<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEMO ERP | تسجيل الدخول</title>
    <style>
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; transition: all 0.3s ease; }
        body.light-mode { --bg: #f1f5f9; --card: #ffffff; --text: #1e293b; --text-muted: #64748b; --border: #e2e8f0; }
        .card { background: var(--card); padding: 40px 30px; border-radius: 20px; width: 450px; max-width: 95%; text-align: center; border: 1px solid var(--border); box-shadow: 0 20px 50px rgba(0,0,0,0.5); position: relative; }
        .logo { width: 70px; height: 70px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 28px; font-weight: bold; color: white; }
        h1 { color: var(--primary); margin-bottom: 10px; font-size: 26px; }
        .mode-toggle { position: absolute; top: 15px; left: 15px; background: none; border: none; color: var(--text-muted); font-size: 20px; cursor: pointer; }
        .demo-box { background: rgba(245,158,11,0.15); border: 1px solid #f59e0b; border-radius: 12px; padding: 15px; margin: 15px 0; text-align: right; }
        .demo-box p { font-size: 14px; color: #f59e0b; font-weight: bold; margin-bottom: 8px; }
        .demo-box span { font-size: 13px; color: var(--text-muted); display: block; line-height: 1.8; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 15px; transition: 0.3s; font-size: 16px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); }
        .btn-demo { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; font-size: 18px; }
        .btn-demo:hover { opacity: 0.9; transform: translateY(-1px); }
        .divider { text-align: center; margin: 15px 0; color: var(--text-muted); font-size: 13px; position: relative; }
        .divider::before, .divider::after { content: ''; position: absolute; top: 50%; width: 40%; height: 1px; background: var(--border); }
        .divider::before { left: 0; }
        .divider::after { right: 0; }
        .notification { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 12px 24px; border-radius: 10px; z-index: 1000; animation: slideDown 0.3s ease; font-weight: bold; }
        @keyframes slideDown { from { opacity: 0; transform: translateX(-50%) translateY(-20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        .notification.success { background: var(--success); color: white; }
        .notification.error { background: var(--danger); color: white; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="card">
    <button class="mode-toggle" onclick="toggleMode()">🌙</button>
    <div class="logo">S</div>
    <h1>SEMO ERP</h1>
    <p style="color: var(--text-muted); margin-bottom: 20px;">نظام تخطيط موارد المؤسسات</p>

    <div class="demo-box">
        <p>🚀 الحسابات التجريبية الجاهزة</p>
        <span>📧 <strong>admin@semo.com</strong> | 🔑 <strong>123456</strong> (مدير)</span>
        <span>📧 <strong>user@semo.com</strong> | 🔑 <strong>123456</strong> (مستخدم)</span>
        <span style="margin-top: 8px; font-size: 12px;">✨ اضغط الزر الأصفر للدخول الفوري ✨</span>
    </div>

    <button class="btn btn-demo" id="demoBtn" onclick="directLogin()">
        🚀 دخول سريع - حساب تجريبي
    </button>

    <div class="divider">أو</div>

    <div>
        <input type="email" id="loginEmail" placeholder="البريد الإلكتروني" style="width:100%; padding:12px; border-radius:10px; border:1px solid var(--border); background:var(--bg); color:var(--text);">
        <input type="password" id="loginPassword" placeholder="كلمة المرور" style="width:100%; padding:12px; margin-top:10px; border-radius:10px; border:1px solid var(--border); background:var(--bg); color:var(--text);">
        <button class="btn btn-primary" onclick="manualLogin()">🔐 تسجيل الدخول</button>
    </div>
</div>

<script>
    // الحسابات التجريبية الثابتة
    const DEMO_ACCOUNTS = {
        admin: { email: "admin@semo.com", password: "123456", role: "admin", name: "مدير النظام", companyName: "SEMO ERP" },
        user:  { email: "user@semo.com",  password: "123456", role: "user",  name: "مستخدم عادي", companyName: "SEMO ERP" }
    };

    function showNotification(msg, type) {
        const n = document.createElement('div');
        n.className = `notification ${type}`;
        n.textContent = msg;
        document.body.appendChild(n);
        setTimeout(() => n.remove(), 3000);
    }

    function toggleMode() {
        document.body.classList.toggle('light-mode');
        document.querySelector('.mode-toggle').textContent = document.body.classList.contains('light-mode') ? '☀️' : '🌙';
    }

    // الدخول المباشر من الزر الأصفر
    function directLogin() {
        const admin = DEMO_ACCOUNTS.admin;
        localStorage.setItem('semo_user', JSON.stringify({
            uid: "demo-admin-001",
            email: admin.email,
            name: admin.name,
            role: admin.role,
            companyName: admin.companyName,
            isActive: true,
            loggedInAt: new Date().toISOString()
        }));
        showNotification(`✅ مرحباً ${admin.name} (مدير النظام)`, 'success');
        setTimeout(() => {
            window.location.href = 'dashboard.html';
        }, 800);
    }

    // الدخول اليدوي (اختياري)
    function manualLogin() {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value.trim();
        
        if (!email || !password) {
            showNotification('⚠️ أدخل البريد وكلمة المرور', 'error');
            return;
        }

        let foundUser = null;
        for (let key in DEMO_ACCOUNTS) {
            if (DEMO_ACCOUNTS[key].email === email && DEMO_ACCOUNTS[key].password === password) {
                foundUser = DEMO_ACCOUNTS[key];
                break;
            }
        }

        if (foundUser) {
            localStorage.setItem('semo_user', JSON.stringify({
                uid: `demo-${foundUser.role}-001`,
                email: foundUser.email,
                name: foundUser.name,
                role: foundUser.role,
                companyName: foundUser.companyName,
                isActive: true,
                loggedInAt: new Date().toISOString()
            }));
            showNotification(`✅ مرحباً ${foundUser.name}`, 'success');
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 800);
        } else {
            showNotification('❌ البريد أو كلمة المرور غير صحيحة', 'error');
        }
    }

    // التحقق من وجود جلسة سابقة
    window.addEventListener('load', function() {
        const savedUser = localStorage.getItem('semo_user');
        if (savedUser) {
            try {
                const user = JSON.parse(savedUser);
                if (user && user.email) {
                    window.location.href = 'dashboard.html';
                }
            } catch(e) {
                localStorage.removeItem('semo_user');
            }
        }
    });

    // دخول بالضغط على Enter
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            manualLogin();
        }
    });
</script>
</body>
</html>
