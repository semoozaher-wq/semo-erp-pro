<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLDEN AI ERP V12</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #0f172a; --accent: #3b82f6; --success: #10b981; --danger: #ef4444; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; }
        [data-theme="dark"] { --primary: #f8fafc; --accent: #60a5fa; --bg: #020617; --card: #1e293b; --text: #f1f5f9; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--bg); color: var(--text); transition: 0.3s; overflow-x: hidden; }

        /* شاشة الدخول */
        .auth-page { position: fixed; inset: 0; z-index: 2000; background: #0f172a; display: flex; align-items: center; justify-content: center; }
        .auth-box { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; color: #333; }
        .auth-box input, .auth-box select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; }

        /* الهيكل الرئيسي */
        .wrapper { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }
        @media (max-width: 768px) { .wrapper { grid-template-columns: 1fr; } .sidebar { display: none; } }
        
        .sidebar { background: #0f172a; color: white; padding: 20px; display: flex; flex-direction: column; gap: 8px; position: sticky; top: 0; height: 100vh; }
        .nav-item { padding: 12px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.2s; font-size: 14px; }
        .nav-item:hover, .nav-item.active { background: var(--accent); color: white; }

        .main { padding: 25px; }
        .card { background: var(--card); padding: 20px; border-radius: 18px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid rgba(0,0,0,0.05); }

        /* بوت الذكاء الاصطناعي */
        #aiBot { position: fixed; bottom: 20px; left: 20px; width: 300px; height: 400px; background: var(--card); border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); display: none; flex-direction: column; z-index: 1000; border: 2px solid var(--accent); }
        .bot-header { background: var(--accent); color: white; padding: 15px; border-radius: 18px 18px 0 0; display: flex; justify-content: space-between; }
        .bot-messages { flex: 1; padding: 15px; overflow-y: auto; font-size: 13px; }
        .bot-input { padding: 10px; border-top: 1px solid #eee; display: flex; }
        
        .btn { padding: 10px 18px; border-radius: 10px; border: none; cursor: pointer; font-weight: 700; transition: 0.2s; }
        .btn-primary { background: var(--accent); color: white; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: rgba(0,0,0,0.02); padding: 12px; font-size: 13px; color: #64748b; }
        td { padding: 12px; border-bottom: 1px solid rgba(0,0,0,0.05); text-align: center; }

        input[type="text"].search-bar { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.1); margin-bottom: 15px; background: var(--card); color: var(--text); }
    </style>
</head>
<body>

<div id="authScreen" class="auth-page">
    <div class="auth-box">
        <h2 style="color:var(--accent)">GOLDEN AI V12</h2>
        <input type="email" id="email" placeholder="البريد الإلكتروني">
        <input type="password" id="password" placeholder="كلمة المرور">
        <select id="userRole">
            <option value="admin">مدير (Admin)</option>
            <option value="user">موظف (User)</option>
        </select>
        <button class="btn btn-primary" style="width: 100%;" onclick="app.handleAuth()" id="authBtn">دخول</button>
        <p onclick="app.toggleAuth()" style="margin-top:15px; cursor:pointer; font-size:13px; color:#64748b;" id="authToggle">ليس لديك حساب؟ إنشاء حساب جديد</p>
    </div>
</div>

<div id="mainApp" class="wrapper" style="display: none;">
    <aside class="sidebar">
        <div style="padding: 10px; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1);">
            <h3 style="color:var(--accent)">AI SYSTEM</h3>
            <small id="roleTag" style="background:var(--success); padding:2px 8px; border-radius:5px; font-size:10px;"></small>
        </div>
        <div class="nav-item active" onclick="app.route('dashboard', this)"><i class="fas fa-chart-pie"></i> لوحة التحكم</div>
        <div class="nav-item" onclick="app.route('pos', this)"><i class="fas fa-cash-register"></i> المبيعات</div>
        <div class="nav-item" onclick="app.route('inventory', this)"><i class="fas fa-boxes"></i> المخزن</div>
        <div class="nav-item" onclick="app.toggleTheme()"><i class="fas fa-moon"></i> الوضع الليلي</div>
        <div class="nav-item" onclick="app.logout()" style="margin-top:auto; color:var(--danger);"><i class="fas fa-power-off"></i> خروج</div>
    </aside>
    <main class="main" id="viewPort"></main>
</div>

<!-- زر المساعد الذكي -->
<button onclick="app.toggleAI()" style="position:fixed; bottom:20px; left:20px; width:60px; height:60px; border-radius:50%; background:var(--accent); color:white; border:none; cursor:pointer; font-size:24px; z-index:1001; box-shadow:0 5px 15px rgba(59,130,246,0.4)">
    <i class="fas fa-robot"></i>
</button>

<div id="aiBot">
    <div class="bot-header"><span>المساعد الذكي AI</span> <i class="fas fa-times" onclick="app.toggleAI()" style="cursor:pointer"></i></div>
    <div class="bot-messages" id="botMsgs">مرحباً! أنا مساعدك الذكي. اسألني عن المبيعات أو الأرباح أو تحليل المخزون.</div>
    <div class="bot-input">
        <input type="text" id="aiQuery" placeholder="اسألني أي شيء..." style="flex:1; border:none; outline:none;">
        <button class="btn btn-primary" onclick="app.askAI()"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
<script>
const firebaseConfig = {
    apiKey: "AIzaSyCfVMHNoqbh86I0JJjnguGY6seA4vWJsSU",
    authDomain: "my-pos-system-11dee.firebaseapp.com",
    databaseURL: "https://my-pos-system-11dee-default-rtdb.firebaseio.com",
    projectId: "my-pos-system-11dee",
    storageBucket: "my-pos-system-11dee.firebasestorage.app",
    messagingSenderId: "565195477080",
    appId: "1:565195477080:web:1ffa21a34e28b47dddfa2d"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

const app = {
    user: null, role: 'user', isSignUp: false,
    data: { products: [], journal: [], customers: {}, vendors: {} },
    cart: [],

    init() {
        auth.onAuthStateChanged(user => {
            if(user) {
                this.user = user;
                this.loadRole();
                document.getElementById('authScreen').style.display='none';
                document.getElementById('mainApp').style.display='grid';
                this.loadData();
                this.startAutoSave();
            } else {
                document.getElementById('authScreen').style.display='flex';
                document.getElementById('mainApp').style.display='none';
            }
        });
    },

    toggleAuth() {
        this.isSignUp = !this.isSignUp;
        document.getElementById('authTitle').innerText = this.isSignUp ? "إنشاء حساب جديد" : "GOLDEN AI V12";
        document.getElementById('authBtn').innerText = this.isSignUp ? "تسجيل" : "دخول";
    },

    async handleAuth() {
        const e = document.getElementById('email').value, p = document.getElementById('password').value, r = document.getElementById('userRole').value;
        try {
            let res;
            if(this.isSignUp) {
                res = await auth.createUserWithEmailAndPassword(e, p);
                await db.ref(`roles/${res.user.uid}`).set(r);
            } else {
                await auth.signInWithEmailAndPassword(e, p);
            }
        } catch(err) { this.notify(err.message, "error"); }
    },

    async loadRole() {
        const snap = await db.ref(`roles/${this.user.uid}`).once('value');
        this.role = snap.val() || 'user';
        document.getElementById('roleTag').innerText = this.role.toUpperCase();
    },

    async loadData() {
        const snap = await db.ref(`v12/${this.user.uid}`).once('value');
        this.data = snap.val() || { products: [], journal: [], customers: {}, vendors: {} };
        this.route('dashboard');
    },

    async sync() {
        try {
            await db.ref(`v12/${this.user.uid}`).set(this.data);
            this.notify("تم مزامنة البيانات تلقائياً ✅");
        } catch (e) { this.notify("خطأ في المزامنة! تحقق من الإنترنت ❌", "error"); }
    },

    startAutoSave() {
        setInterval(() => { this.sync(); }, 60000); // حفظ كل دقيقة
    },

    route(page, el) {
        if(el) { document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active')); el.classList.add('active'); }
        const vp = document.getElementById('viewPort');
        if(page === 'dashboard') vp.innerHTML = this.renderDashboard();
        if(page === 'pos') vp.innerHTML = this.renderPOS();
        if(page === 'inventory') vp.innerHTML = this.renderInventory();
        if(page === 'dashboard') this.initChart();
    },

    renderDashboard() {
        const sales = this.data.journal.reduce((s,j)=>s+j.amount, 0);
        return `
            <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap:20px;">
                <div class="card" style="border-bottom: 4px solid var(--success);"><h4>إجمالي المبيعات</h4><h2>${sales} ج.م</h2></div>
                <div class="card" style="border-bottom: 4px solid var(--danger);"><h4>ديون العملاء</h4><h2>${Object.values(this.data.customers).reduce((a,b)=>a+b,0)} ج.م</h2></div>
                <div class="card" style="border-bottom: 4px solid var(--accent);"><h4>عدد المنتجات</h4><h2>${this.data.products.length}</h2></div>
            </div>
            <div class="card">
                <h3>تحليل المبيعات (الرسم البياني)</h3>
                <canvas id="salesChart" style="max-height:300px;"></canvas>
            </div>
        `;
    },

    initChart() {
        const ctx = document.getElementById('salesChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: this.data.journal.slice(-7).map(j => j.date.split(',')[0]),
                datasets: [{ label: 'المبيعات', data: this.data.journal.slice(-7).map(j => j.amount), borderColor: '#3b82f6', fill: true }]
            }
        });
    },

    renderPOS() {
        return `
            <input type="text" class="search-bar" placeholder="🔍 بحث سريع عن منتج..." oninput="app.filterPOS(this.value)">
            <div style="display:grid; grid-template-columns: 1fr 350px; gap:20px;">
                <div class="card"><div class="prod-grid" id="posGrid">${this.renderProdGrid(this.data.products)}</div></div>
                <div class="card">
                    <h3>السلة</h3>
                    <div id="cartList" style="margin:15px 0; min-height:150px;"></div>
                    <button class="btn btn-primary" style="width:100%" onclick="app.checkout()">إتمام العملية</button>
                </div>
            </div>
        `;
    },

    renderProdGrid(prods) {
        return prods.map(p => `
            <div class="card" style="text-align:center; cursor:pointer;" onclick="app.addToCart(${p.id})">
                <b>${p.name}</b><br><small>${p.price} ج.م</small><br>
                <span style="font-size:10px; color:${p.stock < 5 ? 'red':'green'}">المخزن: ${p.stock}</span>
            </div>
        `).join('');
    },

    filterPOS(val) {
        const filtered = this.data.products.filter(p => p.name.includes(val));
        document.getElementById('posGrid').innerHTML = this.renderProdGrid(filtered);
    },

    addToCart(id) {
        const p = this.data.products.find(x=>x.id===id);
        if(!p || p.stock <= 0) return this.notify("نفذت الكمية من المخزن!", "error");
        this.cart.push({...p});
        this.updateCartUI();
    },

    updateCartUI() {
        const list = document.getElementById('cartList');
        let total = 0;
        list.innerHTML = this.cart.map(i => { total += parseFloat(i.price); return `<div>${i.name} - ${i.price}</div>`; }).join('');
        list.innerHTML += `<hr><b>الإجمالي: ${total}</b>`;
    },

    async checkout() {
        if(!this.cart.length) return;
        const total = this.cart.reduce((s,i)=>s+parseFloat(i.price), 0);
        this.cart.forEach(item => { const p = this.data.products.find(x=>x.id===item.id); if(p) p.stock--; });
        this.data.journal.push({ date: new Date().toLocaleString(), amount: total });
        this.cart = []; this.sync(); this.route('pos');
        this.notify("تمت عملية البيع بنجاح 🧾");
    },

    renderInventory() {
        return `
            <div class="card">
                <h3>إدارة المخزن</h3>
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <input id="n" placeholder="اسم المنتج"> <input id="p" placeholder="السعر"> <input id="s" placeholder="الكمية">
                    <button class="btn btn-primary" onclick="app.saveP()">إضافة</button>
                </div>
            </div>
            <div class="card">
                <table>
                    <thead><tr><th>المنتج</th><th>السعر</th><th>المخزون</th><th>العمليات</th></tr></thead>
                    <tbody>
                        ${this.data.products.map(p => `
                            <tr>
                                <td>${p.name}</td><td>${p.price}</td><td>${p.stock}</td>
                                <td>
                                    ${this.role === 'admin' ? `<button class="btn" style="color:red" onclick="app.delP(${p.id})"><i class="fas fa-trash"></i></button>` : '---'}
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>
        `;
    },

    saveP() {
        const n = document.getElementById('n').value, p = document.getElementById('p').value, s = document.getElementById('s').value;
        if(n && p) { this.data.products.push({ id: Date.now(), name: n, price: p, stock: parseInt(s) }); this.sync(); this.route('inventory'); }
    },

    delP(id) { if(confirm("هل تريد الحذف؟")) { this.data.products = this.data.products.filter(x=>x.id!==id); this.sync(); this.route('inventory'); } },

    toggleAI() { const b = document.getElementById('aiBot'); b.style.display = b.style.display === 'flex' ? 'none' : 'flex'; },

    askAI() {
        const q = document.getElementById('aiQuery').value.toLowerCase();
        const msgBox = document.getElementById('botMsgs');
        let ans = "عذراً، لم أفهم سؤالك. جرب أن تسأل عن (المبيعات، الأرباح، المخزن).";

        if(q.includes("مبيعات") || q.includes("كم")) {
            const total = this.data.journal.reduce((s,j)=>s+j.amount,0);
            ans = `إجمالي مبيعاتك المسجلة حتى الآن هو ${total} ج.م.`;
        } else if(q.includes("مخزن") || q.includes("منتج")) {
            const low = this.data.products.filter(p=>p.stock < 5).length;
            ans = `لديك حالياً ${this.data.products.length} منتجات في المخزن، منها ${low} أصناف أوشكت على النفاد.`;
        } else if(q.includes("نصيحة")) {
            ans = "بناءً على مبيعاتك، أنصحك بزيادة مخزون المنتجات الأكثر طلباً لزيادة أرباحك.";
        }

        msgBox.innerHTML += `<div style="margin-top:10px; color:var(--accent)"><b>أنت:</b> ${q}</div>`;
        msgBox.innerHTML += `<div style="margin-top:5px; color:var(--success)"><b>AI:</b> ${ans}</div>`;
        document.getElementById('aiQuery').value = "";
    },

    notify(msg, type="success") {
        Toastify({ text: msg, duration: 3000, gravity: "top", position: "left", style: { background: type === "success" ? "#10b981" : "#ef4444" } }).showToast();
    },

    toggleTheme() { const t = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'; document.body.setAttribute('data-theme', t); },

    logout() { auth.signOut(); }
};

app.init();
</script>
</body>
</html>
