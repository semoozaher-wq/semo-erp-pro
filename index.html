<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SEMO AI ERP - النسخة الكاملة المتكاملة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* ========== أنماط التصميم الكاملة ========== */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        :root {
            --primary: #3b82f6; --primary-dark: #2563eb; --success: #10b981;
            --danger: #ef4444; --warning: #f59e0b; --info: #8b5cf6;
            --bg: #0f172a; --bg-light: #1e293b; --card: #1e293b;
            --card-light: #334155; --text: #f1f5f9; --text-muted: #94a3b8;
            --border: #334155; --sidebar-width: 280px; --header-height: 60px;
        }
        body { background: var(--bg); color: var(--text); direction: rtl; font-size: 14px; overflow-x: hidden; }
        
        /* Header */
        .top-header { position: fixed; top: 0; right: 0; left: 0; height: var(--header-height); background: var(--card); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; z-index: 99; }
        .header-logo { font-size: 1.3rem; font-weight: 800; color: var(--primary); }
        .header-controls { display: flex; gap: 15px; align-items: center; }
        
        /* Sidebar */
        .sidebar { width: var(--sidebar-width); background: var(--card); position: fixed; right: 0; top: var(--header-height); height: calc(100vh - var(--header-height)); padding: 1rem; overflow-y: auto; z-index: 100; transition: transform 0.3s; border-left: 1px solid var(--border); }
        .menu-item { padding: 10px 16px; margin: 6px 0; border-radius: 12px; cursor: pointer; display: flex; gap: 12px; color: var(--text-muted); transition: all 0.2s; }
        .menu-item:hover, .menu-item.active { background: var(--primary); color: white; transform: translateX(-4px); }
        
        /* Main Content */
        .main-content { margin-right: var(--sidebar-width); margin-top: var(--header-height); padding: 20px; min-height: calc(100vh - var(--header-height)); }
        
        /* Cards */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        .stat-card { background: var(--card); border-radius: 1rem; padding: 1rem; cursor: pointer; border-right: 3px solid var(--primary); transition: transform 0.2s; }
        .stat-card:hover { transform: translateY(-3px); background: var(--card-light); }
        .stat-value { font-size: 1.6rem; font-weight: 800; }
        
        /* Tables */
        .card-box { background: var(--card); border-radius: 1rem; padding: 1.2rem; margin-bottom: 1.2rem; border: 1px solid var(--border); }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 10px; }
        .btn { padding: 6px 16px; border: none; border-radius: 40px; cursor: pointer; font-weight: 600; display: inline-flex; gap: 8px; align-items: center; transition: all 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-warning { background: var(--warning); color: white; }
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th, .data-table td { padding: 10px 8px; text-align: right; border-bottom: 1px solid var(--border); }
        .data-table tr { cursor: pointer; transition: background 0.1s; }
        .data-table tr:hover { background: rgba(59,130,246,0.1); }
        
        /* Badges */
        .badge { padding: 3px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; }
        .badge-success { background: rgba(16,185,129,0.2); color: #34d399; }
        .badge-warning { background: rgba(245,158,11,0.2); color: #fbbf24; }
        .badge-info { background: rgba(139,92,246,0.2); color: #a78bfa; }
        .badge-danger { background: rgba(239,68,68,0.2); color: #f87171; }
        
        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        .modal.show { display: flex; }
        .modal-content { background: var(--card); border-radius: 1rem; max-width: 500px; width: 90%; padding: 1.5rem; max-height: 80vh; overflow-y: auto; }
        
        /* AI Insights */
        .ai-insight { background: linear-gradient(135deg, var(--info), var(--primary)); border-radius: 12px; padding: 12px; margin-bottom: 8px; cursor: pointer; transition: transform 0.2s; }
        .ai-insight:hover { transform: translateX(-5px); }
        
        /* Mobile View */
        body.mobile-view .sidebar { transform: translateX(100%); }
        body.mobile-view .main-content { margin-right: 0; }
        body.mobile-view .sidebar.open { transform: translateX(0); }
        .menu-mobile-btn { display: none; position: fixed; bottom: 20px; left: 20px; background: var(--primary); padding: 12px; border-radius: 40px; z-index: 200; cursor: pointer; }
        body.mobile-view .menu-mobile-btn { display: flex; align-items: center; justify-content: center; }
        
        /* Desktop Compact */
        @media (max-width: 768px) {
            body:not(.mobile-view) .sidebar { width: 70px; }
            body:not(.mobile-view) .sidebar .menu-item span:not(i) { display: none; }
            body:not(.mobile-view) .main-content { margin-right: 70px; }
        }
        
        .profit-positive { color: #34d399; }
        .profit-negative { color: #f87171; }
        input, select, textarea { width: 100%; padding: 10px; margin: 8px 0; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); }
        .online-dot { width: 10px; height: 10px; background: #10b981; border-radius: 50%; display: inline-block; margin-left: 5px; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="top-header">
        <div class="header-logo"><i class="fas fa-microchip"></i> SEMO AI ERP</div>
        <div class="header-controls">
            <div class="date-display" id="currentDate"></div>
            <div class="view-toggle" id="viewToggle" style="display: flex; background: #1e293b; border-radius: 40px;">
                <button class="view-toggle-btn" data-view="desktop" style="padding: 5px 12px; background: none; border: none; color: white; cursor: pointer;">💻</button>
                <button class="view-toggle-btn" data-view="mobile" style="padding: 5px 12px; background: none; border: none; color: white; cursor: pointer;">📱</button>
            </div>
            <div class="notification-bell" id="notificationBell" style="cursor: pointer;"><i class="fas fa-bell"></i><span id="notificationCount" style="background: red; border-radius: 50%; padding: 2px 6px; font-size: 10px;">0</span></div>
            <button id="exportBtn" class="btn btn-info" style="padding: 5px 12px;"><i class="fas fa-file-excel"></i> تصدير</button>
        </div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="menu-item active" data-page="dashboard"><i class="fas fa-chart-line"></i> <span>الرئيسية</span></div>
        <div class="menu-item" data-page="inventory"><i class="fas fa-boxes"></i> <span>المخزون</span></div>
        <div class="menu-item" data-page="suppliers"><i class="fas fa-truck"></i> <span>الموردين</span></div>
        <div class="menu-item" data-page="purchases"><i class="fas fa-shopping-cart"></i> <span>المشتريات</span></div>
        <div class="menu-item" data-page="sales"><i class="fas fa-tag"></i> <span>المبيعات</span></div>
        <div class="menu-item" data-page="accounting"><i class="fas fa-book"></i> <span>دفتر الأستاذ</span></div>
        <div class="menu-item" data-page="trial_balance"><i class="fas fa-scale-balanced"></i> <span>ميزان المراجعة</span></div>
        <div class="menu-item" data-page="clients"><i class="fas fa-users"></i> <span>العملاء</span></div>
        <div class="menu-item" data-page="expenses_rev"><i class="fas fa-coins"></i> <span>المصروفات والإيرادات</span></div>
        <div class="menu-item" data-page="reports"><i class="fas fa-chart-pie"></i> <span>التقارير</span></div>
        <div class="menu-item" data-page="ai_analytics"><i class="fas fa-robot"></i> <span>التحليلات الذكية</span></div>
        <div class="menu-item" data-page="logout"><i class="fas fa-sign-out-alt"></i> <span>خروج</span></div>
    </div>

    <div class="menu-mobile-btn" id="mobileMenuBtn"><i class="fas fa-bars"></i></div>
    <div class="main-content" id="mainContent"><div id="pageContent"></div></div>

    <div id="detailsModal" class="modal" onclick="if(event.target===this) closeModal()">
        <div class="modal-content" id="modalContentInner"></div>
    </div>

<script>
    // ==================== قاعدة البيانات الكاملة ====================
    let db = {
        inventory: JSON.parse(localStorage.getItem('semo_inventory')) || [],
        sales: JSON.parse(localStorage.getItem('semo_sales')) || [],
        clients: JSON.parse(localStorage.getItem('semo_clients')) || [],
        suppliers: JSON.parse(localStorage.getItem('semo_suppliers')) || [],
        purchases: JSON.parse(localStorage.getItem('semo_purchases')) || [],
        expenses: JSON.parse(localStorage.getItem('semo_expenses')) || [],
        revenues: JSON.parse(localStorage.getItem('semo_revenues')) || [],
        journalEntries: JSON.parse(localStorage.getItem('semo_journal')) || [],
        settings: JSON.parse(localStorage.getItem('semo_settings')) || { currencySymbol: 'ريال', nextInvoiceId: 1000, nextPurchaseId: 2000 }
    };

    let charts = [];
    let notifications = [];
    let currentPage = 'dashboard';

    // ==================== الدوال الأساسية ====================
    function saveAll() {
        localStorage.setItem('semo_inventory', JSON.stringify(db.inventory));
        localStorage.setItem('semo_sales', JSON.stringify(db.sales));
        localStorage.setItem('semo_clients', JSON.stringify(db.clients));
        localStorage.setItem('semo_suppliers', JSON.stringify(db.suppliers));
        localStorage.setItem('semo_purchases', JSON.stringify(db.purchases));
        localStorage.setItem('semo_expenses', JSON.stringify(db.expenses));
        localStorage.setItem('semo_revenues', JSON.stringify(db.revenues));
        localStorage.setItem('semo_journal', JSON.stringify(db.journalEntries));
        localStorage.setItem('semo_settings', JSON.stringify(db.settings));
    }

    function todayISO() { 
        let d = new Date(); 
        return `${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,'0')}-${d.getDate().toString().padStart(2,'0')}`; 
    }
    
    function formatCurrency(v) { 
        return (v||0).toLocaleString() + ' ' + db.settings.currencySymbol; 
    }
    
    function showNotification(msg, type = 'success') {
        let div = document.createElement('div');
        div.style.cssText = `position:fixed; bottom:20px; left:20px; background:${type === 'success' ? '#10b981' : type === 'error' ? '#ef4444' : '#f59e0b'}; color:white; padding:10px 20px; border-radius:40px; z-index:1200; font-weight:600;`;
        div.innerHTML = msg;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 2500);
        
        notifications.unshift({ msg, date: new Date().toLocaleString() });
        if (notifications.length > 10) notifications.pop();
        document.getElementById('notificationCount').innerText = notifications.length;
    }

    // ==================== المحاسبة ====================
    function addJournalEntry(description, debitAccount, creditAccount, amount, referenceId = null) {
        db.journalEntries.push({
            id: Date.now(),
            date: todayISO(),
            description: description,
            debitAccount: debitAccount,
            creditAccount: creditAccount,
            amount: amount,
            referenceId: referenceId
        });
        saveAll();
    }

    // ==================== الإحصائيات ====================
    function totalSales() { return db.sales.reduce((s, i) => s + (i.total || 0), 0); }
    function totalPurchases() { return db.purchases.reduce((s, i) => s + (i.total || 0), 0); }
    function totalExpenses() { return db.expenses.reduce((s, i) => s + (i.amount || 0), 0); }
    function totalRevenues() { return db.revenues.reduce((s, i) => s + (i.amount || 0), 0); }
    function netProfit() { return totalSales() - totalPurchases() - totalExpenses() + totalRevenues(); }
    function inventoryValue() { return db.inventory.reduce((s, i) => s + ((i.qty || 0) * (i.costPrice || 0)), 0); }
    function getLowStockCount() { return db.inventory.filter(i => (i.qty || 0) <= 5).length; }
    
    function destroyCharts() { 
        charts.forEach(c => { if (c && c.destroy) c.destroy(); }); 
        charts = []; 
    }

    // تحديث التاريخ
    function updateDate() {
        document.getElementById('currentDate').innerHTML = `<i class="far fa-calendar-alt"></i> ${new Date().toLocaleDateString('ar-EG')}`;
    }
    setInterval(updateDate, 1000);
    updateDate();

    // ==================== الذكاء الاصطناعي ====================
    function getAIAnalytics() {
        let insights = [];
        let profit = netProfit();
        
        if (profit < 0) {
            insights.push(`⚠️ تحذير: خسارة حالية بقيمة ${formatCurrency(Math.abs(profit))}. يوصى بمراجعة أسعار البيع أو تقليل المشتريات.`);
        } else if (profit < 5000) {
            insights.push(`📉 تنبيه: الربح الحالي ${formatCurrency(profit)} منخفض. يوصى بزيادة هامش الربح بنسبة 10%.`);
        } else {
            insights.push(`🎉 إنجاز: الربح الحالي ${formatCurrency(profit)} ممتاز! استمر بنفس السياسة.`);
        }
        
        if (getLowStockCount() > 0) {
            insights.push(`📦 مخزون منخفض: ${getLowStockCount()} منتج (منتجات) تحتاج إلى إعادة طلب عاجلة.`);
        }
        
        // أفضل منتج مبيعاً
        let bestProduct = db.sales.reduce((best, s) => {
            let qty = s.qty || 0;
            if (qty > (best.qty || 0)) return { name: s.productName, qty: qty };
            return best;
        }, { name: 'لا يوجد', qty: 0 });
        
        if (bestProduct.name !== 'لا يوجد') {
            insights.push(`🏆 المنتج الأكثر مبيعاً: ${bestProduct.name} (${bestProduct.qty} قطعة). يوصى بتوفير مخزون إضافي.`);
        }
        
        // أفضل عميل
        let bestClient = db.sales.reduce((best, s) => {
            let total = s.total || 0;
            if (total > (best.total || 0)) return { name: s.clientName, total: total };
            return best;
        }, { name: 'لا يوجد', total: 0 });
        
        if (bestClient.name !== 'لا يوجد') {
            insights.push(`👑 أفضل عميل: ${bestClient.name} (${formatCurrency(bestClient.total)}). فكر في تقديم عرض خاص.`);
        }
        
        // مستحقات العملاء
        let receivables = db.sales.filter(s => s.status !== 'مدفوع').reduce((sum, s) => sum + ((s.total || 0) - (s.paid || 0)), 0);
        if (receivables > 0) {
            insights.push(`💰 مستحقات على العملاء: ${formatCurrency(receivables)}. يوصى بمتابعة التحصيل.`);
        }
        
        // مستحقات للموردين
        let payables = db.purchases.filter(p => p.status !== 'مدفوع').reduce((sum, p) => sum + ((p.total || 0) - (p.paid || 0)), 0);
        if (payables > 0) {
            insights.push(`🏭 مستحقات للموردين: ${formatCurrency(payables)}. خطط للسداد لتجنب التأخير.`);
        }
        
        // توقعات المبيعات
        let avgDaily = totalSales() / 30;
        insights.push(`🔮 توقعات الذكاء الاصطناعي: المبيعات المتوقعة الشهر القادم ${formatCurrency(avgDaily * 30 * 1.1)} (نمو متوقع 10%).`);
        
        // هامش الربح
        let profitMargin = totalSales() > 0 ? (netProfit() / totalSales()) * 100 : 0;
        insights.push(`📊 هامش الربح الإجمالي: ${profitMargin.toFixed(1)}% ${profitMargin > 20 ? '✅ ممتاز' : (profitMargin > 10 ? '🟡 مقبول' : '🔴 يحتاج تحسين')}`);
        
        return insights;
    }

    // ==================== تصدير إلى Excel ====================
    function exportToExcel() {
        let data = [];
        
        // إضافة بيانات المخزون
        db.inventory.forEach(item => {
            data.push({ 'القسم': 'المخزون', 'المنتج': item.name, 'الكمية': item.qty, 'سعر الشراء': item.costPrice, 'سعر البيع': item.sellPrice, 'القيمة': (item.qty || 0) * (item.costPrice || 0) });
        });
        
        // إضافة بيانات المبيعات
        db.sales.forEach(sale => {
            data.push({ 'القسم': 'المبيعات', 'التاريخ': sale.dateISO, 'العميل': sale.clientName, 'المنتج': sale.productName, 'الكمية': sale.qty, 'المبلغ': sale.total, 'المدفوع': sale.paid, 'الحالة': sale.status });
        });
        
        // إضافة بيانات المشتريات
        db.purchases.forEach(purchase => {
            data.push({ 'القسم': 'المشتريات', 'التاريخ': purchase.dateISO, 'المورد': purchase.supplierName, 'المنتج': purchase.productName, 'الكمية': purchase.qty, 'الإجمالي': purchase.total, 'المدفوع': purchase.paid, 'الحالة': purchase.status });
        });
        
        // تحويل إلى CSV
        let headers = Object.keys(data[0] || {});
        let csv = headers.join(',') + '\n';
        data.forEach(row => {
            csv += headers.map(h => JSON.stringify(row[h] || '')).join(',') + '\n';
        });
        
        // تحميل الملف
        let blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' });
        let link = document.createElement('a');
        let url = URL.createObjectURL(blob);
        link.href = url;
        link.setAttribute('download', `semo_erp_export_${todayISO()}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
        
        showNotification('✅ تم تصدير البيانات بنجاح', 'success');
    }

    // ==================== العارضات ====================
    function renderDashboard() {
        let monthlyData = Array(12).fill(0);
        db.sales.forEach(s => {
            if (s.dateISO) {
                let m = parseInt(s.dateISO.split('-')[1]) - 1;
                if (m >= 0 && m < 12) monthlyData[m] += s.total || 0;
            }
        });
        
        let insights = getAIAnalytics();
        
        let html = `
            <div class="stats-grid">
                <div class="stat-card" onclick="switchPage('sales')"><div class="stat-value">${formatCurrency(totalSales())}</div><div>💰 إجمالي المبيعات</div></div>
                <div class="stat-card" onclick="switchPage('purchases')"><div class="stat-value">${formatCurrency(totalPurchases())}</div><div>🚚 إجمالي المشتريات</div></div>
                <div class="stat-card" onclick="switchPage('expenses_rev')"><div class="stat-value">${formatCurrency(totalExpenses())}</div><div>💸 المصروفات</div></div>
                <div class="stat-card" onclick="switchPage('expenses_rev')"><div class="stat-value">${formatCurrency(totalRevenues())}</div><div>💰 الإيرادات</div></div>
                <div class="stat-card" onclick="switchPage('accounting')"><div class="stat-value ${netProfit() >= 0 ? 'profit-positive' : 'profit-negative'}">${formatCurrency(netProfit())}</div><div>📈 صافي الربح</div></div>
                <div class="stat-card" onclick="switchPage('inventory')"><div class="stat-value">${formatCurrency(inventoryValue())}</div><div>📦 قيمة المخزون</div></div>
                <div class="stat-card" onclick="switchPage('suppliers')"><div class="stat-value">${db.suppliers.length}</div><div>🚚 الموردين</div></div>
                <div class="stat-card" onclick="switchPage('clients')"><div class="stat-value">${db.clients.length}</div><div>👥 العملاء</div></div>
            </div>
            <div class="card-box">
                <div class="card-header"><h3><i class="fas fa-microchip"></i> 🤖 تحليلات الذكاء الاصطناعي</h3></div>
                <div id="aiInsightsContainer">${insights.map(i => `<div class="ai-insight" onclick="showNotification('${i.replace(/'/g, "\\'")}', 'info')"><i class="fas fa-robot"></i> ${i}</div>`).join('')}</div>
            </div>
            <div class="card-box">
                <div class="card-header"><h3><i class="fas fa-chart-bar"></i> المبيعات الشهرية</h3></div>
                <canvas id="monthlyChart" height="160"></canvas>
            </div>
            <div class="card-box">
                <div class="card-header"><h3><i class="fas fa-receipt"></i> آخر المبيعات</h3><button class="btn btn-primary" onclick="switchPage('sales')">عرض الكل</button></div>
                <div style="overflow-x:auto">
                    <table class="data-table">
                        <thead><tr><th>التاريخ</th><th>العميل</th><th>المنتج</th><th>المبلغ</th><th>الحالة</th></tr></thead>
                        <tbody id="recentSales"></tbody>
                    </table>
                </div>
            </div>
        `;
        
        document.getElementById('pageContent').innerHTML = html;
        
        let ctx = document.getElementById('monthlyChart').getContext('2d');
        let chart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['يناير', 'فبراير', 'مارس', 'أبريل', 'مايو', 'يونيو', 'يوليو', 'أغسطس', 'سبتمبر', 'أكتوبر', 'نوفمبر', 'ديسمبر'],
                datasets: [{ label: 'المبيعات', data: monthlyData, backgroundColor: '#3b82f6', borderRadius: 8 }]
            },
            options: { responsive: true, maintainAspectRatio: true }
        });
        charts.push(chart);
        
        let recent = [...db.sales].sort((a, b) => (b.dateISO || '').localeCompare(a.dateISO || '')).slice(0, 5);
        document.getElementById('recentSales').innerHTML = recent.map(s => `
            <tr onclick="showSaleDetails(${s.id})">
                <td>${s.dateISO}</td>
                <td>${s.clientName}</td>
                <td>${s.productName || '—'}</td>
                <td>${formatCurrency(s.total)}</td>
                <td><span class="badge ${s.status === 'مدفوع' ? 'badge-success' : 'badge-warning'}">${s.status}</span></td>
            </tr>
        `).join('');
    }

    function addPurchase() {
        if (db.suppliers.length === 0) {
            showNotification('⚠️ يرجى إضافة مورد أولاً', 'error');
            return;
        }
        let list = db.suppliers.map((s, i) => `${i + 1}. ${s.name}`).join('\n');
        let idx = prompt(`اختر رقم المورد:\n${list}`);
        if (!idx) return;
        let supplier = db.suppliers[parseInt(idx) - 1];
        if (!supplier) return;
        
        let productName = prompt('اسم المنتج:');
        if (!productName) return;
        let qty = parseInt(prompt('الكمية:')) || 0;
        let price = parseFloat(prompt('سعر الوحدة:')) || 0;
        let total = qty * price;
        let paid = parseFloat(prompt('المبلغ المدفوع:', '0')) || 0;
        let status = paid >= total ? 'مدفوع' : 'آجل';
        let newId = db.settings.nextPurchaseId++;
        
        db.purchases.push({ id: newId, supplierId: supplier.id, supplierName: supplier.name, productName, qty, price, total, paid, status, dateISO: todayISO() });
        
        let existingProduct = db.inventory.find(p => p.name === productName);
        if (existingProduct) {
            existingProduct.qty = (existingProduct.qty || 0) + qty;
            existingProduct.costPrice = price;
        } else {
            db.inventory.push({ id: Date.now(), name: productName, qty, costPrice: price, sellPrice: price * 1.3, supplierId: supplier.id });
        }
        
        addJournalEntry(`فاتورة شراء #${newId} من ${supplier.name}`, 'المخزون', 'الموردين', total);
        saveAll();
        showNotification(`✅ تم تسجيل فاتورة شراء بمبلغ ${formatCurrency(total)}`);
        renderPurchases();
    }

    function recordPaymentToSupplier(supplierId) {
        let supplier = db.suppliers.find(s => s.id === supplierId);
        if (!supplier) return;
        let amount = parseFloat(prompt('المبلغ المراد تسديده للمورد:'));
        if (isNaN(amount) || amount <= 0) return;
        
        let unpaidPurchases = db.purchases.filter(p => p.supplierId === supplierId && p.status !== 'مدفوع');
        let remainingToPay = amount;
        for (let purchase of unpaidPurchases) {
            let due = purchase.total - purchase.paid;
            if (remainingToPay >= due) {
                purchase.paid = purchase.total;
                purchase.status = 'مدفوع';
                remainingToPay -= due;
            } else {
                purchase.paid += remainingToPay;
                remainingToPay = 0;
                break;
            }
        }
        addJournalEntry(`تسديد دفعة للمورد ${supplier.name}`, 'الموردين', 'النقدية', amount);
        saveAll();
        showNotification(`✅ تم تسديد ${formatCurrency(amount)} للمورد ${supplier.name}`);
        renderSuppliers();
    }

    function quickAddSale() {
        if (db.inventory.length === 0) {
            showNotification('⚠️ لا توجد منتجات في المخزون', 'error');
            return;
        }
        let list = db.inventory.map((p, i) => `${i + 1}. ${p.name} (${p.qty} متاح) - ${formatCurrency(p.sellPrice || p.costPrice * 1.3)}`).join('\n');
        let idx = prompt(`اختر المنتج:\n${list}`);
        if (!idx) return;
        let product = db.inventory[parseInt(idx) - 1];
        if (!product) return;
        
        let qty = parseInt(prompt(`الكمية المتاحة: ${product.qty}`));
        if (isNaN(qty) || qty > product.qty) {
            showNotification('⚠️ كمية غير متوفرة', 'error');
            return;
        }
        let total = qty * (product.sellPrice || product.costPrice * 1.3);
        let paid = parseFloat(prompt('المبلغ المدفوع:', '0')) || 0;
        let clientName = prompt('اسم العميل:', 'عميل نقدي');
        let newId = db.settings.nextInvoiceId++;
        
        product.qty -= qty;
        db.sales.push({ id: newId, clientName: clientName || 'عميل نقدي', productName: product.name, qty, price: product.sellPrice || product.costPrice * 1.3, total, paid, status: paid >= total ? 'مدفوع' : 'آجل', dateISO: todayISO() });
