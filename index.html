<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEMO ERP | الدخول الموحد</title>
    
    <!-- ربط ملف المانيفست لتحويل الموقع لتطبيق -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3b82f6">

    <!-- مكتبات Firebase الأساسية -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <style>
        :root { --main: #3b82f6; --bg: #0f172a; --success: #10b981; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: var(--bg); display: flex; align-items: center; justify-content: center; height: 100vh; color: white; background-image: radial-gradient(circle at top right, #1e293b, #0f172a); }
        .card { background: rgba(255, 255, 255, 0.05); padding: 40px; border-radius: 25px; width: 92%; max-width: 400px; border: 1px solid rgba(255,255,255,0.1); text-align: center; backdrop-filter: blur(10px); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        h1 { color: var(--main); margin-bottom: 25px; font-size: 2.2rem; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #334155; background: rgba(30, 41, 59, 0.8); color: white; outline: none; font-size: 16px; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; background: var(--main); color: white; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 18px; transition: 0.3s; }
        .btn:active { transform: scale(0.98); }
        .link { color: var(--main); font-size: 0.9rem; cursor: pointer; margin-top: 20px; display: block; text-decoration: none; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="card">
        <h1>SEMO ERP</h1>
        
        <!-- واجهة الدخول -->
        <div id="login-view">
            <input type="text" id="log-id" placeholder="الإيميل أو رقم الهاتف">
            <input type="password" id="log-pass" placeholder="كلمة المرور">
            <button class="btn" onclick="login()">دخول النظام</button>
            <span class="link" onclick="toggleView()">تأسيس حساب مؤسسة جديد</span>
        </div>

        <!-- واجهة التسجيل -->
        <div id="signup-view" class="hidden">
            <h3 style="margin-bottom:15px">حساب جديد</h3>
            <input type="email" id="sign-email" placeholder="البريد الإلكتروني">
            <input type="text" id="sign-phone" placeholder="رقم الهاتف">
            <input type="password" id="sign-pass" placeholder="كلمة المرور">
            <button class="btn" style="background: var(--success)" onclick="signup()">إنشاء الحساب والربط ✅</button>
            <span class="link" onclick="toggleView()">العودة للدخول</span>
        </div>
    </div>

    <script>
        // إعدادات مشروعك المربوط my-pos-system-11dee
        const firebaseConfig = {
            apiKey: "AIzaSyC2EVpNEG9XjcPEelUA8lkIUcUceN6Oh0k",
            authDomain: "://firebaseapp.com",
            projectId: "my-pos-system-11dee",
            databaseURL: "https://firebaseio.com"
        };
        
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }

        function toggleView() {
            document.getElementById('login-view').classList.toggle('hidden');
            document.getElementById('signup-view').classList.toggle('hidden');
        }

        // إنشاء الحساب والربط الموحد
        function signup() {
            const email = document.getElementById('sign-email').value.trim();
            const password = document.getElementById('sign-pass').value;
            const phone = document.getElementById('sign-phone').value.trim();

            if(!email || !password || !phone) { alert("أكمل البيانات أولاً يا غالي"); return; }

            firebase.auth().createUserWithEmailAndPassword(email, password)
            .then((u) => {
                firebase.database().ref('users_map/' + phone).set({ email: email })
                .then(() => {
                    alert("تم التسجيل والربط بنجاح!");
                    window.location.href = "dashboard.html";
                });
            })
            .catch((error) => { alert("تنبيه: " + error.message); });
        }

        // الدخول الذكي (إيميل أو هاتف)
        function login() {
            const id = document.getElementById('log-id').value.trim();
            const pass = document.getElementById('log-pass').value;

            if(!id || !pass) { alert("أدخل بيانات الدخول"); return; }

            if(id.includes('@')) {
                performAuth(id, pass);
            } else {
                firebase.database().ref('users_map/' + id).once('value', (snap) => {
                    if(snap.exists()) performAuth(snap.val().email, pass);
                    else alert("رقم الهاتف غير مسجل");
                });
            }
        }

        function performAuth(email, password) {
            firebase.auth().signInWithEmailAndPassword(email, password)
            .then(() => { window.location.href = "dashboard.html"; })
            .catch((error) => { alert("خطأ في البيانات أو كلمة السر"); });
        }

        // كود تفعيل الـ Service Worker لجعل الموقع يعمل كتطبيق
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('التطبيق جاهز للعمل بدون إنترنت'))
                    .catch(err => console.log('فشل تفعيل وضع التطبيق'));
            });
        }
    </script>
</body>
</html>
