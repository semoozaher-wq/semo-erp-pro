<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة الأعمال</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --primary: #1a56db;
            --primary-dark: #1e429f;
            --secondary: #0e9f6e;
            --danger: #e02424;
            --warning: #ff5a1f;
            --bg: #f3f4f6;
            --sidebar-bg: #1e2a3b;
            --sidebar-text: #cbd5e0;
            --sidebar-active: #1a56db;
            --card-bg: #ffffff;
            --text: #111827;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            --nav-height: 60px;
            --sidebar-width: 220px;
        }

        body.dark {
            --bg: #111827;
            --card-bg: #1f2937;
            --text: #f9fafb;
            --text-muted: #9ca3af;
            --border: #374151;
            --sidebar-bg: #0f172a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background 0.3s, color 0.3s;
        }

        /* ===== LOGIN SCREEN ===== */
        #loginScreen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1e2a3b 0%, #1a56db 100%);
        }

        .login-box {
            background: white;
            border-radius: 16px;
            padding: 40px;
            width: 380px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }

        .login-box .logo {
            font-size: 48px;
            color: var(--primary);
            margin-bottom: 10px;
        }

        .login-box h2 {
            font-size: 22px;
            color: #1e2a3b;
            margin-bottom: 6px;
        }

        .login-box p {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 28px;
        }

        .form-group {
            margin-bottom: 16px;
            text-align: right;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
            font-family: inherit;
            direction: rtl;
        }

        .form-group input:focus {
            border-color: var(--primary);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            font-family: inherit;
            margin-top: 4px;
        }

        .btn-login:hover { background: var(--primary-dark); }

        .login-hint {
            margin-top: 14px;
            font-size: 12px;
            color: #9ca3af;
        }

        /* ===== APP LAYOUT ===== */
        #app { display: none; min-height: 100vh; flex-direction: column; }

        /* TOP NAV */
        .topnav {
            height: var(--nav-height);
            background: var(--sidebar-bg);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .topnav-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            font-size: 18px;
            font-weight: 700;
        }

        .topnav-brand i { color: #60a5fa; font-size: 22px; }

        .topnav-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .sync-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: #9ca3af;
        }

        .sync-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #6b7280;
        }

        .sync-dot.online { background: #0e9f6e; box-shadow: 0 0 6px #0e9f6e; }

        .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
            color: white;
            font-size: 14px;
        }

        .user-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
        }

        .btn-icon {
            background: none;
            border: none;
            color: #9ca3af;
            font-size: 18px;
            cursor: pointer;
            padding: 6px;
            border-radius: 6px;
            transition: color 0.2s, background 0.2s;
        }

        .btn-icon:hover { color: white; background: rgba(255,255,255,0.1); }

        /* BODY LAYOUT */
        .app-body {
            display: flex;
            flex: 1;
            min-height: calc(100vh - var(--nav-height));
        }

        /* SIDEBAR */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--sidebar-bg);
            padding: 16px 0;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .sidebar-section-label {
            font-size: 11px;
            font-weight: 700;
            color: #4b5563;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 14px 20px 6px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 11px 20px;
            color: var(--sidebar-text);
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            border-right: 3px solid transparent;
        }

        .nav-item i { width: 18px; text-align: center; font-size: 15px; }

        .nav-item:hover {
            background: rgba(255,255,255,0.07);
            color: white;
        }

        .nav-item.active {
            background: rgba(26, 86, 219, 0.2);
            color: #60a5fa;
            border-right-color: var(--primary);
        }

        /* MAIN CONTENT */
        .main-content {
            flex: 1;
            padding: 28px;
            overflow-y: auto;
        }

        /* PAGE HEADER */
        .page-header {
            margin-bottom: 24px;
        }

        .page-header h1 {
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
        }

        .page-header p {
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 4px;
        }

        /* CARDS */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 16px;
            transition: box-shadow 0.2s;
        }

        .stat-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }

        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .stat-icon.blue { background: #dbeafe; color: var(--primary); }
        .stat-icon.green { background: #d1fae5; color: var(--secondary); }
        .stat-icon.orange { background: #ffedd5; color: var(--warning); }
        .stat-icon.red { background: #fee2e2; color: var(--danger); }

        .stat-info { flex: 1; }
        .stat-value { font-size: 22px; font-weight: 700; color: var(--text); }
        .stat-label { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

        /* TABLE */
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .card-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-header h3 { font-size: 15px; font-weight: 600; color: var(--text); }

        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-success { background: var(--secondary); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-outline {
            background: transparent;
            border: 1.5px solid var(--border);
            color: var(--text);
        }
        .btn-outline:hover { background: var(--bg); }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        thead th {
            background: var(--bg);
            padding: 11px 16px;
            text-align: right;
            font-weight: 600;
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        tbody tr {
            border-top: 1px solid var(--border);
            transition: background 0.15s;
        }

        tbody tr:hover { background: var(--bg); }
        tbody td { padding: 12px 16px; }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-success { background: #d1fae5; color: #065f46; }
        .badge-warning { background: #fef3c7; color: #92400e; }
        .badge-danger { background: #fee2e2; color: #991b1b; }
        .badge-info { background: #dbeafe; color: #1e40af; }

        /* MODAL */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.open { display: flex; }

        .modal {
            background: var(--card-bg);
            border-radius: 14px;
            padding: 28px;
            width: 460px;
            max-width: 95vw;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal h3 { font-size: 17px; font-weight: 700; margin-bottom: 20px; }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .modal .form-group input,
        .modal .form-group select,
        .modal .form-group textarea {
            width: 100%;
            padding: 9px 12px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            background: var(--bg);
            color: var(--text);
            outline: none;
            font-family: inherit;
            direction: rtl;
        }

        .modal .form-group input:focus,
        .modal .form-group select:focus { border-color: var(--primary); }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            justify-content: flex-end;
        }

        /* SEARCH BOX */
        .search-box {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: 8px;
            padding: 8px 12px;
            width: 240px;
        }

        .search-box i { color: var(--text-muted); font-size: 14px; }

        .search-box input {
            border: none;
            background: transparent;
            outline: none;
            font-size: 14px;
            color: var(--text);
            width: 100%;
            font-family: inherit;
            direction: rtl;
        }

        /* TOOLBAR */
        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 10px;
        }

        /* REPORTS */
        .report-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 16px;
        }

        .report-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 22px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: flex-start;
            gap: 14px;
        }

        .report-card:hover {
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
            border-color: var(--primary);
        }

        .report-icon {
            width: 44px;
            height: 44px;
            background: #dbeafe;
            color: var(--primary);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .report-info h4 { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
        .report-info p { font-size: 12px; color: var(--text-muted); }

        /* TOAST */
        .toast-container {
            position: fixed;
            bottom: 24px;
            left: 24px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast {
            padding: 12px 18px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideIn 0.3s ease;
            min-width: 220px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
        }

        .toast-success { background: #065f46; color: white; }
        .toast-error { background: #991b1b; color: white; }
        .toast-info { background: #1e40af; color: white; }

        @keyframes slideIn {
            from { transform: translateX(-30px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<!-- ===== شاشة تسجيل الدخول ===== -->
<div id="loginScreen">
    <div class="login-box">
        <div class="logo"><i class="fas fa-building"></i></div>
        <h2>نظام إدارة الأعمال</h2>
        <p>سجّل دخولك للمتابعة</p>
        <div class="form-group">
            <label>اسم المستخدم</label>
            <input type="text" id="username" placeholder="أدخل اسم المستخدم" value="admin">
        </div>
        <div class="form-group">
            <label>كلمة المرور</label>
            <input type="password" id="password" placeholder="أدخل كلمة المرور" value="admin123"
                   onkeydown="if(event.key==='Enter') auth.login()">
        </div>
        <button class="btn-login" onclick="auth.login()">
            <i class="fas fa-sign-in-alt"></i> تسجيل الدخول
        </button>
        <p class="login-hint">المستخدم: <b>admin</b> | كلمة المرور: <b>admin123</b></p>
    </div>
</div>

<!-- ===== التطبيق الرئيسي ===== -->
<div id="app" style="display:none; flex-direction:column;">

    <!-- الشريط العلوي -->
    <nav class="topnav">
        <div class="topnav-brand">
            <i class="fas fa-building"></i>
            <span>نظام إدارة الأعمال</span>
        </div>
        <div class="topnav-right">
            <div class="sync-badge">
                <div class="sync-dot" id="syncDot"></div>
                <span id="syncText">غير متصل</span>
            </div>
            <button class="btn-icon" onclick="auth.toggleDark()" title="الوضع الليلي">
                <i class="fas fa-moon"></i>
            </button>
            <div class="user-info">
                <div class="user-avatar" id="userAvatar">A</div>
                <span id="currentUsername">المستخدم</span>
            </div>
            <button class="btn-icon" onclick="auth.logout()" title="تسجيل الخروج">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </div>
    </nav>

    <div class="app-body">

        <!-- الشريط الجانبي -->
        <aside class="sidebar">
            <span class="sidebar-section-label">الرئيسية</span>
            <div class="nav-item active" data-page="dashboard" onclick="ui.navigate('dashboard', this)">
                <i class="fas fa-tachometer-alt"></i> لوحة التحكم
            </div>

            <span class="sidebar-section-label">العمليات</span>
            <div class="nav-item" data-page="sales" onclick="ui.navigate('sales', this)">
                <i class="fas fa-shopping-cart"></i> المبيعات
            </div>
            <div class="nav-item" data-page="purchases" onclick="ui.navigate('purchases', this)">
                <i class="fas fa-box"></i> المشتريات
            </div>
            <div class="nav-item" data-page="inventory" onclick="ui.navigate('inventory', this)">
                <i class="fas fa-warehouse"></i> المخزون
            </div>
            <div class="nav-item" data-page="customers" onclick="ui.navigate('customers', this)">
                <i class="fas fa-users"></i> العملاء
            </div>

            <span class="sidebar-section-label">الإدارة</span>
            <div class="nav-item" data-page="reports" onclick="ui.navigate('reports', this)">
                <i class="fas fa-file-invoice"></i> التقارير
            </div>
            <div class="nav-item" data-page="settings" onclick="ui.navigate('settings', this)">
                <i class="fas fa-cog"></i> الإعدادات
            </div>
        </aside>

        <!-- المحتوى الرئيسي -->
        <main class="main-content" id="content">
            <!-- يُعبأ ديناميكياً -->
        </main>
    </div>
</div>

<!-- Modal إضافة عنصر -->
<div class="modal-overlay" id="addModal">
    <div class="modal">
        <h3 id="modalTitle">إضافة عنصر جديد</h3>
        <div id="modalBody"></div>
        <div class="modal-actions">
            <button class="btn btn-outline" onclick="ui.closeModal()">إلغاء</button>
            <button class="btn btn-primary" onclick="ui.saveModal()">
                <i class="fas fa-save"></i> حفظ
            </button>
        </div>
    </div>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<script>
// ============================================================
// البيانات التجريبية
// ============================================================
const db = {
    sales: [
        { id: 1, invoice: 'INV-001', customer: 'شركة النجم', date: '2024-01-10', amount: 15200, status: 'مدفوع' },
        { id: 2, invoice: 'INV-002', customer: 'مؤسسة الخليج', date: '2024-01-12', amount: 8500, status: 'معلق' },
        { id: 3, invoice: 'INV-003', customer: 'شركة المستقبل', date: '2024-01-15', amount: 23000, status: 'مدفوع' },
        { id: 4, invoice: 'INV-004', customer: 'مؤسسة الأمل', date: '2024-01-18', amount: 4300, status: 'متأخر' },
    ],
    purchases: [
        { id: 1, invoice: 'PO-001', supplier: 'شركة الموردين العربية', date: '2024-01-08', amount: 9800, status: 'مستلم' },
        { id: 2, invoice: 'PO-002', supplier: 'مصنع الجودة', date: '2024-01-11', amount: 12500, status: 'في الطريق' },
        { id: 3, invoice: 'PO-003', supplier: 'شركة التوريد الدولية', date: '2024-01-16', amount: 7200, status: 'معلق' },
    ],
    inventory: [
        { id: 1, code: 'P-001', name: 'منتج أ', category: 'إلكترونيات', stock: 145, min: 20, price: 250 },
        { id: 2, code: 'P-002', name: 'منتج ب', category: 'أدوات مكتبية', stock: 8, min: 15, price: 45 },
        { id: 3, code: 'P-003', name: 'منتج ج', category: 'إلكترونيات', stock: 67, min: 10, price: 890 },
        { id: 4, code: 'P-004', name: 'منتج د', category: 'مستلزمات', stock: 0, min: 5, price: 120 },
    ],
    customers: [
        { id: 1, name: 'شركة النجم', contact: 'أحمد محمد', phone: '0501234567', city: 'الرياض', balance: 15200 },
        { id: 2, name: 'مؤسسة الخليج', contact: 'سالم علي', phone: '0557654321', city: 'جدة', balance: -2300 },
        { id: 3, name: 'شركة المستقبل', contact: 'خالد سعد', phone: '0529876543', city: 'الدمام', balance: 0 },
    ]
};

// ============================================================
// المصادقة
// ============================================================
const auth = {
    login() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        if (!username || !password) {
            ui.toast('يرجى إدخال اسم المستخدم وكلمة المرور', 'error');
            return;
        }
        if (username === 'admin' && password === 'admin123') {
            document.getElementById('loginScreen').style.display = 'none';
            const app = document.getElementById('app');
            app.style.display = 'flex';
            document.getElementById('currentUsername').innerText = username;
            document.getElementById('userAvatar').innerText = username[0].toUpperCase();
            document.getElementById('syncDot').classList.add('online');
            document.getElementById('syncText').innerText = 'متصل';
            ui.navigate('dashboard', document.querySelector('.nav-item[data-page="dashboard"]'));
        } else {
            ui.toast('اسم المستخدم أو كلمة المرور غير صحيحة', 'error');
        }
    },
    logout() {
        document.getElementById('app').style.display = 'none';
        document.getElementById('loginScreen').style.display = 'flex';
        ui.toast('تم تسجيل الخروج بنجاح', 'info');
    },
    toggleDark() {
        document.body.classList.toggle('dark');
    }
};

// ============================================================
// واجهة المستخدم
// ============================================================
const ui = {
    currentPage: 'dashboard',

    navigate(page, element) {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        if (element) element.classList.add('active');
        this.currentPage = page;
        this.render(page);
    },

    render(page) {
        const content = document.getElementById('content');
        const pages = {
            dashboard: () => this.renderDashboard(),
            sales: () => this.renderSales(),
            purchases: () => this.renderPurchases(),
            inventory: () => this.renderInventory(),
            customers: () => this.renderCustomers(),
            reports: () => this.renderReports(),
            settings: () => this.renderSettings(),
        };
        if (pages[page]) {
            content.innerHTML = pages[page]();
        } else {
            content.innerHTML = `<div class="page-header"><h1>${page}</h1><p>هذه الصفحة قيد التطوير</p></div>`;
        }
    },

    // ---- لوحة التحكم ----
    renderDashboard() {
        const totalSales = db.sales.reduce((s, i) => s + i.amount, 0);
        const totalPurchases = db.purchases.reduce((s, i) => s + i.amount, 0);
        const lowStock = db.inventory.filter(i => i.stock <= i.min).length;
        return `
        <div class="page-header">
            <h1>لوحة التحكم</h1>
            <p>نظرة عامة على أداء الأعمال</p>
        </div>
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon blue"><i class="fas fa-chart-line"></i></div>
                <div class="stat-info">
                    <div class="stat-value">${totalSales.toLocaleString()} ر.س</div>
                    <div class="stat-label">إجمالي المبيعات</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon orange"><i class="fas fa-shopping-bag"></i></div>
                <div class="stat-info">
                    <div class="stat-value">${totalPurchases.toLocaleString()} ر.س</div>
                    <div class="stat-label">إجمالي المشتريات</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon green"><i class="fas fa-users"></i></div>
                <div class="stat-info">
                    <div class="stat-value">${db.customers.length}</div>
                    <div class="stat-label">إجمالي العملاء</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon red"><i class="fas fa-exclamation-triangle"></i></div>
                <div class="stat-info">
                    <div class="stat-value">${lowStock}</div>
                    <div class="stat-label">مخزون منخفض</div>
                </div>
            </div>
        </div>
        <div class="card">
            <div class="card-header">
                <h3><i class="fas fa-history"></i> آخر المبيعات</h3>
                <button class="btn btn-primary" onclick="ui.navigate('sales', document.querySelector('[data-page=sales]'))">
                    عرض الكل
                </button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>رقم الفاتورة</th>
                        <th>العميل</th>
                        <th>التاريخ</th>
                        <th>المبلغ</th>
                        <th>الحالة</th>
                    </tr>
                </thead>
                <tbody>
                    ${db.sales.slice(0, 3).map(s => `
                    <tr>
                        <td><b>${s.invoice}</b></td>
                        <td>${s.customer}</td>
                        <td>${s.date}</td>
                        <td>${s.amount.toLocaleString()} ر.س</td>
                        <td>${this.statusBadge(s.status)}</td>
                    </tr>`).join('')}
                </tbody>
            </table>
        </div>`;
    },

    // ---- المبيعات ----
    renderSales() {
        return `
        <div class="page-header">
            <h1>المبيعات</h1>
            <p>إدارة فواتير المبيعات والعملاء</p>
        </div>
        <div class="toolbar">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="بحث في المبيعات..." oninput="ui.filterTable(this.value, 'salesTable')">
            </div>
            <button class="btn btn-primary" onclick="ui.openSaleModal()">
                <i class="fas fa-plus"></i> فاتورة جديدة
            </button>
        </div>
        <div class="card">
            <table id="salesTable">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>رقم الفاتورة</th>
                        <th>العميل</th>
                        <th>التاريخ</th>
                        <th>المبلغ</th>
                        <th>الحالة</th>
                        <th>إجراءات</th>
                    </tr>
                </thead>
                <tbody>
                    ${db.sales.map(s => `
                    <tr>
                        <td>${s.id}</td>
                        <td><b>${s.invoice}</b></td>
                        <td>${s.customer}</td>
                        <td>${s.date}</td>
                        <td><b>${s.amount.toLocaleString()} ر.س</b></td>
                        <td>${this.statusBadge(s.status)}</td>
                        <td>
                            <button class="btn btn-outline" style="padding:5px 10px;font-size:12px;" onclick="ui.toast('طباعة الفاتورة ${s.invoice}','info')">
                                <i class="fas fa-print"></i>
                            </button>
                        </td>
                    </tr>`).join('')}
                </tbody>
            </table>
        </div>`;
    },

    openSaleModal() {
        document.getElementById('modalTitle').innerText = 'إضافة فاتورة مبيعات';
        document.getElementById('modalBody').innerHTML = `
            <div class="form-group"><label>العميل</label>
                <select><option>شركة النجم</option><option>مؤسسة الخليج</option><option>شركة المستقبل</option></select>
            </div>
            <div class="form-row">
                <div class="form-group"><label>التاريخ</label><input type="date" value="${new Date().toISOString().split('T')[0]}"></div>
                <div class="form-group"><label>المبلغ</label><input type="number" placeholder="0.00"></div>
            </div>
            <div class="form-group"><label>الحالة</label>
                <select><option>معلق</option><option>مدفوع</option><option>متأخر</option></select>
            </div>`;
        document.getElementById('addModal').classList.add('open');
    },

    // ---- المشتريات ----
    renderPurchases() {
        return `
        <div class="page-header">
            <h1>المشتريات</h1>
            <p>إدارة أوامر الشراء والموردين</p>
        </div>
        <div class="toolbar">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="بحث في المشتريات...">
            </div>
            <button class="btn btn-primary" onclick="ui.toast('إضافة أمر شراء جديد','info')">
                <i class="fas fa-plus"></i> أمر شراء جديد
            </button>
        </div>
        <div class="card">
            <table>
                <thead>
                    <tr><th>#</th><th>رقم الأمر</th><th>المورد</th><th>التاريخ</th><th>المبلغ</th><th>الحالة</th></tr>
                </thead>
                <tbody>
                    ${db.purchases.map(p => `
                    <tr>
                        <td>${p.id}</td>
                        <td><b>${p.invoice}</b></td>
                        <td>${p.supplier}</td>
                        <td>${p.date}</td>
                        <td><b>${p.amount.toLocaleString()} ر.س</b></td>
                        <td>${this.statusBadge(p.status)}</td>
                    </tr>`).join('')}
                </tbody>
            </table>
        </div>`;
    },

    // ---- المخزون ----
    renderInventory() {
        return `
        <div class="page-header">
            <h1>المخزون</h1>
            <p>إدارة المنتجات والكميات</p>
        </div>
        <div class="toolbar">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="بحث في المخزون...">
            </div>
            <button class="btn btn-primary" onclick="ui.toast('إضافة منتج جديد','info')">
                <i class="fas fa-plus"></i> منتج جديد
            </button>
        </div>
        <div class="card">
            <table>
                <thead>
                    <tr><th>الكود</th><th>اسم المنتج</th><th>الفئة</th><th>المخزون</th><th>الحد الأدنى</th><th>السعر</th><th>الحالة</th></tr>
                </thead>
                <tbody>
                    ${db.inventory.map(i => `
                    <tr>
                        <td><b>${i.code}</b></td>
                        <td>${i.name}</td>
                        <td>${i.category}</td>
                        <td>${i.stock}</td>
                        <td>${i.min}</td>
                        <td>${i.price.toLocaleString()} ر.س</td>
                        <td>${i.stock === 0 ? '<span class="badge badge-danger">نفذ</span>' :
                              i.stock <= i.min ? '<span class="badge badge-warning">منخفض</span>' :
                              '<span class="badge badge-success">متوفر</span>'}</td>
                    </tr>`).join('')}
                </tbody>
            </table>
        </div>`;
    },

    // ---- العملاء ----
    renderCustomers() {
        return `
        <div class="page-header">
            <h1>العملاء</h1>
            <p>إدارة بيانات العملاء</p>
        </div>
        <div class="toolbar">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="بحث في العملاء...">
            </div>
            <button class="btn btn-primary" onclick="ui.toast('إضافة عميل جديد','info')">
                <i class="fas fa-plus"></i> عميل جديد
            </button>
        </div>
        <div class="card">
            <table>
                <thead>
                    <tr><th>#</th><th>اسم الشركة</th><th>جهة الاتصال</th><th>الهاتف</th><th>المدينة</th><th>الرصيد</th></tr>
                </thead>
                <tbody>
                    ${db.customers.map(c => `
                    <tr>
                        <td>${c.id}</td>
                        <td><b>${c.name}</b></td>
                        <td>${c.contact}</td>
                        <td dir="ltr">${c.phone}</td>
                        <td>${c.city}</td>
                        <td style="color:${c.balance > 0 ? '#0e9f6e' : c.balance < 0 ? '#e02424' : '#6b7280'}">
                            <b>${c.balance.toLocaleString()} ر.س</b>
                        </td>
                    </tr>`).join('')}
                </tbody>
            </table>
        </div>`;
    },

    // ---- التقارير ----
    renderReports() {
        const reports = [
            { icon: 'fa-chart-bar', title: 'تقرير المبيعات', desc: 'ملخص شامل لحركة المبيعات' },
            { icon: 'fa-chart-pie', title: 'تقرير الأرباح', desc: 'تحليل الإيرادات والمصروفات' },
            { icon: 'fa-warehouse', title: 'تقرير المخزون', desc: 'حركة المنتجات والكميات' },
            { icon: 'fa-users', title: 'تقرير العملاء', desc: 'أداء العملاء والمديونيات' },
            { icon: 'fa-box', title: 'تقرير المشتريات', desc: 'ملخص حركة المشتريات' },
            { icon: 'fa-file-alt', title: 'كشف الحساب', desc: 'تقرير تفصيلي لكل حساب' },
        ];
        return `
        <div class="page-header">
            <h1>التقارير</h1>
            <p>تقارير شاملة لجميع العمليات</p>
        </div>
        <div class="report-grid">
            ${reports.map(r => `
            <div class="report-card" onclick="ui.toast('جاري تحميل ${r.title}...','info')">
                <div class="report-icon"><i class="fas ${r.icon}"></i></div>
                <div class="report-info">
                    <h4>${r.title}</h4>
                    <p>${r.desc}</p>
                </div>
            </div>`).join('')}
        </div>`;
    },

    // ---- الإعدادات ----
    renderSettings() {
        return `
        <div class="page-header">
            <h1>الإعدادات</h1>
            <p>إعدادات النظام والمظهر</p>
        </div>
        <div class="card" style="padding:24px;max-width:500px;">
            <h3 style="margin-bottom:20px;">إعدادات عامة</h3>
            <div class="form-group" style="margin-bottom:16px;">
                <label style="font-weight:600;display:block;margin-bottom:6px;">اسم الشركة</label>
                <input type="text" value="شركتي للتجارة" style="width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;background:var(--bg);color:var(--text);font-family:inherit;">
            </div>
            <div class="form-group" style="margin-bottom:16px;">
                <label style="font-weight:600;display:block;margin-bottom:6px;">العملة الافتراضية</label>
                <select style="width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;background:var(--bg);color:var(--text);font-family:inherit;">
                    <option>ريال سعودي (ر.س)</option>
                    <option>دولار أمريكي ($)</option>
                    <option>درهم إماراتي</option>
                </select>
            </div>
            <button class="btn btn-primary" onclick="ui.toast('تم حفظ الإعدادات','success')">
                <i class="fas fa-save"></i> حفظ الإعدادات
            </button>
        </div>`;
    },

    // ---- أدوات مساعدة ----
    statusBadge(status) {
        const map = {
            'مدفوع': 'badge-success', 'مستلم': 'badge-success',
            'معلق': 'badge-warning', 'في الطريق': 'badge-info',
            'متأخر': 'badge-danger', 'ملغي': 'badge-danger'
        };
        return `<span class="badge ${map[status] || 'badge-info'}">${status}</span>`;
    },

    filterTable(query, tableId) {
        const table = document.getElementById(tableId);
        if (!table) return;
        const rows = table.querySelectorAll('tbody tr');
        rows.forEach(row => {
            row.style.display = row.innerText.includes(query) ? '' : 'none';
        });
    },

    closeModal() {
        document.getElementById('addModal').classList.remove('open');
    },

    saveModal() {
        this.closeModal();
        this.toast('تم الحفظ بنجاح', 'success');
    },

    toast(msg, type = 'info') {
        const container = document.getElementById('toastContainer');
        const icons = { success: 'fa-check-circle', error: 'fa-times-circle', info: 'fa-info-circle' };
        const toast = document.createElement('div');
        toast.className = `toast toast-${type}`;
        toast.innerHTML = `<i class="fas ${icons[type]}"></i> ${msg}`;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
};

// ---- إغلاق Modal عند النقر خارجه ----
document.getElementById('addModal').addEventListener('click', function(e) {
    if (e.target === this) ui.closeModal();
});
</script>
</body>
</html>
