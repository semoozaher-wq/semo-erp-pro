<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLDEN ERP V1.2 | الإصدار النهائي الشامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #0f172a; --accent: #3b82f6; --success: #10b981; --danger: #ef4444; --warning: #f59e0b; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; }
        [data-theme="dark"] { --primary: #f8fafc; --accent: #60a5fa; --bg: #020617; --card: #1e293b; --text: #f1f5f9; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--bg); color: var(--text); transition: 0.3s; }
        .wrapper { display: flex; }
        .sidebar { width: 260px; background: var(--primary); color: white; position: fixed; right: 0; height: 100vh; padding: 20px; z-index: 1000; }
        .main { flex: 1; margin-right: 260px; padding: 25px; min-height: 100vh; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 12px; cursor: pointer; color: #94a3b8; margin-bottom: 5px; transition: 0.2s; }
        .nav-item.active, .nav-item:hover { background: var(--accent); color: white; }
        .card { background: var(--card); border-radius: 20px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .btn { padding: 8px 12px; border-radius: 8px; border: none; cursor: pointer; font-weight: 700; display: inline-flex; align-items: center; gap: 5px; }
        .btn-p { background: var(--accent); color: white; } .btn-d { background: var(--danger); color: white; } .btn-s { background: var(--success); color: white; }
        input, select { padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; width: 100%; margin-top: 5px; background: var(--card); color: var(--text); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; border-bottom: 1px solid #f1f5f9; text-align: center; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { background: var(--bg); width: 90%; max-width: 500px; padding: 25px; border-radius: 20px; }
        .qty-btn { width: 30px; height: 30px; border-radius: 5px; border: 1px solid #ddd; cursor: pointer; }
        .theme-toggle { position: fixed; bottom: 20px; left: 280px; z-index: 1001; }
        @media print { .sidebar, .btn, .no-print, .theme-toggle { display: none !important; } .main { margin: 0; } }
    </style>
</head>
<body data-theme="light">

<div id="authScreen" style="position:fixed; inset:0; background:var(--primary); z-index:9999; display:flex; align-items:center; justify-content:center;">
    <div class="card" style="width:90%; max-width:400px; text-align:center;">
        <h2 id="authTitle" style="color:var(--accent); margin-bottom:20px;">تسجيل الدخول</h2>
        <input type="email" id="authEmail" placeholder="البريد الإلكتروني">
        <input type="password" id="authPass" placeholder="كلمة المرور">
        <div id="roleSelect" style="display:none; margin-top:10px;">
            <select id="userRole"><option value="admin">مدير النظام</option><option value="staff">موظف مبيعات</option></select>
        </div>
        <button class="btn btn-p" style="width:100%; margin-top:15px; justify-content:center;" onclick="app.handleAuth()">دخول</button>
        <p id="toggleAuth" style="margin-top:15px; cursor:pointer; color:var(--accent);" onclick="app.toggleAuthMode()">إنشاء حساب جديد</p>
    </div>
</div>

<div class="wrapper" id="appUI" style="display:none;">
    <aside class="sidebar">
        <h2 style="text-align:center; color:var(--accent); margin-bottom:20px;">GOLDEN V1.2</h2>
        <nav id="mainNav"></nav>
    </aside>
    <main class="main" id="viewPort"></main>
</div>

<button class="btn btn-p theme-toggle" onclick="app.toggleTheme()"><i class="fas fa-moon"></i></button>
<div id="modal" class="modal"><div class="modal-content" id="modalBody"></div></div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyCfVMHNoqbh86I0JJjnguGY6seA4vWJsSU",
    authDomain: "my-pos-system-11dee.firebaseapp.com",
    databaseURL: "https://my-pos-system-11dee-default-rtdb.firebaseio.com",
    projectId: "my-pos-system-11dee"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

const app = {
    user: null, role: 'staff', discount: 0,
    data: { products: [], sales: [], contacts: [], expenses: [], returns: [], categories: ["عام"] },
    cart: [],

    init() {
        auth.onAuthStateChanged(u => {
            if(u) {
                this.user = u;
                db.ref(`users/${u.uid}/role`).once('value', s => {
                    this.role = s.val() || 'admin';
                    this.loadData();
                });
            } else {
                document.getElementById('authScreen').style.display = 'flex';
                document.getElementById('appUI').style.display = 'none';
            }
        });
    },

    toggleTheme() {
        const b = document.body;
        const current = b.getAttribute('data-theme');
        b.setAttribute('data-theme', current === 'light' ? 'dark' : 'light');
    },

    toggleAuthMode() {
        this.authMode = this.authMode === 'login' ? 'signup' : 'login';
        document.getElementById('authTitle').innerText = this.authMode === 'login' ? 'دخول' : 'حساب جديد';
        document.getElementById('roleSelect').style.display = this.authMode === 'login' ? 'none' : 'block';
    },

    handleAuth() {
        const e = document.getElementById('authEmail').value, p = document.getElementById('authPass').value;
        if(this.authMode === 'signup') {
            auth.createUserWithEmailAndPassword(e,p).then(res => {
                db.ref(`users/${res.user.uid}/role`).set(document.getElementById('userRole').value);
            }).catch(err => alert(err.message));
        } else {
            auth.signInWithEmailAndPassword(e,p).catch(err => alert(err.message));
        }
    },

    loadData() {
        db.ref(`users/${this.user.uid}/data`).on('value', s => {
            const d = s.val() || {};
            this.data = {
                products: d.products || [],
                sales: d.sales || [],
                contacts: d.contacts || [],
                expenses: d.expenses || [],
                returns: d.returns || [],
                categories: d.categories || ["عام"]
            };
            this.drawNav();
            this.route('dash');
        });
    },

    save() { db.ref(`users/${this.user.uid}/data`).set(this.data); },

    drawNav() {
        let h = `<div class="nav-item active" onclick="app.route('dash', this)"><i class="fas fa-home"></i> الرئيسية</div>
                 <div class="nav-item" onclick="app.route('pos', this)"><i class="fas fa-cash-register"></i> المبيعات</div>`;
        if(this.role === 'admin') {
            h += `<div class="nav-item" onclick="app.route('stock', this)"><i class="fas fa-boxes"></i> المخزن</div>
                  <div class="nav-item" onclick="app.route('ledger', this)"><i class="fas fa-users"></i> الحسابات</div>
                  <div class="nav-item" onclick="app.route('exp', this)"><i class="fas fa-wallet"></i> المصاريف</div>
                  <div class="nav-item" onclick="app.route('returns', this)"><i class="fas fa-undo"></i> المرتجعات</div>`;
        }
        h += `<div class="nav-item" onclick="auth.signOut()" style="color:var(--danger); margin-top:20px;"><i class="fas fa-sign-out-alt"></i> خروج</div>`;
        document.getElementById('mainNav').innerHTML = h;
        document.getElementById('appUI').style.display = 'flex';
        document.getElementById('authScreen').style.display = 'none';
    },

    route(p, el) {
        if(el) { document.querySelectorAll('.nav-item').forEach(i=>i.classList.remove('active')); el.classList.add('active'); }
        const v = document.getElementById('viewPort');
        if(p === 'dash') v.innerHTML = this.renderDash();
        if(p === 'pos') v.innerHTML = this.renderPOS();
        if(p === 'stock') v.innerHTML = this.renderStock();
        if(p === 'ledger') v.innerHTML = this.renderLedger();
        if(p === 'exp') v.innerHTML = this.renderExp();
        if(p === 'returns') v.innerHTML = this.renderReturns();
        if(p === 'dash' && this.role === 'admin') this.initChart();
    },

    renderDash() {
        const s = this.data.sales?.reduce((a,b)=>a+Number(b.total),0) || 0;
        const e = this.data.expenses?.reduce((a,b)=>a+Number(b.amount),0) || 0;
        return `
            <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap:20px;">
                <div class="card" style="background:var(--accent); color:white;"><h4>المبيعات</h4><h2>${s}</h2></div>
                ${this.role === 'admin' ? `<div class="card" style="background:var(--danger); color:white;"><h4>المصاريف</h4><h2>${e}</h2></div>
                <div class="card" style="background:var(--success); color:white;"><h4>الربح</h4><h2>${s - e}</h2></div>` : ''}
            </div>
            ${this.role === 'admin' ? `<div class="card"><canvas id="salesChart" height="100"></canvas></div>` : ''}
            <div class="card"><h3>📊 العمليات الأخيرة <button class="btn btn-s" onclick="app.exportToExcel('sales')">تصدير Excel</button></h3>
            <table><thead><th>التاريخ</th><th>المبلغ</th><th>إجراء</th></thead>
            <tbody>${this.data.sales?.slice(0,5).map(x=>`<tr><td>${x.date}</td><td>${x.total}</td><td><button class="btn btn-p" onclick="app.printInv('${x.id}')">📄</button></td></tr>`).join('')}</tbody></table></div>`;
    },

    initChart() {
        const ctx = document.getElementById('salesChart').getContext('2d');
        new Chart(ctx, { type: 'line', data: { labels: this.data.sales?.slice(0,7).map(x=>x.date), datasets: [{ label: 'مبيعات', data: this.data.sales?.slice(0,7).map(x=>x.total), borderColor: '#3b82f6', fill: true }] } });
    },

    renderPOS() {
        return `
            <div style="display:grid; grid-template-columns: 1fr 380px; gap:20px;">
                <div class="card">
                    <div style="display:flex; gap:10px;">
                        <input type="text" placeholder="بحث..." onkeyup="app.filterPOS(this.value)">
                        <select onchange="app.filterPOS(this.value)" style="width:150px;">
                            <option value="">كل الفئات</option>
                            ${this.data.categories.map(c=>`<option value="${c}">${c}</option>`).join('')}
                        </select>
                    </div>
                    <div id="posGrid" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap:10px; margin-top:15px;">
                        ${this.data.products?.filter(p=>p.qty>0).map(p=>`<div class="card" style="text-align:center; cursor:pointer;" onclick="app.addToCart('${p.id}')"><b>${p.name}</b><br><small>${p.price} ج.م</small><br><span style="font-size:10px; color:var(--accent)">${p.cat || 'عام'}</span></div>`).join('')}
                    </div>
                </div>
                <div class="card">
                    <h3>🛒 السلة</h3>
                    <div id="cartList" style="min-height:200px; border-bottom:1px solid #eee;"></div>
                    <div style="margin-top:10px;">
                        <input type="number" id="discInput" placeholder="خصم نقدي" oninput="app.applyDiscount(this.value)">
                    </div>
                    <h2 style="padding:15px 0;">الإجمالي: <span id="cartTotal">0</span></h2>
                    <button class="btn btn-p" style="width:100%; height:50px;" onclick="app.checkout()">إتمام و طباعة QR</button>
                </div>
            </div>`;
    },

    addToCart(id) {
        const p = this.data.products.find(x=>x.id==id);
        const inCart = this.cart.find(x=>x.id==id);
        if(inCart) { if(inCart.count < p.qty) inCart.count++; else alert("الكمية انتهت!"); }
        else { this.cart.push({...p, count: 1}); }
        this.updateCart();
    },

    applyDiscount(val) { this.discount = Number(val); this.updateCart(); },

    updateCart() {
        const area = document.getElementById('cartList');
        area.innerHTML = this.cart.map((it, i)=>`
            <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                <span>${it.name}</span>
                <div style="display:flex; align-items:center; gap:5px;">
                    <button class="qty-btn" onclick="app.changeQty(${i}, -1)">-</button>
                    <span>${it.count}</span>
                    <button class="qty-btn" onclick="app.changeQty(${i}, 1)">+</button>
                </div>
                <b>${it.price * it.count}</b>
            </div>`).join('');
        const subTotal = this.cart.reduce((a,b)=>a+(b.price*b.count),0);
        document.getElementById('cartTotal').innerText = subTotal - this.discount;
    },

    changeQty(i, v) {
        const it = this.cart[i];
        const p = this.data.products.find(x=>x.id == it.id);
        if(v === 1 && it.count < p.qty) it.count++;
        if(v === -1 && it.count > 1) it.count--;
        this.updateCart();
    },

    checkout() {
        if(this.cart.length === 0) return;
        const total = Number(document.getElementById('cartTotal').innerText);
        this.cart.forEach(it => { this.data.products.find(x=>x.id==it.id).qty -= it.count; });
        const invId = Date.now();
        this.data.sales.unshift({ id: invId, total, date: new Date().toLocaleString(), items: [...this.cart], discount: this.discount });
        this.save(); this.printInv(invId); this.cart = []; this.discount = 0; this.updateCart();
    },

    printInv(id) {
        const inv = this.data.sales.find(x=>x.id == id);
        document.getElementById('modalBody').innerHTML = `<div style="text-align:center;"><h2>GOLDEN ERP</h2><p>فاتورة #${inv.id}</p><hr><h3>المجموع: ${inv.total}</h3><div id="qr" style="display:flex; justify-content:center; margin-top:10px;"></div></div><button class="btn btn-p" style="width:100%; margin-top:10px;" onclick="window.print()">طباعة</button><button class="btn btn-d" style="width:100%;" onclick="document.getElementById('modal').style.display='none'">إغلاق</button>`;
        new QRCode(document.getElementById("qr"), { text: `INV-${inv.id}`, width: 100, height: 100 });
        document.getElementById('modal').style.display = 'flex';
    },

    renderStock() {
        return `<div class="card"><h3>📦 المخزن <button class="btn btn-s" onclick="app.exportToExcel('products')">تصدير Excel</button></h3>
        <div style="display:grid; grid-template-columns: 1fr 1fr 1fr 1fr auto; gap:8px;">
            <input id="pn" placeholder="الاسم">
            <input id="pp" placeholder="السعر">
            <input id="pq" placeholder="الكمية">
            <select id="pc">${this.data.categories.map(c=>`<option value="${c}">${c}</option>`).join('')}</select>
            <button class="btn btn-p" onclick="app.addP()">حفظ</button>
        </div>
        <div style="margin-top:10px; display:flex; gap:10px;">
            <input placeholder="إضافة فئة جديدة..." id="newCatInput">
            <button class="btn btn-s" onclick="app.addCat()">إضافة فئة</button>
        </div>
        <table id="stockTable"><thead><th>المنتج</th><th>الفئة</th><th>السعر</th><th>الكمية</th><th>إجراء</th></thead>
        <tbody>${this.data.products?.map(p=>`<tr><td>${p.name}</td><td>${p.cat || 'عام'}</td><td>${p.price}</td><td>${p.qty}</td><td><button class="btn btn-s" onclick="app.editP('${p.id}')">تعديل</button><button class="btn btn-d" onclick="app.del('products','${p.id}')">حذف</button></td></tr>`).join('')}</tbody></table></div>`;
    },

    addCat() { const v = document.getElementById('newCatInput').value; if(v){this.data.categories.push(v); this.save();}},
    addP() { const n=document.getElementById('pn').value, p=document.getElementById('pp').value, q=document.getElementById('pq').value, c=document.getElementById('pc').value; if(n&&p&&q){this.data.products.push({id:Date.now(), name:n, price:Number(p), qty:Number(q), cat:c}); this.save();} },
    editP(id) {
        const p = this.data.products.find(x=>x.id==id);
        const nn=prompt("الاسم:", p.name), np=prompt("السعر:", p.price), nq=prompt("الكمية:", p.qty);
        if(nn&&np&&nq){ p.name=nn; p.price=Number(np); p.qty=Number(nq); this.save();}
    },

    renderLedger() {
        return `<div class="card"><h3>👥 الحسابات</h3>
        <div style="display:flex; gap:8px;"><input id="cn" placeholder="الاسم"><select id="ct"><option value="عميل">عميل</option><option value="مورد">مورد</option></select><button class="btn btn-p" onclick="app.addContact()">إضافة</button></div>
        <table><thead><th>الاسم</th><th>النوع</th><th>الرصيد</th><th>إجراء</th></thead>
        <tbody>${this.data.contacts?.map(c=>`<tr><td>${c.name}</td><td>${c.type}</td><td>${c.balance || 0}</td><td><button class="btn btn-p" onclick="app.payDebt('${c.id}')">تسديد</button><button class="btn btn-d" onclick="app.del('contacts','${c.id}')">حذف</button></td></tr>`).join('')}</tbody></table></div>`;
    },

    addContact() { const n=document.getElementById('cn').value, t=document.getElementById('ct').value; if(n){this.data.contacts.push({id:Date.now(), name:n, type:t, balance:0}); this.save();}},
    payDebt(id) { const c=this.data.contacts.find(x=>x.id==id), a=prompt("المبلغ:"); if(a){c.balance-=Number(a); this.save();}},

    renderExp() {
        return `<div class="card"><h3>💸 المصاريف</h3>
        <div style="display:flex; gap:8px;"><input id="en" placeholder="البيان"><input id="ea" placeholder="المبلغ"><button class="btn btn-d" onclick="app.addExp()">إضافة</button></div>
        <table><thead><th>التاريخ</th><th>البيان</th><th>المبلغ</th><th>إجراء</th></thead>
        <tbody>${this.data.expenses?.map((x,i)=>`<tr><td>${x.date}</td><td>${x.note}</td><td>${x.amount}</td><td><button class="btn btn-d" onclick="app.delExp(${i})">حذف</button></td></tr>`).join('')}</tbody></table></div>`;
    },

    addExp() { const n=document.getElementById('en').value, a=document.getElementById('ea').value; if(n&&a){this.data.expenses.unshift({note:n, amount:Number(a), date:new Date().toLocaleDateString()}); this.save();}},
    delExp(i) { this.data.expenses.splice(i,1); this.save(); },

    renderReturns() {
        return `<div class="card"><h3>↩️ المرتجعات</h3>
        <div style="display:flex; gap:8px;"><input id="ri" placeholder="رقم الفاتورة"><input id="ra" placeholder="المبلغ"><button class="btn btn-w" onclick="app.addRet()" style="background:var(--warning); color:white;">تسجيل</button></div>
        <table><thead><th>التاريخ</th><th>الفاتورة</th><th>المبلغ</th></thead>
        <tbody>${this.data.returns?.map(r=>`<tr><td>${r.date}</td><td>${r.invId}</td><td>${r.total}</td></tr>`).join('')}</tbody></table></div>`;
    },

    addRet() { const i=document.getElementById('ri').value, a=document.getElementById('ra').value; if(i&&a){this.data.returns.unshift({invId:i, total:Number(a), date:new Date().toLocaleString()}); this.save();}},

    exportToExcel(type) {
        const ws = XLSX.utils.json_to_sheet(this.data[type]);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, type);
        XLSX.writeFile(wb, `${type}_export.xlsx`);
    },

    del(type, id) { if(confirm("حذف نهائي؟")) { this.data[type] = this.data[type].filter(x=>x.id != id); this.save(); } },
    filterTable(id, val) { const rows = document.querySelectorAll(`#${id} tbody tr`); rows.forEach(r => r.style.display = r.innerText.toLowerCase().includes(val.toLowerCase()) ? '' : 'none'); },
    filterPOS(val) { const items = document.querySelectorAll('#posGrid .card'); items.forEach(i => i.style.display = i.innerText.toLowerCase().includes(val.toLowerCase()) ? '' : 'none'); }
};
app.init();
</script>
</body>
</html>
