<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>ERP PRO - أفضل نسخة نهائية</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{--bg:#f1f5f9;--cd:#fff;--pri:#0d9488;--prd:#0f766e;--ok:#10b981;--er:#ef4444;--wr:#f59e0b;--tx:#0f172a;--mt:#64748b;--bd:#e2e8f0;--prl:#ccfbf1}
.dk{--bg:#0f172a;--cd:#1e293b;--pri:#14b8a6;--prd:#0d9488;--ok:#34d399;--er:#f87171;--wr:#fbbf24;--tx:#f1f5f9;--mt:#94a3b8;--bd:#334155;--prl:#042f2e}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}
body{background:var(--bg);color:var(--tx);direction:rtl;min-height:100vh;transition:background .3s}
.lp{display:flex;justify-content:center;align-items:center;min-height:100vh;background:linear-gradient(135deg,#0f172a,#134e4a);padding:16px}
.lb{background:rgba(255,255,255,.97);padding:32px;border-radius:28px;width:400px;text-align:center;box-shadow:0 25px 60px rgba(0,0,0,.4);z-index:1}
.dk .lb{background:rgba(30,41,59,.97)}
.lb h2{font-size:1.7rem;background:linear-gradient(135deg,var(--pri),#059669);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.lb .sb{color:var(--mt);margin-bottom:18px;font-size:12px}
.lb input{width:100%;padding:12px 14px;margin:6px 0;border:2px solid var(--bd);border-radius:12px;font-size:13px;background:var(--cd);color:var(--tx)}
.lb input:focus{outline:none;border-color:var(--pri);box-shadow:0 0 0 3px rgba(13,148,136,.1)}
.bp{background:linear-gradient(135deg,var(--pri),var(--prd));color:#fff;border:none;padding:12px;border-radius:12px;width:100%;cursor:pointer;font-weight:700;font-size:14px;transition:.3s;display:flex;align-items:center;justify-content:center;gap:8px}
.bp:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(13,148,136,.3)}
.sa{margin-top:12px;cursor:pointer;font-size:12px;color:var(--mt)}
.ap{display:none}
.hd{background:var(--cd);padding:12px 20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:100}
.lo{font-size:1.3rem;font-weight:900;background:linear-gradient(135deg,var(--pri),#059669);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hb{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.hb button{padding:6px 12px;border-radius:10px;border:2px solid var(--bd);background:var(--cd);color:var(--tx);cursor:pointer;font-size:12px;font-weight:600;transition:.3s}
.hb button:hover{border-color:var(--pri)}
.nb{position:relative;cursor:pointer}
.nc{position:absolute;top:-4px;right:-4px;background:var(--er);color:#fff;font-size:9px;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}
.np{position:absolute;top:100%;left:0;background:var(--cd);border:1px solid var(--bd);border-radius:12px;width:280px;box-shadow:0 15px 40px rgba(0,0,0,.15);z-index:200;display:none;max-height:280px;overflow-y:auto}
.np.sh{display:block}
.ni{padding:8px 12px;border-bottom:1px solid var(--bd);font-size:11px;cursor:pointer}.ni:hover{background:var(--bg)}
.mn{display:flex;justify-content:center;background:var(--cd);padding:8px 6px;flex-wrap:wrap;border-bottom:1px solid var(--bd);position:sticky;top:62px;z-index:99;overflow-x:auto;gap:4px}
.mi{text-align:center;cursor:pointer;padding:6px 8px;border-radius:14px;transition:.3s;min-width:52px;flex-shrink:0}
.mi:hover{background:var(--prl)}.mi.ac{background:var(--prl)}
.mi i{width:38px;height:38px;background:linear-gradient(135deg,var(--pri),var(--prd));border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 3px;color:#fff;font-size:14px}
.mi.ac i{box-shadow:0 3px 12px rgba(13,148,136,.3);transform:scale(1.05)}
.mi span{font-size:9px;color:var(--mt);font-weight:600;display:block}
.pg{padding:20px;max-width:1400px;margin:0 auto;padding-bottom:100px}
.sg{display:grid;grid-template-columns:repeat(2,1fr);gap:15px;margin-bottom:20px}
@media(min-width:768px){.sg{grid-template-columns:repeat(3,1fr)}}
@media(min-width:1100px){.sg{grid-template-columns:repeat(6,1fr)}}
.sc{background:var(--cd);border-radius:20px;padding:18px 12px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.04);border:1px solid var(--bd);transition:.3s;cursor:pointer;position:relative;overflow:hidden}
.sc:hover{transform:translateY(-3px);box-shadow:0 8px 25px rgba(0,0,0,.08)}
.sc::after{content:'';position:absolute;top:0;right:0;width:4px;height:100%;border-radius:0 20px 20px 0}
.sc:nth-child(1)::after{background:var(--pri)}.sc:nth-child(2)::after{background:var(--ok)}.sc:nth-child(3)::after{background:var(--er)}.sc:nth-child(4)::after{background:var(--wr)}.sc:nth-child(5)::after{background:#8b5cf6}.sc:nth-child(6)::after{background:#ec4899}
.si{font-size:28px;margin-bottom:6px}.sv{font-size:20px;font-weight:900}.sl{font-size:10px;color:var(--mt);font-weight:600}
.cb{background:var(--cd);border-radius:20px;padding:20px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,.04);border:1px solid var(--bd)}
.cb h3{font-size:1.1rem;font-weight:700;margin-bottom:15px;display:flex;align-items:center;gap:8px}
.ch{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:10px}
.b{padding:8px 18px;border-radius:30px;border:none;cursor:pointer;font-weight:600;display:inline-flex;align-items:center;gap:6px;font-size:12px;transition:.3s}
.b:hover{transform:translateY(-1px)}
.bs{background:var(--ok);color:#fff}.bd{background:var(--er);color:#fff}.bw{background:var(--wr);color:#fff}.bi{background:#3b82f6;color:#fff}.bpi{background:var(--pri);color:#fff}.tw{overflow-x:auto;border-radius:14px;border:1px solid var(--bd)}
.dt{width:100%;border-collapse:collapse}
.dt th,.dt td{padding:12px 14px;text-align:right;font-size:12px}
.dt th{background:var(--bg);color:var(--mt);font-weight:700;border-bottom:2px solid var(--bd);white-space:nowrap}
.dt td{border-bottom:1px solid var(--bd)}.dt tr:hover td{background:var(--bg)}
.bg{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;display:inline-block}
.bg-g{background:#d1fae5;color:#059669}.bg-y{background:#fed7aa;color:#c2410c}.bg-r{background:#fee2e2;color:#dc2626}.bg-b{background:#dbeafe;color:#1d4ed8}
.md{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(15,23,42,.6);backdrop-filter:blur(4px);z-index:1000;justify-content:center;align-items:center;padding:16px}.md.sh{display:flex}
.mc{background:var(--cd);border-radius:20px;max-width:900px;width:100%;padding:24px;max-height:90vh;overflow-y:auto;box-shadow:0 25px 60px rgba(0,0,0,.25)}
.mc h2{margin-bottom:16px;font-size:1.3rem}
.ib{background:var(--bg);padding:15px;border-radius:16px;margin:12px 0}
.sr{display:flex;justify-content:space-between;padding:8px 0;font-size:13px;border-bottom:1px dashed var(--bd)}.sr:last-child{border-bottom:none}
.sb{display:flex;gap:10px;justify-content:center;margin-top:20px;flex-wrap:wrap}
input,select{width:100%;padding:10px 14px;border:2px solid var(--bd);border-radius:12px;font-size:13px;transition:.3s;background:var(--cd);color:var(--tx)}
input:focus,select:focus{outline:none;border-color:var(--pri);box-shadow:0 0 0 3px rgba(13,148,136,.1)}
.fg{margin-bottom:14px}.fg label{display:block;margin-bottom:5px;font-weight:700;color:var(--mt);font-size:12px}
.sx{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap}.sx input{flex:1;min-width:180px}
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:15px}@media(max-width:600px){.g2{grid-template-columns:1fr}}
.tg{color:var(--ok);font-weight:700}.tr{color:var(--er);font-weight:700}
.tst{position:fixed;top:20px;left:20px;color:#fff;padding:12px 20px;border-radius:16px;z-index:2000;display:flex;align-items:center;gap:10px;animation:si .4s;box-shadow:0 8px 25px rgba(0,0,0,.2);max-width:380px;font-size:13px;font-weight:600}
.tst.s{background:linear-gradient(135deg,#059669,#10b981)}.tst.e{background:linear-gradient(135deg,#dc2626,#ef4444)}.tst.w{background:linear-gradient(135deg,#d97706,#f59e0b)}.tst.i{background:linear-gradient(135deg,#2563eb,#3b82f6)}
@keyframes si{from{transform:translateX(-120%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes soo{from{transform:translateX(0);opacity:1}to{transform:translateX(-120%);opacity:0}}
.aib{background:linear-gradient(135deg,#0f172a,#134e4a);color:#fff;padding:18px;border-radius:20px;margin-bottom:20px;border:1px solid rgba(255,255,255,.1)}
.aib h4{display:flex;align-items:center;gap:10px;margin-bottom:10px;font-size:14px}.aib li{padding:4px 0;font-size:11px;opacity:.9;display:flex;align-items:flex-start;gap:8px}.aib li i{margin-top:4px;font-size:9px}
.pos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px;max-height:400px;overflow-y:auto;padding:6px}
.pos-item{background:var(--cd);border:2px solid var(--bd);border-radius:14px;padding:12px 8px;text-align:center;cursor:pointer;transition:.2s}
.pos-item:hover{border-color:var(--pri);transform:translateY(-2px);box-shadow:0 4px 12px rgba(13,148,136,.15)}
.cart-item{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:var(--bg);border-radius:12px;margin:6px 0;font-size:12px;border:1px solid var(--bd)}
.cart-item .ci-qty{display:flex;align-items:center;gap:6px}
.cart-item .ci-qty button{width:28px;height:28px;border-radius:8px;border:1px solid var(--bd);background:var(--cd);cursor:pointer;font-weight:700}
.pos-total{background:var(--prl);padding:15px;border-radius:14px;margin-top:12px;border:2px solid var(--pri)}
.tb{padding:6px 14px;border-radius:22px;border:2px solid var(--bd);background:var(--cd);cursor:pointer;font-size:11px;font-weight:600;transition:.2s}.tb.ac{background:var(--pri);color:#fff;border-color:var(--pri)}
@media print{.hd,.mn,.md{display:none!important}.pg{max-width:100%!important;padding:0!important}.cb{box-shadow:none!important;border:none!important;page-break-inside:avoid}}
</style>
</head>
<body>
<div id="lp" class="lp"><div class="lb"><h2>🏢 ERP PRO</h2><p class="sb">نظام محاسبي متكامل - النسخة النهائية</p><div id="ld"><input type="text" id="lu" value="admin" placeholder="اسم المستخدم"><input type="password" id="lpa" value="admin123" placeholder="كلمة المرور"><button class="bp" onclick="dL()"><i class="fas fa-sign-in-alt"></i> دخول</button><div class="sa" onclick="document.getElementById('ld').style.display='none';document.getElementById('rd').style.display='block'">ليس لديك حساب؟ <span style="color:var(--pri);font-weight:700">سجل الآن</span></div></div><div id="rd" style="display:none"><input type="text" id="rn" placeholder="الاسم الكامل"><input type="text" id="ru" placeholder="اسم المستخدم"><input type="password" id="rp" placeholder="كلمة المرور"><button class="bp" style="background:linear-gradient(135deg,#059669,#10b981)" onclick="dR()"><i class="fas fa-user-plus"></i> تسجيل</button><div class="sa" onclick="document.getElementById('rd').style.display='none';document.getElementById('ld').style.display='block'">لديك حساب؟ <span style="color:var(--pri);font-weight:700">دخول</span></div></div></div></div>
<div id="ap" class="ap"><div class="hd"><div class="lo">🏢 ERP PRO</div><div class="hb"><button onclick="tDk()"><i class="fas fa-moon" id="dkI"></i> وضع ليلي</button><div class="nb" onclick="tNt()"><i class="fas fa-bell"></i><span class="nc" id="nCt">0</span><div class="np" id="nPa"></div></div><span id="uNm"></span><span id="uRl"></span><button style="background:var(--er);border:none;padding:6px 16px;border-radius:20px;color:#fff;cursor:pointer;font-size:12px;font-weight:600" onclick="dO()">خروج</button></div></div><div class="mn" id="mB"></div><div class="pg" id="pg"></div></div>
<div id="md" class="md" onclick="if(event.target===this)closeModal()"><div class="mc" id="mI"></div></div>
<script>
const MENUS=[{id:'dashboard',i:'fa-home',l:'الرئيسية'},{id:'inventory',i:'fa-boxes-stacked',l:'المخزون'},{id:'suppliers',i:'fa-truck',l:'الموردين'},{id:'purchases',i:'fa-cart-shopping',l:'المشتريات'},{id:'sales',i:'fa-tags',l:'المبيعات'},{id:'clients',i:'fa-user-group',l:'العملاء'},{id:'pos',i:'fa-cash-register',l:'نقطة بيع'},{id:'expenses',i:'fa-file-invoice-dollar',l:'المصروفات'},{id:'acct',i:'fa-calculator',l:'المحاسبة'},{id:'settings',i:'fa-sliders',l:'الإعدادات'},{id:'backup',i:'fa-cloud-arrow-up',l:'النسخ الاحتياطي'}];
const CURR={SAR:{n:'ريال سعودي',s:'ر.س',r:1},LYD:{n:'دينار ليبي',s:'ل.د',r:0.78},USD:{n:'دولار',s:'$',r:3.75},EGP:{n:'جنيه',s:'ج.م',r:0.48},AED:{n:'درهم',s:'د.إ',r:1.02}};
const CATEGORIES=['أثاث','إلكترونيات','قرطاسية','أجهزة','أخرى'];
const EXP_CATS=['إيجار','رواتب','كهرباء','ماء','إنترنت','صيانة','نقل','تسويق','أخرى'];
let cur=localStorage.getItem('erp_cur')||'LYD',cUser=null,charts=[],cart=[],logs=[],cPg='dashboard',sFl='all',aTab='coa',dk=localStorage.getItem('erp_dark')==='1',slItems=[];
let ST={nI:1004,nP:2003,nE:4};
let db={
  inv:[{id:1,nm:'مكتب خشبي فاخر',ct:'أثاث',qt:20,cp:1500,sp:2500},{id:2,nm:'كرسي دوار مريح',ct:'أثاث',qt:35,cp:500,sp:900},{id:3,nm:'طابعة HP LaserJet',ct:'إلكترونيات',qt:12,cp:2200,sp:3500},{id:4,nm:'لابتوب Dell',ct:'إلكترونيات',qt:8,cp:3500,sp:5500},{id:5,nm:'شاشة 24 بوصة',ct:'إلكترونيات',qt:15,cp:1200,sp:2000},{id:6,nm:'ماوس لاسلكي',ct:'أجهزة',qt:40,cp:80,sp:150},{id:7,nm:'ورق A4',ct:'قرطاسية',qt:200,cp:8,sp:15},{id:8,nm:'حبر طابعة',ct:'قرطاسية',qt:50,cp:45,sp:80}],
  sl:[{id:1001,cn:'شركة الأهرام',ci:1,it:[{pi:1,nm:'مكتب خشبي',qt:2,pr:2500,tt:5000},{pi:2,nm:'كرسي دوار',qt:3,pr:900,tt:2700}],sb:7700,tx:1155,gr:8855,pd:8855,st:'مدفوع',dt:'2025-05-20'},{id:1002,cn:'مؤسسة النور',ci:2,it:[{pi:3,nm:'طابعة HP',qt:1,pr:3500,tt:3500}],sb:3500,tx:525,gr:4025,pd:2000,st:'آجل',dt:'2025-05-21'}],
  cl:[{id:1,nm:'شركة الأهرام',ph:'0512345678',ad:'الرياض',bl:0},{id:2,nm:'مؤسسة النور',ph:'0587654321',ad:'جدة',bl:2025},{id:3,nm:'مكتبة الفجر',ph:'0551122334',ad:'الدمام',bl:0}],
  sp:[{id:1,nm:'العالمية للتوريدات',ph:'0555555555',ad:'الرياض',ct:'أثاث'},{id:2,nm:'مصنع التقنية',ph:'0566666666',ad:'جدة',ct:'إلكترونيات'}],
  pu:[{id:2001,si:1,sn:'العالمية',pn:'مكتب خشبي',qt:10,pr:1500,tt:15000,pd:15000,st:'مدفوع',dt:'2025-05-18'},{id:2002,si:2,sn:'مصنع التقنية',pn:'طابعة HP',qt:5,pr:2200,tt:11000,pd:6000,st:'آجل',dt:'2025-05-19'}],
  ex:[{id:1,ct:'إيجار',am:5000,ds:'إيجار المكتب',dt:'2025-05-25'},{id:2,ct:'رواتب',am:15000,ds:'رواتب الموظفين',dt:'2025-05-25'}],
  us:[{id:1,nm:'المدير العام',un:'admin',pw:'admin123',rl:'admin'}],
  je:[]
};
function fmt(amt){let c=CURR[cur];return(amt*c.r).toLocaleString('ar',{maximumFractionDigits:2})+' '+c.s}
function td(){let d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function gid(){return Date.now()+Math.floor(Math.random()*10000)}
function esc(s){if(typeof s!=='string')return'';let d=document.createElement('div');d.textContent=s;return d.innerHTML}
function totalSales(){return db.sl.reduce((a,s)=>a+s.gr,0)}
function totalPurchases(){return db.pu.reduce((a,p)=>a+p.tt,0)}
function totalExpenses(){return db.ex.reduce((a,e)=>a+e.am,0)}
function netProfit(){return totalSales()-totalPurchases()-totalExpenses()}
function invValue(){return db.inv.reduce((a,i)=>a+(i.qt*i.cp),0)}
function lowStock(){return db.inv.filter(i=>i.qt<=5&&i.qt>0).length}
function creditTotal(){return db.sl.filter(s=>s.st==='آجل').reduce((a,s)=>a+(s.gr-s.pd),0)}
function supCredit(){return db.pu.filter(p=>p.st==='آجل').reduce((a,p)=>a+(p.tt-p.pd),0)}
function toast(m,t){let ic={s:'fa-check-circle',e:'fa-times-circle',w:'fa-exclamation-triangle',i:'fa-info-circle'};let d=document.createElement('div');d.className='tst '+(t||'i');d.innerHTML='<i class="fas '+(ic[t]||ic.i)+'"></i><span>'+m+'</span>';document.body.appendChild(d);setTimeout(()=>{d.style.animation='soo .4s forwards';setTimeout(()=>d.remove(),400)},3000)}
function addLog(a,d){if(!cUser)return;logs.unshift({id:Date.now(),u:cUser.nm,a:a,d:d,t:new Date().toISOString()});if(logs.length>200)logs.length=200;}
function saveAll(){let data={inv:db.inv,sl:db.sl,cl:db.cl,sp:db.sp,pu:db.pu,ex:db.ex,us:db.us,je:db.je,st:ST,logs:logs,cur:cur};localStorage.setItem('erp_data',JSON.stringify(data));}
function loadAll(){let v=localStorage.getItem('erp_data');if(v){let d=JSON.parse(v);['inv','sl','cl','sp','pu','ex','us','je'].forEach(k=>{if(d[k])db[k]=d[k]});if(d.st)ST=d.st;if(d.logs)logs=d.logs;if(d.cur)cur=d.cur;}}
function isAdmin(){return cUser&&cUser.rl==='admin'}
function openModal(h){document.getElementById('mI').innerHTML=h;document.getElementById('md').classList.add('sh');}
function closeModal(){document.getElementById('md').classList.remove('sh');}
function destroyCharts(){charts.forEach(c=>{try{c.destroy()}catch(e){}});charts=[];}
function dL(){let u=document.getElementById('lu').value.trim(),p=document.getElementById('lpa').value;let f=db.us.find(x=>x.un===u&&x.pw===p);if(!f){toast('خطأ في بيانات الدخول','e');return}cUser=f;loadAll();document.getElementById('lp').style.display='none';document.getElementById('ap').style.display='block';document.getElementById('uNm').innerText=f.nm;document.getElementById('uRl').innerText=f.rl==='admin'?'مدير':'مستخدم';applyDark();buildMenu();addLog('دخول',f.nm);toast('مرحباً '+f.nm,'s');showPage('dashboard');setTimeout(updateNotif,300);}
function dR(){let n=document.getElementById('rn').value.trim(),u=document.getElementById('ru').value.trim(),p=document.getElementById('rp').value;if(!n||!u||!p){toast('جميع الحقول مطلوبة','e');return}if(db.us.find(x=>x.un===u)){toast('اسم المستخدم موجود','e');return}db.us.push({id:gid(),nm:n,un:u,pw:p,rl:'user'});saveAll();toast('تم التسجيل بنجاح','s');document.getElementById('rd').style.display='none';document.getElementById('ld').style.display='block';}
function dO(){if(cUser)addLog('خروج',cUser.nm);cUser=null;cart=[];destroyCharts();document.getElementById('lp').style.display='flex';document.getElementById('ap').style.display='none';toast('تم تسجيل الخروج','s');}
function tDk(){dk=!dk;localStorage.setItem('erp_dark',dk?'1':'0');applyDark();}
function applyDark(){document.body.classList.toggle('dk',dk);document.getElementById('dkI').innerHTML=dk?'<i class="fas fa-sun"></i> وضع عادي':'<i class="fas fa-moon"></i> وضع ليلي';}
function tNt(){document.getElementById('nPa').classList.toggle('sh');}

function addProduct(){if(!isAdmin()){toast('غير مصرح','e');return}openModal('<h2>➕ إضافة منتج</h2><div class="g2"><div><label>الاسم</label><input id="pNm"></div><div><label>التصنيف</label><select id="pCt">'+CATEGORIES.map(c=>'<option>'+c+'</option>').join('')+'</select></div></div><div class="g2"><div><label>سعر الشراء</label><input type="number" id="pCp" value="0"></div><div><label>سعر البيع</label><input type="number" id="pSp" value="0"></div></div><div><label>الكمية</label><input type="number" id="pQt" value="0"></div><div class="sb"><button class="b bs" onclick="saveProduct()">حفظ</button><button class="b bd" onclick="closeModal()">إلغاء</button></div>');}
function saveProduct(){let nm=document.getElementById('pNm').value.trim();if(!nm){toast('أدخل الاسم','e');return}let qt=parseInt(document.getElementById('pQt').value)||0,cp=parseFloat(document.getElementById('pCp').value)||0,sp=parseFloat(document.getElementById('pSp').value)||0;db.inv.push({id:gid(),nm:nm,ct:document.getElementById('pCt').value,qt:qt,cp:cp,sp:sp||cp*1.3});saveAll();closeModal();addLog('إضافة',nm);toast('تم الإضافة','s');showPage('inventory');}
function editProduct(id){let p=db.inv.find(x=>x.id===id);if(!p)return;openModal('<h2>✏️ تعديل منتج</h2><div class="g2"><div><label>الاسم</label><input id="pNm" value="'+esc(p.nm)+'"></div><div><label>التصنيف</label><select id="pCt">'+CATEGORIES.map(c=>'<option'+(c===p.ct?' selected':'')+'>'+c+'</option>').join('')+'</select></div></div><div class="g2"><div><label>سعر الشراء</label><input type="number" id="pCp" value="'+p.cp+'"></div><div><label>سعر البيع</label><input type="number" id="pSp" value="'+p.sp+'"></div></div><div><label>الكمية</label><input type="number" id="pQt" value="'+p.qt+'"></div><div class="sb"><button class="b bs" onclick="updateProduct('+id+')">تحديث</button><button class="b bd" onclick="closeModal()">إلغاء</button></div>');}
function updateProduct(id){let p=db.inv.find(x=>x.id===id);if(!p)return;p.nm=document.getElementById('pNm').value.trim();p.ct=document.getElementById('pCt').value;p.cp=parseFloat(document.getElementById('pCp').value)||0;p.sp=parseFloat(document.getElementById('pSp').value)||0;p.qt=parseInt(document.getElementById('pQt').value)||0;saveAll();closeModal();addLog('تعديل',p.nm);toast('تم التحديث','s');showPage('inventory');}
function delProduct(id){if(!confirm('حذف المنتج؟'))return;db.inv=db.inv.filter(x=>x.id!==id);saveAll();toast('تم الحذف','s');showPage('inventory');}

function editSupplier(id){let s=db.sp.find(x=>x.id===id);if(!s)return;openModal('<h2>✏️ تعديل مورد</h2><div><label>الاسم</label><input id="sNm" value="'+esc(s.nm)+'"></div><div><label>الهاتف</label><input id="sPh" value="'+esc(s.ph)+'"></div><div><label>العنوان</label><input id="sAd" value="'+esc(s.ad)+'"></div><div><label>التصنيف</label><select id="sCt">'+CATEGORIES.map(c=>'<option'+(c===s.ct?' selected':'')+'>'+c+'</option>').join('')+'</select></div><div class="sb"><button class="b bs" onclick="updateSupplier('+id+')">تحديث</button><button class="b bd" onclick="closeModal()">إلغاء</button></div>');}
function updateSupplier(id){let s=db.sp.find(x=>x.id===id);if(!s)return;s.nm=document.getElementById('sNm').value.trim();s.ph=document.getElementById('sPh').value;s.ad=document.getElementById('sAd').value;s.ct=document.getElementById('sCt').value;saveAll();closeModal();toast('تم التحديث','s');showPage('suppliers');}

function viewSup(id){let s=db.sp.find(x=>x.id===id);let purs=db.pu.filter(p=>p.si===id);let total=purs.reduce((a,p)=>a+p.tt,0);let paid=purs.reduce((a,p)=>a+p.pd,0);openModal('<h2>'+esc(s.nm)+'</h2><div class="ib"><div>الهاتف: '+esc(s.ph)+'</div><div>العنوان: '+esc(s.ad)+'</div><div>إجمالي المشتريات: '+fmt(total)+'</div><div>المدفوع: '+fmt(paid)+'</div><div>المتبقي: '+fmt(total-paid)+'</div></div><div class="tw"><table class="dt"><thead><tr><th>#</th><th>التاريخ</th><th>المنتج</th><th>الكمية</th><th>الإجمالي</th><th>الحالة</th></tr></thead><tbody>'+purs.map(p=>'<tr><td>'+p.id+'</td><td>'+p.dt+'</td><td>'+esc(p.pn)+'</td><td>'+p.qt+'</td><td>'+fmt(p.tt)+'</td><td><span class="bg '+(p.st==='مدفوع'?'bg-g':'bg-y')+'">'+p.st+'</span></td></tr>').join('')+'</tbody></table></div><div class="sb"><button class="b bd" onclick="closeModal()">إغلاق</button></div>');}
function renderPurchases(el){let total=db.pu.reduce((a,p)=>a+p.tt,0),paid=db.pu.reduce((a,p)=>a+p.pd,0);el.innerHTML='<div class="sxb"><div class="sr"><span>💰 إجمالي المشتريات:</span><strong>'+fmt(total)+'</strong></div><div class="sr"><span>💳 المدفوع:</span><strong>'+fmt(paid)+'</strong></div><div class="sr"><span>📉 المتبقي:</span><strong class="tr">'+fmt(total-paid)+'</strong></div></div><div class="cb"><div class="ch"><h3>🛒 فواتير الشراء</h3><button class="b bs" onclick="addPurchase()">+ فاتورة</button></div><div class="sx"><input type="text" id="purSearch" placeholder="بحث..." oninput="filterPur()"></div><div class="tw"><table class="dt" id="purT"><thead><tr><th>#</th><th>التاريخ</th><th>المورد</th><th>المنتج</th><th>الكمية</th><th>الإجمالي</th><th>الحالة</th><th>إجراءات</th></tr></thead><tbody>'+purRows(db.pu)+'</tbody></table></div></div>';}
function purRows(it){if(!it.length)return'<tr><td colspan="8" style="text-align:center;padding:30px">لا توجد فواتير</td></tr>';return it.map(p=>'<tr><td>'+p.id+'</td><td>'+p.dt+'</td><td style="cursor:pointer;color:var(--pri)" onclick="viewSup('+p.si+')">'+esc(p.sn)+'</td><td>'+esc(p.pn)+'</td><td>'+p.qt+'</td><td>'+fmt(p.tt)+'</td><td><span class="bg '+(p.st==='مدفوع'?'bg-g':'bg-y')+'">'+p.st+'</span></td><td><button class="b bi" onclick="viewPurchase('+p.id+')"><i class="fas fa-eye"></i></button>'+(p.st==='آجل'?' <button class="b bs" onclick="payPurchase('+p.id+')"><i class="fas fa-money-bill"></i></button>':'')+'</td></tr>').join('');}
function filterPur(){let q=document.getElementById('purSearch').value.toLowerCase();document.querySelector('#purT tbody').innerHTML=purRows(db.pu.filter(p=>p.sn.toLowerCase().includes(q)||p.pn.toLowerCase().includes(q)));}
function addPurchase(){if(!isAdmin()){toast('غير مصرح','e');return}if(!db.sp.length){toast('أضف مورد','e');return}openModal('<h2>➕ فاتورة شراء</h2><div><label>المورد</label><select id="purSup">'+db.sp.map(s=>'<option value="'+s.id+'">'+esc(s.nm)+'</option>').join('')+'</select></div><div><label>المنتج</label><input id="purProd"></div><div class="g2"><div><label>الكمية</label><input type="number" id="purQty" value="1"></div><div><label>سعر الوحدة</label><input type="number" id="purPrice" value="0"></div></div><div class="g2"><div><label>المدفوع</label><input type="number" id="purPaid" value="0"></div><div><label>الحالة</label><select id="purStatus"><option>مدفوع</option><option>آجل</option></select></div></div><div class="sb"><button class="b bs" onclick="savePurchase()">حفظ</button><button class="b bd" onclick="closeModal()">إلغاء</button></div>');}
function savePurchase(){let sid=parseInt(document.getElementById('purSup').value),sup=db.sp.find(x=>x.id===sid),pn=document.getElementById('purProd').value.trim(),qty=parseInt(document.getElementById('purQty').value)||0,price=parseFloat(document.getElementById('purPrice').value)||0,paid=parseFloat(document.getElementById('purPaid').value)||0,status=document.getElementById('purStatus').value;if(!pn||qty<=0||price<=0){toast('بيانات غير صحيحة','e');return}let total=qty*price;if(status==='مدفوع')paid=total;let pur={id:ST.nP++,si:sid,sn:sup.nm,pn:pn,qt:qty,pr:price,tt:total,pd:paid,st:status,dt:td()};db.pu.push(pur);let ex=db.inv.find(p=>p.nm===pn);if(ex){ex.qt+=qty;ex.cp=(ex.cp*ex.qt+price*qty)/(ex.qt);if(ex.sp<=ex.cp)ex.sp=ex.cp*1.3;}else{db.inv.push({id:gid(),nm:pn,ct:'أخرى',qt:qty,cp:price,sp:price*1.3});}saveAll();closeModal();addLog('شراء',pn);toast('تمت الفاتورة','s');showPage('purchases');}
function viewPurchase(id){let p=db.pu.find(x=>x.id===id);openModal('<h2>🧾 فاتورة شراء #'+p.id+'</h2><div class="ib"><div>التاريخ: '+p.dt+'</div><div>المورد: '+esc(p.sn)+'</div><div>المنتج: '+esc(p.pn)+'</div><div>الكمية: '+p.qt+'</div><div>الإجمالي: '+fmt(p.tt)+'</div><div>المدفوع: '+fmt(p.pd)+'</div><div>المتبقي: '+fmt(p.tt-p.pd)+'</div></div><div class="sb"><button class="b bd" onclick="closeModal()">إغلاق</button></div>');}
function payPurchase(id){let p=db.pu.find(x=>x.id===id);let rem=p.tt-p.pd;openModal('<h2>💰 دفع للمورد</h2><div><strong>المتبقي: '+fmt(rem)+'</strong></div><div><label>المبلغ</label><input type="number" id="payAmt" value="'+rem+'"></div><div class="sb"><button class="b bs" onclick="confirmPay('+id+')">تأكيد</button><button class="b bd" onclick="closeModal()">إلغاء</button></div>');}

function renderSales(el){let total=db.sl.reduce((a,s)=>a+s.gr,0),paid=db.sl.reduce((a,s)=>a+s.pd,0);let filtered=db.sl;if(sFl==='paid')filtered=db.sl.filter(s=>s.st==='مدفوع');else if(sFl==='credit')filtered=db.sl.filter(s=>s.st==='آجل');else if(sFl==='today')filtered=db.sl.filter(s=>s.dt===td());el.innerHTML='<div class="sxb"><div class="sr"><span>💰 إجمالي المبيعات:</span><strong>'+fmt(total)+'</strong></div><div class="sr"><span>💳 المدفوع:</span><strong>'+fmt(paid)+'</strong></div><div class="sr"><span>📉 المتبقي:</span><strong class="tr">'+fmt(total-paid)+'</strong></div></div><div class="cb"><div class="ch"><h3>🏷️ فواتير المبيعات</h3><button class="b bs" onclick="addSale()">+ فاتورة</button></div><div class="tb-bar" style="display:flex;gap:6px;margin-bottom:12px"><button class="tb '+(sFl==='all'?'ac':'')+'" onclick="sFl=\'all\';showPage(\'sales\')">الكل</button><button class="tb '+(sFl==='paid'?'ac':'')+'" onclick="sFl=\'paid\';showPage(\'sales\')">مدفوع</button><button class="tb '+(sFl==='credit'?'ac':'')+'" onclick="sFl=\'credit\';showPage(\'sales\')">آجل</button><button class="tb '+(sFl==='today'?'ac':'')+'" onclick="sFl=\'today\';showPage(\'sales\')">اليوم</button></div><div class="sx"><input type="text" id="slSearch" placeholder="بحث..." oninput="filterSales()"></div><div class="tw"><table class="dt" id="slT"><thead><tr><th>#</th><th>التاريخ</th><th>العميل</th><th>المنتجات</th><th>الإجمالي</th><th>الحالة</th><th>إجراءات</th></tr></thead><tbody>'+slRows(filtered)+'</tbody></table></div></div>';}
function slRows(it){if(!it.length)return'<tr><td colspan="7" style="text-align:center;padding:30px">لا توجد فواتير</td></tr>';return it.map(s=>'<tr><td>'+s.id+'</td><td>'+s.dt+'</td><td style="font-weight:700;cursor:pointer;color:var(--pri)" onclick="viewClient('+s.ci+')">'+esc(s.cn)+'</td><td style="max-width:180px;overflow:hidden;text-overflow:ellipsis" title="'+s.it.map(i=>i.nm).join('، ')+'">'+s.it.map(i=>i.nm).join('، ')+'</td><td>'+fmt(s.gr)+'</td><td><span class="bg '+(s.st==='مدفوع'?'bg-g':'bg-y')+'">'+s.st+'</span></td><td><button class="b bi" onclick="viewSale('+s.id+')"><i class="fas fa-eye"></i></button>'+(s.st==='آجل'?' <button class="b bs" onclick="collectSale('+s.id+')"><i class="fas fa-money-bill"></i></button>':'')+'</td></tr>').join('');}
function filterSales(){let q=document.getElementById('slSearch').value.toLowerCase();let f=db.sl;if(sFl==='paid')f=f.filter(s=>s.st==='مدفوع');else if(sFl==='credit')f=f.filter(s=>s.st==='آجل');else if(sFl==='today')f=f.filter(s=>s.dt===td());f=f.filter(s=>s.cn.toLowerCase().includes(q)||s.it.some(i=>i.nm.toLowerCase().includes(q)));document.querySelector('#slT tbody').innerHTML=slRows(f);}
function addSale(){if(!db.inv.filter(p=>p.qt>0).length){toast('لا توجد منتجات','e');return}openModal('<h2>🧾 فاتورة بيع</h2><div><label>العميل</label><select id="slCl"><option value="">عميل نقدي</option>'+db.cl.map(c=>'<option value="'+c.id+'">'+esc(c.nm)+'</option>').join('')+'</select></div><div><input id="slNc" placeholder="أو عميل جديد"></div><div id="slItBox"></div><button class="b bpi" style="margin:10px 0" onclick="addSaleLine()">+ إضافة منتج</button><div class="ib"><div class="sr"><span>المجموع:</span><strong id="slSub">0</strong></div><div class="sr"><span>الضريبة 15%:</span><span id="slTax">0</span></div><div class="sr"><span>الإجمالي:</span><strong id="slGrand">0</strong></div></div><div class="g2"><div><label>المدفوع</label><input type="number" id="slPaid" value="0"></div><div><label>الحالة</label><select id="slSt"><option>مدفوع</option><option>آجل</option></select></div></div><div class="sb"><button class="b bs" onclick="saveSale()">حفظ</button><button class="b bd" onclick="closeModal()">إلغاء</button></div>');addSaleLine();}
function addSaleLine(){let id='sl'+gid();let div=document.createElement('div');div.className='ir';div.id=id;div.innerHTML='<select style="flex:1" onchange="calcTotals()"><option value="">اختر منتج</option>'+db.inv.filter(p=>p.qt>0).map(p=>'<option value="'+p.id+'" data-price="'+p.sp+'">'+esc(p.nm)+' ('+fmt(p.sp)+')</option>').join('')+'</select><input type="number" placeholder="الكمية" value="1" min="1" style="width:70px" onchange="calcTotals()"><button class="b bd" onclick="this.parentElement.remove();calcTotals()">✖</button>';document.getElementById('slItBox').appendChild(div);calcTotals();}
function calcTotals(){let sub=0;document.querySelectorAll('#slItBox .ir').forEach(row=>{let sel=row.querySelector('select'),qty=row.querySelector('input');if(sel&&sel.value&&qty){let price=parseFloat(sel.selectedOptions[0]?.dataset.price)||0,q=parseInt(qty.value)||0;sub+=price*q}});let tax=sub*0.15,grand=sub+tax;document.getElementById('slSub').innerHTML=fmt(sub);document.getElementById('slTax').innerHTML=fmt(tax);document.getElementById('slGrand').innerHTML=fmt(grand);}
function saveSale(){let items=[];let ok=true;document.querySelectorAll('#slItBox .ir').forEach(row=>{let sel=row.querySelector('select'),qty=row.querySelector('input');if(sel&&sel.value&&qty){let opt=sel.selectedOptions[0],pid=parseInt(sel.value),name=opt.textContent.split('(')[0].trim(),price=parseFloat(opt.dataset.price)||0,q=parseInt(qty.value)||0,prod=db.inv.find(p=>p.id===pid);if(q>prod.qt){toast('الكمية غير متوفرة لـ '+name,'e');ok=false;return}items.push({pi:pid,name,qt:q,pr:price,tt:price*q});}});if(!ok||!items.length){if(ok)toast('أضف منتجاً','e');return}let sub=items.reduce((a,i)=>a+i.tt,0),tax=sub*0.15,grand=sub+tax,paid=parseFloat(document.getElementById('slPaid').value)||0,status=document.getElementById('slSt').value;if(status==='مدفوع'&&paid<grand)status='آجل';let clId=parseInt(document.getElementById('slCl').value)||0,clNm='عميل نقدي';if(clId){let c=db.cl.find(x=>x.id===clId);if(c)clNm=c.nm;}else{let nc=document.getElementById('slNc').value.trim();if(nc){let c=db.cl.find(x=>x.nm===nc);if(!c){c={id:gid(),nm:nc,ph:'',ad:'',bl:0};db.cl.push(c)}clId=c.id;clNm=c.nm}}let nid=ST.nI++;items.forEach(i=>{let p=db.inv.find(x=>x.id===i.pi);if(p)p.qt-=i.qt});db.sl.push({id:nid,cn:clNm,ci:clId,it:items,sb:sub,tx:tax,gr:grand,pd:paid,st:status,dt:td()});if(clId&&status==='آجل'){let c=db.cl.find(x=>x.id===clId);if(c)c.bl+=(grand-paid)}saveAll();closeModal();addLog('بيع',clNm);toast('تمت الفاتورة','s');showPage('sales');}
function viewSale(id){let s=db.sl.find(x=>x.id===id);let rem=s.gr-s.pd;openModal('<h2>🧾 فاتورة مبيعات #'+s.id+'</h2><div class="ib"><div>التاريخ: '+s.dt+'</div><div>العميل: '+esc(s.cn)+'</div></div><table class="dt"><thead><tr><th>المنتج</th><th>الكمية</th><th>السعر</th><th>الإجمالي</th></tr></thead><tbody>'+s.it.map(i=>'<tr><td>'+esc(i.name)+'</td><td>'+i.qt+'</td><td>'+fmt(i.pr)+'</td><td>'+fmt(i.tt)+'</td></tr>').join('')+'</tbody></table><div class="ib"><div>المجموع: '+fmt(s.sb)+'</div><div>الضريبة: '+fmt(s.tx)+'</div><div>الإجمالي: '+fmt(s.gr)+'</div><div>المدفوع: '+fmt(s.pd)+'</div><div>المتبقي: '+fmt(rem)+'</div></div><div class="sb"><button class="b bd" onclick="closeModal()">إغلاق</button></div>');}
function collectSale(id){let s=db.sl.find(x=>x.id===id);let rem=s.gr-s.pd;openModal('<h2>💰 تحصيل من عميل</h2><div><strong>المتبقي: '+fmt(rem)+'</strong></div><div><label>المبلغ</label><input type="number" id="colAmt" value="'+rem+'"></div><div class="sb"><button class="b bs" onclick="confirmCollect('+id+')">تأكيد</button><button class="b bd" onclick="closeModal()">إلغاء</button></div>');}
function confirmCollect(id){let s=db.sl.find(x=>x.id===id),amt=parseFloat(document.getElementById('colAmt').value)||0;if(amt<=0||amt>s.gr-s.pd){toast('مبلغ غير صحيح','e');return}s.pd+=amt;if(s.pd>=s.gr)s.st='مدفوع';if(s.ci){let c=db.cl.find(x=>x.id===s.ci);if(c)c.bl-=amt}saveAll();closeModal();addLog('تحصيل',s.cn);toast('تم التحصيل','s');showPage('sales');}
function viewClient(id){let c=db.cl.find(x=>x.id===id);let invs=db.sl.filter(s=>s.ci===id);let total=invs.reduce((a,s)=>a+s.gr,0);let paid=invs.reduce((a,s)=>a+s.pd,0);openModal('<h2>'+esc(c.nm)+'</h2><div class="ib"><div>الهاتف: '+esc(c.ph)+'</div><div>العنوان: '+esc(c.ad)+'</div><div>إجمالي المشتريات: '+fmt(total)+'</div><div>المدفوع: '+fmt(paid)+'</div><div>المتبقي: '+fmt(total-paid)+'</div></div><div class="tw"><table class="dt"><thead><tr><th>#</th><th>التاريخ</th><th>المنتجات</th><th>الإجمالي</th><th>الحالة</th></tr></thead><tbody>'+invs.map(s=>'<tr><td>'+s.id+'</td><td>'+s.dt+'</td><td>'+s.it.map(i=>i.nm).join('، ')+'</td><td>'+fmt(s.gr)+'</td><td><span class="bg '+(s.st==='مدفوع'?'bg-g':'bg-y')+'">'+s.st+'</span></td></tr>').join('')+'</tbody></table></div><div class="sb"><button class="b bd" onclick="closeModal()">إغلاق</button></div>');}
function renderClients(el){el.innerHTML='<div class="cb"><div class="ch"><h3>👥 العملاء</h3><button class="b bs" onclick="addClient()">+ إضافة</button></div><div class="sx"><input type="text" id="clSearch" placeholder="بحث..." oninput="filterCli()"></div><div class="tw"><table class="dt" id="clT"><thead><tr><th>#</th><th>الاسم</th><th>الهاتف</th><th>العنوان</th><th>الرصيد</th><th>إجراءات</th></tr></thead><tbody>'+clRows(db.cl)+'</tbody></table></div></div>';}
function clRows(it){if(!it.length)return'<tr><td colspan="6" style="text-align:center;padding:30px">لا يوجد عملاء<\/td><\/tr>';return it.map((c,i)=>{let debt=db.sl.filter(s=>s.ci===c.id&&s.st==='آجل').reduce((a,s)=>a+(s.gr-s.pd),0);return'<tr><td>'+(i+1)+'<\/td><td style="font-weight:700;cursor:pointer;color:var(--pri)" onclick="viewClient('+c.id+')">'+esc(c.nm)+'<\/td><td>'+esc(c.ph)+'<\/td><td>'+esc(c.ad)+'<\/td><td class="'+(debt>0?'tr':'')+'">'+fmt(debt)+'<\/td><td><button class="b bi" onclick="editClient('+c.id+')"><i class="fas fa-edit"><\/i><\/button> <button class="b bd" onclick="delClient('+c.id+')"><i class="fas fa-trash"><\/i><\/button><\/td><\/tr>';}).join('');}
function filterCli(){let q=document.getElementById('clSearch').value.toLowerCase();document.querySelector('#clT tbody').innerHTML=clRows(db.cl.filter(c=>c.nm.toLowerCase().includes(q)));}
function addClient(){if(!isAdmin()){toast('غير مصرح','e');return}openModal('<h2>➕ إضافة عميل</h2><div><label>الاسم</label><input id="cNm"></div><div><label>الهاتف</label><input id="cPh"></div><div><label>العنوان</label><input id="cAd"></div><div class="sb"><button class="b bs" onclick="saveClient()">حفظ</button><button class="b bd" onclick="closeModal()">إلغاء</button></div>');}
function saveClient(){let nm=document.getElementById('cNm').value.trim();if(!nm){toast('أدخل الاسم','e');return}db.cl.push({id:gid(),nm:nm,ph:document.getElementById('cPh').value,ad:document.getElementById('cAd').value,bl:0});saveAll();closeModal();addLog('عميل',nm);toast('تمت الإضافة','s');showPage('clients');}
function editClient(id){let c=db.cl.find(x=>x.id===id);if(!c)return;openModal('<h2>✏️ تعديل عميل</h2><div><label>الاسم</label><input id="cNm" value="'+esc(c.nm)+'"></div><div><label>الهاتف</label><input id="cPh" value="'+esc(c.ph)+'"></div><div><label>العنوان</label><input id="cAd" value="'+esc(c.ad)+'"></div><div class="sb"><button class="b bs" onclick="updateClient('+id+')">تحديث</button><button class="b bd" onclick="closeModal()">إلغاء</button></div>');}
function updateClient(id){let c=db.cl.find(x=>x.id===id);if(!c)return;c.nm=document.getElementById('cNm').value.trim();c.ph=document.getElementById('cPh').value;c.ad=document.getElementById('cAd').value;saveAll();closeModal();toast('تم التحديث','s');showPage('clients');}
function delClient(id){if(db.sl.some(s=>s.ci===id)){toast('لا يمكن الحذف','e');return}if(!confirm('حذف؟'))return;db.cl=db.cl.filter(x=>x.id!==id);saveAll();toast('تم الحذف','s');showPage('clients');}
function renderPOS(el){el.innerHTML='<div class="g2"><div class="cb"><h3>🛍️ المنتجات</h3><div class="pos-grid">'+db.inv.filter(p=>p.qt>0).map(p=>'<div class="pos-item" onclick="addToCart('+p.id+')"><div style="font-weight:700">'+esc(p.nm)+'</div><div class="tg">'+fmt(p.sp)+'</div><div style="font-size:9px">متوفر: '+p.qt+'</div></div>').join('')+'</div></div><div class="cb"><h3>🛒 السلة</h3><div id="cartDiv">'+(cart.length?cart.map((c,i)=>'<div class="cart-item"><div><strong>'+esc(c.name)+'</strong><br>'+fmt(c.price)+' × '+c.qty+'</div><div class="ci-qty"><button onclick="cartQty('+i+',-1)">-</button><span>'+c.qty+'</span><button onclick="cartQty('+i+',1)">+</button></div><div>'+fmt(c.total)+'</div><button class="b bd" style="padding:2px 6px" onclick="cartRemove('+i+')"><i class="fas fa-trash"></i></button></div>').join(''):'<div style="text-align:center;padding:20px">فارغة</div>')+'</div><div class="pos-total"><div class="sr"><span>الإجمالي:</span><strong id="cartTotal">'+fmt(cart.reduce((a,c)=>a+c.total,0))+'</strong></div></div><div class="g2"><div><label>العميل</label><input id="posClient" placeholder="عميل نقدي"></div><div><label>المدفوع</label><input type="number" id="posPaid" value="'+Math.round(cart.reduce((a,c)=>a+c.total,0))+'"></div></div><div id="posChange" class="ib" style="text-align:center">الباقي: 0</div><div class="sb"><button class="b bs" style="width:100%" onclick="checkout()" '+(cart.length?'':'disabled')+'>إتمام البيع</button><button class="b bd" style="width:100%" onclick="clearCart()">تفريغ</button></div></div></div>';upChange();}
function addToCart(pid){let p=db.inv.find(x=>x.id===pid);if(!p||p.qt<=0){toast('غير متوفر','e');return}let ex=cart.find(c=>c.id===pid);if(ex){if(ex.qty>=p.qt){toast('كمية غير متوفرة','w');return}ex.qty++;ex.total=ex.qty*ex.price;}else{cart.push({id:pid,name:p.nm,price:p.sp,qty:1,total:p.sp});}showPage('pos');}
function cartQty(i,d){let item=cart[i];if(!item)return;let p=db.inv.find(x=>x.id===item.id);let nq=item.qty+d;if(nq<=0){cart.splice(i,1);showPage('pos');return;}if(p&&nq>p.qty+item.qty){toast('الكمية غير متوفرة','w');return;}item.qty=nq;item.total=item.qty*item.price;showPage('pos');}
function cartRemove(i){cart.splice(i,1);showPage('pos');}
function clearCart(){cart=[];showPage('pos');}
function upChange(){let paid=parseFloat(document.getElementById('posPaid')?.value)||0;let total=cart.reduce((a,c)=>a+c.total,0);let ch=Math.max(0,paid-total);let el=document.getElementById('posChange');if(el){el.textContent='الباقي: '+fmt(ch);el.style.background=paid>=total?'#d1fae5':'#fee2e2';el.style.color=paid>=total?'#059669':'#dc2626';}}
function checkout(){if(!cart.length){toast('السلة فارغة','e');return}let clNm=document.getElementById('posClient').value.trim()||'عميل نقدي';let paid=parseFloat(document.getElementById('posPaid').value)||0;let sub=cart.reduce((a,c)=>a+c.total,0),tax=sub*0.15,grand=sub+tax;let cl=db.cl.find(c=>c.nm===clNm);let clId=0;if(!cl&&clNm!=='عميل نقدي'){cl={id:gid(),nm:clNm,ph:'',ad:'',bl:0};db.cl.push(cl);clId=cl.id;}else if(cl)clId=cl.id;let items=cart.map(c=>({pi:c.id,name:c.name,qt:c.qty,pr:c.price,tt:c.total}));let nid=ST.nI++;items.forEach(i=>{let p=db.inv.find(x=>x.id===i.pi);if(p)p.qt-=i.qt});let sl={id:nid,cn:clNm,ci:clId,it:items,sb:sub,tx:tax,gr:grand,pd:paid,st:paid>=grand?'مدفوع':'آجل',dt:td()};db.sl.push(sl);if(clId&&sl.st==='آجل'){let c=db.cl.find(x=>x.id===clId);if(c)c.bl
