<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SEMO ERP | بوابة الدخول والتحقق</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <script src="https://cloudflare.com"></script>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <style>
        :root { --main: #0f172a; --accent: #2563eb; --success: #10b981; --bg: #f8fafc; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: var(--main); display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .auth-card { background: white; padding: 35px; border-radius: 30px; width: 92%; max-width: 420px; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        input, select { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #e2e8f0; border-radius: 15px; font-size: 16px; background: #fdfdfd; outline: none; }
        .iti { width: 100%; margin: 10px 0; text-align: left; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 15px; cursor: pointer; font-weight: 700; margin-top: 10px; transition: 0.3s; }
        .btn-p { background: var(--accent); color: white; }
        .hidden { display: none; }
        .link { color: var(--accent); cursor: pointer; text-decoration: none; font-size: 0.85rem; display: block; margin-top: 15px; font-weight: 600; }
        #toast { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 15px 30px; border-radius: 50px; display: none; z-index: 10000; font-size: 0.85rem; }
    </style>
</head>
<body>
    <div class="auth-card" id="auth-container">
        <h1 style="color:var(--main); font-weight: 900;">SEMO ERP <span style="font-size:0.7rem; color:var(--accent)">SECURITY</span></h1>
        <p style="color:#64748b; margin-bottom:25px; font-size:0.85rem;">نظام إدارة المؤسسات المتكامل</p>
        
        <div id="login-view">
            <input type="email" id="email" placeholder="البريد الإلكتروني">
            <input type="password" id="pass" placeholder="كلمة المرور">
            <button class="btn btn-p" onclick="loginEmail()">دخول آمن للمؤسسة</button>
            <button class="link" onclick="switchView('signup-view')">إنشاء حساب جديد</button>
        </div>

        <div id="signup-view" class="hidden">
            <h3>تسجيل مستخدم جديد</h3>
            <select id="sign-role">
                <option value="user">موظف مبيعات (User)</option>
                <option value="admin">مدير النظام (Admin)</option>
            </select>
            <input type="email" id="sign-email" placeholder="البريد الإلكتروني">
            <input type="password" id="sign-pass" placeholder="كلمة المرور">
            <button class="btn btn-p" style="background:var(--success);" onclick="signUp()">تأكيد التسجيل ✅</button>
            <button class="link" onclick="switchView('login-view')">العودة للدخول</button>
        </div>
    </div>
    <div id="toast"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCRhkV4HLp26QMNorerA9nDeRAQSsD0mmU",
            authDomain: "://firebaseapp.com",
            projectId: "my-pos-system-33831",
            storageBucket: "my-pos-system-33831.firebasestorage.app",
            messagingSenderId: "581619407658",
            appId: "1:581619407658:web:b5c3cc4841033eba97dc53",
            databaseURL: "https://firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const rtdb = firebase.database();

        function switchView(id) { document.querySelectorAll('#auth-container > div').forEach(d => d.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }
        function notify(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 5000); }

        function loginEmail() {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            firebase.auth().signInWithEmailAndPassword(e, p).then(res => {
                localStorage.setItem('isLoggedIn', 'true');
                window.location.assign("dashboard.html");
            }).catch(err => notify("خطأ: " + err.message));
        }

        function signUp() {
            const e = document.getElementById('sign-email').value, p = document.getElementById('sign-pass').value, role = document.getElementById('sign-role').value;
            firebase.auth().createUserWithEmailAndPassword(e, p).then(res => {
                // حفظ الرتبة في قاعدة البيانات فوراً
                rtdb.ref('users/' + res.user.uid + '/profile').set({ email: e, role: role });
                notify("تم إنشاء الحساب برتبة: " + role);
                switchView('login-view');
            }).catch(err => notify(err.message));
        }
    </script>
</body>
</html>
