<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEMO CLOUD - نظام سحابي متكامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
        import { getDatabase, ref, set, get, child, push, onValue } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCfVMHNoqbh86I0JJjnguGY6seA4vWJsSU",
            authDomain: "my-pos-system-11dee.firebaseapp.com",
            databaseURL: "https://my-pos-system-11dee-default-rtdb.firebaseio.com",
            projectId: "my-pos-system-11dee",
            storageBucket: "my-pos-system-11dee.firebasestorage.app",
            messagingSenderId: "565195477080",
            appId: "1:565195477080:web:1ffa21a34e28b47dddfa2d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const database = getDatabase(app);

        window.auth = auth;
        window.db = database;
        window.signInWithEmailAndPassword = signInWithEmailAndPassword;
        window.createUserWithEmailAndPassword = createUserWithEmailAndPassword;
        window.ref = ref;
        window.set = set;
        window.get = get;
        window.child = child;
        window.push = push;
        window.onValue = onValue;
        
        console.log("✅ Firebase connected");
        
        // تشغيل التطبيق بعد تحميل Firebase
        if(window.initApp) window.initApp();
    </script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --p: #3b82f6;
            --s: #10b981;
            --d: #ef4444;
            --w: #f59e0b;
            --bg: #0f172a;
            --c: #1e293b;
            --t: #f8fafc;
            --b: #334155;
        }
        body {
            background: var(--bg);
            color: var(--t);
            font-family: 'Cairo', sans-serif;
            direction: rtl;
            display: flex;
            min-height: 100vh;
        }
        
        /* شاشة الدخول */
        .login-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .login-card {
            background: #1e293b;
            padding: 40px;
            border-radius: 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            border: 1px solid #334155;
        }
        .login-card h1 {
            color: #3b82f6;
            margin-bottom: 10px;
        }
        .login-card p {
            font-size: 12px;
            opacity: 0.7;
            margin-bottom: 20px;
        }
        .login-card input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: #0f172a;
            border: 1px solid #334155;
            color: #fff;
            border-radius: 12px;
            font-size: 16px;
        }
        .login-card button {
            width: 100%;
            padding: 15px;
            background: #3b82f6;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .toggle-auth {
            margin-top: 15px;
            color: #3b82f6;
            cursor: pointer;
            font-size: 14px;
        }
        .error-msg {
            color: #f87171;
            margin-top: 15px;
            display: none;
        }
        
        /* الشريط الجانبي */
        .sidebar {
            width: 280px;
            background: #1e293b;
            padding: 25px 20px;
            position: fixed;
            right: 0;
            top: 0;
            height: 100vh;
            overflow-y: auto;
            border-left: 1px solid #334155;
            z-index: 100;
        }
        .main {
            margin-right: 280px;
            padding: 30px;
            width: calc(100% - 280px);
        }
        .user-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px;
            background: #0f172a;
            border-radius: 16px;
            margin-bottom: 25px;
        }
        .menu-title {
            font-size: 11px;
            color: #3b82f6;
            margin: 15px 0 5px;
            font-weight: bold;
        }
        .menu-item {
            padding: 12px 15px;
            margin: 5px 0;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: 0.3s;
        }
        .menu-item:hover, .menu-item.active {
            background: #3b82f6;
        }
        
        /* المحتوى */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #1e293b;
            padding: 20px;
            border-radius: 20px;
            border-right: 4px solid #3b82f6;
            cursor: pointer;
        }
        .stat-value {
            font-size: 28px;
            font-weight: 800;
            margin-top: 10px;
        }
        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 20px;
            border: 1px solid #334155;
            margin-bottom: 20px;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #334155;
        }
        th {
            color: #3b82f6;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-primary { background: #3b82f6; color: #fff; }
        .btn-success { background: #10b981; color: #fff; }
        .btn-danger { background: #ef4444; color: #fff; }
        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #0f172a;
            border: 1px solid #334155;
            color: #fff;
            border-radius: 10px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1100;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: #1e293b;
            padding: 30px;
            border-radius: 25px;
            width: 90%;
            max-width: 500px;
        }
        @media (max-width: 768px) {
            .sidebar { transform: translateX(100%); width: 260px; }
            .sidebar.open { transform: translateX(0); }
            .main { margin-right: 0; width: 100%; }
        }
    </style>
</head>
<body>

<!-- شاشة الدخول -->
<div id="loginPage" class="login-page">
    <div class="login-card">
        <h1>SEMO CLOUD</h1>
        <p>نظام الإدارة السحابي المتكامل</p>
        <input type="email" id="email" placeholder="البريد الإلكتروني">
        <input type="password" id="password" placeholder="كلمة المرور">
        <button id="authBtn" onclick="handleAuth()">دخول للنظام</button>
        <div id="loginError" class="error-msg"></div>
        <p class="toggle-auth" onclick="toggleAuthMode()" id="toggleText">ليس لديك حساب؟ إنشاء حساب جديد</p>
    </div>
</div>

<!-- شاشة النظام الرئيسي -->
<div id="appSystem" style="display: none;">
    <aside class="sidebar">
        <div class="user-card">
            <div style="width:45px; height:45px; background:#3b82f6; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:20px;">👤</div>
            <div>
                <h4 id="userDisplayName">مستخدم</h4>
                <p id="userEmailDisplay" style="font-size:10px; opacity:0.6;"></p>
            </div>
        </div>
        <div class="menu-title">الرئيسية</div>
        <div class="menu-item active" onclick="sp('dash', this)">🏠 لوحة التحكم</div>
        <div class="menu-title">المخازن والبيع</div>
        <div class="menu-item" onclick="sp('inv', this)">📦 المخزون السحابي</div>
        <div class="menu-item" onclick="sp('sales', this)">🛒 المبيعات الحية</div>
        <div class="menu-title">المالية</div>
        <div class="menu-item" onclick="sp('exp', this)">💸 المصروفات</div>
        <div style="margin-top:50px;" class="menu-item" onclick="logout()">🚪 تسجيل الخروج</div>
    </aside>
    <main class="main">
        <div id="pageContent"></div>
    </main>
</div>

<div id="modal" class="modal" onclick="if(event.target===this)cm()">
    <div class="modal-content" id="mBody"></div>
</div>

<script>
let authMode = 'login';
let currentUid = null;
let cloudData = { inv: [], sales: [], exp: [] };

// --- نظام الـ Authentication السحابي ---
window.handleAuth = async function() {
    const email = document.getElementById('email').value;
    const pass = document.getElementById('password').value;
    const err = document.getElementById('loginError');
    
    try {
        let res;
        if(authMode === 'login') {
            res = await window.signInWithEmailAndPassword(window.auth, email, pass);
        } else {
            res = await window.createUserWithEmailAndPassword(window.auth, email, pass);
            // تهيئة بيانات للمستخدم الجديد
            await window.set(window.ref(window.db, 'users/' + res.user.uid), { inv: {}, sales: {}, exp: {} });
        }
        startSystem(res.user);
    } catch (e) {
        err.style.display = 'block';
        err.innerText = "خطأ: " + e.message;
    }
};

window.toggleAuthMode = function() {
    authMode = authMode === 'login' ? 'signup' : 'login';
    document.getElementById('authBtn').innerText = authMode === 'login' ? 'دخول للنظام' : 'إنشاء حساب جديد';
    document.getElementById('toggleText').innerText = authMode === 'login' ? 'ليس لديك حساب؟ إنشاء حساب جديد' : 'لديك حساب بالفعل؟ سجل دخولك';
};

// --- تشغيل النظام وربط الـ Realtime Data ---
function startSystem(user) {
    currentUid = user.uid;
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('appSystem').style.display = 'block';
    document.getElementById('userDisplayName').innerText = user.email.split('@')[0];
    document.getElementById('userEmailDisplay').innerText = user.email;

    // مراقبة البيانات حياً من Firebase
    const dataRef = window.ref(window.db, 'users/' + currentUid);
    window.onValue(dataRef, (snapshot) => {
        const data = snapshot.val();
        if(data) {
            cloudData.inv = data.inv ? Object.entries(data.inv).map(([id, val]) => ({...val, id})) : [];
            cloudData.sales = data.sales ? Object.entries(data.sales).map(([id, val]) => ({...val, id})) : [];
            cloudData.exp = data.exp ? Object.entries(data.exp).map(([id, val]) => ({...val, id})) : [];
        }
        if(document.querySelector('.menu-item.active')?.innerText.includes('الرئيسية')) {
            renderDash();
        } else if(document.querySelector('.menu-item.active')?.innerText.includes('المخزون')) {
            renderInv();
        } else if(document.querySelector('.menu-item.active')?.innerText.includes('المبيعات')) {
            renderSales();
        } else if(document.querySelector('.menu-item.active')?.innerText.includes('المصروفات')) {
            renderExp();
        } else {
            renderDash();
        }
    });
}

// --- الدوال المحاسبية السحابية ---
window.sp = function(p, el) {
    document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
    if(el) el.classList.add('active');
    if(p === 'dash') renderDash();
    if(p === 'inv') renderInv();
    if(p === 'sales') renderSales();
    if(p === 'exp') renderExp();
};

function renderDash() {
    let sTot = cloudData.sales.reduce((a, b) => a + b.tot, 0);
    let pTot = cloudData.sales.reduce((a, b) => a + b.prof, 0);
    let eTot = cloudData.exp.reduce((a, b) => a + b.amt, 0);

    document.getElementById('pageContent').innerHTML = `
        <h1 style="margin-bottom:20px">لوحة التحكم السحابية</h1>
        <div class="stats-grid">
            <div class="stat-card" onclick="sp('sales')"><h3>💰 إجمالي المبيعات</h3><div class="stat-value">${sTot.toLocaleString()}</div></div>
            <div class="stat-card" onclick="sp('sales')" style="border-color:var(--s)"><h3>📈 صافي الأرباح</h3><div class="stat-value" style="color:var(--s)">${(pTot - eTot).toLocaleString()}</div></div>
            <div class="stat-card" onclick="sp('exp')" style="border-color:var(--d)"><h3>💸 المصروفات</h3><div class="stat-value">${eTot.toLocaleString()}</div></div>
            <div class="stat-card" onclick="sp('inv')"><h3>📦 عدد المنتجات</h3><div class="stat-value">${cloudData.inv.length}</div></div>
        </div>
        <div class="card"><h3>📋 آخر المبيعات (Live)</h3>
        <table><thead><tr><th>التاريخ</th><th>المنتج</th><th>الكمية</th><th>الإجمالي</th></tr></thead>
        <tbody>${cloudData.sales.slice(-5).reverse().map(s=>`<tr><td style="text-align:center">${s.d || ''}</td><td style="text-align:center">${s.n}</td><td style="text-align:center">${s.q}</td><td style="text-align:center">${s.tot.toLocaleString()}</td></tr>`).join('')}</tbody></table></div>
    `;
}

function renderInv() {
    document.getElementById('pageContent').innerHTML = `
        <div class="card"><div class="card-header"><h2>📦 المخزون</h2><button class="btn btn-primary" onclick="openInvM()">+ إضافة صنف</button></div>
        <div class="table-wrapper"><table><thead><tr><th>#</th><th>الصنف</th><th>التكلفة</th><th>البيع</th><th>الكمية</th><th></th></tr></thead>
        <tbody>${cloudData.inv.map((i,idx)=>`<tr><td style="text-align:center">${idx+1}</td><td style="text-align:center"><strong>${i.n}</strong></td><td style="text-align:center">${i.c}</td><td style="text-align:center">${i.p}</td><td style="text-align:center">${i.q}</td><td style="text-align:center"><button class="btn btn-danger" style="padding:5px" onclick="deleteInv('${i.id}')">🗑️</button></td></tr>`).join('')}</tbody><tr></div></div>
    `;
}

window.openInvM = function() {
    document.getElementById('mBody').innerHTML = `<h3>➕ منتج جديد</h3><input id="in" placeholder="الاسم"><input id="ic" type="number" placeholder="سعر التكلفة"><input id="ip" type="number" placeholder="سعر البيع"><input id="iq" type="number" placeholder="الكمية"><button class="btn btn-success" style="width:100%" onclick="saveInv()">💾 حفظ في السحابة</button>`;
    document.getElementById('modal').classList.add('show');
};

window.saveInv = async function() {
    const name = document.getElementById('in').value;
    if(!name) { alert('❌ يرجى كتابة اسم المنتج'); return; }
    const data = { n: name, c: parseFloat(document.getElementById('ic').value) || 0, p: parseFloat(document.getElementById('ip').value) || 0, q: parseInt(document.getElementById('iq').value) || 0 };
    const newRef = window.push(window.ref(window.db, `users/${currentUid}/inv`));
    await window.set(newRef, data);
    cm();
    alert('✅ تمت الإضافة بنجاح');
};

window.deleteInv = async function(id) {
    if(confirm('⚠️ هل أنت متأكد من الحذف؟')) {
        await window.set(window.ref(window.db, `users/${currentUid}/inv/${id}`), null);
        alert('🗑️ تم الحذف');
    }
};

function renderSales() {
    document.getElementById('pageContent').innerHTML = `
        <h2>🛒 فاتورة بيع جديدة</h2>
        <div class="card">
            <select id="si">${cloudData.inv.map(i=>`<option value="${i.id}">${i.n} (متوفر: ${i.q}) - ${i.p} ج.م</option>`)}</select>
            <input id="sq" type="number" value="1" placeholder="الكمية">
            <input id="sclient" placeholder="اسم العميل">
            <button class="btn btn-success" style="width:100%" onclick="doSale()">💰 تأكيد البيع وخصم المخزن</button>
        </div>
        <div class="card"><h3>📋 سجل الفواتير</h3><div class="table-wrapper"><table><thead><td><th>#</th><th>التاريخ</th><th>المنتج</th><th>العميل</th><th>الكمية</th><th>الإجمالي</th></tr></thead>
        <tbody>${cloudData.sales.slice().reverse().map((s,idx)=>`<tr><td style="text-align:center">${idx+1}</td><td style="text-align:center">${s.d}</td><td style="text-align:center">${s.n}</td><td style="text-align:center">${s.cli || '-'}</td><td style="text-align:center">${s.q}</td><td style="text-align:center">${s.tot.toLocaleString()}</td></tr>`).join('')}</tbody></table></div></div>
    `;
}

window.doSale = async function() {
    let id = document.getElementById('si').value;
    let q = parseInt(document.getElementById('sq').value);
    let client = document.getElementById('sclient').value || 'زبون نقدي';
    let prod = cloudData.inv.find(i=>i.id === id);
    if(prod && prod.q >= q) {
        // تحديث المخزن في السحابة
        await window.set(window.ref(window.db, `users/${currentUid}/inv/${id}/q`), prod.q - q);
        // تسجيل البيع
        const saleData = { n: prod.n, cli: client, q: q, tot: q * prod.p, prof: q * (prod.p - prod.c), d: new Date().toLocaleDateString('ar-EG') };
        await window.push(window.ref(window.db, `users/${currentUid}/sales`), saleData);
        alert('✅ تمت العملية وحفظها سحابياً');
        renderSales();
    } else alert('❌ الكمية غير كافية!');
};

function renderExp() {
    document.getElementById('pageContent').innerHTML = `
        <div class="card"><div class="card-header"><h2>💸 المصروفات</h2><button class="btn btn-danger" onclick="openExpM()">+ تسجيل مصروف</button></div>
        <div class="table-wrapper"><table><thead><td><th>#</th><th>التاريخ</th><th>البيان</th><th>المبلغ</th></thead>
        <tbody>${cloudData.exp.map((e,idx)=>`<tr><td style="text-align:center">${idx+1}</td><td style="text-align:center">${e.d}</td><td style="text-align:center">${e.n}</td><td style="text-align:center">${e.amt.toLocaleString()}</td></tr>`).join('')}</tbody></table></div></div>
    `;
}

window.openExpM = function() {
    document.getElementById('mBody').innerHTML = `<h3>➕ مصروف جديد</h3><input id="en" placeholder="البيان (مثال: كهرباء، إيجار)"><input id="ea" type="number" placeholder="المبلغ"><button class="btn btn-danger" style="width:100%" onclick="addExp()">💾 حفظ</button>`;
    document.getElementById('modal').classList.add('show');
};

window.addExp = async function() {
    let name = document.getElementById('en').value;
    let amount = parseFloat(document.getElementById('ea').value);
    if(!name) { alert('❌ يرجى كتابة البيان'); return; }
    const data = { n: name, amt: amount, d: new Date().toLocaleDateString('ar-EG') };
    await window.push(window.ref(window.db, `users/${currentUid}/exp`), data);
    cm();
    alert('✅ تمت الإضافة');
};

// أدوات
function cm() { document.getElementById('modal').classList.remove('show'); }
window.logout = async function() { await window.auth.signOut(); location.reload(); };

window.initApp = function() {
    window.auth.onAuthStateChanged(user => {
        if(user) startSystem(user);
        else document.getElementById('loginPage').style.display = 'flex';
    });
};
</script>
</body>
</html>
