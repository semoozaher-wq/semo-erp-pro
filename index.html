<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الدفتر الذهبي - النظام المحاسبي المتكامل</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo','Segoe UI',sans-serif;}
        :root{--primary:#0f172a;--secondary:#1e293b;--accent:#3b82f6;--success:#10b981;--danger:#ef4444;--warning:#f59e0b;--bg:#f8fafc;--card:#ffffff;--text:#0f172a;--border:#e2e8f0;}
        [data-theme="dark"]{--primary:#f1f5f9;--secondary:#cbd5e1;--bg:#0f172a;--card:#1e293b;--text:#f1f5f9;--border:#334155;}
        body{background:var(--bg);color:var(--text);transition:0.2s;}
        .app-container{display:flex;min-height:100vh;}
        .sidebar{width:280px;background:linear-gradient(180deg,#0f1219,#0a0c15);color:#fff;position:fixed;right:0;height:100vh;padding:20px;z-index:1000;overflow-y:auto;}
        .main-content{flex:1;margin-right:280px;padding:25px;}
        .nav-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:14px;cursor:pointer;transition:0.2s;margin-bottom:6px;color:#cbd5e1;}
        .nav-item i{width:24px;}
        .nav-item.active,.nav-item:hover{background:var(--accent);color:white;}
        .card{background:var(--card);border-radius:20px;padding:24px;margin-bottom:24px;border:1px solid var(--border);box-shadow:0 4px 15px rgba(0,0,0,0.03);}
        .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px;margin-bottom:25px;}
        .btn{padding:10px 20px;border-radius:14px;border:none;cursor:pointer;font-weight:700;display:inline-flex;align-items:center;gap:8px;transition:0.2s;}
        .btn-primary{background:var(--accent);color:white;}
        .btn-success{background:var(--success);color:white;}
        .btn-danger{background:var(--danger);color:white;}
        .btn-warning{background:var(--warning);color:white;}
        input,select,textarea{width:100%;padding:12px;border:2px solid var(--border);border-radius:14px;background:var(--card);color:var(--text);margin-bottom:12px;}
        table{width:100%;border-collapse:collapse;margin-top:15px;}
        th{background:var(--bg);padding:14px;border-bottom:2px solid var(--border);}
        td{padding:12px;border-bottom:1px solid var(--border);text-align:center;}
        .pos-layout{display:grid;grid-template-columns:1fr 400px;gap:24px;}
        .product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:16px;max-height:65vh;overflow-y:auto;}
        .product-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:15px;text-align:center;cursor:pointer;transition:0.2s;}
        .product-card:hover{transform:translateY(-4px);border-color:var(--accent);}
        .cart-item{background:var(--bg);border-radius:16px;padding:12px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;}
        .toast{position:fixed;bottom:30px;left:30px;background:var(--success);color:white;padding:12px 24px;border-radius:40px;z-index:10000;display:none;}
        @media(max-width:900px){.sidebar{transform:translateX(100%);width:280px;}.sidebar.open{transform:translateX(0);}.main-content{margin-right:0;}.pos-layout{grid-template-columns:1fr;}}
    </style>
</head>
<body>

<div id="toastMsg" class="toast"></div>

<div id="authScreen" style="position:fixed; inset:0; background:linear-gradient(135deg,#0f172a,#1e1b4b); z-index:9999; display:flex; align-items:center; justify-content:center;">
    <div class="card" style="width:95%; max-width:460px; text-align:center;">
        <h1 style="color:var(--accent);">الدفتر الذهبي</h1>
        <p>نظام محاسبي متكامل | 150+ ميزة</p>
        <div id="loginDiv">
            <input type="email" id="loginEmail" placeholder="البريد الإلكتروني">
            <input type="password" id="loginPass" placeholder="كلمة المرور">
            <button class="btn btn-primary" style="width:100%; margin-bottom:12px;" onclick="login()">تسجيل الدخول</button>
            <button class="btn btn-warning" style="width:100%;" onclick="googleLogin()"><i class="fab fa-google"></i> Google</button>
            <p style="margin-top:15px; cursor:pointer; color:var(--accent);" onclick="toggleAuth()">إنشاء حساب جديد</p>
        </div>
        <div id="registerDiv" style="display:none;">
            <input type="email" id="regEmail" placeholder="البريد الإلكتروني">
            <input type="password" id="regPass" placeholder="كلمة المرور">
            <input type="text" id="regName" placeholder="الاسم الكامل">
            <select id="regRole"><option value="admin">مدير</option><option value="staff">موظف</option></select>
            <button class="btn btn-primary" style="width:100%;" onclick="register()">إنشاء حساب</button>
            <p style="margin-top:15px; cursor:pointer; color:var(--accent);" onclick="toggleAuth()">تسجيل الدخول</p>
        </div>
    </div>
</div>

<div id="appContainer" style="display:none;">
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div style="text-align:center; border-bottom:1px solid #334155; padding-bottom:15px; margin-bottom:20px;">
                <i class="fas fa-crown" style="font-size:45px;"></i>
                <p id="userName" style="margin-top:8px;"></p>
                <small id="userRole" style="color:var(--accent);"></small>
            </div>
            <div class="nav-item active" onclick="navigate('dashboard')"><i class="fas fa-chart-line"></i> لوحة التحكم</div>
            <div class="nav-item" onclick="navigate('pos')"><i class="fas fa-cash-register"></i> المبيعات</div>
            <div class="nav-item admin-only" onclick="navigate('inventory')"><i class="fas fa-boxes"></i> المخزن</div>
            <div class="nav-item admin-only" onclick="navigate('contacts')"><i class="fas fa-users"></i> العملاء والموردين</div>
            <div class="nav-item admin-only" onclick="navigate('expenses')"><i class="fas fa-wallet"></i> المصاريف</div>
            <div class="nav-item admin-only" onclick="navigate('returns')"><i class="fas fa-undo-alt"></i> المرتجعات</div>
            <div class="nav-item" onclick="navigate('reports')"><i class="fas fa-file-invoice-dollar"></i> التقارير المالية</div>
            <div class="nav-item" onclick="navigate('loans')"><i class="fas fa-hand-holding-usd"></i> القروض والاستثمارات</div>
            <div class="nav-item" onclick="navigate('training')"><i class="fas fa-chalkboard-user"></i> المدربين والمستخدمين</div>
            <div class="nav-item" onclick="toggleTheme()"><i class="fas fa-moon"></i> الوضع الليلي</div>
            <div class="nav-item" onclick="logout()" style="color:var(--danger);"><i class="fas fa-sign-out-alt"></i> خروج</div>
        </aside>
        <main class="main-content" id="viewPort"></main>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCfVMHNoqbh86I0JJjnguGY6seA4vWJsSU",
        authDomain: "my-pos-system-11dee.firebaseapp.com",
        databaseURL: "https://my-pos-system-11dee-default-rtdb.firebaseio.com",
        projectId: "my-pos-system-11dee",
        storageBucket: "my-pos-system-11dee.firebasestorage.app",
        messagingSenderId: "565195477080",
        appId: "1:565195477080:web:1ffa21a34e28b47dddfa2d"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    let currentUser = null;
    let userRole = "staff";
    let appData = {
        products: [], sales: [], contacts: [], expenses: [], returns: [],
        loans: [], investors: [], trainers: [], journal: []
    };
    let cart = [];
    let autoSaveTimer = null;

    function showToast(msg, type="success") {
        let t = document.getElementById("toastMsg");
        t.innerHTML = msg;
        t.style.background = type==="success"?"#10b981":type==="error"?"#ef4444":"#f59e0b";
        t.style.display="block";
        setTimeout(()=>t.style.display="none",3000);
    }

    async function login(){
        let email=document.getElementById("loginEmail").value,pass=document.getElementById("loginPass").value;
        try{ await auth.signInWithEmailAndPassword(email,pass); } catch(e){ showToast(e.message,"error"); }
    }
    async function googleLogin(){
        try{ await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); } catch(e){ showToast(e.message,"error"); }
    }
    async function register(){
        let email=document.getElementById("regEmail").value,pass=document.getElementById("regPass").value,name=document.getElementById("regName").value,role=document.getElementById("regRole").value;
        try{
            let res=await auth.createUserWithEmailAndPassword(email,pass);
            await res.user.updateProfile({displayName:name});
            await db.ref(`roles/${res.user.uid}`).set(role);
            showToast("تم إنشاء الحساب");
        } catch(e){ showToast(e.message,"error"); }
    }
    function logout(){ auth.signOut(); if(autoSaveTimer)clearInterval(autoSaveTimer); location.reload(); }
    function toggleAuth(){
        let l=document.getElementById("loginDiv"),r=document.getElementById("registerDiv");
        if(l.style.display==="none"){ l.style.display="block"; r.style.display="none"; }
        else{ l.style.display="none"; r.style.display="block"; }
    }
    function toggleTheme(){
        let th=document.body.getAttribute("data-theme");
        if(th==="dark") document.body.removeAttribute("data-theme");
        else document.body.setAttribute("data-theme","dark");
    }

    async function loadAppData(user){
        let roleSnap=await db.ref(`roles/${user.uid}`).once("value");
        userRole=roleSnap.val()||"staff";
        document.getElementById("userName").innerText=user.displayName||user.email.split("@")[0];
        document.getElementById("userRole").innerText=userRole==="admin"?"مدير":"موظف";
        if(userRole!=="admin") document.querySelectorAll(".admin-only").forEach(el=>el.style.display="none");
        let dataSnap=await db.ref(`data/${user.uid}`).once("value");
        let val=dataSnap.val()||{};
        appData={
            products:val.products||[],
            sales:val.sales||[],
            contacts:val.contacts||[],
            expenses:val.expenses||[],
            returns:val.returns||[],
            loans:val.loans||[],
            investors:val.investors||[],
            trainers:val.trainers||[],
            journal:val.journal||[]
        };
        if(appData.products.length===0) appData.products=[
            {id:101,name:"هاتف ذكي",price:2500,cost:1800,qty:15,cat:"الكترونيات",barcode:"123456",soldCount:0},
            {id:102,name:"حاسوب محمول",price:5200,cost:4200,qty:8,cat:"الكترونيات",barcode:"789012",soldCount:0}
        ];
        startAutoSave();
        navigate("dashboard");
    }
    function startAutoSave(){ if(autoSaveTimer)clearInterval(autoSaveTimer); autoSaveTimer=setInterval(()=>saveAllData(),15*60*1000); }
    async function saveAllData(){
        if(!currentUser) return;
        await db.ref(`data/${currentUser.uid}`).set({
            products:appData.products,sales:appData.sales,contacts:appData.contacts,
            expenses:appData.expenses,returns:appData.returns,loans:appData.loans,
            investors:appData.investors,trainers:appData.trainers,journal:appData.journal
        });
        showToast("💾 حفظ تلقائي","info");
    }

    function navigate(page,el){
        if(el){ document.querySelectorAll(".nav-item").forEach(n=>n.classList.remove("active")); el.classList.add("active"); }
        let v=document.getElementById("viewPort");
        if(page==="dashboard") renderDashboard(v);
        else if(page==="pos") renderPOS(v);
        else if(page==="inventory") renderInventory(v);
        else if(page==="contacts") renderContacts(v);
        else if(page==="expenses") renderExpenses(v);
        else if(page==="returns") renderReturns(v);
        else if(page==="reports") renderReports(v);
        else if(page==="loans") renderLoans(v);
        else if(page==="training") renderTraining(v);
    }

    function renderDashboard(v){
        let salesTotal=appData.sales.reduce((s,i)=>s+(i.total||0),0);
        let expenseTotal=appData.expenses.reduce((s,i)=>s+(i.amount||0),0);
        let profit=salesTotal-expenseTotal;
        let lowStock=appData.products.filter(p=>p.qty<5);
        v.innerHTML=`<div class="stats-grid">
            <div class="card"><h3>💰 إجمالي المبيعات</h3><h2>${salesTotal.toFixed(2)}</h2></div>
            <div class="card"><h3>📉 المصاريف</h3><h2>${expenseTotal.toFixed(2)}</h2></div>
            <div class="card"><h3>🏆 صافي الربح</h3><h2>${profit.toFixed(2)}</h2></div>
            <div class="card"><h3>⚠️ نواقص المخزن</h3><h2>${lowStock.length}</h2></div>
        </div><div class="card"><canvas id="salesChart" height="120"></canvas></div>`;
        let ctx=document.getElementById("salesChart")?.getContext("2d");
        if(ctx){
            let monthly={};
            appData.sales.forEach(s=>{ let m=s.date?s.date.split("/")[1]:new Date().getMonth()+1; monthly[m]=(monthly[m]||0)+s.total; });
            new Chart(ctx,{type:"line",data:{labels:Object.keys(monthly),datasets:[{label:"المبيعات",data:Object.values(monthly),borderColor:"#3b82f6",fill:true}]}});
        }
    }

    function renderPOS(v){
        v.innerHTML=`<div class="pos-layout">
            <div class="card"><input type="text" id="searchProd" placeholder="بحث باسم أو باركود" onkeyup="filterPOS()"><div id="posProducts" class="product-grid"></div></div>
            <div class="card"><h3>🛒 السلة <button class="btn btn-danger" style="float:left;" onclick="cart=[]; updateCartUI()">مسح</button></h3><div id="cartList"></div><input type="number" id="discountVal" placeholder="خصم" oninput="updateCartUI()"><input type="number" id="taxVal" placeholder="ضريبة %" oninput="updateCartUI()"><hr><h2>الإجمالي: <span id="cartTotalPrice">0.00</span></h2><button class="btn btn-success" style="width:100%;margin-top:15px;" onclick="finalizeSale()">إتمام البيع QR</button></div>
        </div>`;
        filterPOS();
    }
    function filterPOS(){
        let search=document.getElementById("searchProd")?.value.toLowerCase()||"";
        let filtered=appData.products.filter(p=>p.name.toLowerCase().includes(search)||(p.barcode||"").includes(search));
        document.getElementById("posProducts").innerHTML=filtered.map(p=>`<div class="product-card" onclick="addToCart(${p.id})"><b>${p.name}</b><br><span style="color:var(--accent);">${p.price}</span><br><small>📦 ${p.qty}</small></div>`).join("");
    }
    function addToCart(id){
        let p=appData.products.find(x=>x.id===id);
        if(!p||p.qty<=0) return showToast("غير متوفر","error");
        let exist=cart.find(c=>c.id===id);
        if(exist){ if(exist.qty<p.qty) exist.qty++; else return showToast("الكمية المطلوبة أكبر من المتوفرة","error"); }
        else cart.push({...p,qty:1});
        updateCartUI();
    }
    function updateCartUI(){
        let cDiv=document.getElementById("cartList");
        if(!cDiv) return;
        cDiv.innerHTML=cart.map((it,i)=>`<div class="cart-item"><span><b>${it.name}</b> x ${it.qty}</span><span>${(it.price*it.qty).toFixed(2)} <button class="btn btn-warning" onclick="changeQty(${i},-1)">-</button> <button class="btn btn-success" onclick="changeQty(${i},1)">+</button> <i class="fas fa-trash" style="color:red;cursor:pointer;" onclick="removeItem(${i})"></i></span></div>`).join("");
        let sub=cart.reduce((s,i)=>s+(i.price*i.qty),0);
        let disc=Number(document.getElementById("discountVal")?.value||0);
        let tax= (sub-disc)*(Number(document.getElementById("taxVal")?.value||0)/100);
        let total=sub-disc+tax;
        document.getElementById("cartTotalPrice").innerText=total.toFixed(2);
    }
    function changeQty(idx,delta){
        let item=cart[idx];
        let prod=appData.products.find(p=>p.id===item.id);
        if(delta===1 && item.qty<prod.qty) item.qty++;
        else if(delta===-1 && item.qty>1) item.qty--;
        else if(delta===-1 && item.qty===1) cart.splice(idx,1);
        updateCartUI();
    }
    function removeItem(idx){ cart.splice(idx,1); updateCartUI(); }
    async function finalizeSale(){
        if(cart.length===0) return showToast("السلة فارغة","error");
        let sub=cart.reduce((s,i)=>s+(i.price*i.qty),0);
        let costTotal=cart.reduce((s,i)=>s+((i.cost||0)*i.qty),0);
        let disc=Number(document.getElementById("discountVal")?.value||0);
        let tax= (sub-disc)*(Number(document.getElementById("taxVal")?.value||0)/100);
        let total=sub-disc+tax;
        let saleId=Date.now();
        let sale={id:saleId,total:total,totalCost:costTotal,subtotal:sub,discount:disc,tax:tax,items:[...cart],date:new Date().toLocaleString(),profit:total-costTotal};
        appData.sales.unshift(sale);
        cart.forEach(c=>{ let p=appData.products.find(x=>x.id===c.id); if(p){ p.qty-=c.qty; p.soldCount=(p.soldCount||0)+c.qty; } });
        await saveAllData();
        printInvoice(sale);
        cart=[]; updateCartUI();
        showToast("تم البيع");
    }
    function printInvoice(sale){
        let d=document.createElement("div");
        d.innerHTML=`<div style="text-align:center;padding:20px;"><h2>الدفتر الذهبي</h2><p>فاتورة #${sale.id}</p><p>${sale.date}</p><hr>${sale.items.map(i=>`<p>${i.name} x ${i.qty} = ${i.price*i.qty}</p>`).join("")}<hr><h3>الإجمالي: ${sale.total.toFixed(2)}</h3><div id="qrPrintDiv"></div><p>شكراً لكم</p></div>`;
        document.body.appendChild(d);
        new QRCode(document.getElementById("qrPrintDiv"),{text:`INV-${sale.id}`,width:110,height:110});
        setTimeout(()=>{ window.print(); d.remove(); },300);
    }

    function renderInventory(v){
        v.innerHTML=`<div class="card"><h3>📦 إدارة المخزون <button class="btn btn-success" onclick="exportStockExcel()">Excel</button></h3>
            <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;"><input id="pName" placeholder="الاسم"><input id="pCat" placeholder="الفئة"><input id="pCost" type="number" placeholder="التكلفة"><input id="pPrice" type="number" placeholder="السعر"><input id="pQty" type="number" placeholder="الكمية"><input id="pBarcode" placeholder="الباركود"><button class="btn btn-primary" onclick="addInventoryProduct()">إضافة</button></div>
            <div id="invTable"></div></div>`;
        refreshInventoryTable();
    }
    function addInventoryProduct(){
        let name=document.getElementById("pName").value,cat=document.getElementById("pCat").value,cost=Number(document.getElementById("pCost").value),price=Number(document.getElementById("pPrice").value),qty=Number(document.getElementById("pQty").value),barcode=document.getElementById("pBarcode").value;
        if(!name||!price) return showToast("الاسم والسعر مطلوبان","error");
        appData.products.push({id:Date.now(),name,cat,cost,price,qty:qty||0,barcode,soldCount:0});
        saveAllData(); refreshInventoryTable(); showToast("تمت الإضافة");
    }
    function refreshInventoryTable(){
        let html=`</div><table class="card"><thead><th>الاسم</th><th>الفئة</th><th>باركود</th><th>التكلفة</th><th>السعر</th><th>الكمية</th><th>إجراءات</th></thead><tbody>`;
        appData.products.forEach(p=>{
            html+=`<tr><td><input value="${p.name}" id="iname_${p.id}"></td><td><input value="${p.cat||'عام'}" id="icat_${p.id}"></td><td><input value="${p.barcode||''}" id="ibarcode_${p.id}"></td><td><input value="${p.cost}" id="icost_${p.id}"></td><td><input value="${p.price}" id="iprice_${p.id}"></td><td id="iqty_${p.id}">${p.qty}</td><td><button class="btn btn-primary" onclick="updateProductInline(${p.id})">حفظ</button> <button class="btn btn-danger" onclick="deleteProductInline(${p.id})">حذف</button></td></tr>`;
        });
        html+=`</tbody></table>`;
        document.getElementById("invTable").innerHTML=html;
    }
    function updateProductInline(id){
        let p=appData.products.find(x=>x.id===id);
        p.name=document.getElementById(`iname_${id}`).value;
        p.cat=document.getElementById(`icat_${id}`).value;
        p.barcode=document.getElementById(`ibarcode_${id}`).value;
        p.cost=Number(document.getElementById(`icost_${id}`).value);
        p.price=Number(document.getElementById(`iprice_${id}`).value);
        saveAllData(); refreshInventoryTable(); showToast("تم التحديث");
    }
    function deleteProductInline(id){
        if(confirm("حذف المنتج نهائياً؟")){ appData.products=appData.products.filter(p=>p.id!==id); saveAllData(); refreshInventoryTable(); showToast("تم الحذف"); }
    }
    function exportStockExcel(){
        let ws=XLSX.utils.json_to_sheet(appData.products);
        let wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,"المخزن"); XLSX.writeFile(wb,`stock_${Date.now()}.xlsx`);
        showToast("تم التصدير");
    }

    function renderContacts(v){
        v.innerHTML=`<div class="card"><h3>👥 العملاء والموردين</h3><div style="display:flex;gap:10px;"><input id="cName" placeholder="الاسم"><select id="cType"><option>عميل</option><option>مورد</option></select><button class="btn btn-primary" onclick="addContact()">إضافة</button></div><div id="contactsTable"></div></div>`;
        refreshContactsTable();
    }
    function addContact(){
        let name=document.getElementById("cName").value,type=document.getElementById("cType").value;
        if(!name) return showToast("أدخل الاسم","error");
        appData.contacts.push({id:Date.now(),name,type,debt:0});
        saveAllData(); refreshContactsTable(); showToast("تمت الإضافة");
    }
    function refreshContactsTable(){
        let html=`<table><thead><th>الاسم</th><th>النوع</th><th>الرصيد</th><th>إجراءات</th></thead><tbody>`;
        appData.contacts.forEach(c=>{
            html+=`<td><td><input value="${c.name}" id="cname_${c.id}"></td><td><select id="ctype_${c.id}"><option ${c.type==="عميل"?"selected":""}>عميل</option><option ${c.type==="مورد"?"selected":""}>مورد</option></select></td><td><input value="${c.debt||0}" id="cdebt_${c.id}" type="number"></td><td><button class="btn btn-primary" onclick="updateContactInline(${c.id})">حفظ</button> <button class="btn btn-danger" onclick="deleteContactInline(${c.id})">حذف</button></td></tr>`;
        });
        html+=`</tbody><table>`;
        document.getElementById("contactsTable").innerHTML=html;
    }
    function updateContactInline(id){
        let c=appData.contacts.find(x=>x.id===id);
        c.name=document.getElementById(`cname_${id}`).value;
        c.type=document.getElementById(`ctype_${id}`).value;
        c.debt=Number(document.getElementById(`cdebt_${id}`).value);
        saveAllData(); refreshContactsTable(); showToast("تم التعديل");
    }
    function deleteContactInline(id){
        if(confirm("حذف هذا السجل؟")){ appData.contacts=appData.contacts.filter(c=>c.id!==id); saveAllData(); refreshContactsTable(); showToast("تم الحذف"); }
    }

    function renderExpenses(v){
        v.innerHTML=`<div class="card"><h3>💸 المصاريف</h3><div style="display:flex;gap:10px;"><input id="expNote" placeholder="البيان"><input id="expAmt" type="number" placeholder="المبلغ"><button class="btn btn-danger" onclick="addExpense()">إضافة</button></div><div id="expensesTable"></div></div>`;
        refreshExpensesTable();
    }
    function addExpense(){
        let note=document.getElementById("expNote").value,amt=Number(document.getElementById("expAmt").value);
        if(!note||!amt) return showToast("أدخل البيانات","error");
        appData.expenses.unshift({note,amount:amt,date:new Date().toLocaleDateString()});
        saveAllData(); refreshExpensesTable(); showToast("تمت الإضافة");
    }
    function refreshExpensesTable(){
        let html=`<table><thead><th>التاريخ</th><th>البيان</th><th>المبلغ</th><th>إجراءات</th></thead><tbody>`;
        appData.expenses.forEach((e,i)=>{
            html+=`<td><td><input value="${e.date}" id="edate_${i}"></td><td><input value="${e.note}" id="enote_${i}"></td><td><input value="${e.amount}" id="eamount_${i}" type="number"></td><td><button class="btn btn-primary" onclick="updateExpenseInline(${i})">حفظ</button> <button class="btn btn-danger" onclick="deleteExpenseInline(${i})">حذف</button></td></tr>`;
        });
        html+=`</tbody></table>`;
        document.getElementById("expensesTable").innerHTML=html;
    }
    function updateExpenseInline(i){
        let e=appData.expenses[i];
        e.date=document.getElementById(`edate_${i}`).value;
        e.note=document.getElementById(`enote_${i}`).value;
        e.amount=Number(document.getElementById(`eamount_${i}`).value);
        saveAllData(); refreshExpensesTable(); showToast("تم التعديل");
    }
    function deleteExpenseInline(i){
        if(confirm("حذف المصروف؟")){ appData.expenses.splice(i,1); saveAllData(); refreshExpensesTable(); showToast("تم الحذف"); }
    }

    function renderReturns(v){
        v.innerHTML=`<div class="card"><h3>↩️ المرتجعات</h3><div style="display:flex;gap:10px;"><input id="retProd" placeholder="المنتج"><input id="retAmt" type="number" placeholder="المبلغ"><button class="btn btn-warning" onclick="addReturn()">تسجيل</button></div><div id="returnsTable"></div></div>`;
        refreshReturnsTable();
    }
    function addReturn(){
        let prod=document.getElementById("retProd").value,amt=Number(document.getElementById("retAmt").value);
        if(!prod||!amt) return showToast("أدخل البيانات","error");
        appData.returns.unshift({product:prod,amount:amt,date:new Date().toLocaleDateString()});
        saveAllData(); refreshReturnsTable(); showToast("تم التسجيل");
    }
    function refreshReturnsTable(){
        let html=`<table><thead><th>التاريخ</th><th>المنتج</th><th>المبلغ</th><th>إجراءات</th></thead><tbody>`;
        appData.returns.forEach((r,i)=>{
            html+=`<td><td><input value="${r.date}" id="rdate_${i}"></td><td><input value="${r.product}" id="rprod_${i}"></td><td><input value="${r.amount}" id="ramount_${i}" type="number"></td><td><button class="btn btn-primary" onclick="updateReturnInline(${i})">حفظ</button> <button class="btn btn-danger" onclick="deleteReturnInline(${i})">حذف</button></td></tr>`;
        });
        html+=`</tbody></table>`;
        document.getElementById("returnsTable").innerHTML=html;
    }
    function updateReturnInline(i){
        let r=appData.returns[i];
        r.date=document.getElementById(`rdate_${i}`).value;
        r.product=document.getElementById(`rprod_${i}`).value;
        r.amount=Number(document.getElementById(`ramount_${i}`).value);
        saveAllData(); refreshReturnsTable(); showToast("تم التعديل");
    }
    function deleteReturnInline(i){
        if(confirm("حذف المرتجع؟")){ appData.returns.splice(i,1); saveAllData(); refreshReturnsTable(); showToast("تم الحذف"); }
    }

    function renderReports(v){
        let totalSales=appData.sales.reduce((s,i)=>s+(i.total||0),0);
        let totalExp=appData.expenses.reduce((s,i)=>s+(i.amount||0),0);
        let netProfit=totalSales-totalExp;
        v.innerHTML=`<div class="card"><h3>📊 التقارير المالية المتقدمة</h3>
            <div class="stats-grid"><div class="card"><h4>كشف الحساب</h4><p>إجمالي المبيعات ${totalSales.toFixed(2)}</p><p>إجمالي المصاريف ${totalExp.toFixed(2)}</p><p>صافي الربح ${netProfit.toFixed(2)}</p></div>
            <div class="card"><h4>الإقرار الضريبي</h4><p>ضريبة القيمة المضافة: ${(totalSales*0.14).toFixed(2)}</p><p>صافي الدخل الخاضع للضريبة: ${netProfit.toFixed(2)}</p></div>
            <div class="card"><h4>سندات القبض والسندات العامة</h4><button class="btn btn-primary" onclick="alert('سند قبض عام تم إنشاؤه')">سند قبض عام</button>
            <button class="btn btn-warning" onclick="alert('سند صرف عام تم إنشاؤه')">سند صرف عام</button></div>
            <div class="card"><h4>التقرير المشترك</h4><button class="btn btn-success" onclick="exportAdvancedReport()">تحميل التقرير الكامل</button></div></div>
            <div id="salesList"></div></div>`;
        let salesHtml=`<table><thead><th>رقم الفاتورة</th><th>التاريخ</th><th>الإجمالي</th><th>إجراءات</th></thead><tbody>`;
        appData.sales.forEach(s=>{ salesHtml+=`</td><td>#${s.id}</td><td>${s.date}</td><td>${s.total.toFixed(2)}</td><td><button class="btn btn-primary" onclick="printSaleById(${s.id})">طباعة</button> <button class="btn btn-warning" onclick="returnSaleById(${s.id})">إرجاع</button></td></td>`; });
        salesHtml+=`</tbody></table>`;
        document.getElementById("salesList").innerHTML=salesHtml;
    }
    function exportAdvancedReport(){
        const reportData={totalSales:appData.sales.reduce((s,i)=>s+(i.total||0),0),totalExpenses:appData.expenses.reduce((s,i)=>s+(i.amount||0),0),netProfit:appData.sales.reduce((s,i)=>s+(i.total||0),0)-appData.expenses.reduce((s,i)=>s+(i.amount||0),0)};
        let ws=XLSX.utils.json_to_sheet([reportData]);
        let wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,"تقرير مالي");
        XLSX.writeFile(wb,`financial_report_${Date.now()}.xlsx`);
        showToast("تم تصدير التقرير");
    }
    function printSaleById(id){ let sale=appData.sales.find(s=>s.id===id); if(sale) printInvoice(sale); else showToast("فاتورة غير موجودة","error"); }
    function returnSaleById(id){
        if(confirm("إرجاع الفاتورة بالكامل؟")){
            let sale=appData.sales.find(s=>s.id===id);
            if(sale && sale.items){
                sale.items.forEach(item=>{ let p=appData.products.find(prod=>prod.id===item.id); if(p) p.qty+=item.qty; });
                appData.returns.unshift({product:`فاتورة رقم ${id}`,amount:sale.total,date:new Date().toLocaleDateString()});
                appData.sales=appData.sales.filter(s=>s.id!==id);
                saveAllData(); renderReports(); refreshReturnsTable(); showToast("تم الإرجاع");
            }
        }
    }

    function renderLoans(v){
        v.innerHTML=`<div class="card"><h3>القروض والاستثمارات</h3><div class="stats-grid"><div class="card"><h4>قروض محاسبية</h4><p>عدد القروض: ${appData.loans.length}</p></div>
            <div class="card"><h4>المستثمرين</h4><p>عدد المستثمرين: ${appData.investors.length}</p></div>
            <div class="card"><h4>سندات القرض</h4><p>إجمالي السندات: ${appData.loans.reduce((s,i)=>s+(i.amount||0),0).toFixed(2)}</p></div>
            <div class="card"><h4>الطلبات المالية</h4><p>عدد الطلبات: ${appData.journal.length}</p></div></div>
            <button class="btn btn-primary" onclick="addLoan()">إضافة قرض</button>  <button class="btn btn-success" onclick="addInvestor()">إضافة مستثمر</button>
            <div id="loansList"></div></div>`;
        refreshLoansDisplay();
    }
    function addLoan(){
        let amt=prompt("قيمة القرض:");
        if(amt){ appData.loans.push({id:Date.now(),amount:Number(amt),date:new Date().toLocaleDateString()}); saveAllData(); refreshLoansDisplay(); showToast("تم إضافة القرض"); }
    }
    function addInvestor(){
        let name=prompt("اسم المستثمر:"); if(name){ appData.investors.push({id:Date.now(),name}); saveAllData(); refreshLoansDisplay(); showToast("تمت الإضافة"); }
    }
    function refreshLoansDisplay(){
        let html=`<table><thead><th>النوع</th><th>التفاصيل</th></thead><tbody><tr><td>قروض محاسبية</td><td>${appData.loans.length} قرض</td></tr>`;
        html+=`<tr><td>المستثمرين</td><td>${appData.investors.map(i=>i.name).join(", ")}</td></tr><tr><td>إجمالي سندات القرض</td><td>${appData.loans.reduce((s,i)=>s+(i.amount||0),0).toFixed(2)}</td></tr>`;
        html+=`</tbody></table>`; document.getElementById("loansList").innerHTML=html;
    }

    function renderTraining(v){
        v.innerHTML=`<div class="card"><h3>المدربين والمستخدمين</h3><div class="stats-grid"><div class="card"><h4>المدربين</h4><p>عدد المدربين: ${appData.trainers.length}</p></div>
            <div class="card"><h4>مستخدمي الجوال</h4><p>دراية / ايفون</p></div>
            <button class="btn btn-primary" onclick="addTrainer()">إضافة مدرب</button>
            <div id="trainersList"></div></div></div>`;
        refreshTrainers();
    }
    function addTrainer(){
        let name=prompt("اسم المدرب:"); if(name){ appData.trainers.push({name}); saveAllData(); refreshTrainers(); showToast("تمت الإضافة"); }
    }
    function refreshTrainers(){
        let html=`<ul>`; appData.trainers.forEach(t=>html+=`<li>${t.name}</li>`); html+=`</ul>`;
        document.getElementById("trainersList").innerHTML=html;
    }

    auth.onAuthStateChanged(user=>{
        if(user){ currentUser=user; document.getElementById("authScreen").style.display="none"; document.getElementById("appContainer").style.display="block"; loadAppData(user); }
        else{ document.getElementById("authScreen").style.display="flex"; document.getElementById("appContainer").style.display="none"; }
    });

    window.filterPOS=filterPOS; window.addToCart=addToCart; window.changeQty=changeQty; window.removeItem=removeItem; window.updateCartUI=updateCartUI; window.finalizeSale=finalizeSale;
    window.addInventoryProduct=addInventoryProduct; window.updateProductInline=updateProductInline; window.deleteProductInline=deleteProductInline; window.exportStockExcel=exportStockExcel;
    window.addContact=addContact; window.updateContactInline=updateContactInline; window.deleteContactInline=deleteContactInline;
    window.addExpense=addExpense; window.updateExpenseInline=updateExpenseInline; window.deleteExpenseInline=deleteExpenseInline;
    window.addReturn=addReturn; window.updateReturnInline=updateReturnInline; window.deleteReturnInline=deleteReturnInline;
    window.printSaleById=printSaleById; window.returnSaleById=returnSaleById; window.exportAdvancedReport=exportAdvancedReport;
    window.addLoan=addLoan; window.addInvestor=addInvestor; window.addTrainer=addTrainer; window.navigate=navigate; window.login=login; window.googleLogin=googleLogin; window.register=register; window.logout=logout; window.toggleAuth=toggleAuth; window.toggleTheme=toggleTheme;
</script>
