<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SEMO ERP | نظام مؤسسي متكامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* خلفية متحركة */
        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(59,130,246,0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
            z-index: 0;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .login-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 480px;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 45px 35px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .glass-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 35px 60px -15px rgba(0,0,0,0.6);
            border-color: rgba(59,130,246,0.5);
        }

        .logo-area {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo-icon {
            width: 85px;
            height: 85px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 42px;
            box-shadow: 0 10px 25px -5px rgba(59,130,246,0.4);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        h1 {
            font-size: 32px;
            background: linear-gradient(135deg, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 14px;
        }

        .demo-box {
            background: rgba(245,158,11,0.15);
            border: 1px solid #f59e0b;
            border-radius: 20px;
            padding: 15px 20px;
            margin: 25px 0;
            transition: all 0.3s;
        }

        .demo-box:hover {
            background: rgba(245,158,11,0.25);
            transform: scale(1.02);
        }

        .demo-title {
            color: #f59e0b;
            font-weight: 700;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .demo-account {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px dashed rgba(245,158,11,0.3);
            font-size: 13px;
            color: #cbd5e1;
        }

        .demo-account:last-child {
            border-bottom: none;
        }

        .demo-account .badge {
            background: #f59e0b;
            color: #1e293b;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: bold;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid #334155;
            border-radius: 60px;
            font-size: 16px;
            color: #f8fafc;
            font-family: inherit;
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
        }

        .input-group input::placeholder {
            color: #64748b;
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 60px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            box-shadow: 0 4px 15px rgba(59,130,246,0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(59,130,246,0.4);
        }

        .btn-demo {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(245,158,11,0.3);
        }

        .btn-demo:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(245,158,11,0.4);
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 25px 0;
            color: #64748b;
            font-size: 13px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #334155;
        }

        .divider::before {
            margin-left: 15px;
        }

        .divider::after {
            margin-right: 15px;
        }

        .shortcut {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #64748b;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.6s ease;
        }
    </style>
</head>
<body>
    <div class="login-container fade-in">
        <div class="glass-card">
            <div class="logo-area">
                <div class="logo-icon">📊</div>
                <h1>SEMO ERP</h1>
                <p class="subtitle">نظام إدارة المؤسسات المتكامل</p>
            </div>

            <div class="demo-box">
                <div class="demo-title">
                    <span>🚀</span> حسابات تجريبية جاهزة
                </div>
                <div class="demo-account">
                    <span>📧 admin@system.com</span>
                    <span>🔑 123456</span>
                    <span class="badge">مدير</span>
                </div>
                <div class="demo-account">
                    <span>📧 manager@system.com</span>
                    <span>🔑 123456</span>
                    <span class="badge">مدير مالي</span>
                </div>
                <div class="demo-account">
                    <span>📧 user@system.com</span>
                    <span>🔑 123456</span>
                    <span class="badge">مستخدم</span>
                </div>
            </div>

            <button class="btn btn-demo" onclick="directLogin()">
                🚀 دخول سريع – حساب مدير
            </button>

            <div class="divider">أو</div>

            <div class="input-group">
                <input type="email" id="loginEmail" placeholder="البريد الإلكتروني" value="admin@system.com">
            </div>
            <div class="input-group">
                <input type="password" id="loginPassword" placeholder="كلمة المرور" value="123456">
            </div>

            <button class="btn btn-primary" onclick="manualLogin()">
                🔐 تسجيل الدخول
            </button>

            <div class="shortcut">
                ⏎ اضغط Enter للدخول السريع
            </div>
        </div>
    </div>

    <script>
        // حسابات تجريبية
        const DEMO_USERS = {
            admin: { email: "admin@system.com", password: "123456", name: "مدير النظام", role: "admin", avatar: "👑" },
            manager: { email: "manager@system.com", password: "123456", name: "مدير مالي", role: "financial_manager", avatar: "💰" },
            user: { email: "user@system.com", password: "123456", name: "مستخدم عادي", role: "user", avatar: "👤" }
        };

        function directLogin() {
            localStorage.setItem('semo_user', JSON.stringify(DEMO_USERS.admin));
            localStorage.setItem('semo_token', 'demo-token-' + Date.now());
            window.location.href = 'dashboard.html';
        }

        function manualLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            
            const user = Object.values(DEMO_USERS).find(u => u.email === email && u.password === password);
            
            if (user) {
                localStorage.setItem('semo_user', JSON.stringify(user));
                localStorage.setItem('semo_token', 'demo-token-' + Date.now());
                window.location.href = 'dashboard.html';
            } else {
                alert('❌ البريد الإلكتروني أو كلمة المرور غير صحيحة');
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') directLogin();
        });

        // التحقق من جلسة سابقة
        if (localStorage.getItem('semo_user')) {
            window.location.href = 'dashboard.html';
        }

        // تسجيل Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(e => console.log('SW not registered'));
        }
    </script>
</body>
</html>
