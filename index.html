<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>ERP PRO ULTIMATE - النسخة الكاملة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}
:root{--bg:#f0f4f8;--card:#ffffff;--primary:#0d9488;--primary-dark:#0f766e;--primary-light:#ccfbf1;--success:#10b981;--danger:#ef4444;--warning:#f59e0b;--info:#3b82f6;--text:#0f172a;--muted:#64748b;--border:#e2e8f0;--radius:16px;--shadow:0 4px 24px rgba(0,0,0,0.06);--badge-s-bg:#d1fae5;--badge-s-c:#059669;--badge-w-bg:#fef3c7;--badge-w-c:#b45309;--badge-d-bg:#fee2e2;--badge-d-c:#dc2626;--badge-i-bg:#dbeafe;--badge-i-c:#2563eb;--table-stripe:rgba(0,0,0,0.02)}
.dark{--bg:#0c1222;--card:#1a2332;--primary:#14b8a6;--primary-dark:#0d9488;--primary-light:#042f2e;--success:#34d399;--danger:#f87171;--warning:#fbbf24;--info:#60a5fa;--text:#e2e8f0;--muted:#94a3b8;--border:#2d3a4a;--shadow:0 4px 24px rgba(0,0,0,0.3);--badge-s-bg:#064e3b;--badge-s-c:#6ee7b7;--badge-w-bg:#78350f;--badge-w-c:#fde68a;--badge-d-bg:#7f1d1d;--badge-d-c:#fca5a5;--badge-i-bg:#1e3a5f;--badge-i-c:#93c5fd;--table-stripe:rgba(255,255,255,0.02)}
body{background:var(--bg);color:var(--text);direction:rtl;min-height:100vh;transition:background .3s,color .3s;overflow-x:hidden}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--muted);border-radius:3px}
.login-screen{display:flex;justify-content:center;align-items:center;min-height:100vh;background:linear-gradient(160deg,#0a1628 0%,#0d3d38 50%,#134e4a 100%);padding:16px;position:relative;overflow:hidden}
.login-screen::before{content:'';position:absolute;width:500px;height:500px;background:radial-gradient(circle,rgba(20,184,166,0.15),transparent 70%);top:-100px;left:-100px;border-radius:50%;animation:pulse1 6s ease-in-out infinite}
.login-screen::after{content:'';position:absolute;width:400px;height:400px;background:radial-gradient(circle,rgba(5,150,105,0.12),transparent 70%);bottom:-80px;right:-80px;border-radius:50%;animation:pulse2 8s ease-in-out infinite}
@keyframes pulse1{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.2);opacity:1}}
@keyframes pulse2{0%,100%{transform:scale(1.1);opacity:.5}50%{transform:scale(.9);opacity:.8}}
.login-box{background:rgba(255,255,255,.06);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);padding:40px 32px;border-radius:28px;width:420px;max-width:100%;text-align:center;position:relative;z-index:1}
.dark .login-box{background:rgba(26,35,50,.9);border-color:rgba(255,255,255,.08)}
.login-logo{font-size:2rem;font-weight:900;margin-bottom:4px;background:linear-gradient(135deg,#14b8a6,#059669,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-0.5px}
.login-sub{color:#94a3b8;font-size:13px;margin-bottom:24px}
.login-box .field{position:relative;margin-bottom:14px}
.login-box .field i{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:#64748b;font-size:14px}
.login-box .field input{width:100%;padding:13px 44px 13px 16px;border:2px solid rgba(255,255,255,.1);border-radius:14px;background:rgba(255,255,255,.05);color:#e2e8f0;font-size:14px;transition:.3s;outline:none}
.login-box .field input:focus{border-color:#14b8a6;background:rgba(20,184,166,.08);box-shadow:0 0 0 3px rgba(20,184,166,.15)}
.login-box .field input::placeholder{color:#64748b}
.btn-primary{background:linear-gradient(135deg,#14b8a6,#0d9488);color:#fff;border:none;padding:13px;border-radius:14px;width:100%;cursor:pointer;font-weight:700;font-size:15px;display:flex;align-items:center;justify-content:center;gap:8px;transition:.3s;margin-top:6px}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(20,184,166,.3)}
.login-link{margin-top:18px;color:#14b8a6;cursor:pointer;font-size:13px;transition:.2s}
.login-link:hover{color:#34d399;text-decoration:underline}
.app{display:none}
.top-bar{background:var(--card);padding:12px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:var(--shadow);transition:background .3s}
.logo{font-size:1.2rem;font-weight:900;background:linear-gradient(135deg,var(--primary),#059669);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.top-actions{display:flex;gap:10px;align-items:center}
.top-actions button{background:none;border:none;cursor:pointer;color:var(--muted);font-size:16px;padding:6px;border-radius:8px;transition:.2s}
.top-actions button:hover{color:var(--primary);background:var(--primary-light)}
.user-badge{background:var(--primary-light);color:var(--primary);padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700}
.menu{display:flex;justify-content:center;background:var(--card);padding:8px 10px;gap:4px;flex-wrap:wrap;border-bottom:1px solid var(--border);position:sticky;top:56px;z-index:99;transition:background .3s}
.menu-item{text-align:center;cursor:pointer;padding:8px 12px;border-radius:12px;min-width:58px;transition:.25s;color:var(--muted);font-weight:600}
.menu-item:hover{background:var(--primary-light);color:var(--primary)}
.menu-item.active{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;box-shadow:0 4px 12px rgba(13,148,136,.3)}
.menu-item i{font-size:17px;display:block;margin-bottom:2px}
.menu-item span{font-size:9.5px;letter-spacing:0}
.content{padding:20px;max-width:1400px;margin:0 auto}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:14px;margin-bottom:24px}
.stat-card{background:var(--card);border-radius:var(--radius);padding:20px 16px;text-align:center;border:1px solid var(--border);cursor:pointer;transition:.3s;position:relative;overflow:hidden}
.stat-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--primary),#059669);opacity:0;transition:.3s}
.stat-card:hover{transform:translateY(-4px);box-shadow:var(--shadow)}.stat-card:hover::after{opacity:1}
.stat-card .stat-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 10px;font-size:18px}
.stat-card h3{font-size:1.35rem;font-weight:900;margin-bottom:2px}
.stat-card span{font-size:11px;color:var(--muted);font-weight:600}
.card{background:var(--card);border-radius:var(--radius);padding:22px;margin-bottom:20px;border:1px solid var(--border);box-shadow:var(--shadow);transition:background .3s,border .3s}
.card-title{font-size:1rem;font-weight:800;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.btn{padding:7px 16px;border-radius:10px;border:none;cursor:pointer;font-weight:700;font-size:12px;display:inline-flex;align-items:center;gap:5px;transition:.2s;font-family:'Cairo'}
.btn:hover{transform:translateY(-1px);filter:brightness(1.1)}
.btn-success{background:var(--success);color:#fff}.btn-danger{background:var(--danger);color:#fff}
.btn-warning{background:var(--warning);color:#fff}.btn-info{background:var(--info);color:#fff}
.btn-primary-bg{background:var(--primary);color:#fff}.btn-sm{padding:5px 10px;font-size:11px;border-radius:8px}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}.btn-ghost:hover{background:var(--bg);color:var(--text)}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:11px 14px;text-align:right;border-bottom:1px solid var(--border)}
th{background:var(--bg);color:var(--muted);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.3px}
tbody tr:nth-child(even){background:var(--table-stripe)}
tbody tr:hover{background:var(--primary-light)}
input,select,textarea{width:100%;padding:10px 14px;border:2px solid var(--border);border-radius:12px;background:var(--card);color:var(--text);font-size:13px;font-family:'Cairo';transition:.2s;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(13,148,136,.12)}
label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:4px}
.field-group{margin-bottom:14px}
.badge{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;display:inline-block}
.badge-success{background:var(--badge-s-bg);color:var(--badge-s-c)}
.badge-warning{background:var(--badge-w-bg);color:var(--badge-w-c)}
.badge-danger{background:var(--badge-d-bg);color:var(--badge-d-c)}
.badge-info{background:var(--badge-i-bg);color:var(--badge-i-c)}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.55);backdrop-filter:blur(6px);z-index:1000;justify-content:center;align-items:center;padding:16px;animation:fadeIn .2s}
.modal-content{background:var(--card);border-radius:20px;max-width:750px;width:100%;max-height:88vh;overflow-y:auto;padding:28px;animation:slideUp .25s;box-shadow:0 25px 60px rgba(0,0,0,.25)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-title{font-size:1.2rem;font-weight:800;margin-bottom:20px;display:flex;align-items:center;gap:8px}
.toast-container{position:fixed;bottom:20px;left:20px;z-index:2000;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 20px;border-radius:12px;color:#fff;font-size:13px;font-weight:600;animation:toastIn .3s;display:flex;align-items:center;gap:8px;box-shadow:0 8px 24px rgba(0,0,0,.2)}
.toast-success{background:linear-gradient(135deg,#059669,#10b981)}.toast-error{background:linear-gradient(135deg,#dc2626,#ef4444)}
.toast-info{background:linear-gradient(135deg,#2563eb,#3b82f6)}
@keyframes toastIn{from{transform:translateX(-100%);opacity:0}to{transform:translateX(0);opacity:1}}
.flex-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.flex-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.summary-bar{background:var(--primary-light);padding:14px 18px;border-radius:14px;margin-bottom:16px;display:flex;flex-wrap:wrap;gap:20px;font-size:13px}
.summary-bar strong{color:var(--primary)}
.text-danger{color:var(--danger)}.text-success{color:var(--success)}.text-muted{color:var(--muted)}
.text-center{text-align:center}.text-left{text-align:left}.mt-2{margin-top:8px}.mt-3{margin-top:16px}
.gap-2{gap:8px}.d-flex{display:flex}.align-center{align-items:center}.justify-between{justify-content:space-between}
.pos-layout{display:grid;grid-template-columns:1fr 380px;gap:16px;min-height:500px}
.pos-products{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:16px;overflow-y:auto;max-height:65vh}
.pos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.pos-product{background:var(--bg);border:2px solid var(--border);border-radius:14px;padding:14px;text-align:center;cursor:pointer;transition:.2s}
.pos-product:hover{border-color:var(--primary);transform:translateY(-2px);box-shadow:var(--shadow)}
.pos-product.out-of-stock{opacity:.4;pointer-events:none}
.pos-product h4{font-size:13px;margin-bottom:4px}.pos-product .price{color:var(--primary);font-weight:800;font-size:14px}
.pos-product .stock{font-size:10px;color:var(--muted)}
.pos-cart{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:16px;display:flex;flex-direction:column}
.pos-cart-items{flex:1;overflow-y:auto;margin-bottom:12px}
.pos-cart-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px}
.pos-cart-item .qty-controls{display:flex;align-items:center;gap:6px}
.pos-cart-item .qty-controls button{width:24px;height:24px;border-radius:6px;border:1px solid var(--border);background:var(--bg);cursor:pointer;font-weight:700;color:var(--text);display:flex;align-items:center;justify-content:center}
.pos-totals{border-top:2px solid var(--border);padding-top:12px}
.pos-totals .line{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px}
.pos-totals .line.grand{font-size:1.1rem;font-weight:900;color:var(--primary)}
.chart-container{position:relative;height:280px}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-state i{font-size:48px;margin-bottom:12px;opacity:.3}
.trial-total td{font-weight:900;background:var(--primary-light)!important;font-size:14px}
.tbl-wrap{overflow-x:auto}
.search-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.search-bar input{max-width:280px}
.alert-bar{background:#fef3c7;border:1px solid #f59e0b;border-radius:12px;padding:10px 16px;margin-bottom:14px;font-size:13px;display:flex;align-items:center;gap:10px;color:#92400e}
.dark .alert-bar{background:#78350f;border-color:#b45309;color:#fde68a}
.invoice-print{max-width:700px;margin:0 auto;padding:30px;background:#fff;color:#000}
.invoice-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;padding-bottom:16px;border-bottom:2px solid #0d9488}
.invoice-logo{font-size:1.5rem;font-weight:900;color:#0d9488}
.invoice-title{font-size:1.8rem;font-weight:900;color:#0d9488;text-align:left}
.invoice-table th{background:#0d9488;color:#fff}
.invoice-total{text-align:left;margin-top:16px;font-size:1.1rem;font-weight:700}
.invoice-footer{margin-top:24px;padding-top:12px;border-top:1px solid #ddd;text-align:center;color:#64748b;font-size:12px}
@media print{.top-bar,.menu,.no-print{display:none!important}body{background:#fff;color:#000}.card{box-shadow:none;border:1px solid #ddd}.content{padding:0}}
@media(max-width:768px){
.pos-layout{grid-template-columns:1fr}.pos-products{max-height:35vh}
.flex-2,.flex-3{grid-template-columns:1fr}
.stats-grid{grid-template-columns:repeat(2,1fr)}
.top-bar{padding:10px 14px}.logo{font-size:1rem}
.menu{gap:2px;padding:6px}.menu-item{padding:6px 8px;min-width:48px}.menu-item span{font-size:8.5px}
.content{padding:14px}
}
@media(max-width:480px){.stats-grid{grid-template-columns:1fr 1fr;gap:10px}.stat-card{padding:14px 10px}.stat-card h3{font-size:1.1rem}}
</style>
</head>
<body>

<div id="loginScreen" class="login-screen">
<div class="login-box" id="loginDiv">
    <div class="login-logo">ERP PRO ULTIMATE</div>
    <div class="login-sub">نظام محاسبي متكامل &bull; القيد المزدوج</div>
    <div class="field"><i class="fas fa-user"></i><input type="text" id="loginUser" placeholder="اسم المستخدم" value="admin"></div>
    <div class="field"><i class="fas fa-lock"></i><input type="password" id="loginPass" placeholder="كلمة المرور" value="admin123"></div>
    <button class="btn-primary" onclick="doLogin()"><i class="fas fa-sign-in-alt"></i> تسجيل الدخول</button>
    <div class="login-link" onclick="toggleAuthForm('register')">ليس لديك حساب؟ إنشاء حساب جديد</div>
</div>
<div class="login-box" id="registerDiv" style="display:none">
    <div class="login-logo">إنشاء حساب</div>
    <div class="login-sub">أدخل بياناتك للتسجيل في النظام</div>
    <div class="field"><i class="fas fa-id-badge"></i><input type="text" id="regName" placeholder="الاسم الكامل"></div>
    <div class="field"><i class="fas fa-user"></i><input type="text" id="regUser" placeholder="اسم المستخدم"></div>
    <div class="field"><i class="fas fa-lock"></i><input type="password" id="regPass" placeholder="كلمة المرور"></div>
    <button class="btn-primary" onclick="doRegister()"><i class="fas fa-user-plus"></i> إنشاء الحساب</button>
    <div class="login-link" onclick="toggleAuthForm('login')">لديك حساب بالفعل؟ تسجيل الدخول</div>
</div>
</div>

<div id="app" class="app">
<header class="top-bar">
    <div class="logo" id="topLogo">ERP PRO ULTIMATE</div>
    <div class="top-actions">
        <span class="user-badge" id="userBadge"></span>
        <button onclick="toggleDark()" title="الوضع الليلي"><i class="fas fa-moon" id="darkIcon"></i></button>
        <button onclick="showNotifications()" title="التنبيهات" style="position:relative">
            <i class="fas fa-bell"></i>
            <span id="notifBadge" style="position:absolute;top:-2px;right:-2px;background:#ef4444;color:#fff;border-radius:50%;width:14px;height:14px;font-size:9px;display:none;align-items:center;justify-content:center;font-weight:700"></span>
        </button>
        <button onclick="logout()" title="خروج" style="color:var(--danger)"><i class="fas fa-sign-out-alt"></i></button>
    </div>
</header>
<nav class="menu" id="menuBar"></nav>
<main class="content" id="pageContent"></main>
</div>

<div id="modal" class="modal" onclick="if(event.target===this)closeModal()">
<div class="modal-content" id="modalBody"></div>
</div>

<div class="toast-container" id="toastBox"></div>

<script>
/* ========== 1. الثوابت ========== */
const PAGES=[
    {id:'dashboard',icon:'fa-th-large',label:'الرئيسية'},
    {id:'inventory',icon:'fa-boxes-stacked',label:'المخزون'},
    {id:'suppliers',icon:'fa-truck-field',label:'الموردين'},
    {id:'purchases',icon:'fa-cart-shopping',label:'المشتريات'},
    {id:'sales',icon:'fa-file-invoice-dollar',label:'المبيعات'},
    {id:'clients',icon:'fa-user-group',label:'العملاء'},
    {id:'pos',icon:'fa-cash-register',label:'نقطة البيع'},
    {id:'expenses',icon:'fa-money-bill-trend-up',label:'المصروفات'},
    {id:'accounting',icon:'fa-scale-balanced',label:'المحاسبة'},
    {id:'reports',icon:'fa-chart-bar',label:'التقارير'},
    {id:'settings',icon:'fa-gear',label:'الإعدادات'},
    {id:'backup',icon:'fa-cloud-arrow-down',label:'النسخ الاحتياطي'}
];
const RATES={SAR:1,LYD:0.78,USD:3.75,EGP:0.48,AED:1.02,TND:0.97};
const CHART_OF_ACCOUNTS=[
    {code:'1000',name:'الأصول',type:'asset',parent:null},
    {code:'1100',name:'الصندوق (النقدية)',type:'asset',parent:'1000'},
    {code:'1200',name:'البنك',type:'asset',parent:'1000'},
    {code:'1300',name:'ذمم مدينة (عملاء)',type:'asset',parent:'1000'},
    {code:'1400',name:'المخزون',type:'asset',parent:'1000'},
    {code:'2000',name:'الخصوم',type:'liability',parent:null},
    {code:'2100',name:'ذمم دائنة (موردين)',type:'liability',parent:'2000'},
    {code:'2200',name:'ضريبة القيمة المضافة',type:'liability',parent:'2000'},
    {code:'3000',name:'حقوق الملكية',type:'equity',parent:null},
    {code:'3100',name:'رأس المال',type:'equity',parent:'3000'},
    {code:'3200',name:'أرباح (خسائر) المرحلة',type:'equity',parent:'3000'},
    {code:'4000',name:'الإيرادات',type:'revenue',parent:null},
    {code:'4100',name:'إيرادات المبيعات',type:'revenue',parent:'4000'},
    {code:'4200',name:'إيرادات أخرى',type:'revenue',parent:'4000'},
    {code:'5000',name:'المصروفات',type:'expense',parent:null},
    {code:'5100',name:'تكلفة البضاعة المباعة',type:'expense',parent:'5000'},
    {code:'5200',name:'مصروفات تشغيلية',type:'expense',parent:'5000'},
    {code:'5300',name:'مصروفات إدارية',type:'expense',parent:'5000'}
];
const EXPENSE_CATS=['إيجار','رواتب وأجور','كهرباء ومياه','إنترنت واتصالات','صيانة','نقل وشحن','تسويق وإعلان','مستلزمات مكتبية','ضريبة ورسوم','أخرى'];
const THEME_COLORS=[
    {name:'أخضر مائي',primary:'#0d9488',dark:'#0f766e'},
    {name:'أزرق',primary:'#2563eb',dark:'#1d4ed8'},
    {name:'بنفسجي',primary:'#7c3aed',dark:'#6d28d9'},
    {name:'وردي',primary:'#db2777',dark:'#be185d'},
    {name:'برتقالي',primary:'#ea580c',dark:'#c2410c'},
    {name:'رمادي',primary:'#475569',dark:'#334155'}

function toast(msg,type='info'){
    let el=document.createElement('div');
    el.className='toast toast-'+type;
    let icons={success:'fa-check-circle',error:'fa-times-circle',info:'fa-info-circle'};
    el.innerHTML=`<i class="fas ${icons[type]||icons.info}"></i> ${msg}`;
    $('toastBox').appendChild(el);
    setTimeout(()=>el.remove(),3000);
}
function openModal(html){$('modalBody').innerHTML=html;$('modal').style.display='flex'}

function applyTheme(){
    document.documentElement.style.setProperty('--primary',themeColor);
    document.documentElement.style.setProperty('--primary-dark',themeDark);
    let r=parseInt(themeColor.slice(1,3),16),g=parseInt(themeColor.slice(3,5),16),b=parseInt(themeColor.slice(5,7),16);
    document.documentElement.style.setProperty('--primary-light',`rgba(${r},${g},${b},0.12)`);
}

function save(){
    try{
        let d=JSON.stringify({db,logs,companyInfo,currency,themeColor,themeDark,lowStockThreshold});
        if(typeof CryptoJS!=='undefined'){
            let enc=CryptoJS.AES.encrypt(d,'erp_pro_ultimate_key_2025').toString();
            localStorage.setItem('erp_data',enc);
        } else {
            localStorage.setItem('erp_data_plain',d);
        }
    }catch(e){console.warn('Save error',e);}
}
function load(){
    try{
        let enc=localStorage.getItem('erp_data');
        if(enc&&typeof CryptoJS!=='undefined'){
            let bytes=CryptoJS.AES.decrypt(enc,'erp_pro_ultimate_key_2025');
            let dec=bytes.toString(CryptoJS.enc.Utf8);
            if(dec){
                let obj=JSON.parse(dec);
                if(obj.db)db=obj.db;
                if(obj.logs)logs=obj.logs;
                if(obj.companyInfo)companyInfo=obj.companyInfo;
                if(obj.currency)currency=obj.currency;
                if(obj.themeColor){themeColor=obj.themeColor;themeDark=obj.themeDark||'#0f766e';}
                if(obj.lowStockThreshold)lowStockThreshold=obj.lowStockThreshold;
            }
        } else {
            let plain=localStorage.getItem('erp_data_plain');
            if(plain){
                let obj=JSON.parse(plain);
                if(obj.db)db=obj.db;if(obj.logs)logs=obj.logs;
                if(obj.companyInfo)companyInfo=obj.companyInfo;if(obj.currency)currency=obj.currency;
                if(obj.themeColor){themeColor=obj.themeColor;themeDark=obj.themeDark||'#0f766e';}
                if(obj.lowStockThreshold)lowStockThreshold=obj.lowStockThreshold;
            }
        }
    }catch(e){console.warn('Load error',e);}
}

    if(!currentUser)return;

}

/* ========== 5. المحاسبة المزدوجة ========== */
function je(description,date,lines){
    let td=lines.reduce((s,l)=>s+l.debit,0);
    let tc=lines.reduce((s,l)=>s+l.credit,0);
    if(Math.abs(td-tc)>0.01)console.warn('قيد غير متوازن:',description);
    db.journal.push({id:nextId('jnl'),date:date||today(),description,lines});
}
function jeSale(s){
    let costTotal=s.items.reduce((sum,it)=>{let p=db.inventory.find(x=>x.id===it.pid);return sum+(p?p.buy*it.qty:0);},0);
    let cashAcc=s.status==='مدفوع'?'1100':'1300';
    je(`فاتورة بيع #${s.id} - ${s.clientName}`,s.date,[
        {acc:cashAcc,debit:s.grand,credit:0},{acc:'4100',debit:0,credit:s.sub},
        {acc:'2200',debit:0,credit:s.tax},{acc:'5100',debit:costTotal,credit:0},{acc:'1400',debit:0,credit:costTotal}
    ]);
}
function jePurchase(p){
    let payAcc=p.status==='مدفوع'?'1100':'2100';
    je(`فاتورة شراء #${p.id} - ${p.prodName}`,p.date,[
        {acc:'1400',debit:p.total,credit:0},{acc:payAcc,debit:0,credit:p.total}
    ]);
}
function jeExpense(e){
    je(`${e.cat}: ${e.note}`,e.date,[
        {acc:'5200',debit:e.amount,credit:0},{acc:'1100',debit:0,credit:e.amount}
    ]);
}
function accBalance(code){
    let bal=0;
    db.journal.forEach(e=>e.lines.forEach(l=>{if(l.acc===code)bal+=l.debit-l.credit}));
    return bal;
}
function trialBalance(){
    let rows=[];
    CHART_OF_ACCOUNTS.filter(a=>a.parent).forEach(a=>{
        let bal=accBalance(a.code);
        if(Math.abs(bal)>0.01)rows.push({code:a.code,name:a.name,debit:bal>0?bal:0,credit:bal<0?-bal:0});
    });
    return rows;
}
function incomeStatement(){
    let revenue=accBalance('4100')+accBalance('4200');
    let cogs=accBalance('5100');
    let opExp=accBalance('5200')+accBalance('5300');
    let gross=revenue-cogs;
    let net=gross-opExp;
    return{revenue,cogs,gross,opExp,net};
}
function balanceSheet(){
    let assets=accBalance('1100')+accBalance('1200')+accBalance('1300')+accBalance('1400');
    let liabilities=accBalance('2100')+accBalance('2200');
    let equity=accBalance('3100')+accBalance('3200');
    let is_=incomeStatement();
    equity+=is_.net;
    return{assets,liabilities,equity,totalLiabEq:liabilities+equity};
}

function toggleAuthForm(type){

}
function doLogin(){
    let u=$('loginUser').value.trim(),p=$('loginPass').value;
    let found=db.users.find(x=>x.username===u&&x.password===p);
    if(!found){toast('اسم المستخدم أو كلمة المرور غير صحيحة','error');return}
    currentUser=found;
    $('loginScreen').style.display='none';
    $('app').style.display='block';
    $('userBadge').textContent=found.name;
    if(isDark){document.body.classList.add('dark');$('darkIcon').className='fas fa-sun';}
    applyTheme();
    $('topLogo').textContent=companyInfo.name||'ERP PRO ULTIMATE';
    addLog('تسجيل دخول',`المستخدم: ${found.username}`);
    buildMenu();navigate('dashboard');
    updateNotifBadge();
    toast(`مرحباً ${found.name}`,'success');
}
function doRegister(){
    let name=$('regName').value.trim(),user=$('regUser').value.trim(),pass=$('regPass').value;
    if(!name||!user||!pass){toast('جميع الحقول مطلوبة','error');return}
    if(pass.length<4){toast('كلمة المرور قصيرة جداً','error');return}
    if(db.users.find(x=>x.username===user)){toast('اسم المستخدم مستخدم بالفعل','error');return}
    db.users.push({id:nextId('usr'),name,username:user,password:pass,role:'user'});
    save();toast('تم إنشاء الحساب بنجاح','success');
    toggleAuthForm('login');$('loginUser').value=user;$('loginPass').value='';
}
function logout(){
    addLog('تسجيل خروج','');currentUser=null;
    $('loginScreen').style.display='flex';$('app').style.display='none';

}
function toggleDark(){

            <td><span class="badge badge-success">${margin}%</span></td>
            <td>
              <button class="btn btn-info btn-sm" onclick="modalEditInventory(${p.id})"><i class="fas fa-edit"></i></button>
              ${isAdmin()?`<button class="btn btn-danger btn-sm" onclick="deleteInventory(${p.id})"><i class="fas fa-trash"></i></button>`:''}
            </td>
        </tr>`;
    }).join('')||'<tr><td colspan="8" class="text-center text-muted">لا توجد أصناف</td></tr>';
}
function filterInventory(){
    let q=($('invSearch')?$('invSearch').value:'').toLowerCase();
    let cat=($('invCatFilter')?$('invCatFilter').value:'');
    renderInvBody(db.inventory.filter(p=>{
        let matchQ=p.name.toLowerCase().includes(q)||p.cat.toLowerCase().includes(q);
        let matchC=!cat||p.cat===cat;
        return matchQ&&matchC;
    }));
}
