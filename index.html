<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة الأعمال | دخول</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', Tahoma, sans-serif; }
        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: 30px;
            padding: 40px 35px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .login-card h1 { color: #1e3c72; margin-bottom: 10px; }
        .login-card p { color: #6c757d; margin-bottom: 30px; }
        .demo-box {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 25px;
            text-align: right;
        }
        .demo-box p { font-weight: bold; color: #ffc107; margin-bottom: 8px; }
        .demo-box span { display: block; font-size: 13px; color: #495057; margin: 5px 0; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ced4da;
            border-radius: 40px;
            font-size: 15px;
        }
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-size: 16px;
        }
        .btn-primary { background: #ffc107; color: #1e3c72; margin-top: 10px; }
        .btn-primary:hover { background: #ffca2c; transform: translateY(-2px); }
        .btn-demo { background: #28a745; color: white; margin-bottom: 15px; }
        .btn-demo:hover { background: #218838; transform: translateY(-2px); }
        .divider { margin: 20px 0; color: #adb5bd; position: relative; }
        .divider::before, .divider::after { content: ''; position: absolute; top: 50%; width: 45%; height: 1px; background: #dee2e6; }
        .divider::before { left: 0; }
        .divider::after { right: 0; }
        .shortcut { font-size: 12px; color: #6c757d; margin-top: 15px; }
    </style>
</head>
<body>
<div class="login-card">
    <h1>📊 نظام إدارة الأعمال</h1>
    <p>متكامل – مخزون، مبيعات، مشتريات، عملاء، موردين، حسابات</p>
    <div class="demo-box">
        <p>🚀 حسابات تجريبية جاهزة</p>
        <span>📧 admin@system.com | 🔑 123456 (مدير)</span>
        <span>📧 user@system.com | 🔑 123456 (مستخدم)</span>
    </div>
    <button class="btn-demo" onclick="directLogin()">🚀 دخول سريع – حساب تجريبي</button>
    <div class="divider">أو</div>
    <input type="email" id="loginEmail" placeholder="البريد الإلكتروني">
    <input type="password" id="loginPassword" placeholder="كلمة المرور">
    <button class="btn-primary" onclick="manualLogin()">🔐 تسجيل الدخول</button>
    <div class="shortcut">⏎ اضغط Enter للتسجيل السريع</div>
</div>

<script src="main.js"></script>
<script>
    // تسجيل Service Worker للتشغيل بدون إنترنت
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').then(reg => console.log('SW registered', reg)).catch(err => console.log('SW failed', err));
    }
    // دوال تسجيل الدخول
    const DEMO_ACCOUNTS = {
        admin: { email: "admin@system.com", password: "123456", name: "مدير النظام", role: "admin" },
        user:  { email: "user@system.com",  password: "123456", name: "مستخدم عادي", role: "user" }
    };
    function directLogin() {
        localStorage.setItem('semo_user', JSON.stringify(DEMO_ACCOUNTS.admin));
        window.location.href = 'dashboard.html';
    }
    function manualLogin() {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value.trim();
        const found = Object.values(DEMO_ACCOUNTS).find(acc => acc.email === email && acc.password === password);
        if (found) {
            localStorage.setItem('semo_user', JSON.stringify(found));
            window.location.href = 'dashboard.html';
        } else {
            alert('❌ البريد أو كلمة المرور غير صحيحة');
        }
    }
    document.addEventListener('keydown', (e) => { if (e.key === 'Enter') manualLogin(); });
    if (localStorage.getItem('semo_user')) window.location.href = 'dashboard.html';
</script>
</body>
</html>
