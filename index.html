<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ERP X - نظام متكامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}
        :root{--bg:#f1f5f9;--card:#fff;--pri:#0d9488;--danger:#ef4444;--warning:#f59e0b;--success:#10b981;--text:#1e293b;--muted:#64748b;--border:#e2e8f0}
        .dark{--bg:#0f172a;--card:#1e293b;--pri:#14b8a6;--text:#f1f5f9;--muted:#94a3b8;--border:#334155}
        body{background:var(--bg);color:var(--text);direction:rtl;}
        .login-screen{display:flex;justify-content:center;align-items:center;min-height:100vh;background:linear-gradient(135deg,#0f172a,#134e4a)}
        .login-box{background:rgba(255,255,255,.96);padding:35px;border-radius:24px;width:380px;text-align:center}
        .dark .login-box{background:rgba(30,41,59,.96)}
        .login-box h2{font-size:1.6rem;margin-bottom:4px;background:linear-gradient(135deg,var(--pri),#059669);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .login-box input{width:100%;padding:12px;margin:8px 0;border:2px solid var(--border);border-radius:12px;background:var(--card);color:var(--text)}
        .btn-primary{background:linear-gradient(135deg,var(--pri),#0f766e);color:#fff;border:none;padding:12px;border-radius:12px;width:100%;cursor:pointer;font-weight:700;display:flex;align-items:center;justify-content:center;gap:6px}
        .app{display:none}
        .top-header{background:var(--card);padding:12px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
        .menu{display:flex;justify-content:center;background:var(--card);padding:8px;gap:6px;flex-wrap:wrap;border-bottom:1px solid var(--border);position:sticky;top:60px;z-index:99}
        .menu-item{text-align:center;cursor:pointer;padding:5px 8px;border-radius:12px;min-width:55px}
        .menu-item.active{background:var(--pri);color:#fff}
        .menu-item i{font-size:18px;display:block}
        .menu-item span{font-size:10px}
        .content{padding:16px;max-width:1400px;margin:0 auto}
        .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px}
        .stat-card{background:var(--card);border-radius:16px;padding:16px;text-align:center;border:1px solid var(--border);cursor:pointer}
        .stat-card h3{font-size:24px;font-weight:900}
        .card{background:var(--card);border-radius:16px;padding:18px;margin-bottom:18px;border:1px solid var(--border)}
        .card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;flex-wrap:wrap}
        .btn{padding:6px 14px;border-radius:20px;border:none;cursor:pointer;font-weight:600;font-size:12px;display:inline-flex;align-items:center;gap:5px}
        .btn-success{background:var(--success);color:#fff}
        .btn-danger{background:var(--danger);color:#fff}
        .btn-warning{background:var(--warning);color:#fff}
        .btn-info{background:#3b82f6;color:#fff}
        table{width:100%;border-collapse:collapse}
        th,td{padding:10px;text-align:right;border-bottom:1px solid var(--border);font-size:12px}
        th{background:var(--bg);color:var(--muted)}
        input,select{width:100%;padding:8px 12px;border:2px solid var(--border);border-radius:10px;background:var(--card);color:var(--text)}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:1000;justify-content:center;align-items:center}
        .modal-content{background:var(--card);border-radius:20px;width:90%;max-width:600px;max-height:80vh;overflow-y:auto;padding:20px}
        .toast{position:fixed;bottom:20px;left:20px;background:#333;color:#fff;padding:10px 20px;border-radius:8px;z-index:2000}
        @media (max-width:600px){.stat-card h3{font-size:18px}}
    </style>
</head>
<body>

<!-- شاشة الدخول -->
<div id="loginScreen" class="login-screen">
    <div class="login-box" id="loginDiv">
        <h2>🏢 ERP X</h2>
        <p class="muted">نظام متكامل للمؤسسات</p>
        <input type="text" id="username" placeholder="اسم المستخدم" value="admin">
        <input type="password" id="password" placeholder="كلمة المرور" value="admin123">
        <button class="btn-primary" onclick="login()"><i class="fas fa-sign-in-alt"></i> دخول</button>
        <div style="margin-top:12px;cursor:pointer;color:var(--pri)" onclick="showRegister()">ليس لديك حساب؟ سجل الآن</div>
    </div>
    <div class="login-box" id="registerDiv" style="display:none">
        <h2>📝 تسجيل جديد</h2>
        <input type="text" id="regName" placeholder="الاسم الكامل">
        <input type="text" id="regUser" placeholder="اسم المستخدم">
        <input type="password" id="regPass" placeholder="كلمة المرور">
        <button class="btn-primary" onclick="register()"><i class="fas fa-user-plus"></i> تسجيل</button>
        <div style="margin-top:12px;cursor:pointer;color:var(--pri)" onclick="showLogin()">لديك حساب؟ دخول</div>
    </div>
</div>

<!-- التطبيق -->
<div id="app" class="app">
    <div class="top-header">
        <div class="logo" style="font-weight:900">🏢 ERP X</div>
        <div style="display:flex;gap:10px;align-items:center">
            <button onclick="toggleDarkMode()" style="background:none;border:none;cursor:pointer"><i class="fas fa-moon" id="darkIcon"></i></button>
            <span id="userName"></span>
            <button onclick="logout()" class="btn-danger" style="padding:4px 12px">خروج</button>
        </div>
    </div>
    <div class="menu" id="menu"></div>
    <div class="content" id="content"></div>
</div>

<div id="modal" class="modal" onclick="if(event.target===this) closeModal()"><div class="modal-content" id="modalBody"></div></div>

<script>
    // ==================== ثوابت ====================
    const MENUS = [
        {id:'dashboard', icon:'fa-home', name:'الرئيسية'},
        {id:'inventory', icon:'fa-boxes', name:'المخزون'},
        {id:'suppliers', icon:'fa-truck', name:'الموردين'},
        {id:'purchases', icon:'fa-cart-shopping', name:'المشتريات'},
        {id:'sales', icon:'fa-tags', name:'المبيعات'},
        {id:'clients', icon:'fa-users', name:'العملاء'},
        {id:'pos', icon:'fa-cash-register', name:'نقطة بيع'},
        {id:'expenses', icon:'fa-receipt', name:'المصروفات'},
        {id:'settings', icon:'fa-cog', name:'إعدادات'},
        {id:'backup', icon:'fa-database', name:'نسخ احتياطي'}
    ];

    // ==================== قاعدة البيانات ====================
    let db = {
        inventory: [
            {id:1, name:'مكتب خشبي', category:'أثاث', quantity:20, buyPrice:1500, sellPrice:2500},
            {id:2, name:'كرسي دوار', category:'أثاث', quantity:35, buyPrice:500, sellPrice:900},
            {id:3, name:'طابعة HP', category:'إلكترونيات', quantity:12, buyPrice:2200, sellPrice:3500},
            {id:4, name:'لابتوب Dell', category:'إلكترونيات', quantity:8, buyPrice:3500, sellPrice:5500}
        ],
        sales: [
            {id:1001, client:'شركة الأهرام', clientId:1, items:[{productId:1,name:'مكتب خشبي',qty:2,price:2500,total:5000}], total:5000, paid:5000, status:'مدفوع', date:'2025-05-20'},
            {id:1002, client:'مؤسسة النور', clientId:2, items:[{productId:3,name:'طابعة HP',qty:1,price:3500,total:3500}], total:3500, paid:2000, status:'آجل', date:'2025-05-21'}
        ],
        clients: [
            {id:1, name:'شركة الأهرام', phone:'0512345678', address:'الرياض', balance:0},
            {id:2, name:'مؤسسة النور', phone:'0587654321', address:'جدة', balance:1500},
            {id:3, name:'مكتبة الفجر', phone:'0551122334', address:'الدمام', balance:0}
        ],
        suppliers: [
            {id:1, name:'العالمية للتوريدات', phone:'0555555555', address:'الرياض', category:'أثاث'},
            {id:2, name:'مصنع التقنية', phone:'0566666666', address:'جدة', category:'إلكترونيات'}
        ],
        purchases: [
            {id:2001, supplierId:1, supplierName:'العالمية', product:'مكتب خشبي', qty:10, price:1500, total:15000, paid:15000, status:'مدفوع', date:'2025-05-18'},
            {id:2002, supplierId:2, supplierName:'مصنع التقنية', product:'طابعة HP', qty:5, price:2200, total:11000, paid:6000, status:'آجل', date:'2025-05-19'}
        ],
        expenses: [
            {id:1, category:'إيجار', amount:5000, note:'إيجار المكتب', date:'2025-05-25'},
            {id:2, category:'رواتب', amount:15000, note:'رواتب مايو', date:'2025-05-25'}
        ],
        users: [
            {id:1, name:'Admin', username:'admin', password:'admin123', role:'admin'},
            {id:2, name:'User', username:'user', password:'user123', role:'user'}
        ]
    };

    let currentUser = null;
    let currentPage = 'dashboard';
    let darkMode = localStorage.getItem('darkMode') === 'true';
    let cart = [];
    let activityLog = [];

    // ==================== دوال مساعدة ====================
    function formatMoney(amount) {
        let cur = localStorage.getItem('currency') || 'LYD';
        let rates = {SAR:1, LYD:0.78, USD:3.75};
        let val = amount * (rates[cur] || 1);
        return val.toLocaleString('ar') + ' ' + cur;
    }

    function today() {
        let d = new Date();
        return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    }

    function showToast(msg, type='info') {
        let t = document.createElement('div');
        t.className = 'toast';
        t.innerHTML = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2500);
    }

    function saveData() {
        localStorage.setItem('erp_db', JSON.stringify(db));
        localStorage.setItem('erp_logs', JSON.stringify(activityLog));
    }

    function loadData() {
        let d = localStorage.getItem('erp_db');
        if(d) db = JSON.parse(d);
        let l = localStorage.getItem('erp_logs');
        if(l) activityLog = JSON.parse(l);
    }

    function addLog(action, details) {
        if(!currentUser) return;
        activityLog.unshift({user:currentUser.name, action, details, time:new Date().toISOString()});
        if(activityLog.length > 100) activityLog.pop();
        saveData();
    }

    function isAdmin() { return currentUser && currentUser.role === 'admin'; }

    // ==================== تسجيل الدخول ====================
    function login() {
        let user = document.getElementById('username').value;
        let pass = document.getElementById('password').value;
        let found = db.users.find(u => u.username === user && u.password === pass);
        if(found) {
            currentUser = found;
            loadData();
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            document.getElementById('userName').innerText = found.name;
            addLog('دخول', 'تم تسجيل الدخول');
            renderMenu();
            showPage('dashboard');
            showToast('مرحباً ' + found.name, 'success');
        } else {
            showToast('خطأ في اسم المستخدم أو كلمة المرور', 'error');
        }
    }

    function register() {
        let name = document.getElementById('regName').value;
        let user = document.getElementById('regUser').value;
        let pass = document.getElementById('regPass').value;
        if(!name || !user || !pass) { showToast('جميع الحقول مطلوبة','error'); return; }
        if(db.users.find(u => u.username === user)) { showToast('اسم المستخدم موجود','error'); return; }
        db.users.push({id:Date.now(), name, username:user, password:pass, role:'user'});
        saveData();
        showToast('تم التسجيل بنجاح','success');
        showLogin();
    }

    function showRegister() {
        document.getElementById('loginDiv').style.display = 'none';
        document.getElementById('registerDiv').style.display = 'block';
    }

    function showLogin() {
        document.getElementById('loginDiv').style.display = 'block';
        document.getElementById('registerDiv').style.display = 'none';
    }

    function logout() {
        addLog('خروج', 'تم تسجيل الخروج');
        currentUser = null;
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('app').style.display = 'none';
        showToast('تم الخروج');
    }

    // ==================== القائمة ====================
    function renderMenu() {
        let menuHtml = '';
        MENUS.forEach(m => {
            menuHtml += `<div class="menu-item ${currentPage === m.id ? 'active' : ''}" onclick="showPage('${m.id}')">
                            <i class="fas ${m.icon}"></i><span>${m.name}</span>
                         </div>`;
        });
        document.getElementById('menu').innerHTML = menuHtml;
    }

    function showPage(page) {
        currentPage = page;
        renderMenu();
        if(page === 'dashboard') renderDashboard();
        else if(page === 'inventory') renderInventory();
        else if(page === 'suppliers') renderSuppliers();
        else if(page === 'purchases') renderPurchases();
        else if(page === 'sales') renderSales();
        else if(page === 'clients') renderClients();
        else if(page === 'pos') renderPOS();
        else if(page === 'expenses') renderExpenses();
        else if(page === 'settings') renderSettings();
        else if(page === 'backup') renderBackup();
    }

    // ==================== لوحة التحكم ====================
    function renderDashboard() {
        let totalSales = db.sales.reduce((s,i)=>s+i.total,0);
        let totalPurchases = db.purchases.reduce((s,i)=>s+i.total,0);
        let totalExpenses = db.expenses.reduce((s,i)=>s+i.amount,0);
        let inventoryValue = db.inventory.reduce((s,i)=>s+(i.quantity*i.buyPrice),0);
        let lowStock = db.inventory.filter(i=>i.quantity<=5).length;
        let creditTotal = db.sales.filter(s=>s.status==='آجل').reduce((a,s)=>a+(s.total-s.paid),0);
        
        document.getElementById('content').innerHTML = `
            <div class="stats">
                <div class="stat-card"><h3>${formatMoney(totalSales)}</h3><span>إجمالي المبيعات</span></div>
                <div class="stat-card"><h3>${formatMoney(totalPurchases)}</h3><span>المشتريات</span></div>
                <div class="stat-card"><h3>${formatMoney(totalSales-totalPurchases-totalExpenses)}</h3><span>صافي الربح</span></div>
                <div class="stat-card"><h3>${formatMoney(inventoryValue)}</h3><span>قيمة المخزون</span></div>
                <div class="stat-card"><h3>${lowStock}</h3><span>منتجات منخفضة</span></div>
                <div class="stat-card"><h3>${formatMoney(creditTotal)}</h3><span>ذمم مدينة</span></div>
            </div>
            <div class="card">
                <div class="card-header"><h3>📋 آخر العمليات</h3></div>
                <table><thead><tr><th>الوقت</th><th>المستخدم</th><th>العملية</th><th>التفاصيل</th></tr></thead><tbody>
                    ${activityLog.slice(0,8).map(l=>`<tr><td>${new Date(l.time).toLocaleTimeString()}</td><td>${l.user}</td><td>${l.action}</td><td>${l.details}</td></tr>`).join('')}
                </tbody></table>
            </div>
        `;
    }

    // ==================== المخزون ====================
    function renderInventory() {
        let html = `<div class="card"><div class="card-header"><h3>📦 المخزون</h3>${isAdmin() ? '<button class="btn btn-success" onclick="addProduct()">+ إضافة</button>' : ''}</div>
                    <input type="text" id="searchInv" placeholder="بحث..." style="margin-bottom:12px" oninput="filterInventory()">
                    <table id="invTable"><thead><tr><th>#</th><th>المنتج</th><th>التصنيف</th><th>الكمية</th><th>سعر الشراء</th><th>سعر البيع</th><th>الحالة</th>${isAdmin() ? '<th>إجراءات</th>' : ''}</tr></thead><tbody>`;
        db.inventory.forEach((p,idx) => {
            let status = p.quantity<=0 ? 'نفد' : (p.quantity<=5 ? 'منخفض' : 'متوفر');
            html += `<tr><td>${idx+1}</td><td>${p.name}</td><td>${p.category}</td><td>${p.quantity}</td><td>${formatMoney(p.buyPrice)}</td><td>${formatMoney(p.sellPrice)}</td><td>${status}</td>`;
            if(isAdmin()) html += `<td><button class="btn btn-info" onclick="editProduct(${p.id})"><i class="fas fa-edit"></i></button> <button class="btn btn-danger" onclick="deleteProduct(${p.id})"><i class="fas fa-trash"></i></button></td>`;
            html += `</tr>`;
        });
        html += `</tbody></table></div>`;
        document.getElementById('content').innerHTML = html;
    }

    function filterInventory() {
        let search = document.getElementById('searchInv').value.toLowerCase();
        let rows = document.querySelectorAll('#invTable tbody tr');
        rows.forEach(row => {
            let name = row.cells[1]?.innerText.toLowerCase();
            row.style.display = name.includes(search) ? '' : 'none';
        });
    }

    function addProduct() {
        let html = `<h2>➕ إضافة منتج</h2>
                    <div class="form-group"><label>الاسم</label><input id="prodName"></div>
                    <div class="form-group"><label>التصنيف</label><select id="prodCat"><option>أثاث</option><option>إلكترونيات</option><option>قرطاسية</option><option>أجهزة</option><option>أخرى</option></select></div>
                    <div class="form-group"><label>الكمية</label><input type="number" id="prodQty" value="0"></div>
                    <div class="form-group"><label>سعر الشراء</label><input type="number" id="prodBuy" value="0"></div>
                    <div class="form-group"><label>سعر البيع</label><input type="number" id="prodSell" value="0"></div>
                    <div style="display:flex;gap:8px;justify-content:center;margin-top:16px">
                        <button class="btn btn-success" onclick="saveProduct()">حفظ</button>
                        <button class="btn btn-danger" onclick="closeModal()">إلغاء</button>
                    </div>`;
        openModal(html);
    }

    function saveProduct() {
        let name = document.getElementById('prodName').value;
        if(!name) { showToast('أدخل اسم المنتج','error'); return; }
        let newId = Date.now();
        db.inventory.push({
            id:newId,
            name:name,
            category:document.getElementById('prodCat').value,
            quantity:parseInt(document.getElementById('prodQty').value)||0,
            buyPrice:parseFloat(document.getElementById('prodBuy').value)||0,
            sellPrice:parseFloat(document.getElementById('prodSell').value)||0
        });
        saveData();
        addLog('إضافة منتج', name);
        showToast('تمت الإضافة');
        closeModal();
        renderInventory();
    }

    function editProduct(id) {
        let p = db.inventory.find(x=>x.id===id);
        if(!p) return;
        let html = `<h2>✏️ تعديل منتج</h2>
                    <div><label>الاسم</label><input id="editName" value="${p.name}"></div>
                    <div><label>التصنيف</label><select id="editCat">${['أثاث','إلكترونيات','قرطاسية','أجهزة','أخرى'].map(c=>`<option ${c===p.category?'selected':''}>${c}</option>`).join('')}</select></div>
                    <div><label>الكمية</label><input type="number" id="editQty" value="${p.quantity}"></div>
                    <div><label>سعر الشراء</label><input type="number" id="editBuy" value="${p.buyPrice}"></div>
                    <div><label>سعر البيع</label><input type="number" id="editSell" value="${p.sellPrice}"></div>
                    <div style="display:flex;gap:8px;margin-top:16px">
                        <button class="btn btn-success" onclick="updateProduct(${id})">تحديث</button>
                        <button class="btn btn-danger" onclick="closeModal()">إلغاء</button>
                    </div>`;
        openModal(html);
    }

    function updateProduct(id) {
        let p = db.inventory.find(x=>x.id===id);
        if(p) {
            p.name = document.getElementById('editName').value;
            p.category = document.getElementById('editCat').value;
            p.quantity = parseInt(document.getElementById('editQty').value)||0;
            p.buyPrice = parseFloat(document.getElementById('editBuy').value)||0;
            p.sellPrice = parseFloat(document.getElementById('editSell').value)||0;
            saveData();
            addLog('تعديل منتج', p.name);
            showToast('تم التحديث');
            closeModal();
            renderInventory();
        }
    }

    function deleteProduct(id) {
        if(!confirm('هل أنت متأكد من حذف هذا المنتج؟')) return;
        let p = db.inventory.find(x=>x.id===id);
        db.inventory = db.inventory.filter(x=>x.id!==id);
        saveData();
        addLog('حذف منتج', p?.name);
        showToast('تم الحذف');
        renderInventory();
    }

    // ==================== الموردين ====================
    function renderSuppliers() {
        let html = `<div class="card"><div class="card-header"><h3>🚚 الموردين</h3>${isAdmin() ? '<button class="btn btn-success" onclick="addSupplier()">+ إضافة</button>' : ''}</div>
                    <table><thead><tr><th>#</th><th>الاسم</th><th>الهاتف</th><th>العنوان</th><th>التصنيف</th>${isAdmin() ? '<th>إجراءات</th>' : ''}</tr></thead><tbody>`;
        db.suppliers.forEach((s,idx) => {
            html += `<tr><td>${idx+1}</td><td>${s.name}</td><td>${s.phone}</td><td>${s.address}</td><td>${s.category}</td>`;
            if(isAdmin()) html += `<td><button class="btn btn-info" onclick="editSupplier(${s.id})"><i class="fas fa-edit"></i></button> <button class="btn btn-danger" onclick="deleteSupplier(${s.id})"><i class="fas fa-trash"></i></button></td>`;
            html += `</tr>`;
        });
        html += `</tbody></table></div>`;
        document.getElementById('content').innerHTML = html;
    }

    function addSupplier() {
        let html = `<h2>➕ إضافة مورد</h2>
                    <div><label>الاسم</label><input id="supName"></div>
                    <div><label>الهاتف</label><input id="supPhone"></div>
                    <div><label>العنوان</label><input id="supAddr"></div>

    function savePurchase() {

        let product = document.getElementById('purProd').value;
        let qty = parseInt(document.getElementById('purQty').value)||0;
        let price = parseFloat(document.getElementById('purPrice').value)||0;
        let paid = parseFloat(document.getElementById('purPaid').value)||0;
        let status = document.getElementById('purStatus').value;
        if(!product || qty<=0 || price<=0) { showToast('بيانات غير صحيحة','error'); return; }
        let total = qty*price;
        if(status === 'مدفوع') paid = total;
        db.purchases.push({
            id:Date.now(), supplierId:supId, supplierName:sup.name, product, qty, price, total, paid, status, date:today()
        });
        let existing = db.inventory.find(i=>i.name === product);
        if(existing) {
            existing.quantity += qty;
            existing.buyPrice = (existing.buyPrice * existing.quantity + price*qty) / (existing.quantity);
        } else {
            db.inventory.push({id:Date.now(), name:product, category:'أخرى', quantity:qty, buyPrice:price, sellPrice:price*1.3});

        saveData();

    function addSaleItem() {
        let id = Date.now();
        let div = document.createElement('div');
        div.className = 'sale-item';
        div.innerHTML = `<select style="width:60%" onchange="calcSaleTotal()">
                            <option value="">اختر منتج</option>
                            ${db.inventory.filter(p=>p.quantity>0).map(p=>`<option value="${p.id}" data-price="${p.sellPrice}" data-name="${p.name}">${p.name} - ${formatMoney(p.sellPrice)}</option>`).join('')}
                         </select>
                         <input type="number" placeholder="الكمية" value="1" min="1" style="width:20%" onchange="calcSaleTotal()">
                         <button class="btn btn-danger" onclick="this.parentElement.remove();calcSaleTotal()"><i class="fas fa-times"></i></button>`;
        document.getElementById('saleItems').appendChild(div);
        calcSaleTotal();
    }

    function calcSaleTotal() {
        let sub = 0;
        document.querySelectorAll('.sale-item').forEach(item => {
            let sel = item.querySelector('select');
            let qty = item.querySelector('input');
            if(sel && sel.value && qty) {
                let price = parseFloat(sel.selectedOptions[0].dataset.price) || 0;
                let q = parseFloat(qty.value) || 0;
                sub += price * q;
            }
        });
        let tax = sub * 0.15;
        let grand = sub + tax;
        document.getElementById('subTotal').innerText = formatMoney(sub);
        document.getElementById('tax').innerText = formatMoney(tax);
        document.getElementById('grandTotal').innerText = formatMoney(grand);
        let paid = document.getElementById('salePaid');
        if(paid && parseFloat(paid.value) === 0) paid.value = grand;
    }

    function saveSale() {
        let items = [];
        let valid = true;
        document.querySelectorAll('.sale-item').forEach(item => {
            let sel = item.querySelector('select');
            let qty = item.querySelector('input');
            if(sel && sel.value && qty) {
                let pid = parseInt(sel.value);
                let name = sel.selectedOptions[0].dataset.name;
                let price = parseFloat(sel.selectedOptions[0].dataset.price);
                let q = parseFloat(qty.value);
                let prod = db.inventory.find(p=>p.id===pid);
                if(q > prod.quantity) {
                    showToast('كمية غير متوفرة لـ ' + name, 'error');
                    valid = false;
                    return;
                }
                items.push({productId:pid, name, qty:q, price, total:price*q});
                prod.quantity -= q;
            }
        });
        if(!valid || items.length===0) { if(valid) showToast('أضف منتجاً','error'); return; }
        let sub = items.reduce((a,i)=>a+i.total,0);
        let tax = sub * 0.15;
        let grand = sub + tax;
        let paid = parseFloat(document.getElementById('salePaid').value) || 0;
        let status = document.getElementById('saleStatus').value;
        if(status === 'مدفوع' && paid < grand) status = 'آجل';
        let clientId = parseInt(document.getElementById('saleClient').value) || 0;
        let clientName = 'عميل نقدي';
        if(clientId) {
            let c = db.clients.find(x=>x.id===clientId);
            if(c) clientName = c.name;
        } else {
            let newClient = document.getElementById('newClient').value.trim();
            if(newClient) {
                let c = db.clients.find(x=>x.name===newClient);
                if(!c) {
                    c = {id:Date.now(), name:newClient, phone:'', address:'', balance:0};
                    db.clients.push(c);
                }
                clientId = c.id;
                clientName = c.name;
            }
        }
        let newId = Date.now();
        db.sales.push({id:newId, client:clientName, clientId, items, total:grand, paid, status, date:today()});
        if(clientId && status === 'آجل') {
            let c = db.clients.find(x=>x.id===clientId);
            if(c) c.balance += (grand - paid);
        }
        saveData();
        addLog('فاتورة بيع', clientName);
        showToast('تمت الفاتورة');
        closeModal();
        renderSales();
    }

    function addToCart(pid) {
        let prod = db.inventory.find(p=>p.id===pid);
        if(!prod || prod.quantity===0) { showToast('المنتج غير متوفر','error'); return; }
        let existing = cart.find(c=>c.id===pid);
        if(existing) {
            if(existing.qty >= prod.quantity) { showToast('الكمية غير متوفرة','error'); return; }
            existing.qty++;
            existing.total = existing.qty * existing.price;
        } else {
            cart.push({id:pid, name:prod.name, price:prod.sellPrice, qty:1, total:prod.sellPrice});
        }
        renderCartItems();
    }

    function changeCartQty(idx, delta) {
        let item = cart[idx];
        if(!item) return;
        let prod = db.inventory.find(p=>p.id===item.id);
        let newQty = item.qty + delta;
        if(newQty <= 0) {
            cart.splice(idx,1);
        } else if(prod && newQty > prod.quantity) {
            showToast('الكمية غير متوفرة','error');
            return;
        } else {
            item.qty = newQty;
            item.total = item.qty * item.price;
        }
        renderCartItems();
    }

    function removeFromCart(idx) {
        cart.splice(idx,1);
        renderCartItems();
    }

    function clearCart() {
        cart = [];
        renderCartItems();
    }

    function updatePosChange() {
        let paid = parseFloat(document.getElementById('posPaid')?.value) || 0;
        let total = cart.reduce((a,c)=>a+c.total,0);
        let change = Math.max(0, paid - total);
        let el = document.getElementById('posChange');
        if(el) {
            el.textContent = `الباقي: ${formatMoney(change)}`;
            el.style.background = paid >= total ? '#d1fae5' : '#fee2e2';
        }
    }

    function checkoutPOS() {
        if(cart.length === 0) { showToast('السلة فارغة','error'); return; }
        let clientName = document.getElementById('posClient').value.trim() || 'عميل نقدي';
        let paid = parseFloat(document.getElementById('posPaid').value) || 0;
        let sub = cart.reduce((a,c)=>a+c.total,0);
        let tax = sub * 0.15;
        let grand = sub + tax;
        let client = db.clients.find(c=>c.name===clientName);
        let clientId = 0;
        if(!client && clientName !== 'عميل نقدي') {
            client = {id:Date.now(), name:clientName, phone:'', address:'', balance:0};
            db.clients.push(client);
            clientId = client.id;
        } else if(client) {
            clientId = client.id;
        }
        let items = cart.map(c => ({productId:c.id, name:c.name, qty:c.qty, price:c.price, total:c.total}));
        items.forEach(i => {
            let prod = db.inventory.find(p=>p.id===i.productId);
            if(prod) prod.quantity -= i.qty;
        });
        let newId = Date.now();
        db.sales.push({id:newId, client:clientName, clientId, items, total:grand, paid, status:paid>=grand?'مدفوع':'آجل', date:today()});
        if(clientId && paid < grand) {
            let c = db.clients.find(x=>x.id===clientId);
            if(c) c.balance += (grand - paid);
        }
        cart = [];
        saveData();
        addLog('نقطة بيع', clientName);
        showToast('تم البيع');
        renderPOS();
    }
