<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2563eb">
    <title>الدفتر الذهبي Pro Max - Golden Book</title>
    
    <!-- PWA -->
    <link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiYWxkYXR0ZXIgYWxkaGFiYSBQcm8gTWF4Iiwic2hvcnRfbmFtZSI6ImdvbGRlbmJvb2siLCJzdGFydF91cmwiOiIuIiwiZGlzcGxheSI6InN0YW5kYWxvbmUiLCJiYWNrZ3JvdW5kX2NvbG9yIjoiI2YwZjJmNSIsInRoZW1lX2NvbG9yIjoiIzI1NjNlYiJ9">
    
    <!-- Libraries -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        :root { --primary: #2563eb; --secondary: #64748b; --success: #22c55e; --warning: #f59e0b; --danger: #ef4444; --info: #06b6d4; --purple: #8b5cf6; --dark: #1e293b; --light: #f8fafc; }
        body { background: var(--light); min-height: 100vh; }
        
        /* Loading Screen */
        .loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, var(--primary), var(--purple)); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 99999; transition: all 0.5s; }
        .loading-screen.hidden { opacity: 0; visibility: hidden; }
        .loading-spinner { width: 60px; height: 60px; border: 4px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Auth Screen */
        .auth-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, var(--primary), var(--purple)); padding: 20px; }
        .auth-box { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); width: 100%; max-width: 450px; }
        .auth-logo { text-align: center; margin-bottom: 30px; }
        .auth-logo i { font-size: 4rem; color: var(--primary); }
        .auth-logo h1 { color: var(--dark); margin-top: 10px; }
        
        /* Header */
        .header { background: linear-gradient(135deg, var(--primary), var(--purple)); color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 15px rgba(0,0,0,0.1); }
        .header h1 { font-size: 1.3rem; display: flex; align-items: center; gap: 10px; }
        .header-actions { display: flex; gap: 10px; align-items: center; }
        .user-info { display: flex; align-items: center; gap: 10px; margin-left: 15px; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; background: white; color: var(--primary); display: flex; align-items: center; justify-content: center; font-weight: 700; }
        .btn { padding: 10px 18px; border: none; border-radius: 10px; cursor: pointer; font-size: 0.9rem; transition: all 0.3s; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; }
        .btn:active { transform: scale(0.95); }
        .btn-primary { background: white; color: var(--primary); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-warning { background: var(--warning); color: white; }
        .btn-info { background: var(--info); color: white; }
        .btn-sm { padding: 6px 12px; font-size: 0.8rem; }
        .btn-full { width: 100%; }
        
        /* Container */
        .container { padding: 15px; max-width: 1400px; margin: 0 auto; padding-bottom: 80px; }
        
        /* Stats */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 20px; border-radius: 14px; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.06); border-bottom: 4px solid var(--primary); transition: transform 0.3s; }
        .stat-card:hover { transform: translateY(-5px); }
        .stat-card h3 { font-size: 2rem; color: var(--primary); margin-bottom: 5px; }
        .stat-card p { color: var(--secondary); font-size: 0.9rem; }
        .stat-card.success { border-bottom-color: var(--success); }
        .stat-card.success h3 { color: var(--success); }
        .stat-card.warning { border-bottom-color: var(--warning); }
        .stat-card.warning h3 { color: var(--warning); }
        .stat-card.danger { border-bottom-color: var(--danger); }
        .stat-card.danger h3 { color: var(--danger); }
        
        /* Card */
        .card { background: white; border-radius: 14px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        .card-title { font-size: 1.2rem; font-weight: 700; color: var(--dark); margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
        .card-title i { color: var(--primary); margin-left: 8px; }
        
        /* Table */
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th, td { padding: 12px 15px; text-align: right; border-bottom: 1px solid #e5e7eb; }
        th { background: #f8fafc; font-weight: 700; color: var(--dark); font-size: 0.9rem; white-space: nowrap; }
        tr:hover { background: #f8fafc; }
        .badge { padding: 4px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; display: inline-block; }
        .badge-success { background: #dcfce7; color: #166534; }
        .badge-danger { background: #fee2e2; color: #991b1b; }
        .badge-warning { background: #fef3c7; color: #92400e; }
        .badge-info { background: #dbeafe; color: #1e40af; }
        .badge-purple { background: #ede9fe; color: #6b21a8; }
        
        /* Profit */
        .profit-positive { color: var(--success); font-weight: 700; }
        .profit-negative { color: var(--danger); font-weight: 700; }
        
        /* Search & Filters */
        .filters { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .search-box { flex: 1; min-width: 250px; position: relative; }
        .search-box input, .search-box select { width: 100%; padding: 12px 15px 12px 40px; border: 2px solid #e5e7eb; border-radius: 10px; font-size: 1rem; }
        .search-box i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--secondary); }
        
        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        .modal-content { background: white; padding: 25px; border-radius: 18px; width: 100%; max-width: 700px; max-height: 90vh; overflow-y: auto; }
        .modal-content.large { max-width: 900px; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid #f1f5f9; }
        .modal-header h2 { font-size: 1.3rem; color: var(--dark); display: flex; align-items: center; gap: 8px; }
        .modal-close { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--secondary); padding: 5px; }
        .modal-close:hover { color: var(--danger); }
        
        /* Form */
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 600; color: var(--dark); font-size: 0.9rem; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 11px 14px; border: 2px solid #e5e7eb; border-radius: 10px; font-size: 1rem; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--primary); }
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }
        .profit-preview { background: linear-gradient(135deg, #f0fdf4, #dcfce7); padding: 15px; border-radius: 12px; margin: 15px 0; text-align: center; border: 2px solid #bbf7d0; }
        .profit-preview h4 { color: var(--success); font-size: 1.3rem; }
        
        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 8px 0; box-shadow: 0 -3px 15px rgba(0,0,0,0.08); z-index: 99; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 3px; color: var(--secondary); cursor: pointer; padding: 8px 12px; border-radius: 10px; transition: all 0.3s; }
        .nav-item.active { color: var(--primary); background: #eff6ff; }
        .nav-item i { font-size: 1.3rem; }
        .nav-item span { font-size: 0.7rem; font-weight: 600; }
        
        /* POS */
        .pos-container { display: grid; grid-template-columns: 1fr 400px; gap: 15px; }
        @media (max-width: 900px) { .pos-container { grid-template-columns: 1fr; } }
        .pos-products { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
        .pos-product { background: white; border: 2px solid #e5e7eb; border-radius: 12px; padding: 15px; text-align: center; cursor: pointer; transition: all 0.3s; }
        .pos-product:hover { border-color: var(--primary); transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .pos-product .price { color: var(--success); font-weight: 700; font-size: 1.1rem; margin: 5px 0; }
        .pos-product .stock { font-size: 0.8rem; color: var(--secondary); }
        .pos-cart { background: white; border-radius: 14px; padding: 15px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); position: sticky; top: 80px; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #f1f5f9; }
        .cart-item-info { flex: 1; }
        .cart-item-name { font-weight: 600; font-size: 0.9rem; }
        .cart-item-price { color: var(--success); font-weight: 700; }
        .cart-item-actions { display: flex; align-items: center; gap: 8px; }
        .cart-item-actions button { width: 28px; height: 28px; border: none; border-radius: 6px; cursor: pointer; font-weight: 700; display: flex; align-items: center; justify-content: center; }
        .cart-qty-btn { background: var(--primary); color: white; }
        .cart-remove-btn { background: var(--danger); color: white; }
        .cart-total { padding: 15px; background: #f8fafc; border-radius: 10px; margin-top: 10px; }
        .cart-total-row { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .cart-total-final { font-size: 1.3rem; font-weight: 700; color: var(--primary); border-top: 2px solid #e5e7eb; padding-top: 10px; margin-top: 5px; }
        
        /* Invoice */
        .invoice-print { background: white; padding: 30px; max-width: 700px; margin: 0 auto; }
        .invoice-header { text-align: center; border-bottom: 3px solid var(--primary); padding-bottom: 20px; margin-bottom: 20px; }
        .invoice-logo { font-size: 2rem; font-weight: 700; color: var(--primary); }
        .invoice-details { display: flex; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        .invoice-table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        .invoice-table th, .invoice-table td { padding: 10px; border: 1px solid #e5e7eb; text-align: center; }
        .invoice-table th { background: #f8fafc; }
        .invoice-total { text-align: left; font-size: 1.2rem; font-weight: 700; margin-top: 20px; }
        
        /* Tabs */
        .tabs { display: flex; gap: 5px; margin-bottom: 20px; border-bottom: 2px solid #e5e7eb; overflow-x: auto; }
        .tab { padding: 10px 20px; background: none; border: none; cursor: pointer; font-weight: 600; color: var(--secondary); white-space: nowrap; border-bottom: 3px solid transparent; margin-bottom: -2px; }
        .tab.active { color: var(--primary); border-bottom-color: var(--primary); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* Barcode Scanner */
        .barcode-scanner { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; display: none; align-items: center; justify-content: center; flex-direction: column; }
        .barcode-scanner.active { display: flex; }
        #barcode-reader { width: 90%; max-width: 600px; border: 4px solid var(--primary); border-radius: 10px; }
        
        /* Quick Actions */
        .quick-actions { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .quick-action { background: white; padding: 20px; border-radius: 12px; text-align: center; cursor: pointer; transition: all 0.3s; border: 2px solid #e5e7eb; }
        .quick-action:hover { border-color: var(--primary); transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .quick-action i { font-size: 2rem; color: var(--primary); margin-bottom: 8px; }
        .quick-action span { font-weight: 600; display: block; }
        
        /* Responsive */
        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .form-row { grid-template-columns: 1fr; }
            .header h1 span { display: none; }
            .btn span { display: none; }
            .btn { padding: 8px 12px; }
            .user-info { display: none; }
        }
        
        /* Empty State */
        .empty-state { text-align: center; padding: 40px 20px; color: var(--secondary); }
        .empty-state i { font-size: 3rem; margin-bottom: 10px; opacity: 0.3; }
        
        /* Toast */
        .toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: var(--dark); color: white; padding: 12px 25px; border-radius: 10px; z-index: 2000; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        .toast.show { opacity: 1; }
        .toast.success { background: var(--success); }
        .toast.error { background: var(--danger); }
        .toast.warning { background: var(--warning); }
        
        /* Notifications */
        .notification-badge { position: absolute; top: -5px; right: -5px; background: var(--danger); color: white; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 700; }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loadingScreen" class="loading-screen">
        <div class="loading-spinner"></div>
        <div style="color: white; margin-top: 20px; font-size: 1.2rem; font-weight: 700;">جاري تحميل النظام...</div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <!-- Auth Screen -->
    <div id="authScreen" class="auth-screen" style="display: none;">
        <div class="auth-box">
            <div class="auth-logo">
                <i class="fas fa-crown"></i>
                <h1>الدفتر الذهبي Pro Max</h1>
                <p style="color: var(--secondary); margin-top: 5px;">نظام إدارة المبيعات والمخزون المتكامل</p>
            </div>
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> البريد الإلكتروني</label>
                    <input type="email" id="loginEmail" required placeholder="example@email.com">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> كلمة المرور</label>
                    <input type="password" id="loginPassword" required placeholder="••••••••" minlength="6">
                </div>
                <button type="submit" class="btn btn-primary btn-full" style="margin-top: 10px;">
                    <i class="fas fa-sign-in-alt"></i> تسجيل الدخول
                </button>
                <div style="text-align: center; margin-top: 20px; color: var(--secondary);">
                    <p>أو</p>
                    <button type="button" class="btn btn-success btn-full" onclick="createDemoAccount()" style="margin-top: 10px;">
                        <i class="fas fa-user-plus"></i> إنشاء حساب تجريبي
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Main App -->
    <div id="mainApp" style="display: none;">
        <!-- Header -->
        <div class="header">
            <h1><i class="fas fa-crown"></i> <span>الدفتر الذهبي Pro Max</span></h1>
            <div class="header-actions">
                <button class="btn btn-primary" onclick="showBarcodeScanner()"><i class="fas fa-barcode"></i> <span>مسح</span></button>
                <button class="btn btn-success" onclick="showPage('pos', null)"><i class="fas fa-cash-register"></i> <span>بيع</span></button>
                <div class="user-info">
                    <div class="user-avatar" id="userAvatar">م</div>
                    <span id="userName">مدير</span>
                    <button class="btn btn-danger" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </div>
        </div>

        <!-- Main Container -->
        <div class="container" id="mainContainer"></div>

        <!-- Bottom Navigation -->
        <div class="bottom-nav">
            <div class="nav-item active" onclick="showPage('home', this)">
                <i class="fas fa-home"></i>
                <span>الرئيسية</span>
            </div>
            <div class="nav-item" onclick="showPage('pos', this)">
                <i class="fas fa-cash-register"></i>
                <span>البيع</span>
            </div>
            <div class="nav-item" onclick="showPage('products', this)">
                <i class="fas fa-boxes"></i>
                <span>المنتجات</span>
            </div>
            <div class="nav-item" onclick="showPage('customers', this)">
                <i class="fas fa-users"></i>
                <span>العملاء</span>
            </div>
            <div class="nav-item" onclick="showPage('reports', this)">
                <i class="fas fa-chart-bar"></i>
                <span>التقارير</span>
            </div>
        </div>
    </div>

    <!-- Barcode Scanner -->
    <div id="barcodeScanner" class="barcode-scanner">
        <div id="barcode-reader"></div>
        <div style="margin-top: 20px; display: flex; gap: 10px;">
            <button class="btn btn-success" onclick="startBarcodeScanner()"><i class="fas fa-camera"></i> تشغيل</button>
            <button class="btn btn-danger" onclick="stopBarcodeScanner()"><i class="fas fa-stop"></i> إيقاف</button>
            <button class="btn btn-primary" onclick="closeBarcodeScanner()"><i class="fas fa-times"></i> إغلاق</button>
        </div>
    </div>

    <!-- Modals Container -->
    <div id="modalsContainer"></div>

    <script>
        // ==================== Firebase Configuration ====================
        const firebaseConfig = {
            apiKey: "AIzaSyCfVMHNoqbh86I0JJjnguGY6seA4vWJsSU",
            authDomain: "my-pos-system-11dee.firebaseapp.com",
            databaseURL: "https://my-pos-system-11dee-default-rtdb.firebaseio.com",
            projectId: "my-pos-system-11dee",
            storageBucket: "my-pos-system-11dee.appspot.com",
            messagingSenderId: "565195477080",
            appId: "1:565195477080:web:1ffa21a34e28b47dddfa2d"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        // ==================== Global State ====================
        let products = [];
        let customers = [];
        let suppliers = [];
        let sales = [];
        let purchases = [];
        let expenses = [];
        let revenues = [];
        let debts = [];
        let cashbox = [];
        let users = [];
        let categories = [];
        let returns = [];
        let branches = [];
        let currentUser = null;
        let cart = [];
        let currentSale = null;
        let barcodeScannerActive = false;

        // ==================== Initialize ====================
        window.onload = function() {
            auth.onAuthStateChanged(user => {
                if (user) {
                    currentUser = { uid: user.uid, email: user.email };
                    loadAllData();
                    document.getElementById('loadingScreen').classList.add('hidden');
                    document.getElementById('authScreen').style.display = 'none';
                    document.getElementById('mainApp').style.display = 'block';
                    createModals();
                    showPage('home', document.querySelector('.nav-item'));
                    showToast('تم تسجيل الدخول بنجاح!', 'success');
                } else {
                    document.getElementById('loadingScreen').classList.add('hidden');
                    document.getElementById('authScreen').style.display = 'flex';
                }
            });
        };

        // ==================== Auth Functions ====================
        function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            auth.signInWithEmailAndPassword(email, password)
                .catch(error => showToast('خطأ: ' + error.message, 'error'));
        }

        function createDemoAccount() {
            const email = 'demo@goldenbook.com';
            const password = 'demo123';
            
            auth.createUserWithEmailAndPassword(email, password)
                .then(cred => {
                    return db.ref('users/' + cred.user.uid).set({
                        name: 'مدير تجريبي',
                        email: email,
                        role: 'admin',
                        branch: 'main',
                        createdAt: new Date().toISOString()
                    });
                })
                .then(() => showToast('تم إنشاء الحساب التجريبي!\nالبريد: demo@goldenbook.com\nكلمة المرور: demo123', 'success'))
                .catch(error => showToast('خطأ: ' + error.message, 'error'));
        }

        function handleLogout() {
            if (confirm('هل تريد تسجيل الخروج؟')) {
                auth.signOut();
                location.reload();
            }
        }

        // ==================== Data Loading ====================
        function loadAllData() {
            const uid = currentUser.uid;
            
            db.ref('users/' + uid + '/products').on('value', snapshot => {
                products = [];
                snapshot.forEach(child => products.push({ id: child.key, ...child.val() }));
                updateCurrentPage();
            });
            
            db.ref('users/' + uid + '/customers').on('value', snapshot => {
                customers = [];
                snapshot.forEach(child => customers.push({ id: child.key, ...child.val() }));
                updateCurrentPage();
            });
            
            db.ref('users/' + uid + '/suppliers').on('value', snapshot => {
                suppliers = [];
                snapshot.forEach(child => suppliers.push({ id: child.key, ...child.val() }));
            });

        // ==================== Navigation ====================
        function showPage(page, navElement) {
            if (navElement) {
                document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
                navElement.classList.add('active');
            }
            
            const container = document.getElementById('mainContainer');
            
            switch(page) {
                case 'home': showHomePage(container); break;
                case 'pos': showPOSPage(container); break;
                case 'products': showProductsPage(container); break;
                case 'customers': showCustomersPage(container); break;
                case 'sales': showSalesPage(container); break;
                case 'suppliers': showSuppliersPage(container); break;
                case 'purchases': showPurchasesPage(container); break;
                case 'expenses': showExpensesPage(container); break;
                case 'revenues': showRevenuesPage(container); break;
                case 'debts': showDebtsPage(container); break;
                case 'cashbox': showCashboxPage(container); break;
                case 'categories': showCategoriesPage(container); break;
                case 'returns': showReturnsPage(container); break;
                case 'reports': showReportsPage(container); break;
                case 'backup': showBackupPage(container); break;
                default: showHomePage(container);
            }
        }

        function updateCurrentPage() {
            const activeNav = document.querySelector('.nav-item.active');
            if (activeNav) {
                const page = activeNav.getAttribute('onclick').match(/'(\w+)'/)[1];
                showPage(page, activeNav);
            }
        }

        // ==================== Pages ====================
        function showHomePage(container) {
            const totalProducts = products.length;
            const stockValue = products.reduce((sum, p) => sum + (p.costPrice * p.quantity), 0);
            const totalProfit = products.reduce((sum, p) => sum + ((p.salePrice - p.costPrice) * p.quantity), 0);
            const lowStock = products.filter(p => p.quantity <= (p.minStock || 5)).length;
            const totalSales = sales.length;
            const totalRevenue = sales.reduce((sum, s) => sum + (s.total || 0), 0);
            const totalCustomers = customers.length;
            const totalDebts = debts.filter(d => d.status !== 'paid').reduce((sum, d) => sum + (d.remaining || d.amount || 0), 0);

            container.innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card"><h3>${totalProducts}</h3><p>إجمالي المنتجات</p></div>
                    <div class="stat-card success"><h3>${formatCurrency(stockValue)}</h3><p>قيمة المخزون</p></div>
                    <div class="stat-card warning"><h3>${formatCurrency(totalProfit)}</h3><p>إجمالي الأرباح</p></div>
                    <div class="stat-card danger"><h3>${lowStock}</h3><p>منتجات منخفضة</p></div>
                    <div class="stat-card"><h3>${totalSales}</h3><p>عدد المبيعات</p></div>
                    <div class="stat-card success"><h3>${formatCurrency(totalRevenue)}</h3><p>إجمالي الإيرادات</p></div>
                    <div class="stat-card"><h3>${totalCustomers}</h3><p>عدد العملاء</p></div>
                    <div class="stat-card danger"><h3>${formatCurrency(totalDebts)}</h3><p>الديون المستحقة</p></div>
                </div>

        function savePurchase(event) {
            event.preventDefault();
            const supplierId = document.getElementById('purchaseSupplier').value;
            const invoiceNumber = document.getElementById('purchaseInvoiceNumber').value;
            const items = [];
            let total = 0;
            
            document.querySelectorAll('#purchaseItems .form-row').forEach(row => {
                const productId = row.querySelector('.purchase-product').value;
                const qty = parseInt(row.querySelector('.purchase-qty').value) || 0;
                const price = parseFloat(row.querySelector('.purchase-price').value) || 0;
                if (productId && qty > 0) {
                    const product = products.find(p => p.id === productId);
                    items.push({ productId, name: product ? product.name : '', quantity: qty, price: price });
                    total += qty * price;
                    
                    // Update stock
                    if (product) {
                        const uid = currentUser.uid;
                        db.ref('users/' + uid + '/products/' + productId + '/quantity').set(product.quantity + qty);
                    }
                }
            });
            
            if (items.length === 0) {
                showToast('أضف منتجات على الأقل!', 'error');
                return;
            }
            
            const purchaseData = {
                supplierId,
                invoiceNumber,
                items,
                total,
                date: new Date().toISOString(),
                timestamp: Date.now()
            };
            
            const uid = currentUser.uid;
            db.ref('users/' + uid + '/purchases').push(purchaseData).then(() => {
                // Add to cashbox
                db.ref('users/' + uid + '/cashbox').push({
                    type: 'out',
                    description: 'شراء من المورد',
                    amount: total,
                    date: new Date().toISOString(),
                    timestamp: Date.now()
                });
                showToast('تم حفظ الشراء بنجاح!', 'success');
                closeModal('purchaseModal');
            });
        }

        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            if (!product || product.quantity <= 0) { showToast('المنتج غير متوفر!', 'error'); return; }
            const existing = cart.find(item => item.productId === productId);
            if (existing) {
                if (existing.quantity >= product.quantity) { showToast('الكمية غير متوفرة!', 'error'); return; }
                existing.quantity++;
            } else {
                cart.push({ productId: product.id, name: product.name, costPrice: product.costPrice, salePrice: product.salePrice, quantity: 1 });
            }
            renderCart();
        }

        function updateCartQuantity(productId, change) {
            const item = cart.find(i => i.productId === productId);
            if (!item) return;
            const product = products.find(p => p.id === productId);
            const newQty = item.quantity + change;
            if (newQty <= 0) { removeFromCart(productId); return; }
            if (product && newQty > product.quantity) { showToast('الكمية غير متوفرة!', 'error'); return; }
            item.quantity = newQty;
            renderCart();
        }

        function removeFromCart(productId) {
            cart = cart.filter(item => item.productId !== productId);
            renderCart();
        }

        function clearCart() {
            if (confirm('مسح السلة؟')) { cart = []; renderCart(); }
        }

        function updateCartTotal() {
            const subtotal = cart.reduce((sum, item) => sum + (item.salePrice * item.quantity), 0);
            const totalCost = cart.reduce((sum, item) => sum + (item.costPrice * item.quantity), 0);
            const profit = subtotal - totalCost;
            const elSubtotal = document.getElementById('cartSubtotal');
            const elProfit = document.getElementById('cartProfit');
            const elTotal = document.getElementById('cartTotal');
            if (elSubtotal) elSubtotal.textContent = formatCurrency(subtotal);
            if (elProfit) { elProfit.textContent = formatCurrency(profit); elProfit.style.color = profit >= 0 ? 'var(--success)' : 'var(--danger)'; }
            if (elTotal) elTotal.textContent = formatCurrency(subtotal);
        }

        function completeSale() {
            if (cart.length === 0) { showToast('السلة فارغة!', 'error'); return; }
            const customerId = document.getElementById('posCustomer').value;
            const subtotal = cart.reduce((sum, item) => sum + (item.salePrice * item.quantity), 0);
            const totalCost = cart.reduce((sum, item) => sum + (item.costPrice * item.quantity), 0);
            const saleData = {
                customerId: customerId,
                items: cart.map(item => ({ productId: item.productId, name: item.name, costPrice: item.costPrice, salePrice: item.salePrice, quantity: item.quantity })),
                subtotal: subtotal,
                totalCost: totalCost,
                profit: subtotal - totalCost,
                total: subtotal,
                date: new Date().toISOString(),
                timestamp: Date.now()
            };
            const uid = currentUser.uid;
            db.ref('users/' + uid + '/sales').push(saleData).then(ref => {
                // Update stock
                const updates = {};
                cart.forEach(item => {
                    const product = products.find(p => p.id === item.productId);
                    if (product) updates['users/' + uid + '/products/' + item.productId + '/quantity'] = product.quantity - item.quantity;
                });
                return db.ref().update(updates);
            }).then(() => {
                // Add to cashbox
                db.ref('users/' + uid + '/cashbox').push({
                    type: 'in',
                    description: customerId ? 'بيع (آجل)' : 'بيع نقدي',
                    amount: subtotal,
                    date: new Date().toISOString(),
                    timestamp: Date.now()
                });
                // Create debt if credit
                if (customerId) {
                    db.ref('users/' + uid + '/debts').push({
                        customerId,
                        saleId: saleData.id,
                        amount: subtotal,
                        remaining: subtotal,
                        status: 'pending',
                        date: new Date().toISOString(),
                        timestamp: Date.now()
                    });
                }
                showToast('تم البيع بنجاح! 🎉', 'success');
                cart = [];
                renderCart();
                showPage('home', document.querySelector('.nav-item'));
            }).catch(err => showToast('خطأ: ' + err.message, 'error'));
        }

        // ==================== Utility Functions ====================
        function getCategoryName(catId) {
            const cat = categories.find(c => c.id === catId);
            return cat ? cat.name : (catId || '-');
        }

        function formatCurrency(amount) {
            return parseFloat(amount || 0).toFixed(2) + ' ل.د';
        }

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            return new Date(dateStr).toLocaleDateString('ar-LY', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast show ' + (type || '');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function searchProducts() {
            const query = document.getElementById('productSearch').value.toLowerCase();
            const filtered = products.filter(p => p.name.toLowerCase().includes(query));
            renderProductsTable(filtered);
        }

        function filterProducts() {
            const catId = document.getElementById('productFilterCategory').value;
            const filtered = catId ? products.filter(p => p.category === catId) : products;
            renderProductsTable(filtered);
        }

        function searchCustomers() {
            const query = document.getElementById('customerSearch').value.toLowerCase();
            const filtered = customers.filter(c => c.name.toLowerCase().includes(query));
            const tbody = document.getElementById('customersTable');
            if (tbody) {
                tbody.innerHTML = filtered.map(c => `
                    <tr>
                        <td><strong>${escapeHtml(c.name)}</strong></td>
                        <td>${c.phone || '-'}</td>
                        <td>${c.email || '-'}</td>
                        <td>${formatCurrency(c.balance || 0)}</td>
                        <td>-</td>
                        <td><button class="btn btn-sm btn-warning" onclick="editCustomer('${c.id}')"><i class="fas fa-edit"></i></button></td>
                    </tr>
                `).join('') || '<tr><td colspan="6" class="empty-state">لا يوجد عملاء</td></tr>';
            }
        }

        function filterSales() {
            const from = document.getElementById('salesDateFrom').value;
            const to = document.getElementById('salesDateTo').value;
            let filtered = sales;
            if (from) filtered = filtered.filter(s => s.date >= from);
            if (to) filtered = filtered.filter(s => s.date <= to);
            renderSalesTable(filtered);
        }

        function exportToExcel(type) {
            let data = [];
            let filename = '';
            if (type === 'products') { data = products; filename = 'products'; }
            else if (type === 'sales') { data = sales; filename = 'sales'; }
            else if (type === 'customers') { data = customers; filename = 'customers'; }
            
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, filename);
            XLSX.writeFile(wb, filename + '_' + new Date().toISOString().split('T')[0] + '.xlsx');
            showToast('تم التصدير!', 'success');
        }

        function showQR(productId) {
            const p = products.find(x => x.id === productId);
            if (!p) return;
            const qrData = JSON.stringify({ id: p.id, name: p.name, barcode: p.barcode, price: p.salePrice });
            const div = document.createElement('div');
            div.style.cssText = 'position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 15px; z-index: 3000; box-shadow: 0 10px 40px rgba(0,0,0,0.3);';
            div.innerHTML = '<h3 style="margin-bottom: 15px;">' + escapeHtml(p.name) + '</h3><div id="qrcode"></div><button onclick="this.parentElement.remove()" style="margin-top: 15px; padding: 8px 20px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer;">إغلاق</button>';
            document.body.appendChild(div);
            new QRCode(document.getElementById('qrcode'), { text: qrData, width: 200, height: 200 });
        }

        function viewSale(saleId) {
            const sale = sales.find(s => s.id === saleId);
            if (!sale) return;
            const customer = customers.find(c => c.id === sale.customerId);
            let html = '<div style="margin-bottom: 20px;"><strong>رقم الفاتورة:</strong> ' + sale.id.substring(0, 12) + '</div>';
            html += '<div style="margin-bottom: 20px;"><strong>العميل:</strong> ' + (customer ? customer.name : 'نقدي') + '</div>';
            html += '<div style="margin-bottom: 20px;"><strong>التاريخ:</strong> ' + formatDate(sale.date) + '</div>';
            html += '<table class="invoice-table"><thead><tr><th>المنتج</th><th>الكمية</th><th>السعر</th><th>الإجمالي</th></tr></thead><tbody>';
            html += (sale.items || []).map(item => '<tr><td>' + escapeHtml(item.name) + '</td><td>' + item.quantity + '</td><td>' + formatCurrency(item.salePrice) + '</td><td>' + formatCurrency(item.salePrice * item.quantity) + '</td></tr>').join('');
            html += '</tbody></table>';
            html += '<div class="invoice-total"><div>المجموع: ' + formatCurrency(sale.total) + '</div><div>الربح: ' + formatCurrency(sale.profit || 0) + '</div></div>';
            document.getElementById('saleDetails').innerHTML = html;
            currentSale = sale;
            document.getElementById('saleModal').classList.add('active');
        }

        function printInvoice() {
            const content = document.getElementById('saleDetails');
            const opt = { margin: 1, filename: 'invoice.pdf', html2canvas: { scale: 2 }, jsPDF: { orientation: 'portrait', format: 'a4' } };
            html2pdf().set(opt).from(content).save();
        }

        function downloadInvoicePDF() {
            printInvoice();
        }

        function printSaleInvoice(saleId) {
            const sale = sales.find(s => s.id === saleId);
            if (sale) {
                currentSale = sale;
                viewSale(saleId);
                setTimeout(() => printInvoice(), 500);
            }
        }

        function openDebtPayment(debtId) {
            const debt = debts.find(d => d.id === debtId);
            if (!debt) return;
            const customer = customers.find(c => c.id === debt.customerId);
            document.getElementById('debtId').value = debt.id;
            document.getElementById('debtCustomerName').value = customer ? customer.name : '-';
            document.getElementById('debtOriginalAmount').value = formatCurrency(debt.amount);
            document.getElementById('debtRemaining').value = formatCurrency(debt.remaining || debt.amount);
            document.getElementById('debtPaymentAmount').value = '';
            document.getElementById('debtModal').classList.add('active');
        }

        function saveDebtPayment(event) {
            event.preventDefault();
            const debtId = document.getElementById('debtId').value;
            const amount = parseFloat(document.getElementById('debtPaymentAmount').value) || 0;
            const debt = debts.find(d => d.id === debtId);
            if (!debt) return;
            const remaining = (debt.remaining || debt.amount) - amount;
            const updates = { remaining: Math.max(0, remaining) };
            if (remaining <= 0) updates.status = 'paid';
            const uid = currentUser.uid;
            db.ref('users/' + uid + '/debts/' + debtId).update(updates).then(() => {
                showToast('تم السداد!', 'success');
                closeModal('debtModal');
                // Add to cashbox
                db.ref('users/' + uid + '/cashbox').push({
                    type: 'in',
                    description: 'سداد دين',
                    amount: amount,
                    date: new Date().toISOString(),
                    timestamp: Date.now()
                });
            });
        }

        function showCustomerDebts(customerId) {
            const customerDebts = debts.filter(d => d.customerId === customerId);
            alert('ديون العميل: ' + customerDebts.length + '\nالإجمالي: ' + formatCurrency(customerDebts.reduce((sum, d) => sum + (d.remaining || d.amount || 0), 0)));
        }

        function switchTab(btn, tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(tabId).classList.add('active');
        }

        // ==================== Barcode Scanner ====================
        function showBarcodeScanner() {
            document.getElementById('barcodeScanner').classList.add('active');
        }

        function closeBarcodeScanner() {
            stopBarcodeScanner();
            document.getElementById('barcodeScanner').classList.remove('active');
        }

        function startBarcodeScanner() {
            if (barcodeScannerActive) return;
            Quagga.init({
                inputStream: { name: "Live", type: "LiveStream", target: document.querySelector('#barcode-reader'), constraints: { facingMode: "environment" } },
                decoder: { readers: ["ean_reader", "code_128_reader", "upc_reader", "code_39_reader"] }
            }, function(err) {
                if (err) { console.error(err); showToast('خطأ في الكاميرا!', 'error'); return; }
                Quagga.start();
                barcodeScannerActive = true;
                showToast('تم تشغيل الكاميرا', 'success');
            });
            Quagga.onDetected(function(data) {
                const code = data.codeResult.code;
                showToast('الباركود: ' + code, 'success');
                const product = products.find(p => p.barcode === code);
                if (product) {
                    if (document.querySelector('.nav-item.active') && document.querySelector('.nav-item.active').textContent.includes('البيع')) {
                        addToCart(product.id);
                    } else {
                        document.getElementById('productBarcode').value = code;
                        closeBarcodeScanner();
                    }
                } else {
                    showToast('المنتج غير موجود!', 'warning');
                }
            });
        }

        function stopBarcodeScanner() {
            if (!barcodeScannerActive) return;
            Quagga.stop();
            barcodeScannerActive = false;
        }

        // ==================== Backup Functions ====================
        function exportBackup() {
            const uid = currentUser.uid;
            const backup = {
                products, customers, suppliers, sales, purchases, expenses, revenues, debts, cashbox, categories, returns,
                exportDate: new Date().toISOString(),
                version: '1.0'
            };
            const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'backup_' + new Date().toISOString().split('T')[0] + '.json';
            a.click();
            URL.revokeObjectURL(url);
            showToast('تم التصدير!', 'success');
        }

        function importBackup(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const backup = JSON.parse(e.target.result);
                    if (confirm('هل أنت متأكد من استعادة البيانات؟ سيتم استبدال جميع البيانات الحالية!')) {
                        const uid = currentUser.uid;
                        const updates = {};
                        if (backup.products) updates['users/' + uid + '/products'] = backup.products;
                        if (backup.customers) updates['users/' + uid + '/customers'] = backup.customers;
                        if (backup.suppliers) updates['users/' + uid + '/suppliers'] = backup.suppliers;
                        if (backup.categories) updates['users/' + uid + '/categories'] = backup.categories;
                        db.ref().update(updates).then(() => {
                            showToast('تمت الاستعادة بنجاح!', 'success');
                            location.reload();
                        });
                    }
                } catch (err) {
                    showToast('ملف غير صالح!', 'error');
                }
            };
            reader.readAsText(file);
            input.value = '';
        }

        function enableAutoBackup() {
            if ('serviceWorker' in navigator) {
                showToast('تم تفعيل النسخ التلقائي!', 'success');
                // Schedule backup every day at 2 AM
                setInterval(() => {
                    const now = new Date();
                    if (now.getHours() === 2 && now.getMinutes() === 0) {
                        exportBackup();
                    }
                }, 60000); // Check every minute
            } else {
                showToast('المتصفح لا يدعم النسخ التلقائي!', 'warning');
            }
        }

        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) event.target.classList.remove('active');
        }
    </script>
</body>
