function load(cb){

    fbDB.ref('erp').once('value').then(s=>{const d=s.val();if(d)applyLoaded(d);else loadLocal();if(cb)cb();})

  } else {loadLocal();if(cb)cb();}
}

function je(desc,date,lines){
  let td=lines.reduce((s,l)=>s+(l.d||0),0),tc=lines.reduce((s,l)=>s+(l.c||0),0);
  if(Math.abs(td-tc)>0.01)console.warn('Unbalanced JE',desc,td,tc);
  db.journal.push({id:nid('jnl'),date:date||today(),desc,lines});
}
function jeSale(s){
  let cost=s.items.reduce((sum,it)=>{let p=db.inventory.find(x=>x.id===it.pid);return sum+(p?p.buy*it.qty:0);},0);
  let acc=s.status==='مدفوع'?'1100':'1300';
  let lines=[{acc,d:s.grand,c:0},{acc:'4100',d:0,c:s.sub-(s.discount||0)},{acc:'2200',d:0,c:s.tax}];
  if((s.discount||0)>0)lines.push({acc:'4100',d:s.discount,c:0});
  if(cost>0){lines.push({acc:'5100',d:cost,c:0});lines.push({acc:'1400',d:0,c:cost});}
  je(\`فاتورة بيع #\${s.id} - \${s.clientName}\`,s.date,lines);
}

  je(\`فاتورة شراء #\${p.id} - \${p.prodName}\`,p.date,[{acc:'1400',d:p.total,c:0},{acc,d:0,c:p.total}]);
}
function jeExp(e){
  let acc=e.payMethod==='بنك'?'1200':'1100';
  je(\`\${e.cat}: \${e.note}\`,e.date,[{acc:'5200',d:e.amount,c:0},{acc,d:0,c:e.amount}]);
}
function jePaySale(sid,amt){je(\`سداد فاتورة بيع #\${sid}\`,today(),[{acc:'1100',d:amt,c:0},{acc:'1300',d:0,c:amt}]);}
function jePayPur(pid,amt){je(\`سداد فاتورة شراء #\${pid}\`,today(),[{acc:'2100',d:amt,c:0},{acc:'1100',d:0,c:amt}]);}
function jeReturn(r){
  je(\`مرتجع #\${r.id}\`,r.date,[{acc:'4100',d:r.total,c:0},{acc:'1300',d:0,c:r.total},{acc:'1400',d:r.cost||0,c:0},{acc:'5100',d:0,c:r.cost||0}]);
}
function accBal(code){
  let b=0;db.journal.forEach(e=>e.lines.forEach(l=>{if(l.acc===code)b+=(l.d||0)-(l.c||0)}));return b;
}
function trialBalance(){
  let rows=[];
  COA.forEach(a=>{let b=accBal(a.code);if(Math.abs(b)>.001)rows.push({...a,debit:b>0?b:0,credit:b<0?-b:0});});
  return rows;
}
function incomeSt(){
  let rev=accBal('4100')+accBal('4200'),cogs=accBal('5100'),opx=accBal('5200')+accBal('5300')+accBal('5400');
  return{rev,cogs,gross:rev-cogs,opx,net:rev-cogs-opx};
}
function balSheet(){
  let cash=accBal('1100'),bank=accBal('1200'),rec=accBal('1300'),inv=accBal('1400'),fix=accBal('1500');
  let pay=accBal('2100'),vat=accBal('2200'),loans=accBal('2300');
  let cap=accBal('3100'),ret=accBal('3200'),is_=incomeSt();
  return{cash,bank,rec,inv,fix,assets:cash+bank+rec+inv+fix,pay,vat,loans,liab:pay+vat+loans,cap,ret,netProfit:is_.net,equity:cap+ret+is_.net};
}

function showLogin(){$('loginDiv').style.display='block';$('regDiv').style.display='none'}

function doLogin(){
  let u=($('lu').value||'').trim(),p=$('lp').value;
  let f=db.users.find(x=>x.username===u&&x.password===p);
  if(!f){toast('بيانات الدخول غير صحيحة','error');return}
  CU=f;$('loginScreen').style.display='none';$('app').style.display='block';
  $('userBadge').textContent=f.name;
  if(isDark){document.body.classList.add('dark');$('darkIcon').className='fas fa-sun';}
  applyTheme();$('topLogo').textContent=companyInfo.name||'ERP PRO ULTIMATE';
  addLog('تسجيل دخول',f.username);buildMenu();navigate('dashboard');updateNB();
  if(!fbEnabled){let d=$('syncDot'),t=$('syncTxt');if(d)d.className='sync-dot offline';if(t)t.textContent='وضع محلي';}
  toast(\`مرحباً \${f.name}\`,'success');
}
function doRegister(){
  let n=($('rn').value||'').trim(),u=($('ru').value||'').trim(),p=$('rp').value;
  if(!n||!u||!p){toast('جميع الحقول مطلوبة','error');return}
  if(p.length<4){toast('كلمة المرور قصيرة جداً (4 أحرف على الأقل)','error');return}
  if(db.users.find(x=>x.username===u)){toast('اسم المستخدم موجود بالفعل','error');return}
  db.users.push({id:Date.now(),name:n,username:u,password:p,role:'user'});
  save();toast('تم إنشاء الحساب','success');showLogin();
}
function logout(){addLog('تسجيل خروج','');CU=null;$('loginScreen').style.display='flex';$('app').style.display='none';destroyCharts();posCart=[];saleItems=[];quotesItems=[];jeLines=[];}

function buildMenu(){
  $('menuBar').innerHTML=PAGES.map(p=>
    \`<div class="mi\${page===p.id?' active':''}" onclick="navigate('\${p.id}')"><i class="fas \${p.icon}"></i><span>\${p.label}</span></div>\`
  ).join('');
}
function navigate(pg,silent=false){
  page=pg;if(!silent)destroyCharts();buildMenu();
  const R={dashboard:rDash,inventory:rInv,suppliers:rSup,purchases:rPur,quotes:rQuotes,sales:rSales,returns:rReturns,clients:rCli,pos:rPOS,expenses:rExp,accounting:rAcc,reports:rRep,settings:rSettings,backup:rBackup};
  if(R[pg])R[pg]();
  if(!silent)window.scrollTo({top:0,behavior:'smooth'});
}

function showPrint(type,data){lastPT=type;lastPD=data;$('printModal').style.display='flex';renderPM();}
function closePM(){$('printModal').style.display='none';}
function changeTpl(d){activeTpl+=d;if(activeTpl<1)activeTpl=TPLS.length;if(activeTpl>TPLS.length)activeTpl=1;renderPM();}
function renderPM(){
  let tpl=TPLS.find(t=>t.id===activeTpl)||TPLS[0];
  $('tplName').textContent=\`\${activeTpl}/10: \${tpl.name}\`;
  let html='';
  if(lastPT==='sale'||lastPT==='quote')html=buildSaleInv(lastPD,tpl);
  else if(lastPT==='purchase')html=buildPurInv(lastPD,tpl);
  else if(lastPT==='receipt')html=buildReceipt(lastPD,tpl);
  else if(lastPT==='return')html=buildReturnDoc(lastPD,tpl);
  else if(lastPT==='report')html=lastPD;
  $('printContent').innerHTML=html;
}
function doPrint(){
  let html=$('printContent').innerHTML;
  let w=window.open('','_blank','width=860,height=760');
  w.document.write(\`<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8">

  @page{margin:10mm}
  </style></head><body>\${html}</body></html>\`);
  w.document.close();w.focus();setTimeout(()=>w.print(),700);

function buildInvText(data,typeLabel){
  let r=RATES[currency]||1;
  let lines=[\`📄 \${typeLabel} #\${data.id}\`,\`📅 \${data.date}\`,\`🏢 \${companyInfo.name}\`,\`━━━━━━━━━━━━━━━━━━━━\`];
  if(data.items)data.items.forEach(it=>lines.push(\`• \${it.name} × \${it.qty} = \${f2(it.total*r)} \${currency}\`));
  lines.push('━━━━━━━━━━━━━━━━━━━━');
  if(data.sub!=null)lines.push(\`المجموع: \${f2(data.sub*r)} \${currency}\`);
  if(data.discount)lines.push(\`الخصم: - \${f2(data.discount*r)} \${currency}\`);
  if(data.tax)lines.push(\`الضريبة (\${taxRate}%): \${f2(data.tax*r)} \${currency}\`);
  if(data.grand!=null)lines.push(\`💰 الإجمالي: \${f2(data.grand*r)} \${currency}\`);
  lines.push('━━━━━━━━━━━━━━━━━━━━');
  lines.push(\`✅ \${companyInfo.name}\`);
  if(companyInfo.phone)lines.push(\`📞 \${companyInfo.phone}\`);
  return lines.join('\\n');
}
function shareWA(){if(!lastPD){toast('لا توجد بيانات','warning');return;}let L={sale:'فاتورة بيع',purchase:'فاتورة شراء',quote:'عرض أسعار',receipt:'إيصال',return:'مرتجع'};window.open('https://wa.me/?text='+encodeURIComponent(buildInvText(lastPD,L[lastPT]||'مستند')),'_blank');}
