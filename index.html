<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SEMO ERP | الدخول الموحد</title>
    
    <!-- المكتبات -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <script src="https://cloudflare.com"></script>

    <style>
        :root { --accent: #3b82f6; --bg: #0f172a; --success: #10b981; }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; background-image: radial-gradient(circle at top right, #1e293b, #0f172a); }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); padding: 40px; border-radius: 30px; width: 92%; max-width: 420px; text-align: center; color: white; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; background: rgba(0,0,0,0.3); color: white; font-size: 16px; outline: none; }
        .iti { width: 100% !important; margin: 10px 0; text-align: left; }
        .iti__country-list { background-color: #1e293b !important; color: white !important; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 15px; cursor: pointer; font-weight: 800; margin-top: 15px; transition: 0.3s; font-size: 16px; }
        .btn-p { background: var(--accent); color: white; }
        .btn-s { background: var(--success); color: white; }
        .hidden { display: none; }
        .link { color: var(--accent); cursor: pointer; text-decoration: none; font-size: 0.85rem; display: block; margin-top: 15px; background: none; border: none; width: 100%; }
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: white; color: var(--bg); padding: 12px 25px; border-radius: 50px; display: none; z-index: 10000; font-weight: bold; }
    </style>
</head>
<body>

    <div class="glass" id="auth-box">
        <h1 style="color: var(--accent); font-size: 2.2rem; letter-spacing: 2px;">SEMO ERP</h1>
        <p style="color: #94a3b8; margin-bottom: 25px;">النظام الموحد للإدارة المالية</p>
        
        <div id="login-view">
            <input type="text" id="login-id" placeholder="الإيميل أو رقم الهاتف">
            <input type="password" id="login-pass" placeholder="كلمة المرور">
            <button class="btn btn-p" onclick="smartLogin()">دخول المؤسسة</button>
            <button class="link" onclick="toggle('signup-view')">تأسيس حساب جديد (سجل الآن)</button>
        </div>

        <div id="signup-view" class="hidden">
            <h3>تأسيس مؤسسة جديدة</h3>
            <input type="email" id="sign-email" placeholder="البريد الإلكتروني">
            <input type="tel" id="sign-phone"> 
            <input type="password" id="sign-pass" placeholder="تعيين كلمة المرور">
            <button class="btn btn-s" onclick="signup()">إنشاء وتفعيل الحساب</button>
            <button class="link" onclick="toggle('login-view')">رجوع للدخول</button>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC2EVpNEG9XjcPEelUA8lkIUcUceN6Oh0k",
            authDomain: "://firebaseapp.com",
            projectId: "semo-erp-pro13",
            databaseURL: "https://firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const itiS = window.intlTelInput(document.querySelector("#sign-phone"), {
            initialCountry: "ly", separateDialCode: true, utilsScript: "https://cloudflare.com"
        });

        function toggle(id) { document.querySelectorAll('#auth-box > div').forEach(d => d.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }
        function notify(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 4000); }

        function signup() {
            const e = document.getElementById('sign-email').value, p = document.getElementById('sign-pass').value;
            const ph = itiS.getNumber().replace('+', '');

            if(!e || !p || !ph) { notify("أكمل البيانات أولاً"); return; }

            firebase.auth().createUserWithEmailAndPassword(e, p).then(u => {
                db.ref('phoneToEmail/' + ph).set({ email: e });
                notify("تم الحفظ والمزامنة! جاري الدخول...");
                setTimeout(() => window.location.assign("dashboard.html"), 1000);
            }).catch(err => notify(err.message));
        }

        function smartLogin() {
            let id = document.getElementById('login-id').value.trim();
            const p = document.getElementById('login-pass').value;

            if(!id.includes('@')) {
                let cleanPhone = id.replace('+', '');
                db.ref('phoneToEmail/' + cleanPhone).once('value').then(snap => {
                    if (snap.exists()) performAuth(snap.val().email, p);
                    else notify("رقم الهاتف غير مسجل");
                });
            } else { performAuth(id, p); }
        }

        function performAuth(email, pass) {
            firebase.auth().signInWithEmailAndPassword(email, pass)
                .then(() => window.location.assign("dashboard.html"))
                .catch(() => notify("خطأ في البيانات"));
        }
    </script>
</body>
</html>
