<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SIMO ERP PRO - النظام المحاسبي المتكامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        :root {
            --primary: #3b82f6; --primary-dark: #2563eb; --success: #10b981; --success-dark: #059669;
            --danger: #ef4444; --warning: #f59e0b; --info: #8b5cf6; --dark: #1e293b;
            --bg: #0f172a; --card: #1e293b; --card-light: #334155; --text: #f1f5f9;
            --text-muted: #94a3b8; --border: #334155; --sidebar-width: 300px;
        }
        body { background: var(--bg); color: var(--text); direction: rtl; font-size: 14px; overflow-x: hidden; }
        
        /* Login */
        .login-container { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(135deg, #0f172a, #1e293b); }
        .login-box { background: var(--card); padding: 40px; border-radius: 30px; width: 400px; text-align: center; border: 1px solid var(--border); }
        .login-box input, .login-box select { width: 100%; padding: 12px; margin: 10px 0; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; color: var(--text); }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-warning { background: var(--warning); color: white; }
        .btn-sm { padding: 5px 12px; font-size: 12px; }
        .switch-auth { margin-top: 15px; color: var(--text-muted); cursor: pointer; }
        .switch-auth span { color: var(--primary); }
        
        /* Header */
        .top-header { position: fixed; top: 0; right: 0; left: 0; height: 60px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; z-index: 99; }
        .header-logo { font-size: 1.2rem; font-weight: 800; color: var(--primary); }
        .user-info { display: flex; align-items: center; gap: 15px; background: var(--bg); padding: 5px 15px; border-radius: 40px; }
        .logout-btn { background: var(--danger); border: none; padding: 5px 12px; border-radius: 40px; color: white; cursor: pointer; }
        
        /* Sidebar */
        .sidebar { width: var(--sidebar-width); background: var(--card); position: fixed; right: 0; top: 60px; height: calc(100vh - 60px); padding: 1rem; overflow-y: auto; border-left: 1px solid var(--border); transition: transform 0.3s; }
        .menu-item { padding: 12px 16px; margin: 5px 0; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 12px; color: var(--text-muted); transition: 0.2s; }
        .menu-item:hover, .menu-item.active { background: var(--primary); color: white; }
        .menu-item.disabled { opacity: 0.5; pointer-events: none; }
        
        /* Main */
        .main-content { margin-right: var(--sidebar-width); margin-top: 60px; padding: 20px; min-height: calc(100vh - 60px); }
        .page-section { display: none; animation: fadeIn 0.3s; }
        .page-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* Cards */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        .stat-card { background: var(--card); border-radius: 16px; padding: 1.2rem; cursor: pointer; border: 1px solid var(--border); position: relative; overflow: hidden; }
        .stat-card::before { content: ''; position: absolute; top: 0; right: 0; width: 4px; height: 100%; background: var(--primary); }
        .stat-card:hover { transform: translateY(-3px); background: var(--card-light); }
        .stat-title { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.5rem; }
        .stat-value { font-size: 1.6rem; font-weight: 800; }
        .card-box { background: var(--card); border-radius: 16px; padding: 1.2rem; margin-bottom: 1.2rem; border: 1px solid var(--border); }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 10px; }
        
        /* Tables */
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th, .data-table td { padding: 10px 8px; text-align: right; border-bottom: 1px solid var(--border); }
        .data-table th { color: var(--text-muted); font-size: 0.75rem; }
        .data-table tr { cursor: pointer; transition: 0.1s; }
        .data-table tr:hover { background: rgba(59,130,246,0.1); }
        
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; }
        .badge-success { background: rgba(16,185,129,0.2); color: #34d399; }
        .badge-warning { background: rgba(245,158,11,0.2); color: #fbbf24; }
        .badge-danger { background: rgba(239,68,68,0.2); color: #f87171; }
        
        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; }
        .modal.show { display: flex; }
        .modal-content { background: var(--card); border-radius: 20px; max-width: 600px; width: 90%; padding: 1.5rem; max-height: 85vh; overflow-y: auto; }
        
        /* Form */
        input, select, textarea { width: 100%; padding: 10px; margin: 8px 0; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .profit-positive { color: #34d399; }
        .profit-negative { color: #f87171; }
        
        /* Mobile */
        .mobile-menu-btn { display: none; position: fixed; bottom: 20px; left: 20px; background: var(--primary); width: 50px; height: 50px; border-radius: 50%; z-index: 200; cursor: pointer; align-items: center; justify-content: center; }
        body.mobile-view .sidebar { transform: translateX(100%); }
        body.mobile-view .main-content { margin-right: 0; }
        body.mobile-view .sidebar.open { transform: translateX(0); }
        body.mobile-view .mobile-menu-btn { display: flex; }
        @media (max-width: 768px) { body:not(.mobile-view) .sidebar { width: 70px; } body:not(.mobile-view) .sidebar span:not(i) { display: none; } body:not(.mobile-view) .main-content { margin-right: 70px; } }
    </style>
</head>
<body>

<div id="loginScreen" class="login-container">
    <div class="login-box">
        <h2><i class="fas fa-crown"></i> SIMO ERP</h2>
        <div id="loginForm">
            <input type="text" id="loginUsername" placeholder="اسم المستخدم">
            <input type="password" id="loginPassword" placeholder="كلمة المرور">
            <button class="btn btn-primary" onclick="doLogin()">دخول</button>
            <div class="switch-auth" onclick="showRegister()">ليس لديك حساب؟ <span>سجل الآن</span></div>
        </div>
        <div id="registerForm" style="display:none;">
            <input type="text" id="regName" placeholder="الاسم الكامل">
            <input type="text" id="regUsername" placeholder="اسم المستخدم">
            <input type="password" id="regPassword" placeholder="كلمة المرور">
            <select id="regRole">
                <option value="admin">مدير</option>
                <option value="accountant">محاسب</option>
                <option value="inventory">مخزني</option>
                <option value="cashier">كاشير</option>
            </select>
            <button class="btn btn-success" onclick="doRegister()">تسجيل</button>
            <div class="switch-auth" onclick="showLogin()">لديك حساب؟ <span>دخول</span></div>
        </div>
    </div>
</div>

<div id="mainApp" style="display:none;">
    <div class="top-header">
        <div class="header-logo"><i class="fas fa-crown"></i> SIMO ERP PRO</div>
        <div class="user-info">
            <span id="userName"></span>
            <span id="userRole" style="font-size:11px;background:var(--primary-dark);padding:2px 8px;border-radius:20px;"></span>
            <button class="logout-btn" onclick="logout()">خروج</button>
        </div>
    </div>

    <div class="sidebar" id="sidebar">
        <div class="menu-item active" data-page="dashboard"><i class="fas fa-tachometer-alt"></i> <span>الرئيسية</span></div>
        <div class="menu-item" data-page="inventory"><i class="fas fa-boxes"></i> <span>المخزون</span></div>
        <div class="menu-item" data-page="suppliers"><i class="fas fa-truck"></i> <span>الموردين</span></div>
        <div class="menu-item" data-page="purchases"><i class="fas fa-shopping-cart"></i> <span>المشتريات</span></div>
        <div class="menu-item" data-page="sales"><i class="fas fa-tag"></i> <span>المبيعات</span></div>
        <div class="menu-item" data-page="pos"><i class="fas fa-cash-register"></i> <span>نقطة البيع</span></div>
        <div class="menu-item" data-page="clients"><i class="fas fa-users"></i> <span>العملاء</span></div>
        <div class="menu-item" data-page="expenses_rev"><i class="fas fa-coins"></i> <span>المصروفات والإيرادات</span></div>
        <div class="menu-item" data-page="accounting"><i class="fas fa-book"></i> <span>دفتر الأستاذ</span></div>
        <div class="menu-item" data-page="trial_balance"><i class="fas fa-scale-balanced"></i> <span>ميزان المراجعة</span></div>
        <div class="menu-item" data-page="reports"><i class="fas fa-chart-pie"></i> <span>التقارير</span></div>
        <div class="menu-item" data-page="currencies"><i class="fas fa-money-bill-wave"></i> <span>العملات</span></div>
        <div class="menu-item" data-page="users"><i class="fas fa-users-cog"></i> <span>المستخدمين</span></div>
    </div>

    <div class="mobile-menu-btn" id="mobileMenuBtn"><i class="fas fa-bars"></i></div>
    <div class="main-content" id="mainContent"><div id="pageContent"></div></div>
</div>

<div id="detailsModal" class="modal" onclick="if(event.target===this) closeModal()">
    <div class="modal-content" id="modalContentInner"></div>
</div>

<script>
// ==================== قاعدة البيانات ====================
let db = {
    inventory: JSON.parse(localStorage.getItem('simo_inventory')) || [],
    sales: JSON.parse(localStorage.getItem('simo_sales')) || [],
    clients: JSON.parse(localStorage.getItem('simo_clients')) || [],
    suppliers: JSON.parse(localStorage.getItem('simo_suppliers')) || [],
    purchases: JSON.parse(localStorage.getItem('simo_purchases')) || [],
    expenses: JSON.parse(localStorage.getItem('simo_expenses')) || [],
    revenues: JSON.parse(localStorage.getItem('simo_revenues')) || [],
    journalEntries: JSON.parse(localStorage.getItem('simo_journal')) || [],
    users: JSON.parse(localStorage.getItem('simo_users')) || [
        { id: 1, name: 'المدير العام', username: 'admin', password: 'admin123', role: 'admin' },
        { id: 2, name: 'محمد محاسب', username: 'accountant', password: 'acc123', role: 'accountant' },
        { id: 3, name: 'سعيد مخزني', username: 'inventory', password: 'inv123', role: 'inventory' },
        { id: 4, name: 'خالد كاشير', username: 'cashier', password: 'cash123', role: 'cashier' }
    ],
    currencies: JSON.parse(localStorage.getItem('simo_currencies')) || [
        { code: 'SAR', name: 'ريال سعودي', symbol: 'ر.س', rate: 1 },
        { code: 'LYD', name: 'دينار ليبي', symbol: 'ل.د', rate: 0.78 },
        { code: 'USD', name: 'دولار أمريكي', symbol: '$', rate: 3.75 }
    ],
    settings: JSON.parse(localStorage.getItem('simo_settings')) || { nextInvoiceId: 1000, nextPurchaseId: 2000, currentCurrency: 'SAR' }
};

let currentUser = null;
let currentCurrency = db.settings.currentCurrency || 'SAR';
let charts = [];
let cart = [];

// ==================== دوال مساعدة ====================
function formatCurrency(amount) {
    let currency = db.currencies.find(c => c.code === currentCurrency);
    if(!currency) return amount.toLocaleString() + ' ر.س';
    return (amount * currency.rate).toLocaleString() + ' ' + currency.symbol;
}

function showNotification(msg, type = 'success') {
    let div = document.createElement('div');
    div.style.cssText = `position:fixed; bottom:20px; left:20px; background:${type === 'success' ? '#10b981' : '#ef4444'}; color:white; padding:10px 20px; border-radius:40px; z-index:1200;`;
    div.innerHTML = msg;
    document.body.appendChild(div);
    setTimeout(() => div.remove(), 2500);
}

function saveAll() {
    localStorage.setItem('simo_inventory', JSON.stringify(db.inventory));
    localStorage.setItem('simo_sales', JSON.stringify(db.sales));
    localStorage.setItem('simo_clients', JSON.stringify(db.clients));
    localStorage.setItem('simo_suppliers', JSON.stringify(db.suppliers));
    localStorage.setItem('simo_purchases', JSON.stringify(db.purchases));
    localStorage.setItem('simo_expenses', JSON.stringify(db.expenses));
    localStorage.setItem('simo_revenues', JSON.stringify(db.revenues));
    localStorage.setItem('simo_journal', JSON.stringify(db.journalEntries));
    localStorage.setItem('simo_users', JSON.stringify(db.users));
    localStorage.setItem('simo_currencies', JSON.stringify(db.currencies));
    localStorage.setItem('simo_settings', JSON.stringify(db.settings));
}

function todayISO() { let d = new Date(); return `${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,'0')}-${d.getDate().toString().padStart(2,'0')}`; }

function addJournalEntry(description, debitAccount, creditAccount, amount, referenceId = null) {
    db.journalEntries.push({
        id: Date.now(),
        date: todayISO(),
        description: description,
        debitAccount: debitAccount,
        creditAccount: creditAccount,
        amount: amount,
        referenceId: referenceId
    });
    saveAll();
}

function totalSales() { return db.sales.reduce((s,i) => s + (i.total || 0), 0); }
function totalPurchases() { return db.purchases.reduce((s,i) => s + (i.total || 0), 0); }
function totalExpenses() { return db.expenses.reduce((s,i) => s + (i.amount || 0), 0); }
function totalRevenues() { return db.revenues.reduce((s,i) => s + (i.amount || 0), 0); }
function netProfit() { return totalSales() - totalPurchases() - totalExpenses() + totalRevenues(); }
function inventoryValue() { return db.inventory.reduce((s,i) => s + ((i.qty||0) * (i.costPrice||0)), 0); }
function getLowStockCount() { return db.inventory.filter(i => (i.qty||0) <= 5).length; }
function destroyCharts() { charts.forEach(c => c.destroy()); charts = []; }

function hasPermission(roles) {
    if(!currentUser) return false;
    if(currentUser.role === 'admin') return true;
    return roles.includes(currentUser.role);
}

function updateMenuByRole() {
    document.querySelectorAll('.menu-item').forEach(item => {
        let page = item.dataset.page;
        if(page === 'users' && !hasPermission(['admin'])) item.classList.add('disabled');
        else item.classList.remove('disabled');
    });
}

// ==================== المصادقة ====================
function showRegister() {
    document.getElementById('loginForm').style.display = 'none';
    document.getElementById('registerForm').style.display = 'block';
}
function showLogin() {
    document.getElementById('loginForm').style.display = 'block';
    document.getElementById('registerForm').style.display = 'none';
}
function doLogin() {
    let username = document.getElementById('loginUsername').value;
    let password = document.getElementById('loginPassword').value;
    let user = db.users.find(u => u.username === username && u.password === password);
    if(user) {
        currentUser = user;
        localStorage.setItem('simo_current_user', JSON.stringify(user));
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        document.getElementById('userName').innerText = user.name;
        document.getElementById('userRole').innerText = user.role === 'admin' ? 'مدير' : (user.role === 'accountant' ? 'محاسب' : (user.role === 'inventory' ? 'مخزني' : 'كاشير'));
        updateMenuByRole();
        showNotification(`مرحباً ${user.name}`);
        switchPage('dashboard');
    } else {
        showNotification('اسم المستخدم أو كلمة المرور غير صحيحة', 'error');
    }
}
function doRegister() {
    let name = document.getElementById('regName').value;
    let username = document.getElementById('regUsername').value;
    let password = document.getElementById('regPassword').value;
    let role = document.getElementById('regRole').value;
    if(!name || !username || !password) { showNotification('جميع الحقول مطلوبة', 'error'); return; }
    if(db.users.find(u => u.username === username)) { showNotification('اسم المستخدم موجود', 'error'); return; }
    db.users.push({ id: Date.now(), name, username, password, role });
    saveAll();
    showNotification('تم التسجيل بنجاح');
    showLogin();
}
function logout() {
    currentUser = null;
    localStorage.removeItem('simo_current_user');
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('mainApp').style.display = 'none';
    showNotification('تم تسجيل الخروج');
}

// ==================== العملات ====================
function setCurrency(code) {
    currentCurrency = code;
    db.settings.currentCurrency = code;
    saveAll();
    showNotification(`تم تغيير العملة`);
    if(document.querySelector('.page-section.active')?.id === 'dashboard') renderDashboard();
    else renderCurrencies();
}
function addCurrency() {
    let code = prompt('رمز العملة:');
    if(!code) return;
    let name = prompt('اسم العملة:');
    let symbol = prompt('الرمز:');
    let rate = parseFloat(prompt('سعر الصرف:'));
    db.currencies.push({ code: code.toUpperCase(), name, symbol, rate });
    saveAll();
    showNotification(`تم إضافة عملة ${name}`);
    renderCurrencies();
}

// ==================== إدارة المنتجات ====================
function addProduct() {
    let name = prompt('اسم المنتج:'); if(!name) return;
    let qty = parseInt(prompt('الكمية:')) || 0;
    let costPrice = parseFloat(prompt('سعر الشراء:')) || 0;
    let sellPrice = parseFloat(prompt('سعر البيع:')) || 0;
    db.inventory.push({ id: Date.now(), name, qty, costPrice, sellPrice });
    saveAll();
    showNotification(`تم إضافة ${name}`);
    renderInventory();
}
function deleteProduct(id) {
    if(confirm('حذف المنتج؟')) {
        db.inventory = db.inventory.filter(p => p.id !== id);
        saveAll();
        showNotification('تم الحذف');
        renderInventory();
    }
}

function addSupplier() {
    let name = prompt('اسم المورد:'); if(!name) return;
    db.suppliers.push({ id: Date.now(), name, phone: prompt('الهاتف:') || '' });
    saveAll();
    showNotification(`تم إضافة ${name}`);
    renderSuppliers();
}

function addPurchase() {
    if(db.suppliers.length === 0) { showNotification('أضف مورد أولا', 'error'); return; }
    let supplier = db.suppliers[0];
    let productName = prompt('اسم المنتج:'); if(!productName) return;
    let qty = parseInt(prompt('الكمية:')) || 0;
    let price = parseFloat(prompt('سعر الوحدة:')) || 0;
    let total = qty * price;
    let paid = parseFloat(prompt('المدفوع:')) || 0;
    let newId = db.settings.nextPurchaseId++;
    db.purchases.push({ id: newId, supplierId: supplier.id, supplierName: supplier.name, productName, qty, price, total, paid, status: paid >= total ? 'مدفوع' : 'آجل', dateISO: todayISO() });
    let existing = db.inventory.find(p => p.name === productName);
    if(existing) { existing.qty += qty; existing.costPrice = price; }
    else { db.inventory.push({ id: Date.now(), name: productName, qty, costPrice: price, sellPrice: price * 1.3 }); }
    addJournalEntry(`شراء #${newId} من ${supplier.name}`, 'المخزون', 'الموردين', total);
    saveAll();
    showNotification(`تمت فاتورة شراء بمبلغ ${formatCurrency(total)}`);
    renderPurchases();
}

function addClient() {
    let name = prompt('اسم العميل:'); if(!name) return;
    db.clients.push({ id: Date.now(), name, phone: prompt('الهاتف:') || '' });
    saveAll();
    showNotification(`تم إضافة ${name}`);
    renderClients();
}

function addSale() {
    if(db.inventory.length === 0) { showNotification('لا توجد منتجات', 'error'); return; }
    let product = db.inventory[0];
    let qty = parseInt(prompt(`الكمية المتاحة: ${product.qty}`)) || 1;
    if(qty > product.qty) { showNotification('كمية غير متوفرة', 'error'); return; }
    let total = qty * (product.sellPrice || product.costPrice * 1.3);
    let paid = parseFloat(prompt('المدفوع:')) || 0;
    let clientName = prompt('اسم العميل:', 'عميل نقدي');
    let newId = db.settings.nextInvoiceId++;
    product.qty -= qty;
    let status = paid >= total ? 'مدفوع' : 'آجل';
    let sale = { id: newId, clientName: clientName || 'عميل نقدي', productName: product.name, qty, price: product.sellPrice || product.costPrice * 1.3, total, paid, status, dateISO: todayISO() };
    db.sales.push(sale);
    addJournalEntry(`مبيعات #${newId}`, paid >= total ? 'النقدية' : 'العملاء', 'المبيعات', total);
    saveAll();
    showNotification(`تمت فاتورة ${formatCurrency(total)}`);
    renderSales();
}

function viewInvoiceDetails(id) {
    let sale = db.sales.find(s => s.id === id);
    if(!sale) return;
    let remaining = (sale.total || 0) - (sale.paid || 0);
    let html = `
        <h2 style="color:var(--primary);margin-bottom:15px;">🧾 فاتورة #${sale.id}</h2>
        <hr>
        <div><strong>التاريخ:</strong> ${sale.dateISO}</div>
        <div><strong>العميل:</strong> ${sale.clientName}</div>
        <div><strong>المنتج:</strong> ${sale.productName}</div>
        <div><strong>الكمية:</strong> ${sale.qty}</div>
        <div><strong>السعر:</strong> ${formatCurrency(sale.price)}</div>
        <div><strong>الإجمالي:</strong> ${formatCurrency(sale.total)}</div>
        <div><strong>المدفوع:</strong> ${formatCurrency(sale.paid || 0)}</div>
        <div><strong>المتبقي:</strong> ${formatCurrency(remaining)}</div>

            <button class="btn btn-warning" onclick="editInvoice(${sale.id})"><i class="fas fa-edit"></i> تعديل</button>

            <button class="btn btn-success" onclick="recordPayment(${sale.id})"><i class="fas fa-money-bill-wave"></i> تسديد</button>

function editInvoice(id) {
    let sale = db.sales.find(s => s.id === id);
    if(!sale) return;
    let html = `
        <h2 style="color:var(--primary);">✏️ تعديل الفاتورة #${sale.id}</h2>
        <hr>
        <div class="grid-2">
            <div><label>العميل</label><input type="text" id="editClientName" value="${sale.clientName}"></div>
            <div><label>المنتج</label><input type="text" id="editProductName" value="${sale.productName}"></div>
            <div><label>الكمية</label><input type="number" id="editQty" value="${sale.qty}"></div>
            <div><label>السعر</label><input type="number" id="editPrice" value="${sale.price}"></div>
            <div><label>المدفوع</label><input type="number" id="editPaid" value="${sale.paid || 0}"></div>
        </div>
        <div class="flex-between" style="margin-top:15px;">
            <button class="btn btn-success" onclick="updateInvoice(${sale.id})">حفظ</button>
            <button class="btn btn-danger" onclick="closeModal()">إلغاء</button>
        </div>
    `;
    openModal(html);
}

function updateInvoice(id) {
    let sale = db.sales.find(s => s.id === id);
    if(!sale) return;
    let newClientName = document.getElementById('editClientName')?.value || sale.clientName;
    let newProductName = document.getElementById('editProductName')?.value || sale.productName;
    let newQty = parseFloat(document.getElementById('editQty')?.value) || sale.qty;
    let newPrice = parseFloat(document.getElementById('editPrice')?.value) || sale.price;
    let newPaid = parseFloat(document.getElementById('editPaid')?.value) || sale.paid || 0;
    let newTotal = newQty * newPrice;
    let newStatus = newPaid >= newTotal ? 'مدفوع' : 'آجل';
    
    let oldProduct = db.inventory.find(p => p.name === sale.productName);
    let newProduct = db.inventory.find(p => p.name === newProductName);
    
    if(oldProduct && sale.productName !== newProductName) {
        oldProduct.qty += sale.qty;
        if(newProduct) newProduct.qty -= newQty;
    } else if(oldProduct) {
        oldProduct.qty = oldProduct.qty + sale.qty - newQty;
    }
    
    sale.clientName = newClientName;
    sale.productName = newProductName;
    sale.qty = newQty;
    sale.price = newPrice;
    sale.total = newTotal;
    sale.paid = newPaid;
    sale.status = newStatus;
    
    saveAll();
    showNotification('تم تعديل الفاتورة بنجاح');
    closeModal();
    renderSales();
}

function deleteInvoice(id) {
    if(confirm('هل أنت متأكد من حذف هذه الفاتورة؟')) {
        let sale = db.sales.find(s => s.id === id);
        if(sale) {
            let product = db.inventory.find(p => p.name === sale.productName);
            if(product) product.qty += sale.qty;
            db.sales = db.sales.filter(s => s.id !== id);
            db.journalEntries = db.journalEntries.filter(j => j.referenceId !== id);
            saveAll();
            showNotification('تم حذف الفاتورة');
            renderSales();
        }
    }
}

function recordPayment(id) {
    let sale = db.sales.find(s => s.id === id);
    if(!sale) return;
    let remaining = (sale.total || 0) - (sale.paid || 0);
    let amount = parseFloat(prompt(`المبلغ المتبقي: ${formatCurrency(remaining)}\nأدخل مبلغ الدفعة:`, remaining));
    if(isNaN(amount) || amount <= 0) return;
    let newPaid = (sale.paid || 0) + amount;
    sale.paid = newPaid;
    sale.status = newPaid >= sale.total ? 'مدفوع' : 'آجل';
    addJournalEntry(`دفعة على فاتورة #${sale.id}`, 'النقدية', 'العملاء', amount, sale.id);
    saveAll();
    showNotification(`تم تسجيل دفعة ${formatCurrency(amount)}`);
    renderSales();
}

function addToCart(id) {
    let p = db.inventory.find(p => p.id === id);
    if(p && p.qty > 0) {
        let existing = cart.find(i => i.id === id);
        if(existing) { existing.qty++; existing.total = existing.qty * existing.price; }
        else { cart.push({ id: p.id, name: p.name, price: p.sellPrice || p.costPrice * 1.3, qty: 1, total: p.sellPrice || p.costPrice * 1.3 }); }
        p.qty--; saveAll(); renderCart(); showNotification(`✅ تم إضافة ${p.name}`);
    } else showNotification('⚠️ الكمية غير متوفرة', 'error');
}
function renderCart() {
    let div = document.getElementById('cartDisplay');
    let totalDiv = document.getElementById('cartTotal');
    if(div) div.innerHTML = cart.map((item,i) => `<div style="background:var(--card-light);padding:8px;margin:5px;border-radius:8px;display:flex;justify-content:space-between;"><span>${item.name} x${item.qty} = ${formatCurrency(item.total)}</span><button class="btn btn-danger btn-sm" onclick="removeFromCart(${i})">🗑️</button></div>`).join('');
    let total = cart.reduce((s,i) => s + i.total, 0);
    if(totalDiv) totalDiv.innerText = `الإجمالي: ${formatCurrency(total)}`;
}
function removeFromCart(index) { cart.splice(index,1); renderCart(); }
function checkoutPOS() {
    if(cart.length === 0) { showNotification('⚠️ السلة فارغة', 'error'); return; }
    let total = cart.reduce((s,i) => s + i.total, 0);
    let paid = parseFloat(prompt('المبلغ المدفوع:', total)) || 0;
    let clientName = document.getElementById('posClientName')?.value || 'عميل نقدي';
    let newId = db.settings.nextInvoiceId++;
    db.sales.push({ id: newId, clientName, productName: cart.map(i => i.name).join(', '), qty: cart.reduce((s,i) => s + i.qty, 0), price: total / cart.reduce((s,i) => s + i.qty, 0), total, paid, status: paid >= total ? 'مدفوع' : 'آجل', dateISO: todayISO() });
    addJournalEntry(`مبيعات #${newId}`, paid >= total ? 'النقدية' : 'العملاء', 'المبيعات', total);
    saveAll(); cart = []; showNotification(`✅ تمت الفاتورة ${formatCurrency(total)}`); renderPOS();
}

function renderCurrencies() {
    let html = `<div class="card-box"><div class="card-header"><h3>💱 إدارة العملات</h3><button class="btn btn-success" onclick="addCurrency()">+ عملة جديدة</button></div><div style="overflow-x:auto"><table class="data-table"><thead><th>العملة</th><th>الرمز</th><th>سعر الصرف</th><th></th></thead><tbody>${db.currencies.map(c => `<tr><td><strong>${c.name}</strong> ${c.code === currentCurrency ? '✅' : ''}</td><td>${c.symbol}</td><td><input type="number" id="rate_${c.code}" value="${c.rate}" step="0.01" style="width:100px;"></td><td><button class="btn btn-primary btn-sm" onclick="updateCurrency('${c.code}')">تحديث</button> <button class="btn btn-success btn-sm" onclick="setCurrency('${c.code}')">تعيين</button></td></tr>`).join('')}</tbody></div></div>`;
    document.getElementById('pageContent').innerHTML = html;
}
function updateCurrency(code) { let rate = parseFloat(document.getElementById(`rate_${code}`).value); let currency = db.currencies.find(c => c.code === code); if(currency) currency.rate = rate; saveAll(); showNotification(`تم تحديث سعر ${code}`); renderCurrencies(); }

function renderUsers() {
    if(currentUser?.role !== 'admin') { document.getElementById('pageContent').innerHTML = '<div class="card-box"><h3>⛔ غير مصرح</h3><p>هذه الصفحة مخصصة للمدير فقط</p></div>'; return; }
    let html = `<div class="card-box"><div class="card-header"><h3>👥 إدارة المستخدمين</h3><button class="btn btn-success" onclick="addUser()">+ مستخدم جديد</button></div><div style="overflow-x:auto"><table class="data-table"><thead><th>الاسم</th><th>اسم المستخدم</th><th>الدور</th><th></th></thead><tbody>${db.users.map(u => `<tr><td><strong>${u.name}</strong></td><td>${u.username}</td><td><span class="badge badge-info">${u.role}</span></td><td>${u.id !== currentUser?.id ? `<button class="btn btn-danger btn-sm" onclick="deleteUser(${u.id})">حذف</button>` : '—'}</td></tr>`).join('')}</tbody></div><div>عدد المستخدمين: ${db.users.length}</div></div>`;
    document.getElementById('pageContent').innerHTML = html;
}
function addUser() { let name = prompt('الاسم الكامل:'); if(!name) return; let username = prompt('اسم المستخدم:'); let password = prompt('كلمة المرور:'); let role = prompt('الصلاحية (admin/accountant/inventory/cashier):'); if(!['admin','accountant','inventory','cashier'].includes(role)) { showNotification('صلاحية غير صحيحة', 'error'); return; } db.users.push({ id: Date.now(), name, username, password, role }); saveAll(); showNotification(`تم إضافة ${name}`); renderUsers(); }
function deleteUser(id) { if(id === currentUser?.id) { showNotification('لا يمكن حذف نفسك', 'error'); return; } if(confirm('حذف المستخدم؟')) { db.users = db.users.filter(u => u.id !== id); saveAll(); showNotification('تم الحذف'); renderUsers(); } }

function openModal(html) { document.getElementById('modalContentInner').innerHTML = html; document.getElementById('detailsModal').classList.add('show'); }
function closeModal() { document.getElementById('detailsModal').classList.remove('show'); }

function switchPage(pageId) {
    document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
    let act = document.querySelector(`.menu-item[data-page="${pageId}"]`);
    if(act && !act.classList.contains('disabled')) act.classList.add('active');
    destroyCharts();
    if(pageId === 'dashboard') renderDashboard();
    else if(pageId === 'inventory') renderInventory();
    else if(pageId === 'suppliers') renderSuppliers();
    else if(pageId === 'purchases') renderPurchases();
    else if(pageId === 'sales') renderSales();
    else if(pageId === 'pos') renderPOS();
    else if(pageId === 'clients') renderClients();
    else if(pageId === 'expenses_rev') renderExpensesRevenues();
    else if(pageId === 'accounting') renderAccounting();
    else if(pageId === 'trial_balance') renderTrialBalance();
    else if(pageId === 'reports') renderReports();
    else if(pageId === 'currencies') renderCurrencies();
    else if(pageId === 'users') renderUsers();
}
