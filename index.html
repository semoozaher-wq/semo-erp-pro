<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEMO ERP | نظام الإدارة المتكامل</title>
    <style>
        /* تنسيق الواجهة - الوضع الداكن */
        body { 
            background: #0f172a; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
        }
        .card { 
            background: #1e293b; 
            padding: 40px; 
            border-radius: 20px; 
            width: 380px; 
            text-align: center; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); 
            border: 1px solid #334155; 
        }
        h1 { 
            color: #3b82f6; 
            margin-bottom: 25px; 
            font-size: 28px;
            letter-spacing: 1px;
        }
        input { 
            width: 100%; 
            padding: 14px; 
            margin: 12px 0; 
            border-radius: 10px; 
            border: 1px solid #334155; 
            outline: none; 
            font-size: 16px; 
            background: #0f172a; 
            color: white; 
            box-sizing: border-box; 
            transition: 0.3s;
        }
        input:focus { 
            border-color: #3b82f6; 
            box-shadow: 0 0 8px rgba(59, 130, 246, 0.4); 
        }
        .btn { 
            width: 100%; 
            padding: 14px; 
            background: #3b82f6; 
            border: none; 
            color: white; 
            font-weight: bold; 
            border-radius: 10px; 
            cursor: pointer; 
            margin-top: 15px; 
            font-size: 17px; 
            transition: 0.3s;
        }
        .btn:hover { 
            background: #2563eb; 
            transform: translateY(-2px);
        }
        .link { 
            color: #94a3b8; 
            cursor: pointer; 
            display: block; 
            margin-top: 20px; 
            font-size: 14px; 
            text-decoration: none; 
        }
        .link:hover { 
            color: #3b82f6; 
            text-decoration: underline; 
        }
        .hidden { 
            display: none; 
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>SEMO ERP</h1>

        <!-- صندوق تسجيل الدخول -->
        <div id="login-box">
            <input type="text" id="l-id" placeholder="الإيميل أو رقم الهاتف">
            <input type="password" id="l-p" placeholder="كلمة المرور">
            <button class="btn" onclick="login()">دخول للنظام</button>
            <span class="link" onclick="toggle()">ليس لديك حساب؟ تأسيس حساب جديد</span>
        </div>

        <!-- صندوق إنشاء حساب جديد -->
        <div id="signup-box" class="hidden">
            <input type="email" id="s-e" placeholder="البريد الإلكتروني">
            <input type="text" id="s-ph" placeholder="رقم الهاتف">
            <input type="password" id="s-p" placeholder="كلمة المرور">
            <button class="btn" style="background:#10b981" onclick="signup()">تفعيل الحساب الآن</button>
            <span class="link" onclick="toggle()">لديك حساب بالفعل؟ تسجيل الدخول</span>
        </div>
    </div>

    <!-- ربط ملف الجافا سكريبت من مجلد js -->
    <script type="module" src="js/main.js"></script>

</body>
</html>
