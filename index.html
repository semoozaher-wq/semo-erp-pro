<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>ERP PRO ULTIMATE - النسخة النهائية</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}
:root{--bg:#f0f4f8;--card:#fff;--primary:#0d9488;--pd:#0f766e;--pl:rgba(13,148,136,.12);--success:#10b981;--danger:#ef4444;--warning:#f59e0b;--info:#3b82f6;--text:#0f172a;--muted:#64748b;--border:#e2e8f0}
.dark{--bg:#0c1222;--card:#1a2332;--primary:#14b8a6;--pd:#0d9488;--text:#e2e8f0;--muted:#94a3b8;--border:#2d3a4a}
body{background:var(--bg);color:var(--text);direction:rtl;transition:all .3s}
.login-screen{display:flex;justify-content:center;align-items:center;min-height:100vh;background:linear-gradient(160deg,#0a1628,#0d3d38)}
.login-box{background:rgba(255,255,255,.1);backdrop-filter:blur(20px);padding:40px 32px;border-radius:28px;width:400px;max-width:100%;text-align:center}
.login-logo{font-size:2rem;font-weight:900;background:linear-gradient(135deg,#14b8a6,#059669);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.lf{position:relative;margin-bottom:14px}
.lf i{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:#64748b}
.lf input{width:100%;padding:13px 44px;border:2px solid rgba(255,255,255,.2);border-radius:14px;background:rgba(255,255,255,.05);color:#fff;outline:none}
.btn-login{background:#14b8a6;color:#fff;border:none;padding:13px;border-radius:14px;width:100%;cursor:pointer;font-weight:700;margin-top:10px}
.login-link{margin-top:15px;color:#14b8a6;cursor:pointer}
.app{display:none}
.top-bar{background:var(--card);padding:12px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);position:sticky;top:0}
.logo{font-size:1.2rem;font-weight:900;background:linear-gradient(135deg,var(--primary),#059669);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.top-actions{display:flex;gap:10px}
.top-actions button{background:none;border:none;cursor:pointer;color:var(--muted);font-size:16px}
.user-badge{background:var(--pl);color:var(--primary);padding:4px 12px;border-radius:20px;font-size:12px}
.menu{display:flex;justify-content:center;background:var(--card);padding:8px;gap:4px;flex-wrap:wrap;border-bottom:1px solid var(--border);position:sticky;top:54px}
.mi{text-align:center;cursor:pointer;padding:8px 12px;border-radius:12px;min-width:58px;color:var(--muted)}
.mi:hover{background:var(--pl);color:var(--primary)}
.mi.active{background:linear-gradient(135deg,var(--primary),var(--pd));color:#fff}
.mi i{font-size:17px;display:block}
.mi span{font-size:9.5px}
.content{padding:20px;max-width:1400px;margin:0 auto}
.card{background:var(--card);border-radius:16px;padding:22px;margin-bottom:20px;border:1px solid var(--border)}
.ct{font-weight:800;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.ch{display:flex;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap}
.btn{padding:7px 16px;border-radius:10px;border:none;cursor:pointer;font-weight:700;display:inline-flex;align-items:center;gap:5px}
.bp{background:var(--primary);color:#fff}
.bd{background:#ef4444;color:#fff}
.bs{background:#10b981;color:#fff}
.bi{background:#3b82f6;color:#fff}
.bg{background:transparent;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:10px 12px;text-align:right;border-bottom:1px solid var(--border)}
th{background:var(--bg);color:var(--muted)}
input,select{width:100%;padding:10px;border:2px solid var(--border);border-radius:12px;background:var(--card);color:var(--text)}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:11px;margin-bottom:4px;color:var(--muted)}
.badge{padding:3px 9px;border-radius:20px;font-size:10px;display:inline-block}
.bs2{background:#d1fae5;color:#059669}
.bw2{background:#fef3c7;color:#b45309}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);z-index:1000;justify-content:center;align-items:center}
.mc{background:var(--card);border-radius:20px;width:90%;max-width:700px;max-height:85vh;overflow-y:auto;padding:25px}
.toast-c{position:fixed;bottom:20px;left:20px;z-index:2000}
.toast{background:#333;color:#fff;padding:10px 18px;border-radius:10px;margin-bottom:8px;font-size:13px}
.sb{background:var(--pl);padding:12px;border-radius:12px;margin-bottom:15px;display:flex;gap:20px;flex-wrap:wrap}
.tbl{overflow-x:auto}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:15px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:15px}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.sc{background:var(--card);border-radius:16px;padding:16px;text-align:center;border:1px solid var(--border);cursor:pointer}
.sc .si{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 10px}
.sc h3{font-size:1.3rem}
.pos-l{display:grid;grid-template-columns:1fr 350px;gap:15px}
.pos-g{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}
.pos-item{background:var(--bg);border:2px solid var(--border);border-radius:12px;padding:12px;text-align:center;cursor:pointer}
.pos-item h4{font-size:12px}
.pci{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px}
.qc{display:flex;gap:5px}
.pt{border-top:2px solid var(--border);padding-top:10px}
.pt .pl{display:flex;justify-content:space-between;margin-bottom:5px}
@media(max-width:768px){.g2,.g3,.pos-l{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- شاشة تسجيل الدخول -->
<div id="loginScreen" class="login-screen">
  <div class="login-box" id="loginDiv">
    <div class="login-logo">🏢 ERP PRO ULTIMATE</div>
    <div class="login-sub" style="color:#94a3b8;font-size:13px;margin:10px 0">نظام محاسبي متكامل • القيد المزدوج</div>
    <div class="lf"><i class="fas fa-user"></i><input type="text" id="loginUser" placeholder="اسم المستخدم" value="admin"></div>
    <div class="lf"><i class="fas fa-lock"></i><input type="password" id="loginPass" placeholder="كلمة المرور" value="admin123"></div>
    <button class="btn-login" onclick="doLogin()"><i class="fas fa-sign-in-alt"></i> تسجيل الدخول</button>
    <div class="login-link" onclick="showRegister()">ليس لديك حساب؟ إنشاء حساب جديد</div>
  </div>
  <div class="login-box" id="registerDiv" style="display:none">
    <div class="login-logo">📝 إنشاء حساب</div>
    <div class="lf"><i class="fas fa-user"></i><input type="text" id="regName" placeholder="الاسم الكامل"></div>
    <div class="lf"><i class="fas fa-user"></i><input type="text" id="regUser" placeholder="اسم المستخدم"></div>
    <div class="lf"><i class="fas fa-lock"></i><input type="password" id="regPass" placeholder="كلمة المرور"></div>
    <button class="btn-login" onclick="doRegister()">إنشاء الحساب</button>
    <div class="login-link" onclick="showLogin()">تسجيل الدخول</div>
  </div>
</div>

<!-- التطبيق -->
<div id="app" class="app">
  <header class="top-bar">
    <div class="logo" id="topLogo">ERP PRO ULTIMATE</div>
    <div class="top-actions">
      <span class="user-badge" id="userBadge"></span>
      <button onclick="toggleDark()"><i class="fas fa-moon" id="darkIcon"></i></button>
      <button onclick="logout()" style="color:var(--danger)"><i class="fas fa-sign-out-alt"></i></button>
    </div>
  </header>
  <nav class="menu" id="menuBar"></nav>
  <main class="content" id="pageContent"></main>
</div>

<!-- النوافذ المنبثقة -->
<div id="modal" class="modal" onclick="if(event.target===this)closeModal()"><div class="mc" id="modalBody"></div></div>
<div class="toast-c" id="toastBox"></div>

<script>
// ====================== البيانات الأساسية ======================
let currentUser = null;
let currency = 'LYD';
let isDark = false;
let activePage = 'dashboard';
let posCart = [];
let logs = [];
let charts = [];
let saleItems = [];
let quotesItems = [];
let companyInfo = { name: 'شركتي', phone: '', address: '', taxNo: '' };
let themeColor = '#0d9488';
let lowStock = 5;
let taxRate = 15;

const RATES = { LYD: 1, SAR: 1.28, USD: 3.75, EGP: 0.048, AED: 1.02 };
const EXPENSE_CATS = ['إيجار', 'رواتب', 'كهرباء', 'إنترنت', 'صيانة', 'تسويق', 'مستلزمات', 'أخرى'];

let db = {
  inventory: [
    { id: 1, name: 'مكتب خشبي فاخر', cat: 'أثاث', qty: 20, buy: 1500, sell: 2500 },
    { id: 2, name: 'كرسي دوار مريح', cat: 'أثاث', qty: 35, buy: 500, sell: 900 },
    { id: 3, name: 'طابعة HP LaserJet', cat: 'إلكترونيات', qty: 12, buy: 2200, sell: 3500 },
    { id: 4, name: 'لابتوب Dell Inspiron', cat: 'إلكترونيات', qty: 8, buy: 3500, sell: 5500 }
  ],
  suppliers: [
    { id: 1, name: 'شركة العالمية', phone: '0555555555', address: 'الرياض', cat: 'أثاث', balance: 0 },
    { id: 2, name: 'مصنع التقنية', phone: '0566666666', address: 'جدة', cat: 'إلكترونيات', balance: 0 }
  ],
  clients: [
    { id: 1, name: 'شركة الأهرام', phone: '0512345678', address: 'الرياض', balance: 0 },
    { id: 2, name: 'مؤسسة النور', phone: '0587654321', address: 'جدة', balance: 0 }
  ],
  purchases: [],
  sales: [],
  quotes: [],
  returns: [],
  expenses: [],
  users: [{ id: 1, name: 'المدير العام', username: 'admin', password: 'admin123', role: 'admin' }],
  journal: [],
  nids: { inv: 100, sup: 100, cli: 100, pur: 1000, sale: 2000, exp: 100, jnl: 1000, pos: 3000, qte: 4000, ret: 5000 }
};

const PAGES = [
  { id: 'dashboard', icon: 'fa-th-large', label: 'الرئيسية' },
  { id: 'inventory', icon: 'fa-boxes-stacked', label: 'المخزون' },
  { id: 'suppliers', icon: 'fa-truck-field', label: 'الموردين' },
  { id: 'purchases', icon: 'fa-cart-shopping', label: 'المشتريات' },
  { id: 'quotes', icon: 'fa-file-lines', label: 'عروض أسعار' },
  { id: 'sales', icon: 'fa-file-invoice-dollar', label: 'المبيعات' },
  { id: 'returns', icon: 'fa-rotate-left', label: 'المرتجعات' },
  { id: 'clients', icon: 'fa-user-group', label: 'العملاء' },
  { id: 'pos', icon: 'fa-cash-register', label: 'نقطة البيع' },
  { id: 'expenses', icon: 'fa-money-bill-trend-up', label: 'المصروفات' },
  { id: 'accounting', icon: 'fa-scale-balanced', label: 'المحاسبة' },
  { id: 'reports', icon: 'fa-chart-bar', label: 'التقارير' },
  { id: 'settings', icon: 'fa-gear', label: 'الإعدادات' },
  { id: 'backup', icon: 'fa-cloud-arrow-down', label: 'النسخ الاحتياطي' }
];

// ====================== دوال مساعدة ======================
function $(id) { return document.getElementById(id); }
function fmt(n) { let r = RATES[currency] || 1; return (n * r).toLocaleString('ar', { minimumFractionDigits: 2 }) + ' ' + currency; }
function today() { let d = new Date(); return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0'); }
function nid(k) { db.nids[k] = (db.nids[k] || 1000) + 1; return db.nids[k]; }
function isAdmin() { return currentUser && currentUser.role === 'admin'; }
function esc(s) { return String(s || '').replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }

function toast(msg, type) {
  let el = document.createElement('div');
  el.className = 'toast';
  el.innerHTML = '<i class="fas ' + (type === 'success' ? 'fa-check-circle' : 'fa-info-circle') + '"></i> ' + msg;
  $('toastBox').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function save() {
  try {
    let data = JSON.stringify({ db, logs, companyInfo, currency, themeColor, lowStock, taxRate });
    let enc = CryptoJS.AES.encrypt(data, 'erp_key').toString();
    localStorage.setItem('erp_data', enc);
  } catch(e) {}
}

function load() {
  try {
    let enc = localStorage.getItem('erp_data');
    if (enc) {
      let dec = CryptoJS.AES.decrypt(enc, 'erp_key').toString(CryptoJS.enc.Utf8);
      if (dec) {
        let obj = JSON.parse(dec);
        if (obj.db) db = obj.db;
        if (obj.logs) logs = obj.logs;
        if (obj.companyInfo) companyInfo = obj.companyInfo;
        if (obj.currency) currency = obj.currency;
        if (obj.lowStock) lowStock = obj.lowStock;
        if (obj.taxRate) taxRate = obj.taxRate;
      }
    }
  } catch(e) {}
}

function addLog(action, detail) {
  if (!currentUser) return;
  logs.unshift({ user: currentUser.name, action: action, detail: detail, time: new Date().toISOString() });
  if (logs.length > 300) logs.pop();
  save();
}

// ====================== المحاسبة ======================
function je(desc, date, lines) {
  db.journal.push({ id: nid('jnl'), date: date || today(), desc: desc, lines: lines });
}
function accBalance(code) {
  let bal = 0;
  db.journal.forEach(e => e.lines.forEach(l => { if (l.acc === code) bal += (l.d || 0) - (l.c || 0); }));
  return bal;
}
function trialBalance() {
  let accounts = [
    { code: '1100', name: 'الصندوق' }, { code: '1200', name: 'البنك' },
    { code: '1300', name: 'ذمم مدينة' }, { code: '1400', name: 'المخزون' },
    { code: '2100', name: 'ذمم دائنة' }, { code: '2200', name: 'ضريبة القيمة' },
    { code: '4100', name: 'إيرادات المبيعات' }, { code: '5100', name: 'تكلفة البضاعة' },
    { code: '5200', name: 'المصروفات' }
  ];
  return accounts.map(a => {
    let bal = accBalance(a.code);
    return { ...a, debit: bal > 0 ? bal : 0, credit: bal < 0 ? -bal : 0 };
  }).filter(a => a.debit > 0 || a.credit > 0);
}
function incomeSt() {
  let rev = accBalance('4100');
  let cogs = accBalance('5100');
  let exp = accBalance('5200');
  return { rev: rev, cogs: cogs, gross: rev - cogs, exp: exp, net: rev - cogs - exp };
}
function balSheet() {
  let assets = accBalance('1100') + accBalance('1200') + accBalance('1300') + accBalance('1400');
  let liab = accBalance('2100') + accBalance('2200');
  let is_ = incomeSt();
  let equity = accBalance('3100') + is_.net;
  return { assets: assets, liab: liab, equity: equity, total: liab + equity };
}

function jeSale(s) {
  let cost = s.items.reduce((sum, it) => { let p = db.inventory.find(x => x.id === it.pid); return sum + (p ? p.buy * it.qty : 0); }, 0);
  let acc = s.status === 'مدفوع' ? '1100' : '1300';
  let lines = [
    { acc: acc, d: s.grand, c: 0 }, { acc: '4100', d: 0, c: s.sub - (s.discount || 0) }, { acc: '2200', d: 0, c: s.tax }
  ];
  if (cost > 0) { lines.push({ acc: '5100', d: cost, c: 0 }); lines.push({ acc: '1400', d: 0, c: cost }); }
  je('فاتورة بيع #' + s.id, s.date, lines);
}
function jePur(p) {
  let acc = p.status === 'مدفوع' ? '1100' : '2100';
  je('فاتورة شراء #' + p.id, p.date, [{ acc: '1400', d: p.total, c: 0 }, { acc: acc, d: 0, c: p.total }]);
}
function jeExp(e) {
  je(e.cat + ': ' + e.note, e.date, [{ acc: '5200', d: e.amount, c: 0 }, { acc: '1100', d: 0, c: e.amount }]);
}

// ====================== المصادقة ======================
function showLogin() { $('loginDiv').style.display = 'block'; $('registerDiv').style.display = 'none'; }
function showRegister() { $('loginDiv').style.display = 'none'; $('registerDiv').style.display = 'block'; }
function doLogin() {
  let u = $('loginUser').value.trim();
  let p = $('loginPass').value;
  let user = db.users.find(x => x.username === u && x.password === p);
  if (!user) { toast('بيانات الدخول غير صحيحة', 'error'); return; }
  currentUser = user;
  $('loginScreen').style.display = 'none';
  $('app').style.display = 'block';
  $('userBadge').textContent = user.name;
  applyTheme();
  $('topLogo').textContent = companyInfo.name || 'ERP PRO';
  addLog('تسجيل دخول', user.username);
  buildMenu();
  navigate('dashboard');
  toast('مرحباً ' + user.name, 'success');
}
function doRegister() {
  let name = $('regName').value.trim();
  let user = $('regUser').value.trim();
  let pass = $('regPass').value;
  if (!name || !user || !pass) { toast('جميع الحقول مطلوبة', 'error'); return; }
  if (db.users.find(x => x.username === user)) { toast('اسم المستخدم موجود', 'error'); return; }
  db.users.push({ id: Date.now(), name: name, username: user, password: pass, role: 'user' });
  save();
  toast('تم إنشاء الحساب', 'success');
  showLogin();
}
function logout() {
  addLog('تسجيل خروج', '');
  currentUser = null;
  $('loginScreen').style.display = 'flex';
  $('app').style.display = 'none';
  destroyCharts();
}
function toggleDark() {
  isDark = !isDark;
  localStorage.setItem('erp_dark', isDark);
  document.body.classList.toggle('dark', isDark);
  $('darkIcon').className = isDark ? 'fas fa-sun' : 'fas fa-moon';
}
function applyTheme() {
  document.documentElement.style.setProperty('--primary', themeColor);
  let r = parseInt(themeColor.slice(1, 3), 16);
  let g = parseInt(themeColor.slice(3, 5), 16);
  let b = parseInt(themeColor.slice(5, 7), 16);
  document.documentElement.style.setProperty('--pl', 'rgba(' + r + ',' + g + ',' + b + ',0.12)');
}
function destroyCharts() { charts.forEach(c => { try { c.destroy(); } catch(e) {} }); charts = []; }

// ====================== التنقل ======================
function buildMenu() {
  $('menuBar').innerHTML = PAGES.map(p => '<div class="mi' + (activePage === p.id ? ' active' : '') + '" onclick="navigate(\'' + p.id + '\')"><i class="fas ' + p.icon + '"></i><span>' + p.label + '</span></div>').join('');
}
function navigate(page) {
  activePage = page;
  destroyCharts();
  buildMenu();
  if (page === 'dashboard') renderDashboard();
  else if (page === 'inventory') renderInventory();
  else if (page === 'suppliers') renderSuppliers();
  else if (page === 'purchases') renderPurchases();
  else if (page === 'quotes') renderQuotes();
  else if (page === 'sales') renderSales();
  else if (page === 'returns') renderReturns();
  else if (page === 'clients') renderClients();
  else if (page === 'pos') renderPOS();
  else if (page === 'expenses') renderExpenses();
  else if (page === 'accounting') renderAccounting();
  else if (page === 'reports') renderReports();
  else if (page === 'settings') renderSettings();
  else if (page === 'backup') renderBackup();
  window.scrollTo(0, 0);
}

// ====================== لوحة التحكم ======================
function renderDashboard() {
  let totalSales = db.sales.reduce((s, x) => s + x.grand, 0);
  let totalPurchases = db.purchases.reduce((s, x) => s + x.total, 0);
  let totalExpenses = db.expenses.reduce((s, x) => s + x.amount, 0);
  let grossProfit = db.sales.reduce((s, sale) => s + sale.items.reduce((ss, it) => { let p = db.inventory.find(x => x.id === it.pid); return ss + (it.price - (p ? p.buy : 0)) * it.qty; }, 0), 0);
  let netProfit = grossProfit - totalExpenses;
  let invValue = db.inventory.reduce((s, x) => s + x.qty * x.sell, 0);
  $('pageContent').innerHTML = `
    <div class="sg">
      <div class="sc" onclick="navigate('sales')"><div class="si" style="background:#d1fae5;color:#059669"><i class="fas fa-chart-line"></i></div><h3>${fmt(totalSales)}</h3><span>المبيعات</span></div>
      <div class="sc" onclick="navigate('purchases')"><div class="si" style="background:#dbeafe;color:#2563eb"><i class="fas fa-cart-shopping"></i></div><h3>${fmt(totalPurchases)}</h3><span>المشتريات</span></div>
      <div class="sc" onclick="navigate('expenses')"><div class="si" style="background:#fee2e2;color:#dc2626"><i class="fas fa-money-bill"></i></div><h3>${fmt(totalExpenses)}</h3><span>المصروفات</span></div>
      <div class="sc"><div class="si" style="background:${netProfit >= 0 ? '#d1fae5' : '#fee2e2'};color:${netProfit >= 0 ? '#059669' : '#dc2626'}"><i class="fas fa-chart-simple"></i></div><h3>${fmt(netProfit)}</h3><span>صافي الربح</span></div>

  openModal(`

  `);
  setTimeout(() => { let sel = $('purProd'); if (sel) updatePurPrice(); }, 100);
}
window.updatePurPrice = function() {
  let sel = $('purProd');
  if (sel && sel.selectedOptions[0]) {
    let buy = sel.selectedOptions[0].dataset.buy;
    if (buy && $('purPrice')) $('purPrice').value = buy;
    calcPurTotal();
  }
};
window.calcPurTotal = function() {
  let qty = +($('purQty')?.value || 0);
  let price = +($('purPrice')?.value || 0);
  if ($('purTotal')) $('purTotal').value = qty * price;
};
function addPurchase() {
  let supId = +$('purSup').value;
  let prodSel = $('purProd');
  let prodId = +prodSel.value;
  let prodName = prodSel.selectedOptions[0]?.innerText || '';
  let qty = +$('purQty').value;
  let price = +$('purPrice').value;
  let total = +$('purTotal').value;
  let date = $('purDate').value;
  let sup = db.suppliers.find(x => x.id === supId);
  let prod = db.inventory.find(x => x.id === prodId);
  if (!sup || !prod) { toast('بيانات غير صحيحة', 'error'); return; }
  if (qty <= 0) { toast('الكمية غير صحيحة', 'error'); return; }
  let p = { id: nid('pur'), supId: supId, supName: sup.name, prodName: prodName, prodId: prodId, qty: qty, price: price, total: total, paid: total, status: 'مدفوع', date: date };
  db.purchases.push(p);
  prod.qty += qty;
  jePur(p);
  save(); addLog('فاتورة شراء', sup.name + ' - ' + fmt(total)); closeModal(); renderPurchases(); toast('تم إضافة الفاتورة', 'success');
}
function deletePurchase(id) {
  if (!confirm('حذف فاتورة الشراء؟')) return;
  let i = db.purchases.findIndex(x => x.id === id);
  if (i > -1) {
    let p = db.purchases[i];
    let prod = db.inventory.find(x => x.id === p.prodId);
    if (prod) prod.qty -= p.qty;
    db.purchases.splice(i, 1);
    save(); addLog('حذف فاتورة شراء', '#' + p.id); renderPurchases(); toast('تم الحذف', 'success');
  }
}

      <div class="tbl"><table><thead><tr><th>#</th><th>العميل</th><th>الإجمالي</th><th>الحالة</th><th>التاريخ</th><th>إجراء</th></tr></thead><tbody id="saleBody"></tbody></table></div>
    </div>
  `;

}
function renderSaleList() {
  $('saleBody').innerHTML = db.sales.map(s => `
    <tr>
      <td>${s.id}</span><td><strong>${esc(s.clientName)}</strong></td><td>${fmt(s.grand)}</span>
      <td><span class="badge ${s.status === 'مدفوع' ? 'bs2' : 'bw2'}">${s.status}</span></td>
      <td>${s.date}</span><td><button class="btn bd bsm" onclick="deleteSale(${s.id})">حذف</button></td>
    </tr>
  `).join('') || '<tr><td colspan="6" class="tc">لا توجد فواتير</td></tr>';
}
function openAddSale() {
  saleItems = [];
  let clientOptions = db.clients.map(c => '<option value="' + c.id + '">' + esc(c.name) + '</option>').join('');
  let prodOptions = db.inventory.filter(p => p.qty > 0).map(p => '<option value="' + p.id + '" data-sell="' + p.sell + '">' + esc(p.name) + ' (' + p.qty + ')</option>').join('');
  openModal(`
    <div class="ct">➕ فاتورة بيع جديدة</div>
    <div class="g2"><div class="fg"><label>العميل</label><select id="saleClient">${clientOptions}</select></div><div class="fg"><label>التاريخ</label><input id="saleDate" type="date" value="${today()}"></div></div>
    <div class="g2"><div class="fg"><label>الصنف</label><select id="saleProd" onchange="updateSalePrice()">${prodOptions}</select></div><div class="fg"><label>الكمية</label><input id="saleQty" type="number" value="1"></div></div>
    <button class="btn bs bsm" onclick="addSaleItemToList()">إضافة للفاتورة</button>
    <div id="saleItemsList"></div>
    <div class="g3"><div class="fg"><label>الخصم</label><input id="saleDis" type="number" value="0" oninput="calcSaleTotal()"></div><div class="fg"><label>الضريبة</label><input id="saleTax" readonly></div><div class="fg"><label>الإجمالي</label><input id="saleGrand" readonly></div></div>
    <button class="btn bp" onclick="addSale()">إصدار الفاتورة</button>
  `);
  setTimeout(() => { let sel = $('saleProd'); if (sel) updateSalePrice(); }, 100);
}
window.updateSalePrice = function() { let sel = $('saleProd'); if (sel && sel.selectedOptions[0]) { let sell = sel.selectedOptions[0].dataset.sell; if (sell && $('salePrice')) $('salePrice').value = sell; } };
function addSaleItemToList() {
  let sel = $('saleProd');
  if (!sel) return;
  let prodId = +sel.value;
  let prod = db.inventory.find(x => x.id === prodId);
  if (!prod) return;
  let qty = +$('saleQty').value || 1;
  if (qty > prod.qty) { toast('الكمية غير متوفرة', 'error'); return; }
  let existing = saleItems.find(x => x.pid === prodId);
  if (existing) { existing.qty += qty; existing.total = existing.qty * existing.price; }
  else { saleItems.push({ pid: prodId, name: prod.name, qty: qty, price: prod.sell, total: qty * prod.sell }); }
  renderSaleItemsList();
  calcSaleTotal();
}
function renderSaleItemsList() {
  let el = $('saleItemsList');
  if (!el) return;
  if (!saleItems.length) { el.innerHTML = '<div>لا توجد أصناف</div>'; return; }
  el.innerHTML = '<div class="tbl"><table><thead><tr><th>الصنف</th><th>الكمية</th><th>السعر</th><th>الإجمالي</th><th></th></tr></thead><tbody>' + saleItems.map((it, i) => `
    <tr><td>${esc(it.name)}</td><td><input type="number" value="${it.qty}" style="width:60px" onchange="updateSaleItemQty(${i}, this.value)"></td><td>${fmt(it.price)}</td><td>${fmt(it.total)}</td><td><button onclick="removeSaleItem(${i})">✖</button></td></tr>
  `).join('') + '</tbody></table></div>';
}
function updateSaleItemQty(i, val) {
  let it = saleItems[i];
  if (it) { it.qty = +val || 1; it.total = it.qty * it.price; renderSaleItemsList(); calcSaleTotal(); }
}
function removeSaleItem(i) { saleItems.splice(i, 1); renderSaleItemsList(); calcSaleTotal(); }
function calcSaleTotal() {
  let sub = saleItems.reduce((s, x) => s + x.total, 0);
  let dis = +($('saleDis')?.value || 0);
  let tax = Math.max(0, sub - dis) * taxRate / 100;
  let grand = Math.max(0, sub - dis) + tax;
  if ($('saleTax')) $('saleTax').value = fmt(tax);
  if ($('saleGrand')) $('saleGrand').value = fmt(grand);
}
function addSale() {
  if (!saleItems.length) { toast('أضف صنفاً واحداً على الأقل', 'error'); return; }
  for (let it of saleItems) {
    let p = db.inventory.find(x => x.id === it.pid);
    if (!p || p.qty < it.qty) { toast('الكمية غير كافية: ' + it.name, 'error'); return; }
  }
  let clientId = +$('saleClient').value;
  let client = db.clients.find(x => x.id === clientId);
  let sub = saleItems.reduce((s, x) => s + x.total, 0);
  let dis = +($('saleDis')?.value || 0);
  let tax = +($('saleTax')?.value?.replace(/[^0-9.-]/g, '') || 0);
  let grand = +($('saleGrand')?.value?.replace(/[^0-9.-]/g, '') || 0);
  let date = $('saleDate').value || today();
  let sale = { id: nid('sale'), clientId: clientId, clientName: client.name, items: saleItems.map(x => ({ ...x })), sub: sub, discount: dis, tax: tax, grand: grand, paid: grand, status: 'مدفوع', date: date };
  db.sales.push(sale);
  saleItems.forEach(it => { let p = db.inventory.find(x => x.id === it.pid); if (p) p.qty -= it.qty; });
  jeSale(sale);

function renderPOS() {
  posCart = [];
  $('pageContent').innerHTML = `
    <div class="pos-l">
      <div class="card" style="padding:15px"><div class="pos-g" id="posGrid"></div></div>
      <div class="card">
        <div class="ct">🛒 السلة (<span id="posCount">0</span>)</div>

        <div class="pt"><div class="pl"><span>المجموع</span><span id="posSub">0</span></div><div class="pl"><span>ضريبة ${taxRate}%</span><span id="posTax">0</span></div><div class="pl grand"><span>الإجمالي</span><span id="posGrand">0</span></div></div>
        <div class="fg"><label>العميل</label><select id="posClient"><option value="">عميل نقدي</option>${db.clients.map(c => '<option value="' + c.id + '">' + esc(c.name) + '</option>').join('')}</select></div>
        <button class="btn bs" onclick="completePOS()" style="width:100%;margin-top:10px"><i class="fas fa-check"></i> إتمام البيع</button>
      </div>
    </div>
    <input id="posSearch" placeholder="🔍 بحث..." oninput="filterPOS()" style="margin-top:10px">
  `;
  filterPOS();
}
window.filterPOS = function() {
  let q = $('posSearch')?.value.toLowerCase() || '';
  let items = db.inventory.filter(p => p.name.toLowerCase().includes(q) && p.qty > 0);
  $('posGrid').innerHTML = items.map(p => '<div class="pos-item" onclick="addToPOS(' + p.id + ')"><h4>' + esc(p.name) + '</h4><div class="pp">' + fmt(p.sell) + '</div><div class="ps">' + p.qty + ' متبقي</div></div>').join('') || '<div class="tc">لا توجد منتجات</div>';
};
window.addToPOS = function(pid) {
  let p = db.inventory.find(x => x.id === pid);
  if (!p || p.qty <= 0) return;
  let existing = posCart.find(x => x.pid === pid);
  if (existing) { existing.qty++; existing.total = existing.qty * existing.price; }
  else { posCart.push({ pid: p.id, name: p.name, price: p.sell, qty: 1, total: p.sell }); }
  renderPOSCart();
};
function renderPOSCart() {
  if ($('posCount')) $('posCount').textContent = posCart.length;
  let sub = posCart.reduce((s, x) => s + x.total, 0);
  let tax = sub * taxRate / 100;
  let grand = sub + tax;
  if ($('posSub')) $('posSub').textContent = fmt(sub);
  if ($('posTax')) $('posTax').textContent = fmt(tax);
  if ($('posGrand')) $('posGrand').textContent = fmt(grand);
  let el = $('posCartItems');
  if (!el) return;
  if (!posCart.length) { el.innerHTML = '<div class="tc">السلة فارغة</div>'; return; }
  el.innerHTML = posCart.map((it, i) => '<div class="pci"><div>' + esc(it.name) + '</div><div class="qc"><button onclick="changePOSQty(' + i + ',-1)">-</button><span>' + it.qty + '</span><button onclick="changePOSQty(' + i + ',1)">+</button></div><div>' + fmt(it.total) + '</div><button onclick="posCart.splice(' + i + ',1);renderPOSCart()" style="color:red">✖</button></div>').join('');
}
window.changePOSQty = function(i, d) {
  let it = posCart[i];
  if (!it) return;
  let p = db.inventory.find(x => x.id === it.pid);
  let nq = it.qty + d;
  if (nq <= 0) { posCart.splice(i, 1); }
  else { if (p && nq > p.qty) { toast('الكمية المتاحة: ' + p.qty, 'warning'); return; } it.qty = nq; it.total = it.qty * it.price; }
  renderPOSCart();
};
window.completePOS = function() {
  if (!posCart.length) { toast('السلة فارغة', 'error'); return; }
  for (let it of posCart) {
    let p = db.inventory.find(x => x.id === it.pid);
    if (!p || p.qty < it.qty) { toast('الكمية غير كافية: ' + it.name, 'error'); return; }
  }
  let sub = posCart.reduce((s, x) => s + x.total, 0);
  let tax = sub * taxRate / 100;
  let grand = sub + tax;
  let clientId = +($('posClient')?.value || 0);
  let client = clientId ? db.clients.find(x => x.id === clientId) : null;
  let sale = { id: nid('pos'), clientId: clientId || 0, clientName: client ? client.name : 'عميل نقدي', items: posCart.map(x => ({ ...x })), sub: sub, discount: 0, tax: tax, grand: grand, paid: grand, status: 'مدفوع', date: today(), notes: 'نقطة البيع' };
  db.sales.push(sale);
  posCart.forEach(it => { let p = db.inventory.find(x => x.id === it.pid); if (p) p.qty -= it.qty; });
  jeSale(sale);
  save(); addLog('POS', sale.clientName + ' - ' + fmt(grand)); posCart = []; renderPOS(); toast('تم البيع بنجاح', 'success');
};

function renderBackup() {
  $('pageContent').innerHTML = `
    <div class="g2">
      <div class="card"><div class="ct">💾 تصدير البيانات</div><button class="btn bp" onclick="exportBackup()">تصدير JSON مشفر</button></div>
      <div class="card"><div class="ct">📂 استيراد البيانات</div><input type="file" id="backupFile" accept=".json"><button class="btn bp mt2" onclick="importBackup()">استيراد واستعادة</button><div class="alert mt2" style="background:#fee2e2;padding:10px;border-radius:8px"><i class="fas fa-exclamation-triangle"></i> سيتم استبدال جميع البيانات الحالية!</div></div>
    </div>
  `;
}
function exportBackup() {
  let data = JSON.stringify({ db, logs, companyInfo, currency, themeColor, lowStock, taxRate });
  let enc = CryptoJS.AES.encrypt(data, 'backup_key').toString();
  let blob = new Blob([enc], { type: 'application/json' });
  let url = URL.createObjectURL(blob);
  let a = document.createElement('a');
  a.href = url;
  a.download = 'erp_backup_' + today() + '.enc';
  a.click();
  URL.revokeObjectURL(url);
  toast('تم تصدير البيانات', 'success');
}
function importBackup() {
  let file = $('backupFile').files[0];
  if (!file) { toast('اختر ملفاً أولاً', 'error'); return; }
  let reader = new FileReader();
  reader.onload = function(e) {
    try {
      let dec = CryptoJS.AES.decrypt(e.target.result, 'backup_key').toString(CryptoJS.enc.Utf8);
      let obj = JSON.parse(dec);
      if (obj.db) db = obj.db;
      if (obj.logs) logs = obj.logs;
      if (obj.companyInfo) companyInfo = obj.companyInfo;
      if (obj.currency) currency = obj.currency;
      if (obj.lowStock) lowStock = obj.lowStock;
      if (obj.taxRate) taxRate = obj.taxRate;
      if (!db.nids) db.nids = { inv: 100, sup: 100, cli: 100, pur: 1000, sale: 2000, exp: 100, jnl: 1000, pos: 3000, qte: 4000, ret: 5000 };
      if (!db.quotes) db.quotes = [];
      if (!db.returns) db.returns = [];
      save();
      $('topLogo').textContent = companyInfo.name || 'ERP PRO';
      toast('تم الاستيراد بنجاح', 'success');
      navigate('dashboard');
    } catch(err) { toast('الملف تالف أو غير صالح', 'error'); }
  };
  reader.readAsText(file);
}

  if (!sale) return;
  let items = sale.items;
  $('retItemsArea').innerHTML = '<div class="tbl"><table><thead><tr><th>الصنف</th><th>الكمية الأصلية</th><th>كمية الإرجاع</th><th>السعر</th></tr></thead><tbody>' + items.map((it, i) => `
    <tr><td>${esc(it.name)}</td><td>${it.qty}</td><td><input type="number" id="retQty${i}" min="0" max="${it.qty}" value="0" style="width:60px" oninput="calcReturnTotal()"></td><td>${fmt(it.price)}</td>
  </tr>`).join('') + '</tbody></table></div><div class="sb mt2"><span>إجمالي المرتجع: <strong id="retTotal">0.00</strong></span></div>';
  window.returnItems = items;
}
function calcReturnTotal() {
  let total = 0;
  if (window.returnItems) {
    window.returnItems.forEach((it, i) => {
      let qty = +($('retQty' + i)?.value || 0);
      total += qty * it.price;
    });
  }
  let el = $('retTotal');
  if (el) el.textContent = fmt(total);
}
function addReturn() {
  let sel = $('retRef');
  if (!sel) return;
  let val = sel.value;
  if (!val.startsWith('sale_')) return;
  let sid = parseInt(val.split('_')[1]);
  let sale = db.sales.find(x => x.id === sid);
  if (!sale) return;
  let returnItems = [];
  let total = 0;
  sale.items.forEach((it, i) => {
    let qty = +($('retQty' + i)?.value || 0);
    if (qty > 0) {
      returnItems.push({ pid: it.pid, name: it.name, qty: qty, price: it.price, total: qty * it.price });
      total += qty * it.price;
    }
  });
  if (!returnItems.length) { toast('أدخل كمية إرجاع', 'error'); return; }
  let reason = $('retReason')?.value.trim() || '';
  let date = $('retDate')?.value || today();
  let r = { id: nid('ret'), refType: 'بيع', refId: sid, items: returnItems, total: total, reason: reason, date: date };
  db.returns.push(r);
  returnItems.forEach(it => {
    let p = db.inventory.find(x => x.id === it.pid);
    if (p) p.qty += it.qty;
  });
  save(); addLog('مرتجع', '#' + r.id + ' - ' + fmt(total)); closeModal(); renderReturns(); toast('تم تسجيل المرتجع', 'success');
}
function deleteReturn(id) {
  if (!confirm('حذف المرتجع؟')) return;
  let i = db.returns.findIndex(x => x.id === id);
  if (i > -1) { db.returns.splice(i, 1); save(); renderReturns(); toast('تم الحذف', 'success'); }
}

// ====================== التهيئة ======================
function openModal(html) { $('modalBody').innerHTML = html; $('modal').style.display = 'flex'; }
function closeModal() { $('modal').style.display = 'none'; }
function init() {
  load();
  applyTheme();
  if (localStorage.getItem('erp_dark') === 'true') { document.body.classList.add('dark'); isDark = true; $('darkIcon').className = 'fas fa-sun'; }
}
init();
</script>
