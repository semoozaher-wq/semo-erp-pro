<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEMO ERP | دخول</title>
    <style>
        /* إعدادات الصفحة العامة */
        body { 
            background: #0f172a; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
        }

        /* كارت تسجيل الدخول */
        .card { 
            background: #1e293b; 
            padding: 40px 30px; 
            border-radius: 20px; 
            width: 350px; 
            text-align: center; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
            border: 1px solid #334155; 
        }

        h1 { 
            color: #3b82f6; 
            margin-bottom: 30px; 
            font-size: 28px;
            letter-spacing: 1px;
        }

        /* تصميم الحقول */
        input { 
            width: 100%; 
            padding: 14px; 
            margin: 12px 0; 
            border-radius: 10px; 
            border: 1px solid #334155; 
            outline: none; 
            font-size: 16px; 
            background: #0f172a; 
            color: white; 
            box-sizing: border-box; 
            transition: all 0.3s ease;
        }

        input:focus { 
            border-color: #3b82f6; 
            box-shadow: 0 0 8px rgba(59, 130, 246, 0.3);
        }

        /* تصميم الأزرار */
        .btn { 
            width: 100%; 
            padding: 14px; 
            background: #3b82f6; 
            border: none; 
            color: white; 
            font-weight: bold; 
            border-radius: 10px; 
            cursor: pointer; 
            margin-top: 20px; 
            font-size: 16px; 
            transition: background 0.3s ease;
        }

        .btn:hover { 
            background: #2563eb; 
        }

        /* روابط التنقل بين الواجهات */
        .link { 
            color: #94a3b8; 
            cursor: pointer; 
            display: inline-block; 
            margin-top: 25px; /* مسافة كافية لمنع التداخل */
            font-size: 14px; 
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .link:hover { 
            color: #3b82f6; 
            text-decoration: underline;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="card">
        <h1>SEMO ERP</h1>

        <!-- واجهة تسجيل الدخول -->
        <div id="login-box">
            <input type="text" id="l-id" placeholder="الإيميل أو رقم الهاتف">
            <input type="password" id="l-p" placeholder="كلمة المرور">
            <button class="btn" onclick="login()">دخول</button>
            <span class="link" onclick="toggle()">تأسيس حساب جديد</span>
        </div>

        <!-- واجهة إنشاء حساب جديد -->
        <div id="signup-box" class="hidden">
            <input type="email" id="s-e" placeholder="البريد الإلكتروني">
            <input type="text" id="s-ph" placeholder="رقم الهاتف">
            <input type="password" id="s-p" placeholder="كلمة المرور">
            <button class="btn" style="background:#10b981" onclick="signup()">إنشاء حساب</button>
            <span class="link" onclick="toggle()">العودة لتسجيل الدخول</span>
        </div>
    </div>

    <!-- ربط ملف البرمجة -->
    <script type="module" src="main.js"></script>

</body>
</html>
