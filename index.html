<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>GOLDEN ERP V16 | الإصدار النهائي المتكامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --primary: #0f172a;
            --accent: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg: #f1f5f9;
            --card: #ffffff;
            --text: #1e293b;
        }
        [data-theme="dark"] {
            --primary: #f8fafc;
            --accent: #60a5fa;
            --bg: #020617;
            --card: #1e293b;
            --text: #f1f5f9;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--bg); color: var(--text); transition: 0.3s; overflow-x: hidden; }

        .wrapper { display: flex; min-height: 100vh; }
        .sidebar { width: 280px; background: var(--primary); color: white; padding: 20px; position: fixed; right: 0; height: 100vh; transition: 0.3s; z-index: 1000; display: flex; flex-direction: column; }
        .main { flex: 1; margin-right: 280px; padding: 25px; transition: 0.3s; }

        @media (max-width: 768px) {
            .sidebar { width: 0; padding: 0; overflow: hidden; }
            .main { margin-right: 0; padding: 15px; }
            .mobile-menu-btn { display: block; position: fixed; bottom: 20px; left: 20px; background: var(--accent); color: white; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1001; border: none; font-size: 24px; }
        }

        .nav-item { display: flex; align-items: center; gap: 15px; padding: 12px 15px; border-radius: 12px; cursor: pointer; color: #94a3b8; margin-bottom: 5px; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { background: var(--accent); color: white; }

        .card { background: var(--card); border-radius: 20px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid rgba(0,0,0,0.05); }
        .grid-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .stat-card { padding: 20px; border-radius: 15px; color: white; position: relative; overflow: hidden; }
        
        .btn { padding: 10px 20px; border-radius: 10px; border: none; cursor: pointer; font-weight: 700; display: inline-flex; align-items: center; gap: 8px; transition: 0.2s; font-size: 14px; }
        .btn-p { background: var(--accent); color: white; }
        .btn-s { background: var(--success); color: white; }
        .btn-d { background: var(--danger); color: white; }
        .btn-w { background: var(--warning); color: white; }

        input, select { padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; outline: none; width: 100%; transition: 0.3s; margin-top: 5px; background: var(--card); color: var(--text); }
        input:focus { border-color: var(--accent); }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: center; padding: 15px; background: #f8fafc; color: #64748b; font-size: 13px; }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; font-size: 14px; text-align: center; }

        .auth-screen { position: fixed; inset: 0; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: white; padding: 40px; border-radius: 30px; width: 90%; max-width: 400px; text-align: center; }

        .pos-grid { display: grid; grid-template-columns: 1fr 380px; gap: 20px; }
        @media (max-width: 768px) { .pos-grid { grid-template-columns: 1fr; } }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; max-height: 500px; overflow-y: auto; }
        .product-item { background: var(--card); border: 2px solid #f1f5f9; border-radius: 15px; padding: 15px; cursor: pointer; text-align: center; transition: 0.3s; }
        .product-item:hover { border-color: var(--accent); transform: translateY(-3px); }
        
        .toast { position: fixed; bottom: 20px; right: 20px; padding: 12px 20px; border-radius: 10px; color: white; z-index: 10000; display: none; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        .search-box { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #e2e8f0; margin-bottom: 15px; }
        
        .mobile-menu-btn { display: none; }
        @media (max-width: 768px) { .mobile-menu-btn { display: flex; } }
    </style>
</head>
<body>

<div class="toast" id="toast"></div>
<div class="mobile-menu-btn" onclick="toggleMobileMenu()"><i class="fas fa-bars"></i></div>

<div id="authScreen" class="auth-screen">
    <div class="auth-card">
        <h1 style="color:var(--accent); font-weight:900; margin-bottom:10px;">GOLDEN V16</h1>
        <p style="color:#64748b; margin-bottom:25px;">النظام المحاسبي السحابي المتكامل</p>
        <input type="email" id="email" placeholder="البريد الإلكتروني">
        <input type="password" id="pass" placeholder="كلمة المرور">
        <select id="role">
            <option value="admin">مدير النظام (صلاحيات كاملة)</option>
            <option value="user">موظف (مبيعات فقط)</option>
        </select>
        <button class="btn btn-p" style="width:100%; margin-top:20px; height:50px;" onclick="app.handleAuth()">دخول / إنشاء حساب</button>
        <p style="margin-top:15px; font-size:12px; color:#94a3b8;">✨ جرب: test@demo.com | 123456</p>
    </div>
</div>

<div id="appWrap" class="wrapper" style="display:none;">
    <aside class="sidebar" id="sidebar">
        <h2 style="text-align:center; margin-bottom:30px; color:var(--accent);">GOLDEN V16</h2>
        <nav>
            <div class="nav-item active" onclick="app.route('dash', this)"><i class="fas fa-chart-pie"></i> <span>لوحة التحكم</span></div>
            <div class="nav-item" onclick="app.route('pos', this)"><i class="fas fa-cash-register"></i> <span>نقطة البيع</span></div>
            <div class="nav-item is-admin" onclick="app.route('stock', this)"><i class="fas fa-boxes"></i> <span>المخزن</span></div>
            <div class="nav-item is-admin" onclick="app.route('expenses', this)"><i class="fas fa-wallet"></i> <span>المصاريف</span></div>
            <div class="nav-item is-admin" onclick="app.route('returns', this)"><i class="fas fa-undo"></i> <span>المرتجعات</span></div>
            <div class="nav-item" onclick="app.toggleTheme()"><i class="fas fa-moon"></i> <span>الوضع الليلي</span></div>
            <div class="nav-item" onclick="app.logout()" style="margin-top:auto; color:var(--danger);"><i class="fas fa-sign-out-alt"></i> <span>تسجيل الخروج</span></div>
        </nav>
    </aside>

    <main class="main" id="view"></main>
</div>

<script>
// Firebase Configuration
const firebaseConfig = {
    apiKey: "AIzaSyCfVMHNoqbh86I0JJjnguGY6seA4vWJsSU",
    authDomain: "my-pos-system-11dee.firebaseapp.com",
    databaseURL: "https://my-pos-system-11dee-default-rtdb.firebaseio.com",
    projectId: "my-pos-system-11dee",
    storageBucket: "my-pos-system-11dee.firebasestorage.app",
    messagingSenderId: "565195477080",
    appId: "1:565195477080:web:1ffa21a34e28b47dddfa2d"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const database = firebase.database();

const app = {
    user: null, role: 'user',
    data: { products: [], sales: [], expenses: [], returns: [] },
    cart: [],
    autoSaveTimer: null,

    init() {
        auth.onAuthStateChanged(u => {
            if(u) {
                this.user = u;
                database.ref(`roles/${u.uid}`).once('value', s => {
                    this.role = s.val() || 'user';
                    this.startSync();
                });
            } else {
                document.getElementById('authScreen').style.display = 'flex';
                document.getElementById('appWrap').style.display = 'none';
            }
        });
    },

    async handleAuth() {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value, r = document.getElementById('role').value;
        if(!e || !p) return this.notify("يرجى ملء جميع الحقول", "danger");
        try {
            let res;
            try {
                res = await auth.signInWithEmailAndPassword(e, p);
            } catch {
                res = await auth.createUserWithEmailAndPassword(e, p);
            }
            await database.ref(`roles/${res.user.uid}`).set(r);
            this.notify("تم تسجيل الدخول بنجاح", "success");
        } catch(err) { this.notify(err.message, "danger"); }
    },

    startSync() {
        database.ref(`data/${this.user.uid}`).on('value', snap => {
            this.data = snap.val() || { products: [], sales: [], expenses: [], returns: [] };
            if(!this.data.products) this.data.products = [];
            if(!this.data.sales) this.data.sales = [];
            if(!this.data.expenses) this.data.expenses = [];
            if(!this.data.returns) this.data.returns = [];
            
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('appWrap').style.display = 'flex';
            if(this.role !== 'admin') document.querySelectorAll('.is-admin').forEach(el => el.remove());
            
            this.route('dash');
        });
        
        this.autoSaveTimer = setInterval(() => this.save(), 300000);
    },

    async save() {
        try {
            await database.ref(`data/${this.user.uid}`).set(this.data);
            this.notify("💾 تم الحفظ التلقائي", "info");
        } catch(e) { console.error(e); }
    },

    route(page, el) {
        if(el) { document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active')); el.classList.add('active'); }
        const view = document.getElementById('view');
        if(page === 'dash') view.innerHTML = this.renderDashboard();
        if(page === 'pos') view.innerHTML = this.renderPOS();
        if(page === 'stock') view.innerHTML = this.renderStock();
        if(page === 'expenses') view.innerHTML = this.renderExpenses();
        if(page === 'returns') view.innerHTML = this.renderReturns();
        if(page === 'dash') setTimeout(() => this.renderChart(), 100);
    },

    renderDashboard() {
        const totalSales = this.data.sales.reduce((a,b) => a + Number(b.total), 0);
        const totalExp = this.data.expenses.reduce((a,b) => a + Number(b.amount), 0);
        const netProfit = totalSales - totalExp;
        const profitPercent = totalSales > 0 ? ((netProfit / totalSales) * 100).toFixed(1) : 0;

        return `
            <div class="grid-stats">
                <div class="stat-card" style="background:var(--accent)">
                    <span>💰 إجمالي المبيعات</span>
                    <h2>${totalSales.toLocaleString()} ج.م</h2>
                </div>
                <div class="stat-card" style="background:var(--danger)">
                    <span>📉 إجمالي المصاريف</span>
                    <h2>${totalExp.toLocaleString()} ج.م</h2>
                </div>
                <div class="stat-card" style="background:var(--success)">
                    <span>📈 صافي الربح الحقيقي</span>
                    <h2>${netProfit.toLocaleString()} ج.م</h2>
                </div>
            </div>
            <div style="display:grid; grid-template-columns: 2fr 1fr; gap:20px;">
                <div class="card"><h3>📊 تحليل المبيعات</h3><canvas id="mainChart" height="150"></canvas></div>
                <div class="card" style="background:var(--accent); color:white;">
                    <h3><i class="fas fa-robot"></i> تحليل الذكاء الاصطناعي</h3>
                    <p style="margin-top:15px; line-height:1.6;">${this.generateAIReport(totalSales, netProfit, profitPercent)}</p>
                </div>
            </div>
            <div class="card">
                <h3>🕐 آخر العمليات</h3>
                <div class="table-wrap">
                    <table><thead><tr><th>التاريخ</th><th>البيان</th><th>المبلغ</th></tr></thead>
                    <tbody>${this.data.sales.slice(0,5).map(s => `<tr><td>${s.date}</td><td>فاتورة مبيعات</td><td>+${s.total} ج.م</td></tr>`).join('')}${this.data.expenses.slice(0,3).map(e => `<tr><td>${e.date}</td><td>مصروف: ${e.note}</td><td style="color:red">-${e.amount} ج.م</td></tr>`).join('')}</tbody></table>
                </div>
            </div>
        `;
    },

    renderPOS() {
        return `
            <div class="pos-grid">
                <div class="card">
                    <input type="text" class="search-box" placeholder="🔍 بحث عن منتج..." oninput="app.filterProducts(this.value)">
                    <div class="product-grid" id="productsGrid">
                        ${this.data.products.map(p => `
                            <div class="product-item" onclick="app.addToCart('${p.id}')">
                                <strong>${p.name}</strong>
                                <p style="color:var(--accent); font-weight:900;">${p.price} ج.م</p>
                                <small>📦 المخزن: ${p.qty}</small>
                            </div>
                        `).join('')}
                    </div>
                </div>
                <div class="card">
                    <h3>🛒 سلة المشتريات <button class="btn btn-w" style="float:left; font-size:12px; padding:5px 10px;" onclick="app.clearCart()"><i class="fas fa-trash"></i> مسح</button></h3>
                    <div id="cartArea" style="min-height:300px; margin-top:15px;"></div>
                    <div id="cartTotal" style="font-size:24px; font-weight:900; text-align:center; padding:15px; border-top:2px dashed #eee;">0.00 ج.م</div>
                    <select id="customerSelect" style="margin-bottom:10px;"><option value="نقدي">عميل نقدي</option>${Object.keys(app.data.customers || {}).map(c=>`<option>${c}</option>`).join('')}</select>
                    <button class="btn btn-s" style="width:100%; height:55px; font-size:18px;" onclick="app.checkout()"><i class="fas fa-print"></i> إتمام البيع والطباعة</button>
                </div>
            </div>
        `;
    },

    filterProducts(search) {
        const filtered = this.data.products.filter(p => p.name.includes(search));
        document.getElementById('productsGrid').innerHTML = filtered.map(p => `
            <div class="product-item" onclick="app.addToCart('${p.id}')">
                <strong>${p.name}</strong>
                <p style="color:var(--accent); font-weight:900;">${p.price} ج.م</p>
                <small>📦 المخزن: ${p.qty}</small>
            </div>
        `).join('');
    },

    addToCart(id) {
        const p = this.data.products.find(i => i.id === id);
        if(!p || p.qty <= 0) return this.notify("المنتج غير متوفر!", "danger");
        const existing = this.cart.find(i => i.id === id);
        if(existing) existing.qty++;
        else this.cart.push({...p, qty: 1});
        this.renderCart();
    },

    renderCart() {
        const cartDiv = document.getElementById('cartArea');
        let total = 0;
        cartDiv.innerHTML = this.cart.map((item, idx) => {
            total += Number(item.price) * item.qty;
            return `<div style="display:flex; justify-content:space-between; padding:10px; background:var(--bg); border-radius:10px; margin-bottom:5px;">
                <span>${item.name} x${item.qty}</span>
                <strong>${(item.price * item.qty).toFixed(2)} ج.م <i class="fas fa-trash" style="color:red; cursor:pointer;" onclick="app.removeFromCart(${idx})"></i></strong>
            </div>`;
        }).join('');
        document.getElementById('cartTotal').innerText = total.toFixed(2) + " ج.م";
    },

    removeFromCart(idx) { this.cart.splice(idx, 1); this.renderCart(); },
    clearCart() { this.cart = []; this.renderCart(); },

    checkout() {
        if(this.cart.length === 0) return this.notify("السلة فارغة!", "danger");
        const total = this.cart.reduce((s,i) => s + (Number(i.price) * i.qty), 0);
        const customer = document.getElementById('customerSelect').value;
        
        this.cart.forEach(item => {
            const p = this.data.products.find(x => x.id === item.id);
            if(p) p.qty -= item.qty;
        });

        const sale = { id: Date.now(), items: [...this.cart], total, date: new Date().toLocaleString(), customer };
        this.data.sales.unshift(sale);
        
        this.printInvoice(sale);
        this.cart = [];
        this.save();
        this.renderCart();
        this.notify("تمت العملية بنجاح", "success");
    },

    printInvoice(sale) {
        const w = window.open('', '_blank');
        const itemsHtml = sale.items.map(i => `<tr><td style="padding:8px">${i.name}</td><td>${i.qty}</td><td>${i.price}</td><td>${i.price * i.qty}</td></tr>`).join('');
        w.document.write(`
            <html dir="rtl"><head><style>body{font-family:Cairo; padding:30px;} table{width:100%; border-collapse:collapse;} th,td{padding:10px; border-bottom:1px solid #ddd;} @media print{button{display:none;}}</style></head>
            <body><div style="text-align:center;"><h2 style="color:#3b82f6;">GOLDEN ERP V16</h2><p>فاتورة ضريبية مبسطة</p><p>التاريخ: ${sale.date}</p><p>العميل: ${sale.customer}</p><hr></div>
            <table><thead><th>المنتج</th><th>الكمية</th><th>السعر</th><th>الإجمالي</th></thead><tbody>${itemsHtml}</tbody>
            <tfoot><tr style="font-weight:bold;"><td colspan="3">الإجمالي</td><td>${sale.total} ج.م</td></tr></tfoot></table>
            <div style="margin-top:20px; text-align:center;"><img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=INV:${sale.id}-${sale.total}" style="margin-top:10px;"><br><small>شكراً لتعاملكم معنا</small></div>
            <script>window.onload=function(){setTimeout(function(){window.print();window.close();},500);};<\/script>
            </body></html>
        `);
        w.document.close();
    },

    renderStock() {
        return `
            <div class="card"><h3>➕ إضافة منتج جديد</h3>
                <div style="display:grid; grid-template-columns: 2fr 1fr 1fr auto; gap:10px; margin-top:15px;">
                    <input id="pName" placeholder="اسم المنتج"><input id="pPrice" type="number" placeholder="السعر"><input id="pQty" type="number" placeholder="الكمية">
                    <button class="btn btn-p" onclick="app.addProduct()">حفظ</button>
                </div>
            </div>
            <div class="card"><div class="table-wrap"><table><thead><th>المنتج</th><th>السعر</th><th>المخزون</th><th>القيمة</th><th>إجراءات</th></thead>
            <tbody>${this.data.products.map(p => `<tr><td>${p.name}</td><td>${p.price} ج.م</td><td style="color:${p.qty<5?'red':'inherit'}">${p.qty}</td><td>${p.price * p.qty} ج.م</td>
            <td><button class="btn btn-w" style="padding:5px 10px; margin:0 3px;" onclick="app.editProduct('${p.id}')"><i class="fas fa-edit"></i></button>
            <button class="btn btn-d" style="padding:5px 10px;" onclick="app.deleteProduct('${p.id}')"><i class="fas fa-trash"></i></button></td></tr>`).join('')}</tbody></table></div></div>
        `;
    },

    addProduct() {
        const n = document.getElementById('pName').value, p = document.getElementById('pPrice').value, q = document.getElementById('pQty').value;
        if(!n || !p) return this.notify("املأ البيانات!", "danger");
        this.data.products.push({ id: Date.now().toString(), name: n, price: Number(p), qty: Number(q) || 0 });
        this.save();
        this.route('stock');
        this.notify("تم إضافة المنتج", "success");
    },

    editProduct(id) {
        const p = this.data.products.find(x => x.id === id);
        const newPrice = prompt("السعر الجديد:", p.price);
        const newQty = prompt("الكمية الجديدة:", p.qty);
        if(newPrice) p.price = Number(newPrice);
        if(newQty) p.qty = Number(newQty);
        this.save();
        this.route('stock');
    },

    deleteProduct(id) { if(confirm("هل أنت متأكد؟")) { this.data.products = this.data.products.filter(p => p.id !== id); this.save(); this.route('stock'); } },

    renderExpenses() {
        return `
            <div class="card"><h3>📝 تسجيل مصروف جديد</h3>
                <div style="display:grid; grid-template-columns: 2fr 1fr auto; gap:10px;">
                    <input id="expNote" placeholder="بيان المصروف (إيجار، رواتب، كهرباء...)"><input id="expAmount" type="number" placeholder="المبلغ">
                    <button class="btn btn-d" onclick="app.addExpense()">تسجيل</button>
                </div>
            </div>
            <div class="card"><div class="table-wrap"><table><thead><th>التاريخ</th><th>البيان</th><th>المبلغ</th></thead>
            <tbody>${this.data.expenses.map(e => `<tr><td>${e.date}</td><td>${e.note}</td><td style="color:red">-${e.amount} ج.م</td></tr>`).join('')}</tbody></table></div></div>
        `;
    },

    addExpense() {
        const n = document.getElementById('expNote').value, a = document.getElementById('expAmount').value;
        if(!n || !a) return;
        this.data.expenses.unshift({ note: n, amount: Number(a), date: new Date().toLocaleDateString() });
        this.save();
        this.route('expenses');
        this.notify("تم تسجيل المصروف", "info");
    },

    renderReturns() {
        return `<div class="card"><h3>🔄 نظام المرتجعات</h3><p>ابحث عن فاتورة سابقة لاسترجاعها وتعديل المخزون</p>
        <input type="text" id="returnSearch" placeholder="رقم الفاتورة أو العميل..." oninput="app.searchReturn(this.value)">
        <div id="returnResults"></div></div>`;
    },

    renderChart() {
        const ctx = document.getElementById('mainChart');
        if(!ctx) return;
        new Chart(ctx, { type: 'line', data: { labels: this.data.sales.slice(0,7).map(s => s.date.split(',')[0]), datasets: [{ label: 'المبيعات', data: this.data.sales.slice(0,7).map(s => s.total), borderColor: '#3b82f6', tension: 0.4, fill: true }] }, options: { responsive: true } });
    },

    generateAIReport(sales, profit, percent) {
        if(sales === 0) return "✨ لا توجد مبيعات حتى الآن. قم بإضافة منتجات وبدء البيع لتحليل الأداء.";
        if(profit < 0) return "⚠️ تحذير: المصاريف تتجاوز المبيعات! ننصح بمراجعة بنود المصروفات فوراً وزيادة الأسعار.";
        if(percent < 20) return "📊 الأرباح منخفضة نسبياً. حاول تقليل المصاريف أو زيادة حجم المبيعات لتحسين هامش الربح.";
        return `✅ أداء ممتاز! هامش الربح ${percent}%. استمر في مراقبة المخزون والمصاريف للحفاظ على النمو.`;
    },

    toggleTheme() { document.body.setAttribute('data-theme', document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'); },
    notify(msg, type) { const t = document.getElementById('toast'); t.innerText = msg; t.style.background = type === 'danger' ? '#ef4444' : (type === 'success' ? '#10b981' : '#f59e0b'); t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 3000); },
    logout() { auth.signOut(); if(this.autoSaveTimer) clearInterval(this.autoSaveTimer); }
};

function toggleMobileMenu() {
    const sidebar = document.getElementById('sidebar');
    sidebar.style.width = sidebar.style.width === '280px' ? '0' : '280px';
    sidebar.style.padding = sidebar.style.width === '280px' ? '20px' : '0';
}

app.init();
</script>
</body>
</html>
