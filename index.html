<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة المؤسسات - ERP</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        :root {
            --primary: #3b82f6; --success: #10b981; --danger: #ef4444;
            --warning: #f59e0b; --info: #8b5cf6; --bg: #0f172a;
            --card: #1e293b; --text: #f1f5f9; --text-muted: #94a3b8;
            --border: #334155; --sidebar-width: 260px;
        }
        body { background: var(--bg); color: var(--text); direction: rtl; font-size: 14px; }
        .sidebar { width: var(--sidebar-width); background: var(--card); position: fixed; right: 0; top: 0; height: 100vh; padding: 20px; overflow-y: auto; border-left: 1px solid var(--border); }
        .menu-item { padding: 12px; margin: 5px 0; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 10px; color: var(--text-muted); transition: 0.2s; }
        .menu-item:hover, .menu-item.active { background: var(--primary); color: white; }
        .main-content { margin-right: var(--sidebar-width); padding: 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .stat-card { background: var(--card); border-radius: 16px; padding: 20px; border: 1px solid var(--border); cursor: pointer; transition: 0.2s; }
        .stat-card:hover { transform: translateY(-3px); background: #334155; }
        .stat-title { font-size: 13px; color: var(--text-muted); margin-bottom: 8px; }
        .stat-value { font-size: 28px; font-weight: bold; }
        .card-box { background: var(--card); border-radius: 16px; padding: 20px; margin-bottom: 20px; border: 1px solid var(--border); }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px; }
        .btn { padding: 8px 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th, .data-table td { padding: 10px; text-align: right; border-bottom: 1px solid var(--border); }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; }
        .badge-success { background: rgba(16,185,129,0.2); color: #34d399; }
        .badge-warning { background: rgba(245,158,11,0.2); color: #fbbf24; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        .modal.show { display: flex; }
        .modal-content { background: var(--card); border-radius: 16px; max-width: 500px; width: 90%; padding: 20px; max-height: 80vh; overflow-y: auto; }
        input, select { width: 100%; padding: 10px; margin: 8px 0; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); }
        .profit-positive { color: #34d399; }
        .profit-negative { color: #f87171; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        @media (max-width: 768px) { .sidebar { width: 70px; } .sidebar span { display: none; } .main-content { margin-right: 70px; } }
    </style>
</head>
<body>

<div class="sidebar">
    <div style="text-align: center; margin-bottom: 30px; font-size: 24px;">📊</div>
    <div class="menu-item active" onclick="switchPage('dashboard')"><i class="fas fa-chart-line"></i> <span>الرئيسية</span></div>
    <div class="menu-item" onclick="switchPage('inventory')"><i class="fas fa-boxes"></i> <span>المخزون</span></div>
    <div class="menu-item" onclick="switchPage('suppliers')"><i class="fas fa-truck"></i> <span>الموردين</span></div>
    <div class="menu-item" onclick="switchPage('purchases')"><i class="fas fa-shopping-cart"></i> <span>المشتريات</span></div>
    <div class="menu-item" onclick="switchPage('sales')"><i class="fas fa-tag"></i> <span>المبيعات</span></div>
    <div class="menu-item" onclick="switchPage('pos')"><i class="fas fa-cash-register"></i> <span>نقطة البيع</span></div>
    <div class="menu-item" onclick="switchPage('clients')"><i class="fas fa-users"></i> <span>العملاء</span></div>
    <div class="menu-item" onclick="switchPage('expenses_rev')"><i class="fas fa-coins"></i> <span>المصروفات والإيرادات</span></div>
    <div class="menu-item" onclick="switchPage('accounting')"><i class="fas fa-book"></i> <span>دفتر الأستاذ</span></div>
    <div class="menu-item" onclick="switchPage('trial_balance')"><i class="fas fa-scale-balanced"></i> <span>ميزان المراجعة</span></div>
    <div class="menu-item" onclick="switchPage('reports')"><i class="fas fa-chart-pie"></i> <span>التقارير</span></div>
    <div class="menu-item" onclick="switchPage('currencies')"><i class="fas fa-money-bill-wave"></i> <span>العملات</span></div>
    <div class="menu-item" onclick="switchPage('about')"><i class="fas fa-info-circle"></i> <span>معلومات</span></div>
    <div class="menu-item" onclick="exportToExcel()"><i class="fas fa-file-excel"></i> <span>تصدير Excel</span></div>
</div>

<div class="main-content" id="pageContent"></div>

<div id="detailsModal" class="modal" onclick="if(event.target===this) closeModal()"><div class="modal-content" id="modalContentInner"></div></div>

<script>
// ==================== قاعدة البيانات ====================
let db = {
    inventory: JSON.parse(localStorage.getItem('erp_inventory')) || [],
    sales: JSON.parse(localStorage.getItem('erp_sales')) || [],
    clients: JSON.parse(localStorage.getItem('erp_clients')) || [],
    suppliers: JSON.parse(localStorage.getItem('erp_suppliers')) || [],
    purchases: JSON.parse(localStorage.getItem('erp_purchases')) || [],
    expenses: JSON.parse(localStorage.getItem('erp_expenses')) || [],
    revenues: JSON.parse(localStorage.getItem('erp_revenues')) || [],
    journalEntries: JSON.parse(localStorage.getItem('erp_journal')) || [],
    settings: JSON.parse(localStorage.getItem('erp_settings')) || { nextInvoiceId: 1000, nextPurchaseId: 2000, companyName: 'شركتي' }
};

let currencies = JSON.parse(localStorage.getItem('erp_currencies')) || [
    { code: 'SAR', name: 'ريال سعودي', symbol: 'ر.س', rate: 1 },
    { code: 'USD', name: 'دولار أمريكي', symbol: '$', rate: 3.75 },
    { code: 'LYD', name: 'دينار ليبي', symbol: 'ل.د', rate: 0.78 }
];
let currentCurrency = localStorage.getItem('erp_currency') || 'SAR';
let charts = [], cart = [];

// دوال مساعدة
function formatCurrency(amount) {
    let c = currencies.find(c => c.code === currentCurrency);
    if(!c) return amount.toLocaleString() + ' ر.س';
    return (amount * c.rate).toLocaleString() + ' ' + c.symbol;
}
function showNotification(msg, type = 'success') {
    let div = document.createElement('div');
    div.style.cssText = `position:fixed; bottom:20px; left:20px; background:${type === 'success' ? '#10b981' : '#ef4444'}; color:white; padding:10px 20px; border-radius:40px; z-index:1200;`;
    div.innerHTML = msg; document.body.appendChild(div); setTimeout(() => div.remove(), 2500);
}
function saveAll() {
    localStorage.setItem('erp_inventory', JSON.stringify(db.inventory));
    localStorage.setItem('erp_sales', JSON.stringify(db.sales));
    localStorage.setItem('erp_clients', JSON.stringify(db.clients));
    localStorage.setItem('erp_suppliers', JSON.stringify(db.suppliers));
    localStorage.setItem('erp_purchases', JSON.stringify(db.purchases));
    localStorage.setItem('erp_expenses', JSON.stringify(db.expenses));
    localStorage.setItem('erp_revenues', JSON.stringify(db.revenues));
    localStorage.setItem('erp_journal', JSON.stringify(db.journalEntries));
    localStorage.setItem('erp_settings', JSON.stringify(db.settings));
    localStorage.setItem('erp_currencies', JSON.stringify(currencies));
    localStorage.setItem('erp_currency', currentCurrency);
}
function todayISO() { let d = new Date(); return `${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,'0')}-${d.getDate().toString().padStart(2,'0')}`; }
function addJournalEntry(desc, debit, credit, amount) { db.journalEntries.push({ id: Date.now(), date: todayISO(), description: desc, debitAccount: debit, creditAccount: credit, amount: amount }); saveAll(); }
function totalSales() { return db.sales.reduce((s,i) => s + (i.total || 0), 0); }
function totalPurchases() { return db.purchases.reduce((s,i) => s + (i.total || 0), 0); }
function totalExpenses() { return db.expenses.reduce((s,i) => s + (i.amount || 0), 0); }
function totalRevenues() { return db.revenues.reduce((s,i) => s + (i.amount || 0), 0); }
function netProfit() { return totalSales() - totalPurchases() - totalExpenses() + totalRevenues(); }
function inventoryValue() { return db.inventory.reduce((s,i) => s + ((i.qty||0) * (i.costPrice||0)), 0); }
function destroyCharts() { charts.forEach(c => c.destroy()); charts = []; }

// ==================== عرض الصفحات ====================
function renderDashboard() {
    let monthlyData = Array(12).fill(0);
    db.sales.forEach(s => { if(s.dateISO) { let m = parseInt(s.dateISO.split('-')[1]) - 1; if(m >= 0) monthlyData[m] += s.total || 0; } });
    let html = `<div class="stats-grid">
        <div class="stat-card" onclick="switchPage('sales')"><div class="stat-title">💰 إجمالي المبيعات</div><div class="stat-value">${formatCurrency(totalSales())}</div></div>
        <div class="stat-card" onclick="switchPage('purchases')"><div class="stat-title">🚚 المشتريات</div><div class="stat-value">${formatCurrency(totalPurchases())}</div></div>
        <div class="stat-card" onclick="switchPage('expenses_rev')"><div class="stat-title">💸 المصروفات</div><div class="stat-value">${formatCurrency(totalExpenses())}</div></div>
        <div class="stat-card" onclick="switchPage('expenses_rev')"><div class="stat-title">💰 الإيرادات</div><div class="stat-value">${formatCurrency(totalRevenues())}</div></div>
        <div class="stat-card" onclick="switchPage('accounting')"><div class="stat-title">📈 صافي الربح</div><div class="stat-value ${netProfit() >= 0 ? 'profit-positive' : 'profit-negative'}">${formatCurrency(netProfit())}</div></div>
        <div class="stat-card" onclick="switchPage('inventory')"><div class="stat-title">📦 قيمة المخزون</div><div class="stat-value">${formatCurrency(inventoryValue())}</div></div>
    </div>
    <div class="card-box"><canvas id="monthlyChart" height="150"></canvas></div>
    <div class="card-box"><div class="card-header"><h3>📋 آخر المبيعات</h3><button class="btn btn-primary" onclick="switchPage('sales')">عرض الكل</button></div><div style="overflow-x:auto"><table class="data-table"><thead><th>التاريخ</th><th>العميل</th><th>المنتج</th><th>المبلغ</th><th>الحالة</th></thead><tbody id="recentSales"></tbody></table></div></div>`;
    document.getElementById('pageContent').innerHTML = html;
    let ctx = document.getElementById('monthlyChart')?.getContext('2d');
    if(ctx) charts.push(new Chart(ctx, { type: 'bar', data: { labels: ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'], datasets: [{ label: 'المبيعات', data: monthlyData, backgroundColor: '#3b82f6' }] }, options: { responsive: true } }));
    let recent = [...db.sales].sort((a,b) => (b.dateISO || '').localeCompare(a.dateISO || '')).slice(0,5);
    document.getElementById('recentSales').innerHTML = recent.map(s => `<tr onclick="showSaleDetails(${s.id})"><td>${s.dateISO}</td><td>${s.clientName}</td><td>${s.productName || '-'}</td><td>${formatCurrency(s.total)}</td><td><span class="badge ${s.status === 'مدفوع' ? 'badge-success' : 'badge-warning'}">${s.status}</span></td></tr>`).join('');
}

function renderInventory() {
    let html = `<div class="card-box"><div class="card-header"><h3>📦 المخزون</h3><button class="btn btn-success" onclick="addProduct()">+ منتج جديد</button></div>
    <div style="overflow-x:auto"><table class="data-table"><thead><th>المنتج</th><th>الكمية</th><th>سعر الشراء</th><th>سعر البيع</th><th>القيمة</th><th>الحالة</th><th></th></thead><tbody>
    ${db.inventory.map(p => `<tr><td><strong>${p.name}</strong></td><td>${p.qty}</td><td>${formatCurrency(p.costPrice||0)}</td><td>${formatCurrency(p.sellPrice||0)}</td><td>${formatCurrency((p.qty||0)*(p.costPrice||0))}</td><td><span class="badge ${p.qty<=5?'badge-warning':'badge-success'}">${p.qty<=5?'مخزون منخفض':'متوفر'}</span></td><td><button class="btn btn-danger btn-sm" onclick="deleteProduct(${p.id})"><i class="fas fa-trash"></i></button></td></tr>`).join('')}
    </tbody></div></div>`;
    document.getElementById('pageContent').innerHTML = html;
}

function renderSuppliers() {
    let html = `<div class="card-box"><div class="card-header"><h3>🚚 الموردين</h3><button class="btn btn-success" onclick="addSupplier()">+ مورد جديد</button></div>
    <div style="overflow-x:auto"><table class="data-table"><thead><th>الاسم</th><th>الهاتف</th><th>العنوان</th><th>إجمالي المشتريات</th><th>المدفوع</th><th>المتبقي</th></thead><tbody>
    ${db.suppliers.map(sup => { let pur = db.purchases.filter(p => p.supplierId === sup.id); let total = pur.reduce((s,p) => s + (p.total||0),0); let paid = pur.reduce((s,p) => s + (p.paid||0),0); return `<tr><td><strong>${sup.name}</strong></td><td>${sup.phone || '-'}</td><td>${sup.address || '-'}</td><td>${formatCurrency(total)}</td><td>${formatCurrency(paid)}</td><td class="${total-paid>0?'profit-negative':'profit-positive'}">${formatCurrency(total-paid)}</td><tr>`; }).join('')}
    </tbody></div></div>`;
    document.getElementById('pageContent').innerHTML = html;
}

function renderPurchases() {
    let html = `<div class="card-box"><div class="card-header"><h3>🛒 المشتريات</h3><button class="btn btn-success" onclick="addPurchase()">+ فاتورة شراء</button></div>
    <div style="overflow-x:auto"><table class="data-table"><thead><th>التاريخ</th><th>المورد</th><th>المنتج</th><th>الكمية</th><th>الإجمالي</th><th>الحالة</th></thead><tbody>
    ${db.purchases.map(p => `<tr><td>${p.dateISO}</td><td>${p.supplierName}</td><td>${p.productName}</td><td>${p.qty}</td><td>${formatCurrency(p.total)}</td><td><span class="badge ${p.status === 'مدفوع' ? 'badge-success' : 'badge-warning'}">${p.status}</span></td></tr>`).join('')}
    </tbody></div></div>`;
    document.getElementById('pageContent').innerHTML = html;
}

function renderSales() {
    let html = `<div class="card-box"><div class="card-header"><h3>💰 المبيعات</h3><button class="btn btn-success" onclick="quickAddSale()">+ فاتورة جديدة</button></div>
    <div style="overflow-x:auto"><table class="data-table"><thead><th>التاريخ</th><th>العميل</th><th>المنتج</th><th>المبلغ</th><th>المدفوع</th><th>الحالة</th></thead><tbody>
    ${db.sales.map(s => `<tr onclick="showSaleDetails(${s.id})" style="cursor:pointer;"><td>${s.dateISO}</td><td>${s.clientName}</td><td>${s.productName || '-'}</td><td>${formatCurrency(s.total)}</td><td>${formatCurrency(s.paid||0)}</td><td><span class="badge ${s.status === 'مدفوع' ? 'badge-success' : 'badge-warning'}">${s.status}</span></td></tr>`).join('')}
    </tbody></div></div>`;
    document.getElementById('pageContent').innerHTML = html;
}

function renderPOS() {
    let html = `<div class="card-box"><div class="card-header"><h3>🛒 نقطة البيع POS</h3></div><div class="grid-2"><div><h4>المنتجات</h4><div id="posProducts" style="max-height:400px;overflow-y:auto;">${db.inventory.map(p => `<div onclick="addToCart(${p.id})" style="background:#334155;padding:10px;margin:8px;border-radius:12px;cursor:pointer;"><strong>${p.name}</strong><br>${formatCurrency(p.sellPrice || p.costPrice*1.3)}<br><small>متاح: ${p.qty}</small></div>`).join('')}</div></div><div><h4>سلة المشتريات</h4><div id="cartDisplay" style="max-height:300px;overflow-y:auto;"></div><hr><div><strong id="cartTotal">الإجمالي: 0</strong></div><input type="text" id="posClientName" placeholder="اسم العميل"><button class="btn btn-success" onclick="checkoutPOS()" style="margin-top:10px; width:100%;">إتمام البيع</button></div></div></div>`;
    document.getElementById('pageContent').innerHTML = html;
    renderCart();
}

function addToCart(id) {
    let p = db.inventory.find(p => p.id === id);
    if(p && p.qty > 0) {
        let existing = cart.find(i => i.id === id);
        if(existing) { existing.qty++; existing.total = existing.qty * existing.price; }
        else { cart.push({ id: p.id, name: p.name, price: p.sellPrice || p.costPrice * 1.3, qty: 1, total: p.sellPrice || p.costPrice * 1.3 }); }
        p.qty--; saveAll(); renderCart(); showNotification(`✅ تم إضافة ${p.name}`);
    } else showNotification('⚠️ الكمية غير متوفرة', 'error');
}

function renderCart() {
    let div = document.getElementById('cartDisplay');
    let totalDiv = document.getElementById('cartTotal');
    if(div) div.innerHTML = cart.map((item,i) => `<div style="background:#334155;padding:8px;margin:5px;border-radius:8px;display:flex;justify-content:space-between;"><span>${item.name} x${item.qty} = ${formatCurrency(item.total)}</span><button class="btn btn-danger btn-sm" onclick="removeFromCart(${i})">🗑️</button></div>`).join('');
    let total = cart.reduce((s,i) => s + i.total, 0);
    if(totalDiv) totalDiv.innerText = `الإجمالي: ${formatCurrency(total)}`;
}

function removeFromCart(index) { cart.splice(index,1); renderCart(); }

function checkoutPOS() {
    if(cart.length === 0) { showNotification('⚠️ السلة فارغة', 'error'); return; }
    let total = cart.reduce((s,i) => s + i.total, 0);
    let paid = parseFloat(prompt('المبلغ المدفوع:', total)) || 0;
    let clientName = document.getElementById('posClientName')?.value || 'عميل نقدي';
    let newId = db.settings.nextInvoiceId++;
    db.sales.push({ id: newId, clientName, productName: cart.map(i => i.name).join(', '), qty: cart.reduce((s,i) => s + i.qty, 0), price: total / cart.reduce((s,i) => s + i.qty, 0), total, paid, status: paid >= total ? 'مدفوع' : 'آجل', dateISO: todayISO() });
    addJournalEntry(`مبيعات #${newId}`, paid >= total ? 'النقدية' : 'العملاء', 'المبيعات', total);
    saveAll(); cart = []; showNotification(`✅ تمت الفاتورة ${formatCurrency(total)}`); renderPOS();
}

function renderClients() {
    let html = `<div class="card-box"><div class="card-header"><h3>👥 العملاء</h3><button class="btn btn-success" onclick="addClient()">+ عميل جديد</button></div>
    <div style="overflow-x:auto"><table class="data-table"><thead><th>الاسم</th><th>الهاتف</th><th>العنوان</th><th>إجمالي المشتريات</th></thead><tbody>
    ${db.clients.map(c => { let total = db.sales.filter(s => s.clientName === c.name).reduce((sum,s) => sum + (s.total||0),0); return `<tr><td><strong>${c.name}</strong></td><td>${c.phone || '-'}</td><td>${c.address || '-'}</td><td>${formatCurrency(total)}</td></tr>`; }).join('')}
    </tbody></div></div>`;
    document.getElementById('pageContent').innerHTML = html;
}

function renderExpensesRevenues() {
    let html = `<div class="card-box"><div class="card-header"><h3>💸 المصروفات</h3><button class="btn btn-primary" onclick="addExpense()">+ إضافة مصروف</button></div>
    <div style="overflow-x:auto"><table class="data-table"><thead><th>النوع</th><th>المبلغ</th><th>التاريخ</th></thead><tbody>${db.expenses.map(e => `<tr><td>${e.type}</td><td>${formatCurrency(e.amount)}</td><td>${e.date}</td></tr>`).join('')}</tbody></div><div>الإجمالي: ${formatCurrency(totalExpenses())}</div></div>
    <div class="card-box"><div class="card-header"><h3>💰 الإيرادات</h3><button class="btn btn-success" onclick="addRevenue()">+ إضافة إيراد</button></div>
    <div style="overflow-x:auto"><table class="data-table"><thead><th>النوع</th><th>المبلغ</th><th>التاريخ</th></thead><tbody>${db.revenues.map(r => `<tr><td>${r.type}</td><td>${formatCurrency(r.amount)}</td><td>${r.date}</td></td>`).join('')}</tbody></div><div>الإجمالي: ${formatCurrency(totalRevenues())}</div></div>`;
    document.getElementById('pageContent').innerHTML = html;
}

function renderAccounting() {
    let entries = [...db.journalEntries].reverse();
    let html = `<div class="card-box"><div class="card-header"><h3>📚 دفتر الأستاذ</h3></div><div style="overflow-x:auto"><table class="data-table"><thead><th>التاريخ</th><th>البيان</th><th>مدين</th><th>دائن</th><th>المبلغ</th></thead><tbody>${entries.map(e => `<tr><td>${e.date}</td><td>${e.description}</td><td>${e.debitAccount}</td><td>${e.creditAccount}</td><td>${formatCurrency(e.amount)}</td></tr>`).join('')}</tbody></div></div>`;
    document.getElementById('pageContent').innerHTML = html;
}

function renderTrialBalance() {
    let balances = {};
    db.journalEntries.forEach(e => { balances[e.debitAccount] = (balances[e.debitAccount]||0) + e.amount; balances[e.creditAccount] = (balances[e.creditAccount]||0) - e.amount; });
    let totalDebit = 0, totalCredit = 0, html = `<div class="card-box"><div class="card-header"><h3>⚖️ ميزان المراجعة</h3></div><div style="overflow-x:auto"><table class="data-table"><thead><th>الحساب</th><th>مدين</th><th>دائن</th></thead><tbody>`;
    for(let [acc,bal] of Object.entries(balances)) { if(bal > 0) { totalDebit += bal; html += `<tr><td>${acc}</td><td>${formatCurrency(bal)}</td><td>---</td></tr>`; } else if(bal < 0) { let abs = -bal; totalCredit += abs; html += `<tr><td>${acc}</td><td>---</td><td>${formatCurrency(abs)}<td></tr>`; } }
    html += `<tr style="background:var(--primary-dark);font-weight:bold"><td>الإجمالي</td><td class="profit-positive">${formatCurrency(totalDebit)}</td><td class="profit-positive">${formatCurrency(totalCredit)}</td></tr></tbody></div>${Math.abs(totalDebit-totalCredit)<1 ? '<div class="profit-positive" style="margin-top:10px;">✓ الميزان متوازن</div>' : '<div class="profit-negative" style="margin-top:10px;">✗ الميزان غير متوازن</div>'}</div>`;
    document.getElementById('pageContent').innerHTML = html;
}

function renderReports() {
    let html = `<div class="card-box"><div class="card-header"><h3>📊 قائمة الدخل</h3></div><div style="padding:10px;"><div class="flex-between"><span>المبيعات:</span><span class="profit-positive">${formatCurrency(totalSales())}</span></div><div class="flex-between"><span>(-) المشتريات:</span><span class="profit-negative">${formatCurrency(totalPurchases())}</span></div><div class="flex-between"><span>(-) المصروفات:</span><span class="profit-negative">${formatCurrency(totalExpenses())}</span></div><div class="flex-between"><span>(+) الإيرادات:</span><span class="profit-positive">${formatCurrency(totalRevenues())}</span></div><hr><div class="flex-between"><strong>صافي الربح:</strong><strong class="${netProfit() >= 0 ? 'profit-positive' : 'profit-negative'}">${formatCurrency(netProfit())}</strong></div></div></div>
    <div class="card-box"><div class="card-header"><h3>🥧 التحليل المالي</h3></div><canvas id="profitChart" height="200"></canvas></div>`;
    document.getElementById('pageContent').innerHTML = html;
    let ctx = document.getElementById('profitChart')?.getContext('2d');
    if(ctx) charts.push(new Chart(ctx, { type: 'doughnut', data: { labels: ['المبيعات','المشتريات','المصروفات','الإيرادات'], datasets: [{ data: [totalSales(),totalPurchases(),totalExpenses(),totalRevenues()], backgroundColor: ['#3b82f6','#f59e0b','#ef4444','#10b981'] }] }, options: { responsive: true } }));
}

function renderCurrencies() {
    let html = `<div class="card-box"><div class="card-header"><h3>💱 إدارة العملات</h3><button class="btn btn-success" onclick="addCurrency()">+ عملة جديدة</button></div><div style="overflow-x:auto"><table class="data-table"><thead><th>العملة</th><th>الرمز</th><th>سعر الصرف</th><th></th></thead><tbody>${currencies.map(c => `<tr><td><strong>${c.name}</strong> ${c.code === currentCurrency ? '✅' : ''}</td><td>${c.symbol}</td><td><input type="number" id="rate_${c.code}" value="${c.rate}" step="0.01" style="width:100px;"></td><td><button class="btn btn-primary" onclick="updateCurrency('${c.code}')">تحديث</button> <button class="btn btn-success" onclick="setCurrency('${c.code}')">تعيين</button></td></tr>`).join('')}</tbody></div></div>`;
    document.getElementById('pageContent').innerHTML = html;
}

function renderAbout() {
    let html = `<div class="card-box"><div style="text-align:center;padding:20px;"><div style="width:80px;height:80px;background:var(--primary);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 15px;font-size:32px;">🏢</div><h2>نظام إدارة المؤسسات</h2><h3 style="color:var(--primary);">ERP SYSTEM</h3><p><i class="fas fa-phone"></i> <strong>الهاتف:</strong> <span id="ownerPhone">+966 5X XXX XXXX</span> <button class="btn btn-primary btn-sm" onclick="editPhone()">تعديل</button></p><p><i class="fas fa-envelope"></i> <strong>البريد:</strong> <span id="ownerEmail">info@company.com</span> <button class="btn btn-primary btn-sm" onclick="editEmail()">تعديل</button></p></div></div>
    <div class="card-box"><div class="card-header"><h3>📊 إحصائيات</h3></div><div class="grid-2"><div>📦 المنتجات: ${db.inventory.length}</div><div>💰 الفواتير: ${db.sales.length}</div><div>👤 العملاء: ${db.clients.length}</div><div>🚚 الموردين: ${db.suppliers.length}</div></div></div>
    <div class="card-box"><div style="text-align:center;"><p>© ${new Date().getFullYear()} - جميع الحقوق محفوظة</p></div></div>`;
    document.getElementById('pageContent').innerHTML = html;
    let savedPhone = localStorage.getItem('owner_phone');
    let savedEmail = localStorage.getItem('owner_email');
    if(savedPhone) document.getElementById('ownerPhone').innerText = savedPhone;
    if(savedEmail) document.getElementById('ownerEmail').innerText = savedEmail;
}

// ==================== العمليات الأساسية ====================
function addProduct() { let name = prompt('اسم المنتج:'); if(!name) return; let qty = parseInt(prompt('الكمية:'))||0; let cost = parseFloat(prompt('سعر الشراء:'))||0; let sell = parseFloat(prompt('سعر البيع:'))||0; db.inventory.push({ id: Date.now(), name, qty, costPrice: cost, sellPrice: sell }); saveAll(); showNotification(`✅ تم إضافة ${name}`); renderInventory(); }
function deleteProduct(id) { if(confirm('حذف المنتج؟')) { db.inventory = db.inventory.filter(p => p.id !== id); saveAll(); showNotification('✅ تم الحذف'); renderInventory(); } }
function addSupplier() { let name = prompt('اسم المورد:'); if(!name) return; db.suppliers.push({ id: Date.now(), name, phone: prompt('الهاتف:')||'', address: prompt('العنوان:')||'' }); saveAll(); showNotification(`✅ تم إضافة ${name}`); renderSuppliers(); }
function addClient() { let name = prompt('اسم العميل:'); if(!name) return; db.clients.push({ id: Date.now(), name, phone: prompt('الهاتف:')||'', address: prompt('العنوان:')||'' }); saveAll(); showNotification(`✅ تم إضافة ${name}`); renderClients(); }
function addExpense() { let type = prompt('نوع المصروف:'); if(!type) return; let amount = parseFloat(prompt('المبلغ:'))||0; db.expenses.push({ id: Date.now(), type, amount, date: todayISO() }); addJournalEntry(`مصروف ${type}`, 'المصروفات', 'النقدية', amount); saveAll(); showNotification(`✅ تم إضافة مصروف`); renderExpensesRevenues(); }
function addRevenue() { let type = prompt('نوع الإيراد:'); if(!type) return; let amount = parseFloat(prompt('المبلغ:'))||0; db.revenues.push({ id: Date.now(), type, amount, date: todayISO() }); addJournalEntry(`إيراد ${type}`, 'النقدية', 'الإيرادات', amount); saveAll(); showNotification(`✅ تم إضافة إيراد`); renderExpensesRevenues(); }
function addPurchase() { if(db.suppliers.length===0){ showNotification('⚠️ أضف مورد أولا','error'); return; } let sup = db.suppliers[0]; let productName = prompt('اسم المنتج:'); if(!productName) return; let qty = parseInt(prompt('الكمية:'))||0; let price = parseFloat(prompt('سعر الوحدة:'))||0; let total = qty*price; let paid = parseFloat(prompt('المدفوع:'))||0; let newId = db.settings.nextPurchaseId++; db.purchases.push({ id: newId, supplierId: sup.id, supplierName: sup.name, productName, qty, price, total, paid, status: paid>=total?'مدفوع':'آجل', dateISO: todayISO() }); let existing = db.inventory.find(p=>p.name===productName); if(existing) { existing.qty += qty; existing.costPrice = price; } else { db.inventory.push({ id: Date.now(), name: productName, qty, costPrice: price, sellPrice: price*1.3 }); } addJournalEntry(`شراء #${newId}`, 'المخزون', 'الموردين', total); saveAll(); showNotification(`✅ تمت فاتورة شراء`); renderPurchases(); }
function quickAddSale() { if(db.inventory.length===0){ showNotification('⚠️ لا توجد منتجات','error'); return; } let prod = db.inventory[0]; let qty = parseInt(prompt(`الكمية المتاحة: ${prod.qty}`))||1; if(qty>prod.qty){ showNotification('⚠️ كمية غير متوفرة','error'); return; } let total = qty*(prod.sellPrice||prod.costPrice*1.3); let paid = parseFloat(prompt('المدفوع:'))||0; let newId = db.settings.nextInvoiceId++; prod.qty -= qty; db.sales.push({ id: newId, clientName: prompt('اسم العميل:','عميل نقدي'), productName: prod.name, qty, price: prod.sellPrice||prod.costPrice*1.3, total, paid, status: paid>=total?'مدفوع':'آجل', dateISO: todayISO() }); addJournalEntry(`مبيعات #${newId}`, paid>=total?'النقدية':'العملاء', 'المبيعات', total); saveAll(); showNotification(`✅ تمت فاتورة ${formatCurrency(total)}`); renderSales(); }
function showSaleDetails(id) { let s = db.sales.find(s=>s.id===id); if(!s) return; openModal(`<h2>🧾 فاتورة #${s.id}</h2><hr><div><strong>التاريخ:</strong> ${s.dateISO}</div><div><strong>العميل:</strong> ${s.clientName}</div><div><strong>المنتج:</strong> ${s.productName}</div><div><strong>المبلغ:</strong> ${formatCurrency(s.total)}</div><div><strong>المدفوع:</strong> ${formatCurrency(s.paid||0)}</div><div><strong>المتبقي:</strong> ${formatCurrency((s.total||0)-(s.paid||0))}</div><div><strong>الحالة:</strong> <span class="badge ${s.status==='مدفوع'?'badge-success':'badge-warning'}">${s.status}</span></div><hr><button class="btn btn-primary" onclick="closeModal()">إغلاق</button>`); }
function openModal(html) { document.getElementById('modalContentInner').innerHTML = html; document.getElementById('detailsModal').classList.add('show'); }
function closeModal() { document.getElementById('detailsModal').classList.remove('show'); }
function setCurrency(code) { currentCurrency = code; localStorage.setItem('erp_currency', code); showNotification(`✅ تم تغيير العملة`); renderDashboard(); }
function updateCurrency(code) { let rate = parseFloat(document.getElementById(`rate_${code}`).value); let currency = currencies.find(c => c.code === code); if(currency) currency.rate = rate; saveAll(); showNotification(`✅ تم تحديث سعر ${code}`); renderCurrencies(); }
function addCurrency() { let code = prompt('رمز العملة:'); if(!code) return; let name = prompt('اسم العملة:'); let symbol = prompt('الرمز:'); let rate = parseFloat(prompt('سعر الصرف:')); currencies.push({ code: code.toUpperCase(), name, symbol, rate }); saveAll(); showNotification(`✅ تم إضافة عملة ${name}`); renderCurrencies(); }
function editPhone() { let newPhone = prompt('رقم الهاتف الجديد:'); if(newPhone) { document.getElementById('ownerPhone').innerText = newPhone; localStorage.setItem('owner_phone', newPhone); showNotification('✅ تم التحديث'); } }
function editEmail() { let newEmail = prompt('البريد الجديد:'); if(newEmail) { document.getElementById('ownerEmail').innerText = newEmail; localStorage.setItem('owner_email', newEmail); showNotification('✅ تم التحديث'); } }
function exportToExcel() { let data = []; db.inventory.forEach(i => data.push({ القسم:'المخزون', المنتج:i.name, الكمية:i.qty, سعر_الشراء:i.costPrice, سعر_البيع:i.sellPrice })); db.sales.forEach(s => data.push({ القسم:'المبيعات', التاريخ:s.dateISO, العميل:s.clientName, المبلغ:s.total })); let ws = XLSX.utils.json_to_sheet(data); let wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "ERP_DATA"); XLSX.writeFile(wb, `ERP_${todayISO()}.xlsx`); showNotification('✅ تم التصدير'); }

function switchPage(pageId) {
    document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
    event.currentTarget.classList.add('active');
    destroyCharts();
    if(pageId === 'dashboard') renderDashboard();
    else if(pageId === 'inventory') renderInventory();
    else if(pageId === 'suppliers') renderSuppliers();
    else if(pageId === 'purchases') renderPurchases();
    else if(pageId === 'sales') renderSales();
    else if(pageId === 'pos') renderPOS();
    else if(pageId === 'clients') renderClients();
    else if(pageId === 'expenses_rev') renderExpensesRevenues();
    else if(pageId === 'accounting') renderAccounting();
    else if(pageId === 'trial_balance') renderTrialBalance();
    else if(pageId === 'reports') renderReports();
    else if(pageId === 'currencies') renderCurrencies();
    else if(pageId === 'about') renderAbout();
}

function initDemoData() {
    if(db.inventory.length === 0) {
        db.inventory = [{ id: 101, name: 'مكتب خشبي', qty: 20, costPrice: 1500, sellPrice: 2500 }, { id: 102, name: 'كرسي دوار', qty: 35, costPrice: 500, sellPrice: 900 }];
        db.clients = [{ id: 201, name: 'شركة الأهرام', phone: '051234567', address: 'الرياض' }];
        db.suppliers = [{ id: 5001, name: 'العالمية', phone: '055555555', address: 'جدة' }];
        db.purchases = [{ id: 3001, supplierId: 5001, supplierName: 'العالمية', productName: 'مكتب خشبي', qty: 10, price: 1500, total: 15000, paid: 15000, status: 'مدفوع', dateISO: todayISO() }];
        db.sales = [{ id: 4001, clientName: 'شركة الأهرام', productName: 'مكتب خشبي', qty: 2, price: 2500, total: 5000, paid: 5000, status: 'مدفوع', dateISO: todayISO() }];
        saveAll(); showNotification('✅ تم تحميل البيانات التجريبية');
    }
}

initDemoData();
switchPage('dashboard');
</script>
