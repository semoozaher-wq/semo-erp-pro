<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEMO ERP | دخول</title>
    <style>
        /* إعدادات الصفحة العامة */
        body { 
            background: #0f172a; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            transition: background 0.3s ease;
        }

        /* كارت تسجيل الدخول */
        .card { 
            background: #1e293b; 
            padding: 40px 30px; 
            border-radius: 20px; 
            width: 350px; 
            text-align: center; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
            border: 1px solid #334155; 
            transition: background-color 0.3s ease, color 0.3s ease; 
            position: relative;
        }

        /* الوضع الفاتح */
        body.light-mode {
            background: #f1f5f9;
            color: #1e293b;
        }
        body.light-mode .card {
            background: #ffffff;
            color: #1e293b;
            border-color: #e2e8f0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        body.light-mode input {
            background: #f8fafc;
            color: #334155;
            border-color: #cbd5e1;
        }
        body.light-mode .link, body.light-mode .forgot-password {
            color: #64748b;
        }

        h1 { 
            color: #3b82f6; 
            margin-bottom: 10px; 
            font-size: 28px; 
            letter-spacing: 1px;
        }

        /* شعار التطبيق */
        .logo {
            width: 80px;
            height: 80px;
            background: #3b82f6;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: white;
            font-weight: bold;
            font-size: 24px;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        /* تصميم الحقول */
        input { 
            width: 100%; 
            padding: 14px; 
            margin: 12px 0; 
            border-radius: 10px; 
            border: 1px solid #334155; 
            outline: none; 
            font-size: 16px; 
            background: #0f172a; 
            color: white; 
            box-sizing: border-box; 
            transition: all 0.3s ease;
        }

        input:focus { 
            border-color: #3b82f6; 
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2);
        }

        /* زر عرض/إخفاء كلمة السر */
        .toggle-password {
            position: absolute;
            left: 15px; /* لأن الاتجاه RTL */
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #94a3b8;
            font-size: 18px;
            background: none;
            border: none;
            outline: none;
            padding: 0;
        }
        .toggle-password:hover { color: #3b82f6; }

        /* تصميم الأزرار */
        .btn { 
            width: 100%; 
            padding: 14px; 
            background: #3b82f6; 
            border: none; 
            color: white; 
            font-weight: bold; 
            border-radius: 10px; 
            cursor: pointer; 
            margin-top: 20px; 
            font-size: 16px; 
            transition: background 0.3s ease;
        }
        .btn:hover { background: #2563eb; }
        .btn-green { background: #10b981 !important; }
        .btn-green:hover { background: #059669 !important; }

        /* الروابط */
        .link, .forgot-password { 
            color: #94a3b8; 
            cursor: pointer; 
            display: block; 
            margin-top: 15px; 
            font-size: 14px; 
            text-decoration: none;
            transition: color 0.3s ease;
        }
        .link:hover, .forgot-password:hover { color: #3b82f6; text-decoration: underline; }

        /* زر الوضع */
        .mode-toggle { 
            position: absolute; 
            top: 20px; 
            right: 20px; 
            background: none; 
            border: none; 
            color: #94a3b8; 
            font-size: 24px; 
            cursor: pointer; 
            transition: color 0.3s ease;
        }
        .mode-toggle:hover { color: #3b82f6; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="card">
        <button class="mode-toggle" onclick="toggleMode()">🌙</button>
        
        <div class="logo">SEMO</div>
        <h1>SEMO ERP</h1>

        <!-- واجهة تسجيل الدخول -->
        <div id="login-box">
            <input type="text" id="l-id" placeholder="الإيميل أو رقم الهاتف">
            <div style="position: relative;">
                <input type="password" id="l-p" placeholder="كلمة المرور">
                <button class="toggle-password" type="button" onclick="togglePassword('l-p')">👁️</button>
            </div>
            <button class="btn" onclick="login()">دخول</button>
            <span class="link" onclick="toggle()">تأسيس حساب جديد</span>
            <a href="#" class="forgot-password" onclick="forgotPassword()">نسيت كلمة المرور؟</a>
        </div>

        <!-- واجهة إنشاء حساب جديد -->
        <div id="signup-box" class="hidden">
            <input type="email" id="s-e" placeholder="البريد الإلكتروني">
            <input type="tel" id="s-ph" placeholder="رقم الهاتف">
            <div style="position: relative;">
                <input type="password" id="s-p" placeholder="كلمة المرور">
                <button class="toggle-password" type="button" onclick="togglePassword('s-p')">👁️</button>
            </div>
            <button class="btn btn-green" onclick="signup()">إنشاء حساب</button>
            <span class="link" onclick="toggle()">العودة لتسجيل الدخول</span>
        </div>
    </div>

    <script>
        // دالة تبديل الوضع الفاتح/الداكن
        function toggleMode() {
            const body = document.body;
            const btn = document.querySelector('.mode-toggle');
            body.classList.toggle('light-mode');
            
            if (body.classList.contains('light-mode')) {
                btn.textContent = '☀️';
            } else {
                btn.textContent = '🌙';
            }
        }

        // دالة التبديل بين واجهة الدخول والحساب الجديد
        function toggle() {
            const loginBox = document.getElementById('login-box');
            const signupBox = document.getElementById('signup-box');
            
            if (loginBox.classList.contains('hidden')) {
                loginBox.classList.remove('hidden');
                signupBox.classList.add('hidden');
            } else {
                loginBox.classList.add('hidden');
                signupBox.classList.remove('hidden');
            }
        }

        // دالة عرض/إخفاء كلمة السر
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const btn = document.querySelector(`button[onclick="togglePassword('${inputId}')"]`);
            
            if (input.type === 'password') {
                input.type = 'text';
                btn.textContent = '🙈';
            } else {
                input.type = 'password';
                btn.textContent = '👁️';
            }
        }

        // دالة تسجيل الدخول
        function login() {
            const id = document.getElementById('l-id').value;
            const password = document.getElementById('l-p').value;

            if (!id || !password) {
                alert('⚠️ يرجى ملء جميع الحقول');
                return;
            }
            // محاكاة تسجيل الدخول
            alert(`✅ جاري تسجيل الدخول...\nالبيانات: ${id}`);
        }

        // دالة إنشاء حساب جديد
        function signup() {
            const email = document.getElementById('s-e').value;
            const phone = document.getElementById('s-ph').value;
            const password = document.getElementById('s-p').value;

            if (!email || !phone || !password) {
                alert('⚠️ يرجى ملء جميع الحقول');
                return;
            }

            // التحقق من البريد الإلكتروني
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                alert('⚠️ تنسيق البريد الإلكتروني غير صحيح');
                return;
            }

            // التحقق من كلمة المرور
            if (password.length < 6) {
                alert('⚠️ كلمة المرور يجب أن تكون 6 أحرف على الأقل');
                return;
            }

            // محاكاة إنشاء حساب
            alert(`✅ جاري إنشاء الحساب...\nالبريد: ${email}\nالهاتف: ${phone}`);
        }

        // دالة نسيت كلمة المرور
        function forgotPassword() {
            const id = document.getElementById('l-id').value;
            if (!id) {
                alert('⚠️ يرجى إدخال الإيميل أو الهاتف لاستعادة كلمة المرور');
                return;
            }
            alert(`📧 تم إرسال رابط الاستعادة إلى: ${id}`);
        }
    </script>
</body>
</html>
