function dR(){let n=document.getElementById('rn').value.trim(),u=document.getElementById('ru').value.trim(),p=document.getElementById('rp').value;if(!n||!u||!p){toast('جميع الحقول مطلوبة','e');return}if(db.us.find(x=>x.un===u)){toast('اسم المستخدم موجود','e');return}db.us.push({id:gi(),nm:n,un:u,pw:p,rl:'user'});saveAll();toast('تم التسجيل بنجاح','s');document.getElementById('rd').style.display='none';document.getElementById('ld').style.display='block';}

function tDk(){dk=!dk;localStorage.setItem('erp_dark',dk?'1':'0');applyDark();}
function applyDark(){document.body.classList.toggle('dk',dk);document.getElementById('dkI').innerHTML=dk?'<i class="fas fa-sun"></i> وضع عادي':'<i class="fas fa-moon"></i> وضع ليلي';}
function tNt(){document.getElementById('nPa').classList.toggle('sh');}
function upNotif(){let n=[];db.inv.filter(i=>i.qt<=5&&i.qt>0).forEach(i=>n.push({t:'⚠️ "'+i.nm+'" منخفض ('+i.qt+')'}));db.sl.filter(s=>s.st==='آجل').forEach(s=>n.push({t:'💰 فاتورة #'+s.id+' متبقي '+fmt(s.gr-s.pd)}));if(credT()>0)n.push({t:'💰 ذمم مدينة: '+fmt(credT())});if(lowS()>0)n.push({t:'⚠️ '+lowS()+' منتج منخفض'});if(!n.length)n.push({t:'✅ لا توجد تنبيهات'});document.getElementById('nCt').innerText=n.length;document.getElementById('nCt').style.display=n.length?'flex':'none';document.getElementById('nPa').innerHTML=n.map(x=>'<div class="ni">'+x.t+'</div>').join('');}
function buildMenu(){document.getElementById('mB').innerHTML=MENUS.map(m=>'<div class="mi'+(m.id===cPg?' ac':'')+'" onclick="showPage(\''+m.id+'\')"><i class="fas '+m.i+'"></i><span>'+m.l+'</span></div>').join('');}
function showPage(p){cPg=p;if(charts.length)charts.forEach(c=>{try{c.destroy()}catch(e){}});charts=[];buildMenu();upNotif();let el=document.getElementById('pg');if(p==='dashboard')rDash(el);else if(p==='inventory')rInv(el);else if(p==='suppliers')rSup(el);else if(p==='purchases')rPur(el);else if(p==='sales')rSal(el);else if(p==='clients')rCli(el);else if(p==='pos')rPos(el);else if(p==='expenses')rExp(el);else if(p==='accounting')rAcc(el);else if(p==='settings')rSet(el);else if(p==='backup')rBak(el);}
// ========== لوحة التحكم مع كروت تفاعلية ==========
function rDash(el){let al=[];db.inv.filter(i=>i.qt<=5&&i.qt>0).forEach(i=>al.push({t:'"'+i.nm+'" منخفض ('+i.qt+')',c:'var(--wr)'}));if(credT()>0)al.push({t:'ذمم مدينة: '+fmt(credT()),c:'var(--er)'});let ins=al.length?al.slice(0,4).map(a=>'<li><i class="fas fa-exclamation-triangle" style="color:'+a.c+'"></i> '+a.t+'</li>').join(''):'<li><i class="fas fa-check-circle" style="color:var(--ok)"></i> النظام يعمل بشكل طبيعي</li>';el.innerHTML='<div class="aib"><h4><i class="fas fa-robot"></i> تحليلات ذكية</h4><ul>'+ins+'</ul></div><div class="sg"><div class="sc" onclick="showPage(\'sales\')"><div class="si">💰</div><div class="sv">'+fmt(sumSl())+'</div><div class="sl">إجمالي المبيعات</div></div><div class="sc" onclick="showPage(\'purchases\')"><div class="si">🛒</div><div class="sv">'+fmt(sumPur())+'</div><div class="sl">إجمالي المشتريات</div></div><div class="sc"><div class="si">📊</div><div class="sv '+(netP()>=0?'tg':'tr')+'">'+fmt(netP())+'</div><div class="sl">صافي الربح</div></div><div class="sc" onclick="showPage(\'inventory\')"><div class="si">📦</div><div class="sv">'+fmt(invV())+'</div><div class="sl">قيمة المخزون</div></div><div class="sc" onclick="showPage(\'expenses\')"><div class="si">🧾</div><div class="sv">'+fmt(sumExp())+'</div><div class="sl">المصروفات</div></div><div class="sc" onclick="filterLowStock()"><div class="si">⚠️</div><div class="sv '+(lowS()>0?'tr':'')+'">'+lowS()+'</div><div class="sl">مخزون منخفض</div></div></div><div class="sg"><div class="sc" onclick="showPage(\'clients\')"><div class="si">👥</div><div class="sv">'+db.cl.length+'</div><div class="sl">العملاء</div></div><div class="sc" onclick="showPage(\'suppliers\')"><div class="si">🚚</div><div class="sv">'+db.sp.length+'</div><div class="sl">الموردين</div></div><div class="sc" onclick="showCreditClients()"><div class="si">💸</div><div class="sv '+(credT()>0?'tr':'')+'">'+fmt(credT())+'</div><div class="sl">ذمم مدينة (عملاء)</div></div></div><div class="cb"><h3>🕐 آخر العمليات</h3><div class="tw"><table class="dt"><thead><tr><th>الوقت</th><th>المستخدم</th><th>العملية</th><th>التفاصيل</th></tr></thead><tbody>'+(logs.slice(0,10).map(l=>'<tr><td>'+new Date(l.t).toLocaleTimeString('ar')+'</td><td>'+es(l.u)+'</td><td>'+es(l.a)+'<td>'+es(l.d)+'</td></tr>').join('')||'<tr><td colspan="4" style="text-align:center">لا توجد عمليات</td></tr>')+'</tbody></table></div></div>';}
function filterLowStock(){cPg='inventory';buildMenu();let el=document.getElementById('pg');rInv(el);let q=document.getElementById('invSearch');if(q)q.value='';let rows=document.querySelectorAll('#invTable tbody tr');rows.forEach(row=>{let qt=parseInt(row.children[3]?.innerText);if(qt>5)row.style.display='none';});toast('عرض المنتجات منخفضة المخزون فقط','i');}
function showCreditClients(){let cls=db.cl.filter(c=>db.sl.filter(s=>s.ci===c.id&&s.st==='آجل').reduce((a,s)=>a+(s.gr-s.pd),0)>0);if(cls.length===0){toast('لا توجد ذمم مدينة','w');return}let h='<h2>💸 العملاء عليهم ذمم مدينة</h2><div class="tw"><table class="dt"><thead><tr><th>الاسم</th><th>الهاتف</th><th>إجمالي المتبقي</th><th>إجراءات</th></tr></thead><tbody>'+cls.map(c=>{let d=db.sl.filter(s=>s.ci===c.id&&s.st==='آجل').reduce((a,s)=>a+(s.gr-s.pd),0);return'<tr><td style="font-weight:700;cursor:pointer" onclick="closeModal();viewClientAccount('+c.id+')">'+es(c.nm)+'</td><td>'+es(c.ph)+'</td><td class="tr">'+fmt(d)+'</td><td><button class="b bi" onclick="closeModal();viewClientAccount('+c.id+')">عرض الحساب</button></td></tr>'}).join('')+'</tbody></table></div><div class="sb"><button class="b bd" onclick="closeModal()">إغلاق</button></div>';openModal(h);}
// ========== المخزون ==========
function rInv(el){el.innerHTML='<div class="cb"><div class="ch"><h3>📦 المخزون ('+db.inv.length+')</h3><button class="b bs" onclick="addProduct()">+ إضافة</button></div><div class="sx"><input type="text" id="invSearch" placeholder="بحث..." oninput="filterInv()"></div><div class="tw"><table class="dt" id="invTable"><thead><tr><th>#</th><th>المنتج</th><th>التصنيف</th><th>الكمية</th><th>سعر الشراء</th><th>سعر البيع</th><th>القيمة</th><th>الحالة</th><th>إجراءات</th></tr></thead><tbody>'+invRows(db.inv)+'</tbody></table></div></div>';}
function invRows(it){if(!it.length)return'<tr><td colspan="9" style="text-align:center">لا توجد منتجات</td></tr>';return it.map((p,i)=>{let st=p.qt<=0?'<span class="bg bg-r">نفد</span>':p.qt<=5?'<span class="bg bg-y">منخفض</span>':'<span class="bg bg-g">متوفر</span>';return'<tr><td>'+(i+1)+'</td><td style="font-weight:700">'+es(p.nm)+'</td><td><span class="bg bg-b">'+es(p.ct)+'</span></td><td>'+p.qt+'</td><td>'+fmt(p.cp)+'</td><td>'+fmt(p.sp)+'</td><td>'+fmt(p.qt*p.cp)+'</td><td>'+st+'</td><td><button class="b bi" style="padding:4px 8px" onclick="editProduct('+p.id+')"><i class="fas fa-edit"></i></button> <button class="b bd" onclick="deleteProduct('+p.id+')"><i class="fas fa-trash"></i></button></td></tr>';}).join('');}
function filterInv(){let q=document.getElementById('invSearch').value.toLowerCase();document.querySelector('#invTable tbody').innerHTML=invRows(db.inv.filter(p=>p.nm.toLowerCase().includes(q)));}
function addProduct(){if(!isAdmin()){toast('غير مصرح','e');return}openModal('<h2>➕ إضافة منتج</h2><div class="g2"><div class="fg"><label>الاسم</label><input id="pNm"></div><div class="fg"><label>التصنيف</label><select id="pCt">'+CATEGORIES.map(c=>'<option>'+c+'</option>').join('')+'</select></div></div><div class="g2"><div class="fg"><label>سعر الشراء</label><input type="number" id="pCp" value="0"></div><div class="fg"><label>سعر البيع</label><input type="number" id="pSp" value="0"></div></div><div class="fg"><label>الكمية</label><input type="number" id="pQt" value="0"></div><div class="sb"><button class="b bs" onclick="saveProduct()">حفظ</button><button class="b bd" onclick="closeModal()">إلغاء</button></div>');}
function saveProduct(){let nm=document.getElementById('pNm').value.trim();if(!nm){toast('أدخل الاسم','e');return}let qt=parseInt(document.getElementById('pQt').value)||0,cp=parseFloat(document.getElementById('pCp').value)||0,sp=parseFloat(document.getElementById('pSp').value)||0;db.inv.push({id:gi(),nm:nm,ct:document.getElementById('pCt').value,qt:qt,cp:cp,sp:sp||cp*1.3});saveAll();closeModal();addLog('إضافة منتج',nm);toast('تمت الإضافة','s');showPage('inventory');}
function editProduct(id){let p=db.inv.find(x=>x.id===id);if(!p)return;openModal('<h2>✏️ تعديل منتج</h2><div class="g2"><div class="fg"><label>الاسم</label><input id="pNm" value="'+es(p.nm)+'"></div><div class="fg"><label>التصنيف</label><select id="pCt">'+CATEGORIES.map(c=>'<option'+(c===p.ct?' selected':'')+'>'+c+'</option>').join('')+'</select></div></div><div class="g2"><div class="fg"><label>سعر الشراء</label><input type="number" id="pCp" value="'+p.cp+'"></div><div class="fg"><label>سعر البيع</label><input type="number" id="pSp" value="'+p.sp+'"></div></div><div class="fg"><label>الكمية</label><input type="number" id="pQt" value="'+p.qt+'"></div><div class="sb"><button class="b bs" onclick="updateProduct('+id+')">تحديث</button><button class="b bd" onclick="closeModal()">إلغاء</button></div>');}
function updateProduct(id){let p=db.inv.find(x=>x.id===id);if(!p)return;p.nm=document.getElementById('pNm').value.trim();p.ct=document.getElementById('pCt').value;p.cp=parseFloat(document.getElementById('pCp').value)||0;p.sp=parseFloat(document.getElementById('pSp').value)||0;p.qt=parseInt(document.getElementById('pQt').value)||0;saveAll();closeModal();addLog('تعديل منتج',p.nm);toast('تم التحديث','s');showPage('inventory');}
function deleteProduct(id){if(!confirm('حذف المنتج؟'))return;db.inv=db.inv.filter(x=>x.id!==id);saveAll();toast('تم الحذف','s');showPage('inventory');}
// ========== الموردين ==========
function rSup(el){el.innerHTML='<div class="cb"><div class="ch"><h3>🚚 الموردين ('+db.sp.length+')</h3><button class="b bs" onclick="addSupplier()">+ إضافة</button></div><div class="sx"><input type="text" id="supSearch" placeholder="بحث..." oninput="filterSup()"></div><div class="tw"><table class="dt" id="supTable"><thead><tr><th>#</th><th>الاسم</th><th>الهاتف</th><th>العنوان</th><th>التصنيف</th><th>الرصيد(ذمم)</th><th>إجراءات</th></tr></thead><tbody>'+supRows(db.sp)+'</tbody></table></div></div>';}
function supRows(it){if(!it.length)return'<tr><td colspan="7" style="text-align:center">لا يوجد موردين</td></tr>';return it.map((s,i)=>{let bl=db.pu.filter(p=>p.si===s.id&&p.st==='آجل').reduce((a,p)=>a+(p.tt-p.pd),0);return'<tr><td>'+(i+1)+'</td><td style="font-weight:700;cursor:pointer;color:var(--pri)" onclick="viewSupAcc('+s.id+')">'+es(s.nm)+'</td><td>'+es(s.ph)+'</td><td>'+es(s.ad)+'</td><td><span class="bg bg-g">'+es(s.ct)+'</span></td><td class="'+(bl>0?'tr':'')+'">'+fmt(bl)+'</td><td><button class="b bi" onclick="editSupplier('+s.id+')"><i class="fas fa-edit"></i></button> <button class="b bd" onclick="deleteSupplier('+s.id+')"><i class="fas fa-trash"></i></button></td></tr>';}).join('');}
function filterSup(){let q=document.getElementById('supSearch').value.toLowerCase();document.querySelector('#supTable tbody').innerHTML=supRows(db.sp.filter(s=>s.nm.toLowerCase().includes(q)));}
function addSupplier(){if(!isAdmin()){toast('غير مصرح','e');return}openModal('<h2>➕ إضافة مورد</h2><div class="fg"><label>الاسم</label><input id="sNm"></div><div class="fg"><label>الهاتف</label><input id="sPh"></div><div class="fg"><label>العنوان</label><input id="sAd"></div><div class="fg"><label>التصنيف</label><select id="sCt">'+CATEGORIES.map(c=>'<option>'+c+'</option>').join('')+'</select></div><div class="sb"><button class="b bs" onclick="saveSupplier()">حفظ</button><button class="b bd" onclick="closeModal()">إلغاء</button></div>');}
function saveSupplier(){let nm=document.getElementById('sNm').value.trim();if(!nm){toast('أدخل الاسم','e');return}db.sp.push({id:gi(),nm:nm,ph:document.getElementById('sPh').value,ad:document.getElementById('sAd').value,ct:document.getElementById('sCt').value});saveAll();closeModal();addLog('إضافة مورد',nm);toast('تمت الإضافة','s');showPage('suppliers');}
function editSupplier(id){let s=db.sp.find(x=>x.id===id);if(!s)return;openModal('<h2>✏️ تعديل مورد</h2><div class="fg"><label>الاسم</label><input id="sNm" value="'+es(s.nm)+'"></div><div class="fg"><label>الهاتف</label><input id="sPh" value="'+es(s.ph)+'"></div><div class="fg"><label>العنوان</label><input id="sAd" value="'+es(s.ad)+'"></div><div class="fg"><label>التصنيف</label><select id="sCt">'+CATEGORIES.map(c=>'<option'+(c===s.ct?' selected':'')+'>'+c+'</option>').join('')+'</select></div><div class="sb"><button class="b bs" onclick="updateSupplier('+id+')">تحديث</button><button class="b bd" onclick="closeModal()">إلغاء</button></div>');}
function updateSupplier(id){let s=db.sp.find(x=>x.id===id);if(!s)return;s.nm=document.getElementById('sNm').value.trim();s.ph=document.getElementById('sPh').value;s.ad=document.getElementById('sAd').value;s.ct=document.getElementById('sCt').value;saveAll();closeModal();addLog('تعديل مورد',s.nm);toast('تم التحديث','s');showPage('suppliers');}
function deleteSupplier(id){if(db.pu.some(p=>p.si===id)){toast('لا يمكن حذف مورد له مشتريات','e');return}if(!confirm('حذف المورد؟'))return;db.sp=db.sp.filter(x=>x.id!==id);saveAll();toast('تم الحذف','s');showPage('suppliers');}
function viewSupAcc(id){let s=db.sp.find(x=>x.id===id);let purs=db.pu.filter(p=>p.si===id);let total=purs.reduce((a,p)=>a+p.tt,0),paid=purs.reduce((a,p)=>a+p.pd,0);let h='<h2>'+es(s.nm)+'</h2><div class="ib"><div class="sr"><span>📞 الهاتف:</span><span>'+es(s.ph)+'</span></div><div class="sr"><span>📍 العنوان:</span><span>'+es(s.ad)+'</span></div><div class="sr"><span>💰 إجمالي المشتريات:</span><strong>'+fmt(total)+'</strong></div><div class="sr"><span>💳 المدفوع:</span><span class="tg">'+fmt(paid)+'</span></div><div class="sr"><span>📉 المتبقي:</span><span class="tr">'+fmt(total-paid)+'</span></div></div><h3>📋 سجل الفواتير (زيادة/نقصان)</h3><div class="tw"><table class="dt"><thead><tr><th>#</th><th>التاريخ</th><th>المنتج</th><th>الكمية</th><th>الإجمالي</th><th>المدفوع</th><th>الحالة</th><th>طباعة</th><th>مشاركة</th></tr></thead><tbody>'+purs.map(p=>'<tr><td>'+p.id+'</td><td>'+p.dt+'</td><td>'+es(p.pn)+'</td><td>'+p.qt+'</td><td>'+fmt(p.tt)+'</td><td>'+fmt(p.pd)+'</td><td><span class="bg '+(p.st==='مدفوع'?'bg-g':'bg-y')+'">'+p.st+'</span></td><td><button class="b bi" onclick="printPurchase('+p.id+')"><i class="fas fa-print"></i></button></td><td><button class="b bpi" onclick="sharePurchase('+p.id+')"><i class="fab fa-whatsapp"></i></button></td></tr>').join('')||'<tr><td colspan="9" style="text-align:center">لا توجد فواتير</td></tr>'}</tbody></table></div><div class="sb"><button class="b bpi" onclick="printSupplierAccount('+s.id+')"><i class="fas fa-print"></i> طباعة كشف الحساب</button><button class="b bd" onclick="closeModal()">إغلاق</button></div>';openModal(h);}
function printSupplierAccount(id){let s=db.sp.find(x=>x.id===id);let purs=db.pu.filter(p=>p.si===id);let w=window.open('','_blank');w.document.write('<html dir="rtl"><head><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet"><style>body{font-family:Cairo;padding:30px}</style></head><body><h1>كشف حساب المورد: '+es(s.nm)+'</h1><p>الهاتف: '+es(s.ph)+' | العنوان: '+es(s.ad)+'</p><table border="1" style="width:100%;border-collapse:collapse"><thead><tr><th>#</th><th>التاريخ</th><th>المنتج</th><th>الكمية</th><th>الإجمالي</th></tr></thead><tbody>'+purs.map(p=>'<tr><td>'+p.id+'</td><td>'+p.dt+'</td><td>'+es(p.pn)+'</td><td>'+p.qt+'</td><td>'+fmt(p.tt)+'</td></tr>').join('')+'</tbody></table><p>إجمالي المشتريات: '+fmt(purs.reduce((a,p)=>a+p.tt,0))+'</p><script>window.print();window.close();<\/script></body></html>');w.document.close();}
function sharePurchase(id){let p=db.pu.find(x=>x.id===id);if(!p)return;let text='فاتورة شراء #'+p.id+'%0Aالمورد: '+p.sn+'%0Aالمنتج: '+p.pn+'%0Aالكمية: '+p.qt+'%0Aالإجمالي: '+fmt(p.tt);window.open('https://wa.me/?text='+encodeURIComponent(text),'_blank');}
function printPurchase(id){let p=db.pu.find(x=>x.id===id);let w=window.open('','_blank');w.document.write('<html dir="rtl"><head><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet"><style>body{font-family:Cairo;padding:30px}</style></head><body><h1>فاتورة شراء #'+p.id+'</h1><p>التاريخ: '+p.dt+'</p><p>المورد: '+es(p.sn)+'</p><p>المنتج: '+es(p.pn)+'</p><p>الكمية: '+p.qt+'</p><p>الإجمالي: '+fmt(p.tt)+'</p><script>window.print();window.close();<\/script></body></html>');w.document.close();}
// ========== المشتريات ==========
function rPur(el){let tot=db.pu.reduce((a,p)=>a+p.tt,0),paid=db.pu.reduce((a,p)=>a+p.pd,0);el.innerHTML='<div class="sxb"><div class="sr"><span>💰 إجمالي المشتريات:</span><strong>'+fmt(tot)+'</strong></div><div class="sr"><span>💳 المدفوع:</span><strong class="tg">'+fmt(paid)+'</strong></div><div class="sr"><span>📉 المتبقي:</span><strong class="tr">'+fmt(tot-paid)+'</strong></div></div><div class="cb"><div class="ch"><h3>🛒 فواتير الشراء</h3><button class="b bs" onclick="addPurchase()">+ فاتورة</button></div><div class="sx"><input type="text" id="purSearch" placeholder="بحث..." oninput="filterPur()"></div><div class="tw"><table class="dt" id="purTable"><thead><tr><th>#</th><th>التاريخ</th><th>المورد</th><th>المنتج</th><th>الكمية</th><th>الإجمالي</th><th>المدفوع</th><th>الحالة</th><th>إجراءات</th></tr></thead><tbody>'+purRows(db.pu)+'</tbody></table></div></div>';}
function purRows(it){if(!it.length)return'<tr><td colspan="9" style="text-align:center">لا توجد فواتير</td></tr>';return it.map(p=>'<tr><td>'+p.id+'</td><td>'+p.dt+'</td><td style="cursor:pointer;color:var(--pri)" onclick="viewSupAcc('+p.si+')">'+es(p.sn)+'</td><td>'+es(p.pn)+'</td><td>'+p.qt+'</td><td>'+fmt(p.tt)+'</td><td>'+fmt(p.pd)+'</td><td><span class="bg '+(p.st==='مدفوع'?'bg-g':'bg-y')+'">'+p.st+'</span></td><td><button class="b bi" onclick="viewPurchase('+p.id+')"><i class="fas fa-eye"></i></button>'+(p.st==='آجل'?' <button class="b bs" onclick="payPurchase('+p.id+')"><i class="fas fa-money-bill"></i></button>':'')+'</td></tr>';}).join('');}
function filterPur(){let q=document.getElementById('purSearch').value.toLowerCase();document.querySelector('#purTable tbody').innerHTML=purRows(db.pu.filter(p=>p.sn.toLowerCase().includes(q)||p.pn.toLowerCase().includes(q)));}
function addPurchase(){if(!isAdmin()){toast('غير مصرح','e');return}if(!db.sp.length){toast('أضف مورد أولاً','e');return}openModal('<h2>➕ فاتورة شراء</h2><div class="fg"><label>المورد</label><select id="purSup">'+db.sp.map(s=>'<option value="'+s.id+'">'+es(s.nm)+'</option>').join('')+'</select></div><div class="fg"><label>المنتج</label><input id="purProd"></div><div class="g2"><div class="fg"><label>الكمية</label><input type="number" id="purQty" value="1"></div><div class="fg"><label>سعر الوحدة</label><input type="number" id="purPrice" value="0"></div></div><div class="g2"><div class="fg"><label>المدفوع</label><input type="number" id="purPaid" value="0"></div><div class="fg"><label>الحالة</label><select id="purStatus"><option>مدفوع</option><option>آجل</option></select></div></div><div class="sb"><button class="b bs" onclick="savePurchase()">حفظ</button><button class="b bd" onclick="closeModal()">إلغاء</button></div>');}
function savePurchase(){let sid=parseInt(document.getElementById('purSup').value),sup=db.sp.find(x=>x.id===sid),pn=document.getElementById('purProd').value.trim(),qty=parseInt(document.getElementById('purQty').value)||0,price=parseFloat(document.getElementById('purPrice').value)||0,paid=parseFloat(document.getElementById('purPaid').value)||0,status=document.getElementById('purStatus').value;if(!pn||qty<=0||price<=0){toast('بيانات غير صحيحة','e');return}let total=qty*price;if(status==='مدفوع')paid=total;let pur={id:ST.nP++,si:sid,sn:sup.nm,pn:pn,qt:qty,pr:price,tt:total,pd:paid,st:status,dt:td()};db.pu.push(pur);let ex=db.inv.find(p=>p.nm===pn);if(ex){ex.qt+=qty;ex.cp=(ex.cp*ex.qt+price*qty)/(ex.qt+qty);if(ex.sp<=ex.cp)ex.sp=ex.cp*1.3;}else{db.inv.push({id:gi(),nm:pn,ct:'أخرى',qt:qty,cp:price,sp:price*1.3});}db.je.push({id:gi(),dt:td(),ds:'شراء '+pn,rf:'PR-'+pur.id,ls:status==='مدفوع'?[{a:'1400',d:total,c:0,n:'المخزون'},{a:'1100',d:0,c:total,n:'الصندوق'}]:[{a:'1400',d:total,c:0,n:'المخزون'},{a:'2100',d:0,c:total,n:'موردين'}]});saveAll();closeModal();addLog('شراء',pn);toast('تمت الفاتورة والقيد','s');showPage('purchases');}
function viewPurchase(id){let p=db.pu.find(x=>x.id===id);let je=db.je.find(j=>j.rf==='PR-'+id);openModal('<h2>🧾 فاتورة شراء #'+p.id+'</h2><div class="ib"><div class="sr"><span>التاريخ:</span><span>'+p.dt+'</span></div><div class="sr"><span>المورد:</span><span>'+es(p.sn)+'</span></div><div class="sr"><span>المنتج:</span><span>'+es(p.pn)+'</span></div><div class="sr"><span>الكمية:</span><span>'+p.qt+'</span></div><div class="sr"><span>الإجمالي:</span><strong>'+fmt(p.tt)+'</strong></div><div class="sr"><span>المدفوع:</span><span>'+fmt(p.pd)+'</span></div><div class="sr"><span>المتبقي:</span><span class="tr">'+fmt(p.tt-p.pd)+'</span></div></div><div class="sb"><button class="b bi" onclick="printPurchase('+p.id+')"><i class="fas fa-print"></i> طباعة</button><button class="b bpi" onclick="sharePurchase('+p.id+')"><i class="fab fa-whatsapp"></i> مشاركة</button><button class="b bd" onclick="closeModal()">إغلاق</button></div>');}
function payPurchase(id){let p=db.pu.find(x=>x.id===id);let rem=p.tt-p.pd;openModal('<h2>💰 دفع للمورد</h2><div class="ib"><div class="sr"><span>المتبقي:</span><strong class="tr">'+fmt(rem)+'</strong></div></div><div class="fg"><label>المبلغ</label><input type="number" id="payAmt" value="'+rem+'"></div><div class="sb"><button class="b bs" onclick="confirmPay('+id+')">تأكيد</button><button class="b bd" onclick="closeModal()">إلغاء</button></div>');}
function confirmPay(id){let p=db.pu.find(x=>x.id===id);let amt=parseFloat(document.getElementById('payAmt').value)||0;if(amt<=0||amt>p.tt-p.pd){toast('مبلغ غير صحيح','e');return}p.pd+=amt;if(p.pd>=p.tt)p.st='مدفوع';db.je.push({id:gi(),dt:td(),ds:'دفع للمورد '+p.sn,rf:'PY-'+p.id,ls:[{a:'2100',d:amt,c:0,n:'موردين'},{a:'1100',d:0,c:amt,n:'الصندوق'}]});saveAll();closeModal();addLog('دفع',p.sn);toast('تم الدفع والقيد','s');showPage('purchases');}
// ========== المبيعات ==========
function rSal(el){let tot=db.sl.reduce((a,s)=>a+s.gr,0),paid=db.sl.reduce((a,s)=>a+s.pd,0);let f=db.sl;if(sFl==='paid')f=f.filter(s=>s.st==='مدفوع');else if(sFl==='credit')f=f.filter(s=>s.st==='آجل');else if(sFl==='today')f=f.filter(s=>s.dt===td());el.innerHTML='<div class="sxb"><div class="sr"><span>💰 إجمالي المبيعات:</span><strong>'+fmt(tot)+'</strong></div><div class="sr"><span>💳 المدفوع:</span><strong class="tg">'+fmt(paid)+'</strong></div><div class="sr"><span>📉 المتبقي:</span><strong class="tr">'+fmt(tot-paid)+'</strong></div></div><div class="cb"><div class="ch"><h3>🏷️ فواتير المبيعات</h3><button class="b bs" onclick="addSale()">+ فاتورة</button></div><div class="sb"><button class="tb '+(sFl==='all'?'ac':'')+'" onclick="sFl=\'all\';showPage(\'sales\')">الكل</button><button class="tb '+(sFl==='paid'?'ac':'')+'" onclick="sFl=\'paid\';showPage(\'sales\')">مدفوع</button><button class="tb '+(sFl==='credit'?'ac':'')+'" onclick="sFl=\'credit\';showPage(\'sales\')">آجل</button><button class="tb '+(sFl==='today'?'ac':'')+'" onclick="sFl=\'today\';showPage(\'sales\')">اليوم</button></div><div class="sx"><input type="text" id="slSearch" placeholder="بحث..." oninput="filterSales()"></div><div class="tw"><table class="dt" id="slTable"><thead><tr><th>#</th><th>التاريخ</th><th>العميل</th><th>المنتجات</th><th>الإجمالي</th><th>المدفوع</th><th>المتبقي</th><th>الحالة</th><th>إجراءات</th></tr></thead><tbody>'+salRows(f)+'</tbody></table></div></div>';}
function salRows(it){if(!it.length)return'<tr><td colspan="9" style="text-align:center">لا توجد فواتير</td></tr>';return it.map(s=>{let rem=s.gr-s.pd;return'<tr><td>'+s.id+'</td><td>'+s.dt+'</td><td style="font-weight:700;cursor:pointer;color:var(--pri)" onclick="viewCliAcc('+s.ci+')">'+es(s.cn)+'</td><td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+s.it.map(i=>es(i.nm)).join('، ')+'</td><td>'+fmt(s.gr)+'</td><td>'+fmt(s.pd)+'</td><td class="'+(rem>0?'tr':'tg')+'">'+fmt(rem)+'</td><td><span class="bg '+(s.st==='مدفوع'?'bg-g':'bg-y')+'">'+s.st+'</span></td><td><button class="b bi" onclick="viewSale('+s.id+')"><i class="fas fa-eye"></i></button>'+(rem>0?' <button class="b bs" onclick="collectSale('+s.id+')"><i class="fas fa-money-bill"></i></button>':'')+'</td></tr>';}).join('');}
function filterSales(){let q=document.getElementById('slSearch').value.toLowerCase();let f=db.sl;if(sFl==='paid')f=f.filter(s=>s.st==='مدفوع');else if(sFl==='credit')f=f.filter(s=>s.st==='آجل');else if(sFl==='today')f=f.filter(s=>s.dt===td());f=f.filter(s=>s.cn.toLowerCase().includes(q)||s.it.some(i=>i.nm.toLowerCase().includes(q)));document.querySelector('#slTable tbody').innerHTML=salRows(f);}
function addSale(){if(!db.inv.length){toast('لا توجد منتجات','e');return}slItems=[];openSaleModal();}
function openSaleModal(){openModal('<h2>🧾 فاتورة بيع جديدة</h2><div class="fg"><label>العميل</label><select id="saleClient"><option value="">عميل نقدي</option>'+db.cl.map(c=>'<option value="'+c.id+'">'+es(c.nm)+'</option>').join('')+'</select></div><div class="fg"><input id="saleNewClient" placeholder="أو عميل جديد"></div><div id="saleItemsContainer"></div><button class="b bpi" onclick="addSaleItemRow()">+ إضافة منتج</button><div class="ib"><div class="sr"><span>المجموع:</span><strong id="slSub">0</strong></div><div class="sr"><span>الضريبة 15%:</span><span id="slTax">0</span></div><div class="sr"><span>الإجمالي:</span><strong id="slGrand">0</strong></div></div><div class="g2"><div class="fg"><label>المدفوع</label><input type="number" id="slPaid" value="0"></div><div class="fg"><label>الحالة</label><select id="slStatus"><option>مدفوع</option><option>آجل</option></select></div></div><div class="sb"><button class="b bs" onclick="saveSale()">حفظ</button><button class="b bd" onclick="closeModal()">إلغاء</button></div>');addSaleItemRow();updateSaleTotals();}
function addSaleItemRow(){let id='row'+gi();let div=document.createElement('div');div.className='ir';div.id=id;div.innerHTML='<select style="flex:1" id="prod_'+id+'" onchange="updateSaleTotals()"><option value="">اختر منتج</option>'+db.inv.filter(p=>p.qt>0).map(p=>'<option value="'+p.id+'" data-price="'+p.sp+'">'+es(p.nm)+' ('+fmt(p.sp)+')</option>').join('')+'</select><input type="number" id="qty_'+id+'" value="1" min="1" style="width:80px" onchange="updateSaleTotals()"><button class="b bd" onclick="document.getElementById(\''+id+'\').remove();updateSaleTotals()"><i class="fas fa-times"></i></button>';document.getElementById('saleItemsContainer').appendChild(div);updateSaleTotals();}
function updateSaleTotals(){let sub=0;document.querySelectorAll('#saleItemsContainer .ir').forEach(row=>{let sel=row.querySelector('select'),qty=row.querySelector('input[type=number]');if(sel&&sel.value&&qty){let price=parseFloat(sel.selectedOptions[0]?.dataset.price)||0,q=parseInt(qty.value)||0;sub+=price*q;}});let tax=sub*0.15,grand=sub+tax;document.getElementById('slSub').innerHTML=fmt(sub);document.getElementById('slTax').innerHTML=fmt(tax);document.getElementById('slGrand').innerHTML=fmt(grand);let paid=document.getElementById('slPaid');if(paid&&parseFloat(paid.value)===0)paid.value=Math.round(grand);}
function saveSale(){let items=[];let ok=true;document.querySelectorAll('#saleItemsContainer .ir').forEach(row=>{let sel=row.querySelector('select'),qty=row.querySelector('input[type=number]');if(sel&&sel.value&&qty){let opt=sel.selectedOptions[0];let pid=parseInt(sel.value),name=opt.textContent.split('(')[0].trim(),price=parseFloat(opt.dataset.price)||0,q=parseInt(qty.value)||0,prod=db.inv.find(p=>p.id===pid);if(q>prod.qt){toast('الكمية غير متوفرة لـ '+name,'e');ok=false;return}items.push({pi:pid,name:name,qt:q,pr:price,tt:price*q});}});if(!ok||!items.length){if(ok)toast('أضف منتجاً','e');return}let sub=items.reduce((a,i)=>a+i.tt,0),tax=sub*0.15,grand=sub+tax,paid=parseFloat(document.getElementById('slPaid').value)||0,status=document.getElementById('slStatus').value;if(status==='مدفوع'&&paid<grand)status='آجل';let clId=parseInt(document.getElementById('saleClient').value)||0,clNm='عميل نقدي';if(clId){let c=db.cl.find(x=>x.id===clId);if(c)clNm=c.nm;}else{let nc=document.getElementById('saleNewClient').value.trim();if(nc){let c=db.cl.find(x=>x.nm===nc);if(!c){c={id:gi(),nm:nc,ph:'',ad:'',bl:0};db.cl.push(c);}clId=c.id;clNm=c.nm;}}let nid=ST.nI++;items.forEach(i=>{let p=db.inv.find(x=>x.id===i.pi);if(p)p.qt-=i.qt;});let sl={id:nid,cn:clNm,ci:clId,it:items,sb:sub,tx:tax,gr:grand,pd:paid,st:status,dt:td()};db.sl.push(sl);if(clId&&status==='آجل'){let cl=db.cl.find(c=>c.id===clId);if(cl)cl.bl+=(grand-paid);}let cost=items.reduce((a,i)=>{let p=db.inv.find(x=>x.id===i.pi);return a+(p?p.cp*i.qt:0);},0);db.je.push({id:gi(),dt:td(),ds:'بيع #'+nid,rf:'SL-'+nid,ls:[{a:status==='مدفوع'?'1100':'1300',d:grand,c:0,n:status==='مدفوع'?'صندوق':'ذمم'},{a:'4100',d:0,c:sub,n:'إيرادات'},{a:'2200',d:0,c:tax,n:'ضريبة'},{a:'5100',d:cost,c:0,n:'تكلفة'},{a:'1400',d:0,c:cost,n:'مخزون'}]});saveAll();closeModal();addLog('بيع',clNm);toast('تمت الفاتورة والقيد','s');showPage('sales');}
function viewSale(id){let s=db.sl.find(x=>x.id===id);let rem=s.gr-s.pd;openModal('<h2>🧾 فاتورة مبيعات #'+s.id+'</h2><div class="ib"><div class="sr"><span>التاريخ:</span><span>'+s.dt+'</span></div><div class="sr"><span>العميل:</span><span class="cl" onclick="closeModal();viewCliAcc('+s.ci+')">'+es(s.cn)+'</span></div></div><table class="dt"><thead><tr><th>المنتج</th><th>الكمية</th><th>السعر</th><th>الإجمالي</th></tr></thead><tbody>'+s.it.map(i=>'<tr><td style="font-weight:700">'+es(i.name)+'</td><td>'+i.qt+'</td><td>'+fmt(i.pr)+'</td><td>'+fmt(i.tt)+'</td></tr>').join('')+'</tbody></table><div class="ib"><div class="sr"><span>المجموع:</span><span>'+fmt(s.sb)+'</span></div><div class="sr"><span>الضريبة:</span><span>'+fmt(s.tx)+'</span></div><div class="sr"><span>الإجمالي:</span><strong>'+fmt(s.gr)+'</strong></div><div class="sr"><span>المدفوع:</span><span>'+fmt(s.pd)+'</span></div><div class="sr"><span>المتبقي:</span><span class="'+(rem>0?'tr':'tg')+'">'+fmt(rem)+'</span></div></div><div class="sb"><button class="b bi" onclick="printInvoice('+s.id+')"><i class="fas fa-print"></i> طباعة</button><button class="b bpi" onclick="shareInvoice('+s.id+')"><i class="fab fa-whatsapp"></i> مشاركة</button><button class="b bd" onclick="closeModal()">إغلاق</button></div>');}
function printInvoice(id){let s=db.sl.find(x=>x.id===id);let w=window.open('','_blank');w.document.write('<html dir="rtl"><head><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet"><style>body{font-family:Cairo;padding:30px}</style></head><body><h1>فاتورة مبيعات #'+s.id+'</h1><p>التاريخ: '+s.dt+' | العميل: '+es(s.cn)+'</p><table border="1" width="100%"><thead><tr><th>المنتج</th><th>الكمية</th><th>السعر</th><th>الإجمالي</th></tr></thead><tbody>'+s.it.map(i=>'<tr><td>'+es(i.name)+'</td><td>'+i.qt+'</td><td>'+fmt(i.pr)+'</td><td>'+fmt(i.tt)+'</td></tr>').join('')+'</tbody></table><p>الإجمالي: '+fmt(s.gr)+'</p><p>المدفوع: '+fmt(s.pd)+' | المتبقي: '+fmt(s.gr-s.pd)+'</p><script>window.print();window.close();<\/script></body></html>');w.document.close();}
function shareInvoice(id){let s=db.sl.find(x=>x.id==
