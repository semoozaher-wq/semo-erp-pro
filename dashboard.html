<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SEMO ERP V9 | النظام المتكامل</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', 'Segoe UI', Tahoma, sans-serif; }
        :root { --bg: #0f172a; --card: #1e293b; --card-light: #334155; --text: #f8fafc; --text-muted: #94a3b8; --border: #334155; --primary: #6366f1; --success: #10b981; --danger: #ef4444; --warning: #f59e0b; --info: #8b5cf6; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; transition: all 0.3s; }
        body.light-mode { --bg: #f1f5f9; --card: #ffffff; --card-light: #e2e8f0; --text: #1e293b; --text-muted: #64748b; --border: #e2e8f0; }
        .container { max-width: 1400px; margin: 0 auto; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; cursor: pointer; transition: 0.2s; }
        .stat-card:hover { transform: translateY(-3px); }
        .stat-icon { font-size: 28px; margin-bottom: 10px; }
        .stat-label { font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; }
        .stat-value { font-size: 24px; font-weight: 900; color: var(--primary); }
        .stat-value.blurred { filter: blur(6px); }
        .card { background: var(--card); border-radius: 20px; border: 1px solid var(--border); padding: 20px; margin-bottom: 20px; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
        .card-title { font-size: 18px; font-weight: 800; }
        .table-wrapper { overflow-x: auto; border-radius: 16px; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; }
        th { background: var(--card-light); padding: 12px; text-align: center; font-size: 12px; font-weight: 800; color: var(--text-muted); }
        td { padding: 10px 12px; text-align: center; border-bottom: 1px solid var(--border); font-size: 13px; }
        tr:hover td { background: rgba(99,102,241,0.05); }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        .form-group label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); color: var(--text); outline: none; font-size: 13px; }
        input:focus, select:focus { border-color: var(--primary); }
        .btn { padding: 8px 16px; border: none; border-radius: 40px; cursor: pointer; font-weight: 700; font-size: 12px; display: inline-flex; align-items: center; gap: 6px; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-warning { background: var(--warning); color: #1e293b; }
        .btn-info { background: var(--info); color: white; }
        .btn-sm { padding: 4px 10px; font-size: 11px; }
        .badge { padding: 3px 10px; border-radius: 40px; font-size: 10px; font-weight: 700; }
        .badge-success { background: rgba(16,185,129,0.15); color: var(--success); }
        .badge-danger { background: rgba(239,68,68,0.15); color: var(--danger); }
        .badge-warning { background: rgba(245,158,11,0.15); color: var(--warning); }
        .search-bar { width: 220px; padding: 8px 12px; border-radius: 40px; border: 1px solid var(--border); background: var(--bg); color: var(--text); }
        .toast { position: fixed; bottom: 20px; left: 20px; padding: 12px 24px; border-radius: 50px; z-index: 9999; animation: slideIn 0.3s ease; font-weight: bold; }
        @keyframes slideIn { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 10000; justify-content: center; align-items: center; }
        .modal-overlay.show { display: flex; }
        .modal-box { background: var(--card); border-radius: 24px; padding: 25px; width: 90%; max-width: 550px; max-height: 85vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-close { background: none; border: none; color: var(--text-muted); font-size: 20px; cursor: pointer; }
        .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; padding-top: 15px; border-top: 1px solid var(--border); }
        .sidebar { position: fixed; right: 0; top: 0; width: 260px; height: 100%; background: var(--card); border-left: 1px solid var(--border); padding: 20px; transform: translateX(100%); transition: transform 0.3s; z-index: 100; overflow-y: auto; }
        .sidebar.open { transform: translateX(0); }
        .sidebar-header { display: flex; align-items: center; gap: 12px; padding-bottom: 20px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
        .logo-icon { width: 45px; height: 45px; background: var(--primary); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: bold; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 12px; cursor: pointer; transition: 0.2s; margin-bottom: 4px; opacity: 0.7; }
        .nav-item:hover { background: rgba(99,102,241,0.1); opacity: 1; }
        .nav-item.active { background: var(--primary); opacity: 1; color: white; }
        .main-content { margin-right: 0; padding: 20px; transition: margin-right 0.3s; }
        @media (min-width: 768px) { .main-content { margin-right: 260px; } .sidebar { transform: translateX(0); } }
        @media (max-width: 768px) { .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99; display: none; } .sidebar-overlay.show { display: block; } }
        .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        .menu-btn { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 8px 12px; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        @media (min-width: 768px) { .menu-btn { display: none; } }
        .empty-state { text-align: center; padding: 40px; color: var(--text-muted); }
        .chart-wrapper { height: 280px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<div class="sidebar" id="sidebar">
    <div class="sidebar-header"><div class="logo-icon">S</div><div><h3>SEMO PRO V9</h3><small>ELITE ERP</small></div></div>
    <div id="sidebarNav"></div>
</div>

<div class="main-content" id="mainContent">
    <div class="topbar">
        <button class="menu-btn" id="menuBtn" onclick="toggleSidebar()">☰ القائمة</button>
        <div style="display: flex; gap: 8px;">
            <button class="btn btn-primary" id="privacyBtn" onclick="togglePrivacy()">👁️</button>
            <button class="btn btn-primary" id="themeBtn" onclick="toggleTheme()">🌙</button>
            <button class="btn btn-danger" id="logoutBtn" onclick="logout()">🚪 خروج</button>
        </div>
    </div>
    <div id="pageContent"></div>
</div>

<script type="module">
    // Firebase imports
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, getDocs, addDoc, updateDoc, deleteDoc, doc, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCfVMHNoqbh86I0JJjnguGY6seA4vWJsSU",
        authDomain: "my-pos-system-11dee.firebaseapp.com",
        projectId: "my-pos-system-11dee",
        storageBucket: "my-pos-system-11dee.firebasestorage.app",
        messagingSenderId: "565195477080",
        appId: "1:565195477080:web:1ffa21a34e28b47dddfa2d"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;
    let currentUserRole = null;
    let currentCompanyId = null;

    // Collections
    let inventory = [], sales = [], purchases = [], clients = [], suppliers = [], expenses = [], revenues = [], ledger = [];
    let privacyMode = false;
    let darkMode = true;
    let currentTab = 'dashboard';
    let chartInstance = null;

    const menuItems = [
        { id: 'dashboard', name: 'الرئيسية', icon: '🏠' },
        { id: 'inventory', name: 'المخزون', icon: '📦' },
        { id: 'sales', name: 'المبيعات', icon: '💰' },
        { id: 'purchases', name: 'المشتريات', icon: '📥' },
        { id: 'suppliers', name: 'الموردين', icon: '🏭' },
        { id: 'clients', name: 'العملاء', icon: '👥' },
        { id: 'expenses', name: 'المصروفات', icon: '💸' },
        { id: 'revenues', name: 'الإيرادات', icon: '💰' },
        { id: 'reports', name: 'التقارير', icon: '📊' }
    ];

    async function loadData() {
        try {
            const collections = ['inventory', 'sales', 'purchases', 'clients', 'suppliers', 'expenses', 'revenues', 'ledger'];
            for (const col of collections) {
                let q = collection(db, col);
                if (currentCompanyId && currentUserRole !== 'admin') q = query(q, where('companyId', '==', currentCompanyId));
                const snap = await getDocs(q);
                window[col] = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            }
            renderPage();
        } catch(e) { console.error(e); showToast('خطأ في تحميل البيانات', 'error'); }
    }

    function showToast(msg, type = 'success') {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.background = type === 'success' ? '#10b981' : type === 'error' ? '#ef4444' : '#f59e0b';
        toast.style.color = type === 'warning' ? '#1e293b' : 'white';
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
    function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); }
    function togglePrivacy() { privacyMode = !privacyMode; document.getElementById('privacyBtn').textContent = privacyMode ? '🕶️' : '👁️'; renderPage(); }
    function toggleTheme() { darkMode = !darkMode; document.body.classList.toggle('light-mode', !darkMode); localStorage.setItem('semo_theme', darkMode ? 'dark' : 'light'); renderPage(); }
    function logout() { signOut(auth); localStorage.removeItem('semo_user'); window.location.href = 'index.html'; }

    function getStats() {
        const totalSales = sales.reduce((s, i) => s + (i.total || 0), 0);
        const invValue = inventory.reduce((s, i) => s + ((i.stock || 0) * (i.price || 0)), 0);
        const monthSales = sales.filter(s => s.date?.startsWith(new Date().toISOString().slice(0,7))).reduce((s,i)=>s+(i.total||0),0);
        return { totalSales, invValue, monthSales, clientsCount: clients.length };
    }

    function renderSidebar() {
        const html = menuItems.map(item => `<div class="nav-item ${currentTab === item.id ? 'active' : ''}" onclick="switchTab('${item.id}')"><span>${item.icon}</span><span>${item.name}</span></div>`).join('');
        document.getElementById('sidebarNav').innerHTML = html;
    }

    window.switchTab = (tab) => { currentTab = tab; renderPage(); closeSidebar(); };

    function renderPage() {
        renderSidebar();
        if (currentTab === 'dashboard') renderDashboard();
        else if (currentTab === 'inventory') renderInventory();
        else if (currentTab === 'sales') renderSales();
        else if (currentTab === 'purchases') renderPurchases();
        else if (currentTab === 'suppliers') renderSuppliers();
        else if (currentTab === 'clients') renderClients();
        else if (currentTab === 'expenses') renderExpenses();
        else if (currentTab === 'revenues') renderRevenues();
        else if (currentTab === 'reports') renderReports();
    }

    function renderDashboard() {
        const { totalSales, invValue, monthSales, clientsCount } = getStats();
        const html = `
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-icon">💰</div><div class="stat-label">إجمالي السيولة</div><div class="stat-value ${privacyMode ? 'blurred' : ''}">${totalSales.toLocaleString()} $</div></div>
                <div class="stat-card"><div class="stat-icon">📦</div><div class="stat-label">قيمة المستودع</div><div class="stat-value ${privacyMode ? 'blurred' : ''}">${invValue.toLocaleString()} $</div></div>
                <div class="stat-card"><div class="stat-icon">📈</div><div class="stat-label">مبيعات هذا الشهر</div><div class="stat-value ${privacyMode ? 'blurred' : ''}">${monthSales.toLocaleString()} $</div></div>
                <div class="stat-card"><div class="stat-icon">👥</div><div class="stat-label">العملاء</div><div class="stat-value">${clientsCount}</div></div>
            </div>
            <div class="card"><div class="card-header"><h3 class="card-title">⚖️ ترحيل قيد محاسبي</h3><span class="badge badge-success">التوازن المالي</span></div>
                <div class="form-grid"><div class="form-group"><label>نوع الحركة</label><select id="postType"><option value="SALE">مبيعات</option><option value="PURCHASE">مشتريات</option><option value="EXPENSE">مصروفات</option></select></div><div class="form-group"><label>البيان</label><input type="text" id="postDesc" placeholder="وصف الحركة"></div><div class="form-group"><label>القيمة</label><input type="number" id="postAmount" placeholder="0.00"></div></div>
                <button class="btn btn-primary" onclick="addLedgerEntry()">ترحيل ✓</button>
            </div>
            <div class="card"><div class="card-header"><h3 class="card-title">📒 سجل القيود الأخيرة</h3></div><div class="table-wrapper"></td><thead><tr><th>#</th><th>البيان</th><th>القيمة</th><th>التاريخ</th></tr></thead><tbody>${ledger.slice(0,5).map((e,i)=>`<tr><td>${i+1}</td><td>${e.desc}</td><td class="${privacyMode ? 'blurred' : ''}" style="color:${e.amount<0?'var(--danger)':'var(--success)'}">${e.amount.toLocaleString()} $</td><td>${e.date}</td>`).join('') || '<tr><td colspan="4"><div class="empty-state">لا توجد قيود</div></td>'} </tbody></table></div></div>
        `;
        document.getElementById('pageContent').innerHTML = html;
    }

    window.addLedgerEntry = async () => {
        const type = document.getElementById('postType').value;
        const desc = document.getElementById('postDesc').value;
        const amount = parseFloat(document.getElementById('postAmount').value);
        if (!desc || isNaN(amount)) { showToast('املأ الحقول', 'error'); return; }
        const entry = { desc, type, amount: type === 'SALE' ? amount : -amount, impact: type === 'SALE' ? 'نقد +' : 'نقد -', date: new Date().toLocaleDateString('ar-EG'), companyId: currentCompanyId };
        await addDoc(collection(db, 'ledger'), entry);
        ledger.unshift(entry);
        renderPage();
        showToast('تم الترحيل ✅');
    };

    function renderInventory() {
        const html = `<div style="margin-bottom:15px; display:flex; gap:10px; flex-wrap:wrap;"><input type="text" id="searchInv" class="search-bar" placeholder="بحث..." onkeyup="renderInventoryTable()"><button class="btn btn-success" onclick="openInventoryModal()">➕ منتج جديد</button></div>
        <div class="card"><div class="table-wrapper"><table><thead><tr><th>#</th><th>المنتج</th><th>الكمية</th><th>السعر</th><th>الحالة</th><th>إجراءات</th></tr></thead><tbody id="invTableBody"></tbody></td></div></div>
        <div id="invModal" class="modal-overlay"><div class="modal-box"><div class="modal-header"><h3>➕ منتج جديد</h3><button class="modal-close" onclick="closeModal('invModal')">✕</button></div><div class="form-grid"><input type="text" id="invName" placeholder="الاسم"><input type="number" id="invStock" placeholder="الكمية"><input type="number" id="invPrice" placeholder="السعر"></div><div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal('invModal')">إلغاء</button><button class="btn btn-success" onclick="addInventoryItem()">حفظ</button></div></div></div>`;
        document.getElementById('pageContent').innerHTML = html;
        renderInventoryTable();
    }

    window.renderInventoryTable = () => {
        const search = document.getElementById('searchInv')?.value.toLowerCase() || '';
        const filtered = inventory.filter(i => i.name.toLowerCase().includes(search));
        const tbody = document.getElementById('invTableBody');
        if (tbody) tbody.innerHTML = filtered.map((i, idx) => `<tr><70>${idx+1}</td><td><strong>${i.name}</strong> </td><td style="color:${i.stock<5?'var(--danger)':'var(--success)'}">${i.stock} </td><td>${i.price} $</td><td><span class="badge ${i.stock<5?'badge-danger':'badge-success'}">${i.stock<5?'منخفض':'متوفر'}</span></td><td><button class="btn btn-warning btn-sm" onclick="editInventoryItem('${i.id}','${i.name}','${i.stock}','${i.price}')">✏️</button> <button class="btn btn-danger btn-sm" onclick="deleteItem('inventory','${i.id}')">🗑️</button></td></tr>`).join('') || '<tr><td colspan="6"><div class="empty-state">لا توجد منتجات</div></td></tr>';
    };

    window.openInventoryModal = () => { document.getElementById('invModal').classList.add('show'); };
    window.closeModal = (id) => { document.getElementById(id).classList.remove('show'); };
    window.addInventoryItem = async () => {
        const name = document.getElementById('invName').value;
        const stock = parseInt(document.getElementById('invStock').value);
        const price = parseFloat(document.getElementById('invPrice').value);
        if (!name || isNaN(stock) || isNaN(price)) { showToast('املأ الحقول', 'error'); return; }
        const item = { name, stock, price, sku: 'SKU-'+Date.now(), companyId: currentCompanyId };
        const ref = await addDoc(collection(db, 'inventory'), item);
        inventory.push({ id: ref.id, ...item });
        closeModal('invModal');
        document.getElementById('invName').value = '';
        document.getElementById('invStock').value = '';
        document.getElementById('invPrice').value = '';
        renderInventoryTable();
        showToast('تمت الإضافة ✅');
    };
    window.editInventoryItem = (id, name, stock, price) => {
        document.getElementById('invName').value = name;
        document.getElementById('invStock').value = stock;
        document.getElementById('invPrice').value = price;
        const saveBtn = document.querySelector('#invModal .btn-success');
        const oldClick = saveBtn.onclick;
        saveBtn.onclick = async () => {
            const newName = document.getElementById('invName').value;
            const newStock = parseInt(document.getElementById('invStock').value);
            const newPrice = parseFloat(document.getElementById('invPrice').value);
            await updateDoc(doc(db, 'inventory', id), { name: newName, stock: newStock, price: newPrice });
            const idx = inventory.findIndex(i => i.id === id);
            if (idx !== -1) { inventory[idx] = { ...inventory[idx], name: newName, stock: newStock, price: newPrice }; }
            closeModal('invModal');
            renderInventoryTable();
            showToast('تم التعديل ✅');
            saveBtn.onclick = oldClick;
        };
        openInventoryModal();
    };
    window.deleteItem = async (col, id) => { if (confirm('حذف؟')) { await deleteDoc(doc(db, col, id)); window[col] = window[col].filter(i => i.id !== id); renderPage(); showToast('تم الحذف'); } };

    function renderSales() {
        const html = `<div style="margin-bottom:15px; display:flex; gap:10px; flex-wrap:wrap;"><input type="text" id="searchSales" class="search-bar" placeholder="بحث..." onkeyup="renderSalesTable()"><button class="btn btn-success" onclick="openSaleModal()">➕ فاتورة بيع</button></div>
        <div class="card"><div class="table-wrapper"><table><thead><tr><th>#</th><th>التاريخ</th><th>العميل</th><th>المنتج</th><th>الإجمالي</th><th>الحالة</th><th>إجراءات</th></tr></thead><tbody id="salesTableBody"></tbody></table></div></div>
        <div id="saleModal" class="modal-overlay"><div class="modal-box"><div class="modal-header"><h3>🛒 فاتورة بيع</h3><button class="modal-close" onclick="closeModal('saleModal')">✕</button></div><div class="form-grid"><input type="text" id="saleClient" placeholder="العميل"><input type="text" id="saleProduct" placeholder="المنتج"><input type="number" id="saleQty" placeholder="الكمية"><input type="number" id="salePrice" placeholder="السعر"></div><div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal('saleModal')">إلغاء</button><button class="btn btn-success" onclick="addSaleItem()">حفظ</button></div></div></div>`;
        document.getElementById('pageContent').innerHTML = html;
        renderSalesTable();
    }

    window.renderSalesTable = () => {
        const search = document.getElementById('searchSales')?.value.toLowerCase() || '';
        const filtered = sales.filter(s => s.client.toLowerCase().includes(search) || (s.product || '').toLowerCase().includes(search));
        const tbody = document.getElementById('salesTableBody');
        if (tbody) tbody.innerHTML = filtered.map((s, idx) => `<tr><td>${idx+1}</td><td>${s.date}</td><td>${s.client}</td><td>${s.product}</td><td class="${privacyMode ? 'blurred' : ''}">${s.total} $</td><td><span class="badge badge-success">${s.status || 'مدفوع'}</span></td><td><button class="btn btn-info btn-sm" onclick="printSale('${s.id}')">🖨️</button> <button class="btn btn-danger btn-sm" onclick="deleteItem('sales','${s.id}')">🗑️</button></td></tr>`).join('') || '<tr><td colspan="7"><div class="empty-state">لا توجد مبيعات</div></td></tr>';
    };
    window.openSaleModal = () => { document.getElementById('saleModal').classList.add('show'); };
    window.addSaleItem = async () => {
        const client = document.getElementById('saleClient').value;
        const product = document.getElementById('saleProduct').value;
        const qty = parseInt(document.getElementById('saleQty').value);
        const price = parseFloat(document.getElementById('salePrice').value);
        if (!client || !product || isNaN(qty) || isNaN(price)) { showToast('املأ الحقول', 'error'); return; }
        const total = qty * price;
        const sale = { client, product, qty, total, status: 'مدفوع', date: new Date().toLocaleDateString('ar-EG'), companyId: currentCompanyId };
        const ref = await addDoc(collection(db, 'sales'), sale);
        sales.unshift({ id: ref.id, ...sale });
        const invItem = inventory.find(i => i.name === product);
        if (invItem) { invItem.stock -= qty; await updateDoc(doc(db, 'inventory', invItem.id), { stock: invItem.stock }); }
        closeModal('saleModal');
        document.getElementById('saleClient').value = '';
        document.getElementById('saleProduct').value = '';
        document.getElementById('saleQty').value = '';

    window.openPurchaseModal = () => { document.getElementById('purchaseModal').classList.add('show'); };
    window.addPurchaseItem = async () => {
        const supplier = document.getElementById('purchaseSupplier').value;
        const product = document.getElementById('purchaseProduct').value;
        const qty = parseInt(document.getElementById('purchaseQty').value);
        const price = parseFloat(document.getElementById('purchasePrice').value);
        if (!supplier || !product || isNaN(qty) || isNaN(price)) { showToast('املأ الحقول', 'error'); return; }
        const total = qty * price;
        const purchase = { supplier, product, qty, price, total, date: new Date().toLocaleDateString('ar-EG'), companyId: currentCompanyId };
        const ref = await addDoc(collection(db, 'purchases'), purchase);
        purchases.unshift({ id: ref.id, ...purchase });
        const invItem = inventory.find(i => i.name === product);
        if (invItem) { invItem.stock += qty; await updateDoc(doc(db, 'inventory', invItem.id), { stock: invItem.stock }); }
        else { const newItem = { name: product, stock: qty, price, sku: 'SKU-'+Date.now(), companyId: currentCompanyId }; const invRef = await addDoc(collection(db, 'inventory'), newItem); inventory.push({ id: invRef.id, ...newItem }); }
        closeModal('purchaseModal');
        document.getElementById('purchaseSupplier').value = '';
        document.getElementById('purchaseProduct').value = '';
        document.getElementById('purchaseQty').value = '';
        document.getElementById('purchasePrice').value = '';
        renderPurchasesTable();
        showToast('تمت الإضافة وتحديث المخزون ✅');
    };

    function renderReports() {
        const html = `<div class="card"><div class="card-header"><h3 class="card-title">📊 التقارير</h3><div><select id="reportType" class="btn"><option value="monthly">شهري</option><option value="yearly">سنوي</option></select><input type="month" id="reportMonth"><input type="number" id="reportYear" placeholder="السنة"><button class="btn btn-primary" onclick="generateReport()">عرض</button><button class="btn btn-success" onclick="exportReportExcel()">📥 تصدير</button></div></div><div id="reportStats"></div><div class="chart-wrapper"><canvas id="reportChart"></canvas></div></div>`;
        document.getElementById('pageContent').innerHTML = html;
        generateReport();
    }

    window.generateReport = () => {
        const type = document.getElementById('reportType').value;
        const month = document.getElementById('reportMonth').value;
        const year = document.getElementById('reportYear').value;
        let filtered = sales.filter(s => s.status === 'مدفوع');
        if (type === 'monthly' && month) filtered = filtered.filter(s => s.date?.startsWith(month));
        else if (type === 'yearly' && year) filtered = filtered.filter(s => s.date?.startsWith(year));
        const total = filtered.reduce((s, i) => s + (i.total || 0), 0);
        document.getElementById('reportStats').innerHTML = `<div class="stats-grid"><div class="stat-card"><div class="stat-icon">💰</div><div class="stat-label">إجمالي المبيعات</div><div class="stat-value ${privacyMode ? 'blurred' : ''}">${total.toLocaleString()} $</div></div><div class="stat-card"><div class="stat-icon">🧾</div><div class="stat-label">عدد الفواتير</div><div class="stat-value">${filtered.length}</div></div></div>`;
        const months = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
        let monthly = Array(12).fill(0);
        sales.forEach(s => { let d = new Date(s.date); if (!isNaN(d)) monthly[d.getMonth()] += s.total || 0; });
        if (chartInstance) chartInstance.destroy();
        chartInstance = new Chart(document.getElementById('reportChart'), { type: 'line', data: { labels: months, datasets: [{ label: 'المبيعات الشهرية', data: monthly, borderColor: '#6366f1', tension: 0.4, fill: true }] }, options: { responsive: true, maintainAspectRatio: false } });
    };
    window.exportReportExcel = () => {
        const data = sales.map(s => ({ التاريخ: s.date, العميل: s.client, المنتج: s.product, الإجمالي: s.total }));
        if (!data.length) { showToast('لا توجد بيانات', 'warning'); return; }
        const ws = XLSX.utils.json_to_sheet(data); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, 'التقرير'); XLSX.writeFile(wb, `SEMO_Report_${new Date().toLocaleDateString()}.xlsx`);
        showToast('تم التصدير 📥', 'success');
    };

    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = 'index.html'; return; }
        const stored = localStorage.getItem('semo_user');
        if (!stored) { window.location.href = 'index.html'; return; }
        const userData = JSON.parse(stored);
        currentUser = userData;
        currentUserRole = userData.role;
        currentCompanyId = userData.companyId;
        await loadData();
        const savedTheme = localStorage.getItem('semo_theme');
        if (savedTheme === 'light') { darkMode = false; document.body.classList.add('light-mode'); document.getElementById('themeBtn').textContent = '☀️'; }
        renderPage();
    });
