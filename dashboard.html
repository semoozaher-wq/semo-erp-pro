<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>SEMO ERP - Dashboard</title><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"><script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#3b82f6;--success:#10b981;--danger:#ef4444;--bg:#0f172a;--card:#1e293b}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:#fff;direction:rtl}
.sidebar{width:260px;background:var(--card);position:fixed;right:0;top:0;height:100vh;padding:20px;overflow-y:auto}
.main-content{margin-right:260px;padding:20px}
.menu-item{padding:12px;margin:5px 0;border-radius:12px;cursor:pointer;display:flex;gap:10px}
.menu-item:hover,.menu-item.active{background:var(--primary)}
.btn{padding:8px 16px;border:none;border-radius:8px;cursor:pointer;font-weight:bold}
.btn-primary{background:var(--primary);color:#fff}
.btn-success{background:var(--success);color:#fff}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:15px;margin-bottom:20px}
.stat-card{background:var(--card);border-radius:16px;padding:15px;cursor:pointer;border-right:3px solid var(--primary)}
.card-box{background:var(--card);border-radius:16px;padding:20px;margin-bottom:20px}
.data-table{width:100%;border-collapse:collapse}
.data-table th,.data-table td{padding:10px;text-align:right;border-bottom:1px solid #334155}
.badge{padding:4px 10px;border-radius:20px;font-size:12px}
.badge-success{background:rgba(16,185,129,0.2);color:#34d399}
.badge-warning{background:rgba(245,158,11,0.2);color:#fbbf24}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:1000;justify-content:center;align-items:center}
.modal.show{display:flex}
.modal-content{background:var(--card);border-radius:20px;max-width:500px;width:90%;padding:20px}
@media(max-width:768px){.sidebar{transform:translateX(100%)}.sidebar.open{transform:translateX(0)}.main-content{margin-right:0}}
</style></head>
<body>
<div class="sidebar" id="sidebar">
<div class="menu-item active" onclick="switchPage('dashboard')">🏠 الرئيسية</div>
<div class="menu-item" onclick="switchPage('inventory')">📦 المخزون</div>
<div class="menu-item" onclick="switchPage('sales')">🛒 المبيعات</div>
<div class="menu-item" onclick="switchPage('clients')">👥 العملاء</div>
<div class="menu-item" onclick="switchPage('reports')">📊 التقارير</div>
<div class="menu-item" onclick="logout()">🚪 خروج</div>
</div>
<div class="main-content"><div id="pageContent"></div></div>
<div id="detailsModal" class="modal" onclick="if(event.target===this)closeModal('detailsModal')"><div class="modal-content" id="modalContent"></div></div>
<script>
let db={inventory:JSON.parse(localStorage.getItem('semo_inventory'))||[],sales:JSON.parse(localStorage.getItem('semo_sales'))||[],clients:JSON.parse(localStorage.getItem('semo_clients'))||[],expenses:JSON.parse(localStorage.getItem('semo_expenses'))||[],revenues:JSON.parse(localStorage.getItem('semo_revenues'))||[],settings:JSON.parse(localStorage.getItem('semo_settings'))||{currencySymbol:'ج.م'}};
function saveAll(){localStorage.setItem('semo_inventory',JSON.stringify(db.inventory));localStorage.setItem('semo_sales',JSON.stringify(db.sales));localStorage.setItem('semo_clients',JSON.stringify(db.clients));localStorage.setItem('semo_expenses',JSON.stringify(db.expenses));localStorage.setItem('semo_revenues',JSON.stringify(db.revenues));}
function today(){return new Date().toLocaleDateString('ar-EG')}
function formatCurrency(a){return (a||0).toLocaleString()+' '+db.settings.currencySymbol}
function showNotification(m,t){let d=document.createElement('div');d.style.cssText='position:fixed;bottom:20px;left:20px;padding:12px 20px;border-radius:30px;background:'+(t==='success'?'#10b981':'#ef4444')+';color:#fff;z-index:1100';d.innerHTML=m;document.body.appendChild(d);setTimeout(()=>d.remove(),3000)}
function openModal(i){document.getElementById(i).classList.add('show')}
function closeModal(i){document.getElementById(i).classList.remove('show')}
function toggleMobileMenu(){document.getElementById('sidebar').classList.toggle('open')}

function renderDashboard(){
let totalSales=db.sales.reduce((s,i)=>s+(i.total||0),0);
let totalExpenses=db.expenses.reduce((s,i)=>s+(i.amount||0),0);
let totalRevenues=db.revenues.reduce((s,i)=>s+(i.amount||0),0);
let profit=totalSales-totalExpenses+totalRevenues;
let lowStock=db.inventory.filter(i=>(i.qty||0)<=5).length;
document.getElementById('pageContent').innerHTML='<div class="stats-grid">'+
'<div class="stat-card" onclick="switchPage(\'sales\')"><div style="font-size:24px;font-weight:bold">'+formatCurrency(totalSales)+'</div><div>💰 المبيعات</div></div>'+
'<div class="stat-card" onclick="switchPage(\'expenses\')"><div style="font-size:24px;font-weight:bold">'+formatCurrency(totalExpenses)+'</div><div>💸 المصروفات</div></div>'+
'<div class="stat-card" onclick="switchPage(\'revenues\')"><div style="font-size:24px;font-weight:bold">'+formatCurrency(totalRevenues)+'</div><div>💰 الإيرادات</div></div>'+
'<div class="stat-card" onclick="switchPage(\'reports\')"><div style="font-size:24px;font-weight:bold;color:'+(profit>=0?'#34d399':'#f87171')+'">'+formatCurrency(profit)+'</div><div>📈 صافي الربح</div></div>'+
'<div class="stat-card" onclick="switchPage(\'inventory\')"><div style="font-size:24px;font-weight:bold">'+db.inventory.length+'</div><div>📦 المنتجات</div></div>'+
'<div class="stat-card" onclick="switchPage(\'inventory\')"><div style="font-size:24px;font-weight:bold;color:'+(lowStock>0?'#fbbf24':'#34d399')+'">'+lowStock+'</div><div>⚠️ منتجات منخفضة</div></div>'+
'<div class="stat-card" onclick="switchPage(\'clients\')"><div style="font-size:24px;font-weight:bold">'+db.clients.length+'</div><div>👥 العملاء</div></div>'+
'</div><div class="card-box"><canvas id="monthlyChart" height="200"></canvas></div><div class="card-box"><h3>📋 آخر المبيعات</h3><div class="table-wrapper"><table class="data-table"><thead><tr><th>التاريخ</th><th>العميل</th><th>المبلغ</th><th>الحالة</th></tr></thead><tbody id="recentSalesTable"></tbody></table></div></div>';
let months=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
let monthlyData=Array(12).fill(0);
db.sales.forEach(s=>{if(s.date){let parts=s.date.split('/');if(parts.length===3){let m=parseInt(parts[1])-1;if(m>=0&&m<12)monthlyData[m]+=s.total||0}}});
new Chart(document.getElementById('monthlyChart'),{type:'bar',data:{labels:months,datasets:[{label:'المبيعات',data:monthlyData,backgroundColor:'#3b82f6',borderRadius:8}]},options:{responsive:true}});
let recentSales=[...db.sales].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5);
document.getElementById('recentSalesTable').innerHTML=recentSales.map(s=>'<tr onclick="openInvoiceDetails('+s.id+')"><td>'+s.date+'</td><td><strong>'+s.clientName+'</strong></td><td>'+formatCurrency(s.total)+'</td><td><span class="badge '+(s.status==='مدفوع'?'badge-success':'badge-warning')+'">'+s.status+'</span></td></tr>').join('');
}

function openInvoiceDetails(i){
let inv=db.sales.find(s=>s.id===i);
if(!inv)return;
let remaining=(inv.total||0)-(inv.paid||0);
document.getElementById('modalContent').innerHTML='<h2 style="color:#3b82f6">🧾 فاتورة #'+inv.id+'</h2><hr><div style="margin:15px 0"><div><strong>التاريخ:</strong> '+inv.date+'</div><div><strong>العميل:</strong> '+inv.clientName+'</div><div><strong>المبلغ:</strong> '+formatCurrency(inv.total)+'</div><div><strong>المدفوع:</strong> '+formatCurrency(inv.paid||0)+'</div><div><strong>المتبقي:</strong> '+formatCurrency(remaining)+'</div><div><strong>الحالة:</strong> '+inv.status+'</div></div><button class="btn btn-primary" onclick="closeModal(\'detailsModal\')">إغلاق</button>';
openModal('detailsModal');
}

function initDemoData(){
if(db.inventory.length===0){
db.inventory=[{id:1001,name:'مكتب خشبي',qty:15,price:2500},{id:1002,name:'كرسي دوار',qty:25,price:850},{id:1003,name:'طابعة HP',qty:5,price:1800},{id:1004,name:'شاشة 24',qty:12,price:3200}];
db.clients=[{id:2001,name:'شركة الأهرام',phone:'01001112223'},{id:2002,name:'مؤسسة النور',phone:'01002223334'}];
let d=today();
db.sales=[{id:3001,clientId:2001,clientName:'شركة الأهرام',total:8500,paid:8500,status:'مدفوع',date:d},{id:3002,clientId:2002,clientName:'مؤسسة النور',total:3200,paid:1500,status:'آجل',date:d}];
db.expenses=[{id:6001,type:'إيجار',amount:5000,date:d}];
db.revenues=[{id:7001,type:'خدمات',amount:2500,date:d}];
saveAll();
showNotification('✅ تم تحميل البيانات التجريبية');
}
}

function switchPage(p){
document.querySelectorAll('.menu-item').forEach(i=>i.classList.remove('active'));
if(event&&event.target&&event.target.closest)event.target.closest('.menu-item')?.classList.add('active');
if(p==='dashboard')renderDashboard();
else if(p==='inventory')document.getElementById('pageContent').innerHTML='<div class="card-box"><h3>📦 المخزون</h3><p>عدد المنتجات: '+db.inventory.length+'</p><button class="btn btn-success" onclick="addDemoProduct()">➕ إضافة منتج تجريبي</button><div id="inventoryList"></div></div><div id="inventoryList"></div>';
else if(p==='sales')document.getElementById('pageContent').innerHTML='<div class="card-box"><h3>🛒 المبيعات</h3><p>عدد الفواتير: '+db.sales.length+'</p><button class="btn btn-success" onclick="addDemoSale()">➕ إضافة فاتورة تجريبية</button><div id="salesList"></div></div>';
else if(p==='clients')document.getElementById('pageContent').innerHTML='<div class="card-box"><h3>👥 العملاء</h3><p>عدد العملاء: '+db.clients.length+'</p></div>';
else document.getElementById('pageContent').innerHTML='<div class="card-box"><h3>📊 '+p+'</h3><p>الصفحة قيد التطوير</p></div>';
}

function addDemoProduct(){
let newId=Date.now();
db.inventory.push({id:newId,name:'منتج جديد',qty:10,price:500});
saveAll();
showNotification('✅ تم إضافة منتج جديد');
renderDashboard();
}

function addDemoSale(){
let newId=Date.now();
db.sales.push({id:newId,clientId:null,clientName:'عميل جديد',total:1000,paid:500,status:'آجل',date:today()});
saveAll();
showNotification('✅ تم إضافة فاتورة جديدة');
renderDashboard();
}

function logout(){if(confirm('تسجيل الخروج؟'))localStorage.clear();}

initDemoData();
renderDashboard();
</script>
</body>
</html>
