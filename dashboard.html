<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SEMO ERP PRO | نظام إدارة المؤسسات المتكامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: rgba(30, 41, 59, 0.95);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border: #334155;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #8b5cf6;
            --glass: rgba(30, 41, 59, 0.8);
            --shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.3);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.light-mode {
            --bg-primary: #f1f5f9;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --glass: rgba(255, 255, 255, 0.9);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: var(--transition);
            overflow-x: hidden;
        }

        /* ========== أنيميشن ========== */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .animate-in {
            animation: fadeInUp 0.5s ease forwards;
        }

        /* ========== سكرول بار ========== */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary-hover); }

        /* ========== الهيكل الرئيسي ========== */
        .app-container {
            display: flex;
            min-height: 100vh;
        }

        /* ========== السايد بار ========== */
        .sidebar {
            width: 280px;
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border-left: 1px solid var(--border);
            position: fixed;
            right: 0;
            top: 0;
            height: 100vh;
            padding: 25px 20px;
            transition: var(--transition);
            z-index: 100;
            overflow-y: auto;
            box-shadow: -5px 0 30px rgba(0, 0, 0, 0.1);
        }

        .sidebar.collapsed {
            width: 80px;
        }

        .sidebar.collapsed .sidebar-logo h3,
        .sidebar.collapsed .menu-item span,
        .sidebar.collapsed .user-card .user-info {
            display: none;
        }

        .sidebar.collapsed .menu-item {
            justify-content: center;
        }

        .sidebar-logo {
            text-align: center;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 25px;
        }

        .sidebar-logo .logo-icon {
            width: 55px;
            height: 55px;
            background: linear-gradient(135deg, var(--primary), var(--info));
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            font-size: 28px;
            animation: pulse 2s infinite;
        }

        .sidebar-logo h3 {
            font-size: 18px;
            color: var(--text-primary);
        }

        .user-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px;
            background: var(--bg-primary);
            border-radius: 20px;
            margin-bottom: 25px;
        }

        .user-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--primary), var(--info));
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .user-info h4 {
            font-size: 14px;
            margin-bottom: 4px;
        }

        .user-info p {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            margin: 5px 0;
            border-radius: 14px;
            cursor: pointer;
            color: var(--text-secondary);
            transition: var(--transition);
            font-weight: 500;
        }

        .menu-item:hover {
            background: var(--primary);
            color: white;
            transform: translateX(-5px);
        }

        .menu-item.active {
            background: linear-gradient(135deg, var(--primary), var(--info));
            color: white;
            box-shadow: 0 5px 15px rgba(59,130,246,0.3);
        }

        .menu-item i {
            font-size: 20px;
            width: 24px;
            text-align: center;
        }

        /* ========== المحتوى الرئيسي ========== */
        .main-content {
            flex: 1;
            margin-right: 280px;
            padding: 20px 30px;
            transition: var(--transition);
        }

        .sidebar.collapsed ~ .main-content {
            margin-right: 80px;
        }

        /* ========== الهيدر ========== */
        .top-bar {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px 25px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            border: 1px solid var(--border);
        }

        .page-title h2 {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-primary), var(--text-secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .top-bar-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        /* ========== الأزرار ========== */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-2px); }
        .btn-success { background: var(--success); color: white; }
        .btn-success:hover { transform: translateY(-2px); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-warning { background: var(--warning); color: #1e293b; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-primary); }
        .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
        .btn-sm { padding: 5px 12px; font-size: 12px; }

        /* ========== الكروت الإحصائية ========== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid var(--border);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(135deg, var(--primary), var(--info));
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow);
        }

        .stat-card .stat-icon {
            font-size: 32px;
            margin-bottom: 12px;
        }

        .stat-card .stat-value {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 5px;
        }

        .stat-card .stat-label {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* ========== الجداول ========== */
        .card-box {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid var(--border);
            margin-bottom: 25px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .table-wrapper {
            overflow-x: auto;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th {
            text-align: right;
            padding: 15px 12px;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 13px;
            border-bottom: 1px solid var(--border);
        }

        .data-table td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }

        .data-table tr:hover td {
            background: rgba(59, 130, 246, 0.05);
        }

        /* ========== الشارات ========== */
        .badge {
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 700;
        }

        .badge-success { background: rgba(16, 185, 129, 0.2); color: #34d399; }
        .badge-danger { background: rgba(239, 68, 68, 0.2); color: #f87171; }
        .badge-warning { background: rgba(245, 158, 11, 0.2); color: #fbbf24; }
        .badge-info { background: rgba(139, 92, 246, 0.2); color: #a78bfa; }

        /* ========== النماذج ========== */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        input, select, textarea {
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: inherit;
            transition: var(--transition);
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        /* ========== المودال ========== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: var(--bg-card);
            border-radius: 28px;
            max-width: 600px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 30px;
            border: 1px solid var(--border);
            animation: fadeInUp 0.3s ease;
        }

        /* ========== التنبيهات ========== */
        .toast-notification {
            position: fixed;
            bottom: 20px;
            left: 20px;
            padding: 14px 24px;
            border-radius: 60px;
            z-index: 1100;
            animation: slideIn 0.3s ease;
            font-weight: 600;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
        }

        /* ========== وضع الجوال ========== */
        body.mobile-view .sidebar {
            transform: translateX(100%);
            position: fixed;
            z-index: 200;
        }

        body.mobile-view .sidebar.open {
            transform: translateX(0);
        }

        body.mobile-view .main-content {
            margin-right: 0;
        }

        body.mobile-view .stats-grid {
            grid-template-columns: 1fr;
        }

        .mobile-menu-btn {
            display: none;
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 150;
            background: var(--primary);
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 12px;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }

        body.mobile-view .mobile-menu-btn {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ========== إعدادات النظام ========== */
        .settings-section {
            margin-bottom: 25px;
        }

        .color-preview {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            cursor: pointer;
            transition: var(--transition);
        }

        .color-preview:hover {
            transform: scale(1.1);
        }

        /* ========== استجابة ========== */
        @media (max-width: 992px) {
            .sidebar {
                width: 240px;
            }
            .main-content {
                margin-right: 240px;
            }
        }

        @media (max-width: 768px) {
            .main-content {
                margin-right: 0;
                padding: 15px;
            }
            .sidebar {
                transform: translateX(100%);
                width: 260px;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<button class="mobile-menu-btn" onclick="toggleMobileMenu()">☰</button>

<div class="app-container">
    <!-- السايد بار -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <div class="logo-icon" id="companyLogoDisplay">📊</div>
            <h3 id="companyNameDisplay">SEMO ERP PRO</h3>
        </div>

        <div class="user-card">
            <div class="user-avatar" id="userAvatar">👑</div>
            <div class="user-info">
                <h4 id="userName">مدير النظام</h4>
                <p id="userRole">مدير عام</p>
            </div>
        </div>

        <div class="menu-item active" onclick="switchSection('dashboard')">
            <i>🏠</i> <span>الرئيسية</span>
        </div>
        <div class="menu-item" onclick="switchSection('inventory')">
            <i>📦</i> <span>المخزون</span>
        </div>
        <div class="menu-item" onclick="switchSection('sales')">
            <i>🛒</i> <span>المبيعات</span>
        </div>
        <div class="menu-item" onclick="switchSection('purchases')">
            <i>📥</i> <span>المشتريات</span>
        </div>
        <div class="menu-item" onclick="switchSection('clients')">
            <i>👥</i> <span>العملاء</span>
        </div>
        <div class="menu-item" onclick="switchSection('suppliers')">
            <i>🏭</i> <span>الموردين</span>
        </div>
        <div class="menu-item" onclick="switchSection('expenses')">
            <i>💸</i> <span>المصروفات</span>
        </div>
        <div class="menu-item" onclick="switchSection('revenues')">
            <i>💰</i> <span>الإيرادات</span>
        </div>
        <div class="menu-item" onclick="switchSection('reports')">
            <i>📊</i> <span>التقارير</span>
        </div>
        <div class="menu-item" onclick="showSettingsPanel()">
            <i>⚙️</i> <span>إعدادات متقدمة</span>
        </div>
        <div class="menu-item" onclick="logout()">
            <i>🚪</i> <span>خروج</span>
        </div>
    </div>

    <!-- المحتوى الرئيسي -->
    <div class="main-content">
        <div class="top-bar">
            <div class="page-title">
                <h2 id="pageTitle">🏠 لوحة التحكم</h2>
                <small id="dateDisplay"></small>
            </div>
            <div class="top-bar-actions">
                <button class="btn btn-outline" onclick="toggleTheme()" id="themeBtn">🌙</button>
                <button class="btn btn-outline" onclick="toggleMobileView()">📱 وضع الجوال</button>
                <button class="btn btn-primary" onclick="exportData()">📥 تصدير تقرير</button>
            </div>
        </div>

        <!-- محتوى الصفحات ديناميكي -->
        <div id="pageContent"></div>
    </div>
</div>

<!-- مودال الإعدادات المتقدمة -->
<div id="settingsModal" class="modal">
    <div class="modal-content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
            <h3>⚙️ الإعدادات المتقدمة</h3>
            <button class="btn btn-outline btn-sm" onclick="closeModal('settingsModal')">✕</button>
        </div>

        <div class="settings-section">
            <h4 style="margin-bottom: 15px;">🏢 معلومات الشركة</h4>
            <div class="form-grid">
                <div class="form-group">
                    <label>اسم الشركة</label>
                    <input type="text" id="companyName" placeholder="اسم الشركة">
                </div>
                <div class="form-group">
                    <label>شعار الشركة (رمز)</label>
                    <input type="text" id="companyLogo" placeholder="📊 أو 🏢">
                </div>
                <div class="form-group">
                    <label>رقم الهاتف</label>
                    <input type="text" id="companyPhone" placeholder="رقم الهاتف">
                </div>
                <div class="form-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" id="companyEmail" placeholder="البريد الإلكتروني">
                </div>
                <div class="form-group">
                    <label>العنوان</label>
                    <input type="text" id="companyAddress" placeholder="العنوان">
                </div>
                <div class="form-group">
                    <label>رمز العملة</label>
                    <input type="text" id="currencySymbol" placeholder="ج.م" value="ج.م">
                </div>
            </div>
        </div>

        <div class="settings-section">
            <h4 style="margin-bottom: 15px;">🎨 ألوان النظام</h4>
            <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                <div class="color-preview" style="background: #3b82f6;" onclick="setPrimaryColor('#3b82f6')"></div>
                <div class="color-preview" style="background: #8b5cf6;" onclick="setPrimaryColor('#8b5cf6')"></div>
                <div class="color-preview" style="background: #ec4899;" onclick="setPrimaryColor('#ec4899')"></div>
                <div class="color-preview" style="background: #06b6d4;" onclick="setPrimaryColor('#06b6d4')"></div>
                <div class="color-preview" style="background: #10b981;" onclick="setPrimaryColor('#10b981')"></div>
            </div>
        </div>

        <div class="settings-section">
            <h4 style="margin-bottom: 15px;">🔐 إدارة المستخدمين</h4>
            <div id="usersList"></div>
            <button class="btn btn-success btn-sm" onclick="addNewUser()" style="margin-top: 10px;">➕ إضافة مستخدم جديد</button>
        </div>

        <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px;">
            <button class="btn btn-secondary" onclick="closeModal('settingsModal')">إلغاء</button>
            <button class="btn btn-primary" onclick="saveSettings()">💾 حفظ الإعدادات</button>
        </div>
    </div>
</div>

<script>
    // ==================== قاعدة البيانات الأساسية ====================
    let db = {
        inventory: JSON.parse(localStorage.getItem('semo_inventory')) || [],
        sales: JSON.parse(localStorage.getItem('semo_sales')) || [],
        purchases: JSON.parse(localStorage.getItem('semo_purchases')) || [],
        clients: JSON.parse(localStorage.getItem('semo_clients')) || [],
        suppliers: JSON.parse(localStorage.getItem('semo_suppliers')) || [],
        expenses: JSON.parse(localStorage.getItem('semo_expenses')) || [],
        revenues: JSON.parse(localStorage.getItem('semo_revenues')) || [],
        users: JSON.parse(localStorage.getItem('semo_users')) || [],
        settings: JSON.parse(localStorage.getItem('semo_settings')) || {
            companyName: 'SEMO ERP PRO',
            companyLogo: '📊',
            companyPhone: '0930509018',
            companyEmail: 'semoo.zaher@gmail.com',
            companyAddress: '',
            currencySymbol: 'ج.م',
            primaryColor: '#3b82f6'
        }
    };

    // المستخدم الحالي
    let currentUser = JSON.parse(localStorage.getItem('semo_user')) || { name: 'مدير النظام', role: 'admin', avatar: '👑' };
    let currentSection = 'dashboard';

    // دوال مساعدة
    function saveAll() {
        localStorage.setItem('semo_inventory', JSON.stringify(db.inventory));
        localStorage.setItem('semo_sales', JSON.stringify(db.sales));
        localStorage.setItem('semo_purchases', JSON.stringify(db.purchases));
        localStorage.setItem('semo_clients', JSON.stringify(db.clients));
        localStorage.setItem('semo_suppliers', JSON.stringify(db.suppliers));
        localStorage.setItem('semo_expenses', JSON.stringify(db.expenses));
        localStorage.setItem('semo_revenues', JSON.stringify(db.revenues));
        localStorage.setItem('semo_users', JSON.stringify(db.users));
        localStorage.setItem('semo_settings', JSON.stringify(db.settings));
    }

    function today() { return new Date().toLocaleDateString('ar-EG'); }
    function formatCurrency(amount) { return amount.toLocaleString() + ' ' + (db.settings.currencySymbol || 'ج.م'); }
    function showNotification(msg, type = 'success') {
        const toast = document.createElement('div');
        toast.className = 'toast-notification';
        toast.style.background = type === 'success' ? '#10b981' : type === 'danger' ? '#ef4444' : '#f59e0b';
        toast.style.color = type === 'warning' ? '#1e293b' : 'white';
        toast.innerHTML = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    // ==================== الإعدادات ====================
    function applySettings() {
        document.getElementById('companyLogoDisplay').innerHTML = db.settings.companyLogo || '📊';
        document.getElementById('companyNameDisplay').innerHTML = db.settings.companyName || 'SEMO ERP PRO';
        document.getElementById('companyName').value = db.settings.companyName || '';
        document.getElementById('companyLogo').value = db.settings.companyLogo || '📊';
        document.getElementById('companyPhone').value = db.settings.companyPhone || '';
        document.getElementById('companyEmail').value = db.settings.companyEmail || '';
        document.getElementById('companyAddress').value = db.settings.companyAddress || '';
        document.getElementById('currencySymbol').value = db.settings.currencySymbol || 'ج.م';
        document.documentElement.style.setProperty('--primary', db.settings.primaryColor || '#3b82f6');
        document.documentElement.style.setProperty('--primary-hover', db.settings.primaryColor ? db.settings.primaryColor + 'cc' : '#2563eb');
    }

    function saveSettings() {
        db.settings.companyName = document.getElementById('companyName').value;
        db.settings.companyLogo = document.getElementById('companyLogo').value;

    // ==================== دوال الصفحات ====================
    function switchSection(section) {
        currentSection = section;
        document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
        event?.target?.closest('.menu-item')?.classList.add('active');
        
        if (section === 'dashboard') renderDashboard();
        else if (section === 'inventory') renderInventory();
        else if (section === 'sales') renderSales();
        else if (section === 'purchases') renderPurchases();
        else if (section === 'clients') renderClients();
        else if (section === 'suppliers') renderSuppliers();
        else if (section === 'expenses') renderExpenses();
        else if (section === 'revenues') renderRevenues();
        else if (section === 'reports') renderReports();
        
        const titles = {
            dashboard: '🏠 لوحة التحكم',
            inventory: '📦 إدارة المخزون',
            sales: '🛒 المبيعات والفواتير',
            purchases: '📥 المشتريات وأوامر الشراء',
            clients: '👥 العملاء',
            suppliers: '🏭 الموردين',
            expenses: '💸 المصروفات',
            revenues: '💰 الإيرادات',
            reports: '📊 التقارير والتحليلات'
        };
        document.getElementById('pageTitle').innerHTML = titles[section] || 'لوحة التحكم';
    }

    // ==================== لوحة التحكم ====================
    function renderDashboard() {
        const totalSales = db.sales.reduce((s, i) => s + (i.total || 0), 0);
        const totalPurchases = db.purchases.reduce((s, i) => s + (i.total || 0), 0);
        const totalExpenses = db.expenses.reduce((s, i) => s + (i.amount || 0), 0);
        const totalRevenues = db.revenues.reduce((s, i) => s + (i.amount || 0), 0);
        const profit = totalSales - totalPurchases - totalExpenses + totalRevenues;
        const lowStock = db.inventory.filter(i => (i.qty || 0) <= 5).length;
        
        const html = `
            <div class="stats-grid animate-in">
                <div class="stat-card"><div class="stat-icon">💰</div><div class="stat-value">${formatCurrency(totalSales)}</div><div class="stat-label">إجمالي المبيعات</div></div>
                <div class="stat-card"><div class="stat-icon">📥</div><div class="stat-value">${formatCurrency(totalPurchases)}</div><div class="stat-label">إجمالي المشتريات</div></div>
                <div class="stat-card"><div class="stat-icon">💸</div><div class="stat-value">${formatCurrency(totalExpenses)}</div><div class="stat-label">المصروفات</div></div>
                <div class="stat-card"><div class="stat-icon">💰</div><div class="stat-value">${formatCurrency(totalRevenues)}</div><div class="stat-label">الإيرادات</div></div>
                <div class="stat-card"><div class="stat-icon">📈</div><div class="stat-value" style="color:${profit >= 0 ? '#34d399' : '#f87171'}">${formatCurrency(profit)}</div><div class="stat-label">صافي الربح</div></div>
                <div class="stat-card"><div class="stat-icon">📦</div><div class="stat-value">${db.inventory.length}</div><div class="stat-label">المنتجات</div></div>
                <div class="stat-card"><div class="stat-icon">⚠️</div><div class="stat-value" style="color:${lowStock > 0 ? '#fbbf24' : '#34d399'}">${lowStock}</div><div class="stat-label">منتجات منخفضة</div></div>
                <div class="stat-card"><div class="stat-icon">👥</div><div class="stat-value">${db.clients.length}</div><div class="stat-label">العملاء</div></div>
            </div>
            <div class="stats-grid" id="chartsGrid" style="grid-template-columns: 1fr 1fr;"></div>
            <div class="card-box"><div class="card-header"><h3>📋 آخر المبيعات</h3></div><div class="table-wrapper"><table class="data-table"><thead><tr><th>التاريخ</th><th>العميل</th><th>المبلغ</th><th>الحالة</th></tr></thead><tbody id="recentSalesTable"></tbody></table></div></div>
        `;
        document.getElementById('pageContent').innerHTML = html;
        
        // رسم الرسوم البيانية
        const months = ['يناير', 'فبراير', 'مارس', 'أبريل', 'مايو', 'يونيو', 'يوليو', 'أغسطس', 'سبتمبر', 'أكتوبر', 'نوفمبر', 'ديسمبر'];
        let monthlyData = Array(12).fill(0);
        db.sales.forEach(s => { let d = new Date(s.date); if (!isNaN(d)) monthlyData[d.getMonth()] += s.total || 0; });
        
        document.getElementById('chartsGrid').innerHTML = `
            <div class="card-box"><canvas id="monthlyChart" height="200"></canvas></div>
            <div class="card-box"><canvas id="categoryChart" height="200"></canvas></div>
        `;
        
        new Chart(document.getElementById('monthlyChart'), { type: 'bar', data: { labels: months, datasets: [{ label: 'المبيعات', data: monthlyData, backgroundColor: '#3b82f6', borderRadius: 8 }] }, options: { responsive: true } });
        
        let categories = {};
        db.inventory.forEach(i => { let c = i.category || 'عام'; categories[c] = (categories[c] || 0) + (i.qty || 0) * (i.price || 0); });
        new Chart(document.getElementById('categoryChart'), { type: 'doughnut', data: { labels: Object.keys(categories), datasets: [{ data: Object.values(categories), backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#ef4444'] }] }, options: { responsive: true } });
        
        // جدول آخر المبيعات
        const recentSales = [...db.sales].sort((a,b) => new Date(b.date) - new Date(a.date)).slice(0, 5);
        document.getElementById('recentSalesTable').innerHTML = recentSales.map(s => `
            <tr><td>${s.date}</td><td>${s.clientName}</td><td>${formatCurrency(s.total)}</td><td><span class="badge ${s.status === 'مدفوع' ? 'badge-success' : 'badge-warning'}">${s.status}</span></td></tr>
        `).join('');
    }

    function showAddProductModal() {

        if (!name) return;
        const category = prompt('الفئة:', 'عام');
        const qty = parseInt(prompt('الكمية:', '0'));
        const price = parseFloat(prompt('السعر:', '0'));
        if (isNaN(qty) || isNaN(price)) return;
        db.inventory.push({ id: Date.now(), name, category: category || 'عام', qty, price });
        saveAll();
        refreshInventoryTable();
        showNotification('✅ تمت إضافة المنتج');
    }

    function editProduct(id) {
        const item = db.inventory.find(i => i.id === id);
        if (!item) return;
        const newName = prompt('اسم المنتج الجديد:', item.name);
        if (newName) item.name = newName;
        const newQty = parseInt(prompt('الكمية الجديدة:', item.qty));
        if (!isNaN(newQty)) item.qty = newQty;
        const newPrice = parseFloat(prompt('السعر الجديد:', item.price));
        if (!isNaN(newPrice)) item.price = newPrice;
        saveAll();
        refreshInventoryTable();
        showNotification('✅ تم التعديل');
    }

    function showAddPurchaseModal() {
        const supplier = prompt('اسم المورد:');
        if (!supplier) return;
        const product = prompt('اسم المنتج:');
        if (!product) return;
        const qty = parseInt(prompt('الكمية:', '1'));
        const price = parseFloat(prompt('السعر:', '0'));
        if (isNaN(qty) || isNaN(price)) return;
        const total = qty * price;
        db.purchases.push({ id: Date.now(), supplier, product, qty, price, total, date: today() });
        // تحديث المخزون
        const existing = db.inventory.find(i => i.name === product);
        if (existing) existing.qty += qty;
        else db.inventory.push({ id: Date.now(), name: product, category: 'مشتريات', qty, price });
        saveAll();
        refreshPurchasesTable();
        if (currentSection === 'dashboard') renderDashboard();
        showNotification('✅ تمت إضافة أمر الشراء وتحديث المخزون');
    }
