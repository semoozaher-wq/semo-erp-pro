<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEMO ERP | لوحة التحكم</title>
    <!-- خط تجريبي -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- مكتبة الرسم البياني -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --primary: #3b82f6;
            --dark: #0f172a;
            --card-bg: #1e293b;
            --text: #ffffff;
            --text-muted: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
        }

        body {
            margin: 0;
            font-family: 'Cairo', sans-serif;
            background: var(--dark);
            color: var(--text);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* القائمة الجانبية */
        .sidebar {
            width: 250px;
            background: var(--card-bg);
            border-left: 1px solid #334155;
            display: flex;
            flex-direction: column;
            padding: 20px;
            transition: all 0.3s;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 40px;
            text-align: center;
        }

        .menu-item {
            padding: 12px 15px;
            margin-bottom: 10px;
            border-radius: 10px;
            cursor: pointer;
            color: var(--text-muted);
            transition: 0.3s;
            display: flex;
            align-items: center;
            text-decoration: none;
        }

        .menu-item.active, .menu-item:hover {
            background: var(--primary);
            color: white;
        }

        .menu-item i { margin-left: 10px; }

        .logout-btn {
            margin-top: auto;
            background: var(--danger);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        /* المحتوى الرئيسي */
        .main-content {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        /* البطاقات */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; right: 0; width: 4px; height: 100%;
            background: var(--primary);
        }

        .card h3 {
            margin: 0;
            font-size: 14px;
            color: var(--text-muted);
            font-weight: normal;
        }

        .card .value {
            font-size: 28px;
            font-weight: bold;
            margin-top: 10px;
        }

        .card .icon {
            position: absolute;
            left: 20px;
            top: 20px;
            font-size: 30px;
            opacity: 0.2;
        }

        /* الرسم البياني */
        .chart-container {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            height: 400px;
        }

        /* موبايل */
        @media (max-width: 768px) {
            .sidebar { display: none; } /* يمكن تحويلها لقائمة منسدلة */
            .cards-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- القائمة الجانبية -->
    <div class="sidebar">
        <div class="logo">SEMO ERP</div>
        <a href="#" class="menu-item active">📊 لوحة التحكم</a>
        <a href="#" class="menu-item">🛍️ المبيعات</a>
        <a href="#" class="menu-item">📦 المنتجات</a>
        <a href="#" class="menu-item">👥 العملاء</a>
        <a href="#" class="menu-item">⚙️ الإعدادات</a>
        <button class="logout-btn" onclick="logout()">تسجيل خروج</button>
    </div>

    <!-- المحتوى -->
    <div class="main-content">
        <div class="header">
            <h2>نظرة عامة</h2>
            <div class="user-info">
                <span id="user-email-display">المستخدم</span>
                <div class="avatar">U</div>
            </div>
        </div>

        <!-- البطاقات الإحصائية -->
        <div class="cards-grid">
            <div class="card">
                <h3>إجمالي المبيعات</h3>
                <div class="value" id="total-sales">جاري التحميل...</div>
                <div class="icon">💰</div>
            </div>
            <div class="card">
                <h3>عدد الفواتير</h3>
                <div class="value" id="total-invoices">0</div>
                <div class="icon">🧾</div>
            </div>
            <div class="card">
                <h3>المنتجات</h3>
                <div class="value" id="total-products">0</div>
                <div class="icon">📦</div>
            </div>
            <div class="card">
                <h3>العملاء النشطين</h3>
                <div class="value" id="total-customers">0</div>
                <div class="icon">👥</div>
            </div>
        </div>

        <!-- الرسم البياني -->
        <div class="chart-container">
            <canvas id="salesChart"></canvas>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        // --- إعدادات Firebase (نفس الإعدادات السابقة) ---
        const firebaseConfig = {
            apiKey: "AIzaSyCfVMHNoqbh86I0JJjnguGY6seA4vWJsSU",
            authDomain: "my-pos-system-11dee.firebaseapp.com",
            databaseURL: "https://my-pos-system-11dee-default-rtdb.firebaseio.com",
            projectId: "my-pos-system-11dee",
            storageBucket: "my-pos-system-11dee.appspot.com",
            messagingSenderId: "565195477080",
            appId: "1:565195477080:web:1ffa21a34e28b47dddfa2d"
        };

        // تهيئة Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let salesChartInstance = null;

        // --- 1. التحقق من تسجيل الدخول ---
        auth.onAuthStateChanged((user) => {
            if (!user) {
                window.location.href = 'index.html'; // لو مش مسجل، ارجع للصفحة الأولى
            } else {
                document.getElementById('user-email-display').textContent = user.email;
                document.querySelector('.avatar').textContent = user.email.toUpperCase();
                loadDashboardData(); // حمّل البيانات
            }
        });

        // --- 2. تحميل البيانات من Firebase وعرضها ---
        function loadDashboardData() {
            // أ) جلب عدد الفواتير وحساب إجمالي المبيعات
            // ملاحظة: في التطبيق الحقيقي، نفضل نجمع المبيعات في الـ Backend أو Cloud Functions
            // هنا هنعملها في الـ Client للتجربة
            
            db.collection('invoices').get().then((querySnapshot) => {
                let totalAmount = 0;
                const invoiceCount = querySnapshot.size;
                
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    totalAmount += (data.total || 0);
                });

                // عرض الأرقام مع تنسيق العملة
                document.getElementById('total-invoices').textContent = invoiceCount;
                document.getElementById('total-sales').textContent = totalAmount.toLocaleString('ar-EG') + ' ج.م';

                // ج) تحديث الرسم البياني (لو فيه بيانات)
                updateChart(querySnapshot.docs);
            });

            // ب) جلب عدد المنتجات (مثال بسيط)
            db.collection('products').count().get().then((snapshot) => {
                document.getElementById('total-products').textContent = snapshot.data().count;
            });

            // د) جلب عدد العملاء
            db.collection('customers').count().get().then((snapshot) => {
                document.getElementById('total-customers').textContent = snapshot.data().count;
            });
        }

        // --- 3. رسم الرسم البياني ---
        function updateChart(invoiceDocs) {
            // تجهيز البيانات للرسم (مثال: مبيعات كل شهر)
            // في الواقع نحتاج نجمع البيانات حسب التاريخ
            const labels = ['يناير', 'فبراير', 'مارس', 'أبريل', 'مايو', 'يونيو'];
            const dataPoints = [];

            // هنا سنفترض بيانات وهمية للتجربة لو مفيش فواتير حقيقية
            // يمكنك تعديل هذا الجزء ليعمل مع بيانات حقيقية من Firestore
            if (invoiceDocs.length === 0) {
                dataPoints.push(1200, 1900, 3000, 5000, 2000, 3000); // بيانات وهمية
            } else {
                // منطق بسيط: نستخدم قيمة الفاتورة كبيانات (للتبسيط فقط)
                // في الواقع يجب تجميع البيانات حسب التاريخ
                invoiceDocs.forEach(doc => {
                    dataPoints.push(doc.data().total || 1000);
                });
                // لو البيانات قليلة نملأ الفراغ
                while(dataPoints.length < 6) dataPoints.push(Math.floor(Math.random() * 5000));
            }

            const ctx = document.getElementById('salesChart').getContext('2d');
            
            if (salesChartInstance) salesChartInstance.destroy();

            salesChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'المبيعات (ج.م)',
                        data: dataPoints,
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.4, // انحناء الخط
                        pointBackgroundColor: '#fff',
                        pointBorderColor: '#3b82f6',
                        pointRadius: 5
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            labels: { color: '#94a3b8' }
                        }
                    },
                    scales: {
                        y: {
                            grid: { color: '#334155' },
                            ticks: { color: '#94a3b8' }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { color: '#94a3b8' }
                        }
                    }
                }
            });
        }

        // --- 4. تسجيل الخروج ---
        function logout() {
            auth.signOut().then(() => {
                window.location.href = 'index.html';
            });
        }
    </script>
</body>
</html>
