<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المركز المالي | SEMO ERP</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <style>
        :root { --primary: #0f172a; --accent: #3b82f6; --success: #10b981; --bg: #f8fafc; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); display: flex; height: 100vh; overflow: hidden; }

        aside { width: 260px; background: var(--primary); color: white; display: flex; flex-direction: column; transition: 0.3s; }
        .logo { padding: 30px; font-weight: 900; font-size: 1.6rem; color: var(--accent); text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .nav-item { padding: 18px 25px; cursor: pointer; display: flex; align-items: center; gap: 15px; color: #94a3b8; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { background: #1e293b; color: white; border-right: 4px solid var(--accent); }

        main { flex: 1; padding: 30px; overflow-y: auto; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); border-right: 5px solid var(--accent); }
        .stat-card h4 { color: #64748b; font-size: 0.9rem; margin-bottom: 10px; }
        .stat-card .val { font-size: 1.8rem; font-weight: 800; color: var(--primary); }

        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); max-width: 500px; }
        input, select { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #e2e8f0; border-radius: 12px; outline: none; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; cursor: pointer; font-weight: 700; background: var(--accent); color: white; transition: 0.3s; }
        .btn:hover { background: #2563eb; transform: translateY(-2px); }

        @media (max-width: 768px) { aside { width: 70px; } aside span { display: none; } }
    </style>
</head>
<body>

    <aside>
        <div class="logo">SEMO <span style="color:white">ERP</span></div>
        <nav style="margin-top: 20px;">
            <div class="nav-item active"><i class="fas fa-wallet"></i> <span>المركز المالي</span></div>
            <div class="nav-item" onclick="logout()" style="color: #ef4444;"><i class="fas fa-power-off"></i> <span>خروج</span></div>
        </nav>
    </aside>

    <main>
        <div class="top-bar">
            <h2 id="welcome-msg">لوحة التحكم المالية 📊</h2>
            <div id="user-mail" style="font-weight: 600; color: var(--primary);">جاري التحميل...</div>
        </div>

        <div class="grid">
            <div class="stat-card" style="border-color: #3b82f6;"><h4>دينار ليبي (د.ل)</h4><div class="val" id="st-ly">0.00</div></div>
            <div class="stat-card" style="border-color: #10b981;"><h4>جنيه مصري (ج.م)</h4><div class="val" id="st-eg">0.00</div></div>
            <div class="stat-card" style="border-color: #f59e0b;"><h4>ريال سعودي (ر.س)</h4><div class="val" id="st-sa">0.00</div></div>
        </div>

        <div class="card">
            <h3><i class="fas fa-plus-circle"></i> تسجيل عملية جديدة</h3>
            <input type="text" id="cust" placeholder="اسم العميل أو البيان">
            <select id="curr">
                <option value="د.ل">دينار ليبي</option>
                <option value="ج.م">جنيه مصري</option>
                <option value="ر.س">ريال سعودي</option>
            </select>
            <input type="number" id="amt" placeholder="المبلغ">
            <button class="btn" onclick="save()">ترحيل البيانات للسحابة ✅</button>
        </div>
    </main>

    <script>
        // إعدادات مشروعك المربوط my-pos-system-11dee
        const firebaseConfig = {
            apiKey: "AIzaSyC2EVpNEG9XjcPEelUA8lkIUcUceN6Oh0k",
            authDomain: "://firebaseapp.com",
            projectId: "my-pos-system-11dee",
            databaseURL: "https://firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let uID = null;

        firebase.auth().onAuthStateChanged(user => {
            if (user) {
                uID = user.uid;
                document.getElementById('user-mail').innerText = user.email;
                syncData();
            } else {
                window.location.assign("index.html");
            }
        });

        function save() {
            const n = document.getElementById('cust').value, 
                  a = parseFloat(document.getElementById('amt').value), 
                  c = document.getElementById('curr').value;
            if(n && a) {
                db.ref('erp_data/' + uID).push({ n, a, c, date: Date.now() });
                alert("تم الترحيل بنجاح ✅");
                document.getElementById('cust').value = '';
                document.getElementById('amt').value = '';
            } else { alert("أكمل البيانات"); }
        }

        function syncData() {
            db.ref('erp_data/' + uID).on('value', snap => {
                const logs = snap.val() ? Object.values(snap.val()) : [];
                const calc = (cur) => logs.filter(i => i.c === cur).reduce((s, x) => s + x.a, 0).toLocaleString(undefined, {minimumFractionDigits: 2});
                document.getElementById('st-ly').innerText = calc('د.ل');
                document.getElementById('st-eg').innerText = calc('ج.م');
                document.getElementById('st-sa').innerText = calc('ر.س');
            });
        }

        function logout() { firebase.auth().signOut(); }
    </script>
</body>
</html>
